name: Docker Build and Push (reusable)

"on":
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (without registry/namespace).'
        required: true
        type: string
      dockerfile:
        description: 'Path to the Dockerfile.'
        required: false
        type: string
        default: ./Dockerfile
      build_context:
        description: 'Docker build context.'
        required: false
        type: string
        default: .
      registry:
        description: 'Container registry hostname.'
        required: false
        type: string
        default: docker.io
      push:
        description: "'true'/'false' to force push behaviour. Empty => push only on push to default branch."
        required: false
        type: string
        default: ''
      image_version:
        description: 'Explicit image version tag. Overrides auto-resolved version when set.'
        required: false
        type: string
        default: ''
      extra_tags:
        description: 'Newline-separated extra tags to apply to the manifest.'
        required: false
        type: string
        default: ''
      latest:
        description: 'Also tag the manifest as :latest when pushing.'
        required: false
        type: boolean
        default: true
      multi_arch:
        description: 'Build amd64 + arm64. When false, only amd64 is built.'
        required: false
        type: boolean
        default: true
      platforms:
        description: 'Override platform list (comma-separated). Empty => derived from `multi_arch`.'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Newline-separated KEY=VALUE Docker build args.'
        required: false
        type: string
        default: ''
      version_build_arg:
        description: >-
          Dockerfile ARG name to receive the resolved version at build time
          (also the default ARG to read the version from). Empty to skip.
        required: false
        type: string
        default: APP_VERSION
      inject_oci_build_args:
        description: 'Inject standard OCI build-args (BUILD_DATE, VCS_REF, VCS_URL).'
        required: false
        type: boolean
        default: true
      auto_resolve_version:
        description: 'Run the resolve-docker-image-tags composite action.'
        required: false
        type: boolean
        default: true
      version_source:
        description: '`auto` | `dockerfile` | `file` | `git_tag` | `sha`.'
        required: false
        type: string
        default: auto
      version_file:
        description: 'Plain-text version file path (used by `file`/`auto`).'
        required: false
        type: string
        default: VERSION
      distro:
        description: 'Optional distro/variant suffix (e.g. `alpine`, `noble`).'
        required: false
        type: string
        default: ''
      build_date:
        description: 'Override ISO-8601 build date label. Auto-computed when blank.'
        required: false
        type: string
        default: ''
      manifest_retries:
        description: 'Retry attempts when creating the manifest.'
        required: false
        type: number
        default: 3
      manifest_retry_delay:
        description: 'Seconds between manifest retry attempts.'
        required: false
        type: number
        default: 15
      actions_repo:
        description: 'Repo hosting the resolve-docker-image-tags composite action.'
        required: false
        type: string
        default: blackoutsecure/platform-automation
      resolver_ref:
        description: 'Git ref of `actions_repo` to checkout.'
        required: false
        type: string
        default: main
      runner_type:
        description: '`cloud` (GitHub-hosted) or `self-hosted`.'
        required: false
        type: string
        default: cloud
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DOCKERHUB_NAMESPACE:
        required: true
      ACTIONS_REPO_TOKEN:
        description: 'Optional. Only needed if `actions_repo` is private; falls back to GITHUB_TOKEN.'
        required: false
    outputs:
      image:
        description: 'Fully qualified image reference (registry/namespace/name).'
        value: ${{ jobs.manifest.outputs.image }}
      image_version:
        description: 'Resolved image version tag.'
        value: ${{ jobs.setup.outputs.image_version }}

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DIGESTS_DIR: /tmp/digests
  DIGEST_ARTIFACT_PREFIX: digests

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      push: ${{ steps.resolve.outputs.push }}
      image_version: ${{ steps.resolve.outputs.image_version }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      extra_tags: ${{ steps.resolve.outputs.extra_tags }}
    steps:
      - name: Preflight validation
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          REGISTRY: ${{ inputs.registry }}
          VERSION_SOURCE: ${{ inputs.version_source }}
          IMAGE_VERSION: ${{ inputs.image_version }}
          EXTRA_TAGS: ${{ inputs.extra_tags }}
          DISTRO: ${{ inputs.distro }}
          RUNNER_TYPE: ${{ inputs.runner_type }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          # Reject whitespace/newlines (a stray newline in a secret silently breaks GITHUB_OUTPUT).
          check_singleline() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is missing"; return; }
            case "${val}" in
              *[$'\n\r\t ']*) fail "${name} contains whitespace/newlines" ;;
            esac
          }

          TAG_RE='^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$'
          check_tag() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is empty"; return; }
            printf '%s' "${val}" | grep -Eq "${TAG_RE}" \
              || fail "${name} is not a valid Docker tag: '${val}'"
          }

          check_singleline "input 'image_name'"           "${IMAGE_NAME}"
          check_singleline "input 'registry'"             "${REGISTRY}"
          check_singleline "secret 'DOCKERHUB_USERNAME'"  "${DOCKERHUB_USERNAME}"
          check_singleline "secret 'DOCKERHUB_TOKEN'"     "${DOCKERHUB_TOKEN}"
          check_singleline "secret 'DOCKERHUB_NAMESPACE'" "${DOCKERHUB_NAMESPACE}"

          case "${VERSION_SOURCE}" in
            auto|dockerfile|file|git_tag|sha) ;;
            *) fail "input 'version_source' must be one of: auto|dockerfile|file|git_tag|sha (got '${VERSION_SOURCE}')" ;;
          esac

          case "${RUNNER_TYPE}" in
            cloud|self-hosted) ;;
            *) fail "input 'runner_type' must be 'cloud' or 'self-hosted' (got '${RUNNER_TYPE}')" ;;
          esac

          if ! printf '%s' "${IMAGE_NAME}" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            fail "input 'image_name' is not a valid Docker image name: '${IMAGE_NAME}'"
          fi

          if [ -n "${IMAGE_VERSION}" ]; then
            check_singleline "input 'image_version'" "${IMAGE_VERSION}"
            check_tag        "input 'image_version'" "${IMAGE_VERSION}"
          fi

          if [ -n "${DISTRO}" ]; then
            check_singleline "input 'distro'" "${DISTRO}"
            check_tag        "input 'distro'" "${DISTRO}"
          fi

          if [ -n "${EXTRA_TAGS}" ]; then
            line_no=0
            while IFS= read -r raw || [ -n "${raw}" ]; do
              line_no=$((line_no + 1))
              tag="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "${tag}" ] && continue
              case "${tag}" in \#*) continue ;; esac
              check_tag "input 'extra_tags' line ${line_no}" "${tag}"
            done <<< "${EXTRA_TAGS}"
          fi

          [ "${ERR}" -eq 0 ] || { echo "Preflight validation failed." >&2; exit 1; }
          echo "Preflight OK."

      - name: Checkout caller repo
        if: inputs.auto_resolve_version
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout composite actions
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.actions_repo }}
          ref: ${{ inputs.resolver_ref }}
          path: .platform-automation
          token: ${{ secrets.ACTIONS_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: false
          sparse-checkout: |
            .github/actions/resolve-docker-image-tags
            .github/actions/resolve-release-context
          sparse-checkout-cone-mode: false

      - name: Validate caller paths
        if: inputs.auto_resolve_version
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
          BUILD_CONTEXT: ${{ inputs.build_context }}
        run: |
          set -euo pipefail
          [ -d "${BUILD_CONTEXT}" ] || { echo "ERROR: build_context '${BUILD_CONTEXT}' does not exist" >&2; exit 1; }
          [ -f "${DOCKERFILE}" ]    || { echo "ERROR: dockerfile '${DOCKERFILE}' not found"           >&2; exit 1; }

      - name: Resolve image tags
        id: tags
        if: inputs.auto_resolve_version
        uses: ./.platform-automation/.github/actions/resolve-docker-image-tags
        with:
          version_override: ${{ inputs.image_version }}
          version_source: ${{ inputs.version_source }}
          dockerfile: ${{ inputs.dockerfile }}
          dockerfile_arg: ${{ inputs.version_build_arg }}
          version_file: ${{ inputs.version_file }}
          distro: ${{ inputs.distro }}
          extra_tags: ${{ inputs.extra_tags }}

      - name: Resolve release context
        id: ctx
        uses: ./.platform-automation/.github/actions/resolve-release-context
        with:
          publish_override: ${{ inputs.push }}
          auto_resolve_version: ${{ inputs.auto_resolve_version }}
          resolved_version: ${{ steps.tags.outputs.version }}
          resolved_build_date: ${{ steps.tags.outputs.build_date }}
          version_override: ${{ inputs.image_version }}
          build_date_override: ${{ inputs.build_date }}

      - id: resolve
        env:
          PUSH: ${{ steps.ctx.outputs.publish }}
          IMAGE_VERSION: ${{ steps.ctx.outputs.version }}
          BUILD_DATE: ${{ steps.ctx.outputs.build_date }}
          INPUT_EXTRA_TAGS: ${{ inputs.extra_tags }}
          INPUT_MULTI_ARCH: ${{ inputs.multi_arch }}
          RUNNER_TYPE: ${{ inputs.runner_type }}
          AUTO_RESOLVE: ${{ inputs.auto_resolve_version }}
          RESOLVED_EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
        run: |
          set -euo pipefail

          if [ "${AUTO_RESOLVE}" = "true" ]; then
            EXTRA_TAGS="${RESOLVED_EXTRA_TAGS}"
          else
            EXTRA_TAGS="${INPUT_EXTRA_TAGS}"
          fi

          if [ "${RUNNER_TYPE}" = "self-hosted" ]; then
            AMD64='{"arch":"amd64","runner":["self-hosted","Linux","x64"],"platform":"linux/amd64"}'
            ARM64='{"arch":"arm64","runner":["self-hosted","Linux","ARM64"],"platform":"linux/arm64"}'
          else
            AMD64='{"arch":"amd64","runner":"ubuntu-latest","platform":"linux/amd64"}'
            ARM64='{"arch":"arm64","runner":"ubuntu-latest-arm64","platform":"linux/arm64"}'
          fi
          if [ "${INPUT_MULTI_ARCH}" = "true" ]; then
            MATRIX="{\"include\":[${AMD64},${ARM64}]}"
          else
            MATRIX="{\"include\":[${AMD64}]}"
          fi

          # NOTE: image_ref is intentionally NOT a job output. GitHub blanks
          # outputs containing masked secret values (DOCKERHUB_NAMESPACE)
          # when consumed by downstream jobs, so each job recomposes it.
          EOF_MARK="EOF_$(date +%s%N)_${RANDOM}"
          {
            echo "push=${PUSH}"
            echo "image_version=${IMAGE_VERSION}"
            echo "build_date=${BUILD_DATE}"
            echo "matrix<<${EOF_MARK}"
            printf '%s\n' "${MATRIX}"
            echo "${EOF_MARK}"
            echo "extra_tags<<${EOF_MARK}"
            printf '%s\n' "${EXTRA_TAGS}"
            echo "${EOF_MARK}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.arch }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      PUSH: ${{ needs.setup.outputs.push }}
      IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
      BUILD_DATE: ${{ needs.setup.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Compose image reference
        id: ref
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '[:space:]'; }
          REG="$(trim "${REGISTRY}")"
          NS="$(trim "${DOCKERHUB_NAMESPACE}")"
          NAME="$(trim "${IMAGE_NAME}")"
          if [ -z "${REG}" ] || [ -z "${NS}" ] || [ -z "${NAME}" ]; then
            echo "ERROR: missing component for image_ref (registry/namespace/image_name)" >&2
            exit 1
          fi
          echo "::add-mask::${NS}"
          echo "image_ref=${REG}/${NS}/${NAME}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - name: Generate image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ref.outputs.image_ref }}
          labels: |
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.version=${{ env.PUSH == 'true' && env.IMAGE_VERSION || format('check-{0}', github.sha) }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Docker Hub login
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose build args
        id: args
        env:
          USER_BUILD_ARGS: ${{ inputs.build_args }}
          VERSION_BUILD_ARG: ${{ inputs.version_build_arg }}
          INJECT_OCI: ${{ inputs.inject_oci_build_args }}
          VCS_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "build_args<<__EOF__"
            [ -n "${VERSION_BUILD_ARG}" ] && echo "${VERSION_BUILD_ARG}=${IMAGE_VERSION}"
            if [ "${INJECT_OCI}" = "true" ]; then
              echo "BUILD_DATE=${BUILD_DATE}"
              echo "VCS_REF=${GITHUB_SHA}"
              echo "VCS_URL=${VCS_URL}"
            fi
            [ -n "${USER_BUILD_ARGS}" ] && printf '%s\n' "${USER_BUILD_ARGS}"
            echo "__EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve platform
        id: platform
        env:
          OVERRIDE: ${{ inputs.platforms }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          echo "value=${OVERRIDE:-${MATRIX_PLATFORM}}" >> "${GITHUB_OUTPUT}"

      - name: Build${{ env.PUSH == 'true' && ' and push by digest' || ' (validation only)' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ steps.platform.outputs.value }}
          pull: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: ${{ steps.args.outputs.build_args }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest: image name goes in `outputs.name=`, NOT `tags:`.
          outputs: ${{ env.PUSH == 'true' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', steps.ref.outputs.image_ref) || 'type=cacheonly' }}

      - name: Export digest
        if: env.PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [ -n "${DIGEST}" ] || { echo "ERROR: build did not produce a digest" >&2; exit 1; }
          mkdir -p "${DIGESTS_DIR}"
          touch "${DIGESTS_DIR}/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: env.PUSH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIGEST_ARTIFACT_PREFIX }}-${{ matrix.arch }}
          path: ${{ env.DIGESTS_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Publish manifest
    needs: [setup, build]
    if: needs.setup.outputs.push == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
      BUILD_DATE: ${{ needs.setup.outputs.build_date }}
      TAG_LATEST: ${{ inputs.latest }}
      EXTRA_TAGS: ${{ needs.setup.outputs.extra_tags }}
      MANIFEST_RETRIES: ${{ inputs.manifest_retries }}
      MANIFEST_RETRY_DELAY: ${{ inputs.manifest_retry_delay }}
    outputs:
      image: ${{ steps.ref.outputs.image_ref }}
    steps:
      - name: Compose image reference
        id: ref
        env:
          REGISTRY: ${{ inputs.registry }}
          IMAGE_NAME: ${{ inputs.image_name }}
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          trim() { printf '%s' "$1" | tr -d '[:space:]'; }
          REG="$(trim "${REGISTRY}")"
          NS="$(trim "${DOCKERHUB_NAMESPACE}")"
          NAME="$(trim "${IMAGE_NAME}")"
          if [ -z "${REG}" ] || [ -z "${NS}" ] || [ -z "${NAME}" ]; then
            echo "ERROR: missing component for image_ref (registry/namespace/image_name)" >&2
            exit 1
          fi
          echo "::add-mask::${NS}"
          echo "image_ref=${REG}/${NS}/${NAME}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.DIGESTS_DIR }}
          pattern: ${{ env.DIGEST_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Create and push manifest
        env:
          IMAGE_REF: ${{ steps.ref.outputs.image_ref }}
        run: |
          set -euo pipefail

          mapfile -t DIGESTS < <(find "${DIGESTS_DIR}" -type f -printf '%f\n' | sort)
          [ "${#DIGESTS[@]}" -gt 0 ] || { echo "ERROR: no digests found" >&2; exit 1; }

          SOURCES=()
          for d in "${DIGESTS[@]}"; do SOURCES+=("${IMAGE_REF}@sha256:${d}"); done

          declare -A SEEN=()
          TAGS=()
          add_tag() {
            local t="$1"
            [ -n "${t}" ] || return 0
            [ -n "${SEEN[$t]:-}" ] && return 0
            SEEN[$t]=1
            TAGS+=(--tag "${IMAGE_REF}:${t}")
          }

          add_tag "${IMAGE_VERSION}"
          [ "${TAG_LATEST}" = "true" ] && add_tag "latest"

          if [ -n "${EXTRA_TAGS}" ]; then
            while IFS= read -r tag; do
              tag="$(echo "${tag}" | xargs)"
              add_tag "${tag}"
            done <<< "${EXTRA_TAGS}"
          fi

          echo "Applying tags:"
          for t in "${!SEEN[@]}"; do echo "  - ${IMAGE_REF}:${t}"; done

          for attempt in $(seq 1 "${MANIFEST_RETRIES}"); do
            if docker buildx imagetools create "${TAGS[@]}" "${SOURCES[@]}"; then
              break
            fi
            if [ "${attempt}" -eq "${MANIFEST_RETRIES}" ]; then
              echo "ERROR: failed after ${MANIFEST_RETRIES} attempts" >&2
              exit 1
            fi
            echo "attempt ${attempt}/${MANIFEST_RETRIES} failed, retrying in ${MANIFEST_RETRY_DELAY}s..."
            sleep "${MANIFEST_RETRY_DELAY}"
          done

          docker buildx imagetools inspect "${IMAGE_REF}:${IMAGE_VERSION}"

      - name: Job summary
        if: always()
        env:
          IMAGE_REF: ${{ steps.ref.outputs.image_ref }}
        run: |
          {
            echo "## Docker Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image       | \`${IMAGE_REF}\` |"
            echo "| Version     | \`${IMAGE_VERSION}\` |"
            echo "| Latest tag  | \`${TAG_LATEST}\` |"
            echo "| Build date  | \`${BUILD_DATE}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
