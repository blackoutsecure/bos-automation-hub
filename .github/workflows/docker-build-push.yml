name: Docker Build and Push (reusable)

"on":
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (without registry/namespace).'
        required: true
        type: string
      dockerfile:
        description: 'Path to the Dockerfile.'
        required: false
        type: string
        default: ./Dockerfile
      build_context:
        description: 'Docker build context.'
        required: false
        type: string
        default: .
      registry:
        description: 'Container registry hostname.'
        required: false
        type: string
        default: docker.io
      push:
        description: "'true'/'false' to force push behaviour. Empty => push only on push to default branch."
        required: false
        type: string
        default: ''
      force:
        description: >-
          Force a fresh build by passing `no-cache: true` to docker/build-push-action
          on the matrix build step. All layer cache (GHA `type=gha`) is bypassed and
          every layer is re-executed from scratch. Use when the source SHA is
          unchanged but you need fresh layer outputs (e.g. to pick up newer base
          image patches, or to guarantee a new layer-digest stack). Scout's
          local-load scan steps still hit GHA cache for speed — only the published
          matrix build is uncached.
        required: false
        type: boolean
        default: false
      image_version:
        description: 'Explicit image version tag. Overrides auto-resolved version when set.'
        required: false
        type: string
        default: ''
      extra_tags:
        description: 'Newline-separated extra tags to apply to the manifest.'
        required: false
        type: string
        default: ''
      latest:
        description: 'Also tag the manifest as :latest when pushing.'
        required: false
        type: boolean
        default: true
      multi_arch:
        description: 'Build amd64 + arm64. When false, only amd64 is built.'
        required: false
        type: boolean
        default: true
      platforms:
        description: 'Override platform list (comma-separated). Empty => derived from `multi_arch`.'
        required: false
        type: string
        default: ''
      build_args:
        description: 'Newline-separated KEY=VALUE Docker build args.'
        required: false
        type: string
        default: ''
      version_build_arg:
        description: >-
          Dockerfile ARG name to receive the resolved version at build time
          (also the default ARG to read the version from). Empty to skip.
        required: false
        type: string
        default: APP_VERSION
      inject_oci_build_args:
        description: 'Inject standard OCI build-args (BUILD_DATE, VCS_REF, VCS_URL).'
        required: false
        type: boolean
        default: true
      auto_resolve_version:
        description: 'Run the resolve-docker-image-tags composite action.'
        required: false
        type: boolean
        default: true
      version_source:
        description: '`auto` | `dockerfile` | `file` | `git_tag` | `sha`.'
        required: false
        type: string
        default: auto
      version_file:
        description: 'Plain-text version file path (used by `file`/`auto`).'
        required: false
        type: string
        default: VERSION
      distro:
        description: 'Optional distro/variant suffix (e.g. `alpine`, `noble`).'
        required: false
        type: string
        default: ''
      build_date:
        description: 'Override ISO-8601 build date label. Auto-computed when blank.'
        required: false
        type: string
        default: ''
      manifest_retries:
        description: 'Retry attempts when creating the manifest.'
        required: false
        type: number
        default: 3
      manifest_retry_delay:
        description: 'Seconds between manifest retry attempts.'
        required: false
        type: number
        default: 15
      update_description:
        description: >-
          Sync the repo README and short description to Docker Hub after a
          successful manifest push. No-op when not pushing.
        required: false
        type: boolean
        default: true
      readme_filepath:
        description: 'Path to the README uploaded as the Docker Hub full description.'
        required: false
        type: string
        default: ./README.md
      short_description:
        description: >-
          Docker Hub short description (max 100 chars). Empty leaves the
          existing short description untouched.
        required: false
        type: string
        default: ''
      enable_url_completion:
        description: 'Convert relative URLs in the README to absolute GitHub URLs.'
        required: false
        type: boolean
        default: true

      # ---- Docker Scout ---------------------------------------------------
      enable_scout:
        description: >-
          Run Docker Scout against the built image. On `pull_request`
          triggers (and any other non-push run), the `amd64` image is
          loaded into the runner's local store and scanned, with the
          result posted as a PR comment. On a publishing run, the
          published image is scanned in the registry and (when
          `scout_sarif_upload: true`) the SARIF report is uploaded to
          GitHub code scanning. Scout uses the existing
          `DOCKERHUB_USERNAME`/`DOCKERHUB_TOKEN` secrets — no new
          credentials are required.
        required: false
        type: boolean
        default: true
      scout_command:
        description: >-
          Single Scout command, or a comma-separated list executed in
          order. Allowed: `quickview`, `cves`, `compare`,
          `recommendations`, `sbom`, `environment`. Applied to both
          the PR-time and publish-time scans.
        required: false
        type: string
        default: cves
      scout_severities:
        description: 'Comma-separated severities to keep (`critical,high,medium,low,unspecified`).'
        required: false
        type: string
        default: 'critical,high'
      scout_only_fixed:
        description: 'Filter to CVEs that have a fix available.'
        required: false
        type: boolean
        default: false
      scout_ignore_base:
        description: 'Ignore vulnerabilities inherited from the base image (`cves` only).'
        required: false
        type: boolean
        default: false
      scout_ignore_unchanged:
        description: 'Filter out unchanged packages (`compare` only).'
        required: false
        type: boolean
        default: true
      scout_to:
        description: '`compare` only: explicit image reference to compare against.'
        required: false
        type: string
        default: ''
      scout_to_env:
        description: >-
          `compare` only: Scout environment to compare against (e.g.
          `production`). Requires `scout_organization`. Mutually
          exclusive with `scout_to` / `scout_to_latest`.
        required: false
        type: string
        default: ''
      scout_to_latest:
        description: >-
          `compare` only: compare against the latest indexed image
          for the same repository. Requires `scout_organization`.
          Mutually exclusive with `scout_to` / `scout_to_env`.
        required: false
        type: boolean
        default: false
      scout_organization:
        description: >-
          Docker Scout organization (Docker Hub namespace). Required
          when `scout_to_env` / `scout_to_latest` are set, or when
          `scout_record_environment` is non-empty.
        required: false
        type: string
        default: ''
      scout_record_environment:
        description: >-
          Publish-mode only: when set, run `docker scout environment`
          to record the published image into this environment (e.g.
          `production`) so later PR builds can `compare` against it.
          Requires `scout_organization`.
        required: false
        type: string
        default: ''
      scout_sarif_upload:
        description: >-
          Publish-mode only: upload the Scout SARIF report to GitHub
          code scanning so CVEs surface in the Security tab. The
          publishing job opts into `security-events: write` itself —
          the caller does not need to grant it.
        required: false
        type: boolean
        default: true
      scout_write_comment:
        description: 'PR-mode only: post the Scout output as a PR comment.'
        required: false
        type: boolean
        default: true
      scout_keep_previous_comments:
        description: 'PR-mode only: keep previous Scout comments hidden instead of updating one in place.'
        required: false
        type: boolean
        default: false
      scout_exit_code:
        description: 'Exit non-zero (and fail the job) if Scout finds matching vulnerabilities / changes.'
        required: false
        type: boolean
        default: false
      scout_exit_on:
        description: '`compare` only: comma-separated worsening conditions to fail on (`vulnerability,policy`).'
        required: false
        type: string
        default: ''
      scout_enable_repo:
        description: >-
          Publish-mode only: after a successful manifest push, ensure the
          Docker Hub repository is enrolled in Docker Scout's continuous-
          monitoring service. New repositories are NOT automatically
          scanned by Scout until enrolled — this closes that gap so every
          release surfaces in the Scout dashboard without manual
          onboarding. The `docker scout repo enable` call is idempotent
          (no-op on an already-enrolled repo). Requires a Docker Hub PAT
          with admin scope on the namespace.
        required: false
        type: boolean
        default: true

      dockerhub_namespace:
        description: >-
          Docker Hub namespace (org or user) that owns the image. Prefer
          setting this via a repository or organisation `vars.DOCKERHUB_NAMESPACE`
          — namespaces are public information and don't belong in `secrets`.
          When empty, falls back to `secrets.DOCKERHUB_NAMESPACE` for
          back-compat.
        required: false
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DOCKERHUB_NAMESPACE:
        description: 'Deprecated. Pass `dockerhub_namespace` (or set `vars.DOCKERHUB_NAMESPACE`) instead.'
        required: false
    outputs:
      image:
        description: 'Fully qualified image reference (registry/namespace/name).'
        value: ${{ jobs.setup.outputs.image }}
      image_version:
        description: 'Resolved image version tag.'
        value: ${{ jobs.setup.outputs.image_version }}
      namespace:
        description: 'Effective Docker Hub namespace.'
        value: ${{ jobs.setup.outputs.namespace }}

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DIGESTS_DIR: /tmp/digests-${{ github.run_id }}-${{ github.run_attempt }}
  DIGEST_ARTIFACT_PREFIX: digests

jobs:
  setup:
    name: Setup
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER || 'ubuntu-latest')) }}
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      push: ${{ steps.resolve.outputs.push }}
      image_version: ${{ steps.resolve.outputs.image_version }}
      build_date: ${{ steps.resolve.outputs.build_date }}
      extra_tags: ${{ steps.resolve.outputs.extra_tags }}
      namespace: ${{ steps.namespace.outputs.value }}
      image: ${{ steps.image.outputs.ref }}
    steps:
      - name: Resolve Docker Hub namespace
        id: namespace
        env:
          INPUT_NS: ${{ inputs.dockerhub_namespace }}
          SECRET_NS: ${{ secrets.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail
          NS="$(printf '%s' "${INPUT_NS:-${SECRET_NS}}" | tr -d '[:space:]')"
          if [ -z "${NS}" ]; then
            echo "ERROR: Docker Hub namespace is required. Set 'dockerhub_namespace' input or 'vars.DOCKERHUB_NAMESPACE'." >&2
            exit 1
          fi
          if ! printf '%s' "${NS}" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            echo "ERROR: dockerhub_namespace is not a valid Docker Hub namespace: '${NS}'" >&2
            exit 1
          fi
          # Deprecation: registering the namespace as a *secret* causes the
          # GitHub Actions secret-scrubber to mask any later occurrence of
          # the same string (e.g. when DOCKERHUB_USERNAME == namespace),
          # which silently empties downstream `GITHUB_OUTPUT` values.
          # The warning intentionally does NOT include the namespace value
          # itself — printing it would cause the same masking collision.
          if [ -z "${INPUT_NS}" ] && [ -n "${SECRET_NS}" ]; then
            echo "::warning::secrets.DOCKERHUB_NAMESPACE is deprecated. Pass the 'dockerhub_namespace' input (preferably from 'vars.DOCKERHUB_NAMESPACE') instead. Registering a namespace as a secret can collide with the Actions secret-scrubber and break downstream outputs."
          fi
          echo "value=${NS}" >> "${GITHUB_OUTPUT}"

      - name: Compose image reference
        id: image
        env:
          REGISTRY: ${{ inputs.registry }}
          NAMESPACE: ${{ steps.namespace.outputs.value }}
          IMAGE_NAME: ${{ inputs.image_name }}
        run: |
          set -euo pipefail
          REG="$(printf '%s' "${REGISTRY}" | tr -d '[:space:]')"
          NAME="$(printf '%s' "${IMAGE_NAME}" | tr -d '[:space:]')"
          echo "ref=${REG}/${NAMESPACE}/${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Preflight validation
        env:
          IMAGE_NAME: ${{ inputs.image_name }}
          REGISTRY: ${{ inputs.registry }}
          VERSION_SOURCE: ${{ inputs.version_source }}
          IMAGE_VERSION: ${{ inputs.image_version }}
          EXTRA_TAGS: ${{ inputs.extra_tags }}
          DISTRO: ${{ inputs.distro }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          # A stray newline in a secret silently truncates GITHUB_OUTPUT
          # for any downstream job, so reject it explicitly.
          check_singleline() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is missing"; return; }
            case "${val}" in
              *[$'\n\r\t ']*) fail "${name} contains whitespace/newlines" ;;
            esac
          }

          TAG_RE='^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$'
          check_tag() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is empty"; return; }
            printf '%s' "${val}" | grep -Eq "${TAG_RE}" \
              || fail "${name} is not a valid Docker tag: '${val}'"
          }

          check_singleline "input 'image_name'"           "${IMAGE_NAME}"
          check_singleline "input 'registry'"             "${REGISTRY}"
          check_singleline "secret 'DOCKERHUB_USERNAME'"  "${DOCKERHUB_USERNAME}"
          check_singleline "secret 'DOCKERHUB_TOKEN'"     "${DOCKERHUB_TOKEN}"

          case "${VERSION_SOURCE}" in
            auto|dockerfile|file|git_tag|sha) ;;
            *) fail "input 'version_source' must be one of: auto|dockerfile|file|git_tag|sha (got '${VERSION_SOURCE}')" ;;
          esac

          if ! printf '%s' "${IMAGE_NAME}" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            fail "input 'image_name' is not a valid Docker image name: '${IMAGE_NAME}'"
          fi

          if [ -n "${IMAGE_VERSION}" ]; then
            check_singleline "input 'image_version'" "${IMAGE_VERSION}"
            check_tag        "input 'image_version'" "${IMAGE_VERSION}"
          fi

          if [ -n "${DISTRO}" ]; then
            check_singleline "input 'distro'" "${DISTRO}"
            check_tag        "input 'distro'" "${DISTRO}"
          fi

          if [ -n "${EXTRA_TAGS}" ]; then
            line_no=0
            while IFS= read -r raw || [ -n "${raw}" ]; do
              line_no=$((line_no + 1))
              tag="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "${tag}" ] && continue
              case "${tag}" in \#*) continue ;; esac
              check_tag "input 'extra_tags' line ${line_no}" "${tag}"
            done <<< "${EXTRA_TAGS}"
          fi

          [ "${ERR}" -eq 0 ] || { echo "Preflight validation failed." >&2; exit 1; }
          echo "Preflight OK."

      - name: Checkout caller repo
        if: inputs.auto_resolve_version
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate caller paths
        if: inputs.auto_resolve_version
        env:
          DOCKERFILE: ${{ inputs.dockerfile }}
          BUILD_CONTEXT: ${{ inputs.build_context }}
        run: |
          set -euo pipefail
          [ -d "${BUILD_CONTEXT}" ] || { echo "ERROR: build_context '${BUILD_CONTEXT}' does not exist" >&2; exit 1; }
          [ -f "${DOCKERFILE}" ]    || { echo "ERROR: dockerfile '${DOCKERFILE}' not found"           >&2; exit 1; }

      - name: Resolve image tags
        id: tags
        if: inputs.auto_resolve_version
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/resolve-docker-image-tags@main
        with:
          version_override: ${{ inputs.image_version }}
          version_source: ${{ inputs.version_source }}
          dockerfile: ${{ inputs.dockerfile }}
          dockerfile_arg: ${{ inputs.version_build_arg }}
          version_file: ${{ inputs.version_file }}
          distro: ${{ inputs.distro }}
          extra_tags: ${{ inputs.extra_tags }}

      - name: Resolve release context
        id: ctx
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/resolve-release-context@main
        with:
          publish_override: ${{ inputs.push }}
          auto_resolve_version: ${{ inputs.auto_resolve_version }}
          resolved_version: ${{ steps.tags.outputs.version }}
          resolved_build_date: ${{ steps.tags.outputs.build_date }}
          version_override: ${{ inputs.image_version }}
          build_date_override: ${{ inputs.build_date }}

      - id: resolve
        env:
          PUSH: ${{ steps.ctx.outputs.publish }}
          IMAGE_VERSION: ${{ steps.ctx.outputs.version }}
          BUILD_DATE: ${{ steps.ctx.outputs.build_date }}
          INPUT_EXTRA_TAGS: ${{ inputs.extra_tags }}
          INPUT_MULTI_ARCH: ${{ inputs.multi_arch }}
          AUTO_RESOLVE: ${{ inputs.auto_resolve_version }}
          RESOLVED_EXTRA_TAGS: ${{ steps.tags.outputs.extra_tags }}
          # Per-arch runner resolution. Org-shared vars take precedence;
          # empty strings trigger the GitHub-hosted fallback. A var may
          # be either a JSON array of labels (e.g.
          # `["self-hosted","Linux","X64"]`) or a single bare label.
          VARS_RUNNER_X64: ${{ vars.RUNNER_X64 }}
          VARS_RUNNER_ARM64: ${{ vars.RUNNER_ARM64 }}
        run: |
          set -euo pipefail

          if [ "${AUTO_RESOLVE}" = "true" ]; then
            EXTRA_TAGS="${RESOLVED_EXTRA_TAGS}"
          else
            EXTRA_TAGS="${INPUT_EXTRA_TAGS}"
          fi

          # Embed a runner spec into the matrix JSON. JSON-array values
          # are passed through verbatim after a shape check; bare labels
          # are JSON-quoted. Malformed values fail fast here rather than
          # producing a downstream "no runner matching label" error.
          to_json_runner() {
            local raw="$1" name="$2" fallback="$3" val
            val="${raw:-${fallback}}"
            case "${val}" in
              \[*)
                printf '%s' "${val}" | python3 -c 'import json,sys; v=json.loads(sys.stdin.read()); sys.exit(0 if isinstance(v,list) and v and all(isinstance(x,str) and x for x in v) else 1)' \
                  || { echo "ERROR: ${name}='${val}' is not a non-empty JSON array of label strings" >&2; exit 1; }
                printf '%s' "${val}"
                ;;
              *)
                printf '%s' "${val}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*$' \
                  || { echo "ERROR: ${name}='${val}' is not a valid runner label" >&2; exit 1; }
                printf '"%s"' "${val}"
                ;;
            esac
          }

          AMD64_RUNNER="$(to_json_runner "${VARS_RUNNER_X64}"   "vars.RUNNER_X64"   "ubuntu-latest")"
          ARM64_RUNNER="$(to_json_runner "${VARS_RUNNER_ARM64}" "vars.RUNNER_ARM64" "ubuntu-latest-arm64")"

          AMD64="{\"arch\":\"amd64\",\"runner\":${AMD64_RUNNER},\"platform\":\"linux/amd64\"}"
          ARM64="{\"arch\":\"arm64\",\"runner\":${ARM64_RUNNER},\"platform\":\"linux/arm64\"}"

          if [ "${INPUT_MULTI_ARCH}" = "true" ]; then
            MATRIX="{\"include\":[${AMD64},${ARM64}]}"
          else
            MATRIX="{\"include\":[${AMD64}]}"
          fi

          EOF_MARK="EOF_$(date +%s%N)_${RANDOM}"
          {
            echo "push=${PUSH}"
            echo "image_version=${IMAGE_VERSION}"
            echo "build_date=${BUILD_DATE}"
            echo "matrix<<${EOF_MARK}"
            printf '%s\n' "${MATRIX}"
            echo "${EOF_MARK}"
            echo "extra_tags<<${EOF_MARK}"
            printf '%s\n' "${EXTRA_TAGS}"
            echo "${EOF_MARK}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.arch }})
    needs: setup
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    env:
      PUSH: ${{ needs.setup.outputs.push }}
      IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
      BUILD_DATE: ${{ needs.setup.outputs.build_date }}
      IMAGE_REF: ${{ needs.setup.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Generate image labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_REF }}
          labels: |
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.version=${{ env.PUSH == 'true' && env.IMAGE_VERSION || format('check-{0}', github.sha) }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Docker Hub login
        if: env.PUSH == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compose build args
        id: args
        env:
          USER_BUILD_ARGS: ${{ inputs.build_args }}
          VERSION_BUILD_ARG: ${{ inputs.version_build_arg }}
          INJECT_OCI: ${{ inputs.inject_oci_build_args }}
          VCS_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "build_args<<__EOF__"
            [ -n "${VERSION_BUILD_ARG}" ] && echo "${VERSION_BUILD_ARG}=${IMAGE_VERSION}"
            if [ "${INJECT_OCI}" = "true" ]; then
              echo "BUILD_DATE=${BUILD_DATE}"
              echo "VCS_REF=${GITHUB_SHA}"
              echo "VCS_URL=${VCS_URL}"
            fi
            [ -n "${USER_BUILD_ARGS}" ] && printf '%s\n' "${USER_BUILD_ARGS}"
            echo "__EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve platform
        id: platform
        env:
          OVERRIDE: ${{ inputs.platforms }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          echo "value=${OVERRIDE:-${MATRIX_PLATFORM}}" >> "${GITHUB_OUTPUT}"

      - name: Build${{ env.PUSH == 'true' && ' and push by digest' || ' (validation only)' }}
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ steps.platform.outputs.value }}
          pull: true
          # `force: true` => bypass all build cache (GHA layer cache + base image
          # layer reuse) so every layer is re-executed from scratch. Guarantees
          # a fresh layer-digest stack for the published manifest.
          no-cache: ${{ inputs.force }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: ${{ steps.args.outputs.build_args }}
          labels: ${{ steps.meta.outputs.labels }}
          # push-by-digest: image name goes in `outputs.name=`, NOT `tags:`.
          outputs: ${{ env.PUSH == 'true' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', env.IMAGE_REF) || 'type=cacheonly' }}

      - name: Export digest
        if: env.PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          [ -n "${DIGEST}" ] || { echo "ERROR: build did not produce a digest" >&2; exit 1; }
          rm -rf "${DIGESTS_DIR}"
          mkdir -p "${DIGESTS_DIR}"
          touch "${DIGESTS_DIR}/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: env.PUSH == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.DIGEST_ARTIFACT_PREFIX }}-${{ matrix.arch }}
          path: ${{ env.DIGESTS_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    name: Publish manifest
    needs: [setup, build]
    if: needs.setup.outputs.push == 'true' && needs.build.result == 'success'
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER || 'ubuntu-latest')) }}
    timeout-minutes: 30
    env:
      IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
      BUILD_DATE: ${{ needs.setup.outputs.build_date }}
      TAG_LATEST: ${{ inputs.latest }}
      EXTRA_TAGS: ${{ needs.setup.outputs.extra_tags }}
      MANIFEST_RETRIES: ${{ inputs.manifest_retries }}
      MANIFEST_RETRY_DELAY: ${{ inputs.manifest_retry_delay }}
      IMAGE_REF: ${{ needs.setup.outputs.image }}
    steps:
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DIGESTS_DIR }}
          pattern: ${{ env.DIGEST_ARTIFACT_PREFIX }}-*
          merge-multiple: true

      - name: Verify downloaded digests
        env:
          EXPECTED_DIGESTS: ${{ inputs.multi_arch && '2' || '1' }}
        run: |
          set -euo pipefail
          [ -d "${DIGESTS_DIR}" ] || { echo "ERROR: digest directory '${DIGESTS_DIR}' not found" >&2; exit 1; }
          mapfile -t DIGEST_FILES < <(find "${DIGESTS_DIR}" -type f -printf '%f\n' | sort)
          [ "${#DIGEST_FILES[@]}" -gt 0 ] || { echo "ERROR: no digest files downloaded" >&2; exit 1; }
          if [ "${#DIGEST_FILES[@]}" -ne "${EXPECTED_DIGESTS}" ]; then
            echo "ERROR: expected ${EXPECTED_DIGESTS} digest file(s), found ${#DIGEST_FILES[@]}" >&2
            printf 'Downloaded digests:\n' >&2
            printf '  - %s\n' "${DIGEST_FILES[@]}" >&2
            exit 1
          fi

      - name: Create and push manifest
        id: manifest
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/docker-multiarch-manifest@main
        with:
          image_ref: ${{ env.IMAGE_REF }}
          digests_dir: ${{ env.DIGESTS_DIR }}
          version_tag: ${{ env.IMAGE_VERSION }}
          latest: ${{ env.TAG_LATEST }}
          extra_tags: ${{ env.EXTRA_TAGS }}
          max_attempts: ${{ env.MANIFEST_RETRIES }}
          retry_delay_seconds: ${{ env.MANIFEST_RETRY_DELAY }}

      - name: Job summary
        if: always()
        env:
          APPLIED_TAGS: ${{ steps.manifest.outputs.applied_tags }}
          DIGEST_COUNT: ${{ steps.manifest.outputs.digest_count }}
        run: |
          {
            echo "## Docker Build Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image       | \`${IMAGE_REF}\` |"
            echo "| Version     | \`${IMAGE_VERSION}\` |"
            echo "| Latest tag  | \`${TAG_LATEST}\` |"
            echo "| Build date  | \`${BUILD_DATE}\` |"
            echo "| Digests     | \`${DIGEST_COUNT:-?}\` |"
            if [ -n "${APPLIED_TAGS:-}" ]; then
              echo ""
              echo "### Applied tags"
              echo ""
              while IFS= read -r t; do
                [ -n "${t}" ] && echo "- \`${IMAGE_REF}:${t}\`"
              done <<< "${APPLIED_TAGS}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  update-description:
    name: Sync Docker Hub description
    needs: [setup, manifest]
    if: needs.setup.outputs.push == 'true' && inputs.update_description
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER || 'ubuntu-latest')) }}
    timeout-minutes: 5
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Sync description
        uses: blackoutsecure/bos-automation-hub/.github/actions/sync-dockerhub-description@main
        with:
          repository: ${{ needs.setup.outputs.namespace }}/${{ inputs.image_name }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          readme_filepath: ${{ inputs.readme_filepath }}
          short_description: ${{ inputs.short_description }}
          enable_url_completion: ${{ inputs.enable_url_completion }}

  # ---------------------------------------------------------------------------
  # Docker Scout — PR / non-publish branch.
  #
  # Builds a single-arch (amd64) image with `outputs: type=docker` so it lands
  # in the runner's local image store, then runs `docker/scout-action`. The
  # build piggy-backs on the matrix's GHA cache, so this is effectively a
  # local-load step rather than a second build.
  #
  # Runs in parallel to the matrix `build` job (no `needs: build`) so the PR
  # author gets the Scout comment as fast as possible. A failed matrix build
  # does not block the scan — Scout's output is still useful in that case.
  # ---------------------------------------------------------------------------
  scout-pr:
    name: Docker Scout (PR)
    needs: setup
    if: needs.setup.outputs.push != 'true' && inputs.enable_scout
    # The amd64 leg always runs on x64 hardware — Scout doesn't need
    # the arm64 leg, so we hard-pin x64 here regardless of the matrix.
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.RUNNER_X64, '[') && vars.RUNNER_X64 || format('"{0}"', vars.RUNNER_X64 || 'ubuntu-latest')) }}
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    env:
      IMAGE_REF: ${{ needs.setup.outputs.image }}
      # A throwaway tag scoped to this commit so Scout has something to
      # name the local image by. Never pushed.
      SCAN_TAG: scan-${{ github.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compose build args
        id: args
        env:
          USER_BUILD_ARGS: ${{ inputs.build_args }}
          VERSION_BUILD_ARG: ${{ inputs.version_build_arg }}
          INJECT_OCI: ${{ inputs.inject_oci_build_args }}
          IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
          BUILD_DATE: ${{ needs.setup.outputs.build_date }}
          VCS_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "build_args<<__EOF__"
            [ -n "${VERSION_BUILD_ARG}" ] && echo "${VERSION_BUILD_ARG}=${IMAGE_VERSION}"
            if [ "${INJECT_OCI}" = "true" ]; then
              echo "BUILD_DATE=${BUILD_DATE}"
              echo "VCS_REF=${GITHUB_SHA}"
              echo "VCS_URL=${VCS_URL}"
            fi
            [ -n "${USER_BUILD_ARGS}" ] && printf '%s\n' "${USER_BUILD_ARGS}"
            echo "__EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Build amd64 and load locally
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          # Scout indexes a single architecture per scan; the matrix
          # build covers arm64 on its own runner.
          platforms: linux/amd64
          pull: true
          provenance: false
          sbom: false
          # Same scope as the matrix amd64 leg → near-instant cache hit.
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64
          build-args: ${{ steps.args.outputs.build_args }}
          load: true
          tags: ${{ env.IMAGE_REF }}:${{ env.SCAN_TAG }}

      - name: Run Docker Scout
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/docker-scout-scan@main
        with:
          # `local://` forces Scout to use the loaded image and skip
          # any registry round-trip — important because the tag does
          # not exist on Docker Hub yet.
          image: local://${{ env.IMAGE_REF }}:${{ env.SCAN_TAG }}
          command: ${{ inputs.scout_command }}
          to: ${{ inputs.scout_to }}
          to_env: ${{ inputs.scout_to_env }}
          to_latest: ${{ inputs.scout_to_latest }}
          organization: ${{ inputs.scout_organization }}
          platform: linux/amd64
          severities: ${{ inputs.scout_severities }}
          only_fixed: ${{ inputs.scout_only_fixed }}
          ignore_base: ${{ inputs.scout_ignore_base }}
          ignore_unchanged: ${{ inputs.scout_ignore_unchanged }}
          exit_code: ${{ inputs.scout_exit_code }}
          exit_on: ${{ inputs.scout_exit_on }}
          # No SARIF in PR mode — code scanning rejects uploads from
          # untrusted PRs (no `security-events: write` for forks).
          sarif_file: ''
          sarif_upload: 'false'
          summary: 'true'
          write_comment: ${{ inputs.scout_write_comment }}
          keep_previous_comments: ${{ inputs.scout_keep_previous_comments }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ env.IMAGE_REF }}:${{ env.SCAN_TAG }}
          STATUS: ${{ job.status }}
        run: |
          {
            echo "## Docker Scout (PR)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image      | \`${IMAGE}\` |"
            echo "| Command    | \`${{ inputs.scout_command }}\` |"
            echo "| Severities | \`${{ inputs.scout_severities }}\` |"
            echo "| Status     | \`${STATUS}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # Docker Scout — publish branch.
  #
  # Runs after the multi-arch manifest is published. Scans the registry
  # image at the resolved version tag, optionally uploads the SARIF report
  # to GitHub code scanning, and (when `scout_record_environment` is set)
  # records the image into a Scout environment so later PR builds can
  # `compare` against it.
  # ---------------------------------------------------------------------------
  scout-published:
    name: Docker Scout (published)
    needs: [setup, manifest]
    if: needs.setup.outputs.push == 'true' && inputs.enable_scout && needs.manifest.result == 'success'
    # Scout indexing is CPU/RAM heavy; default to x64 runner to avoid
    # arm64 self-hosted instability during scan/index steps.
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.RUNNER_X64, '[') && vars.RUNNER_X64 || format('"{0}"', vars.RUNNER_X64 || 'ubuntu-latest')) }}
    timeout-minutes: 20
    permissions:
      contents: read
      # required by github/codeql-action/upload-sarif
      security-events: write
    env:
      IMAGE_REF: ${{ needs.setup.outputs.image }}
      IMAGE_VERSION: ${{ needs.setup.outputs.image_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Docker Scout (CVEs)
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/docker-scout-scan@main
        with:
          # `registry://` forces a registry pull — the runner's local
          # store is empty here (the matrix build pushed by digest from
          # a different runner).
          image: registry://${{ env.IMAGE_REF }}:${{ env.IMAGE_VERSION }}
          command: ${{ inputs.scout_command }}
          to: ${{ inputs.scout_to }}
          to_env: ${{ inputs.scout_to_env }}
          to_latest: ${{ inputs.scout_to_latest }}
          organization: ${{ inputs.scout_organization }}
          severities: ${{ inputs.scout_severities }}
          only_fixed: ${{ inputs.scout_only_fixed }}
          ignore_base: ${{ inputs.scout_ignore_base }}
          ignore_unchanged: ${{ inputs.scout_ignore_unchanged }}
          exit_code: ${{ inputs.scout_exit_code }}
          exit_on: ${{ inputs.scout_exit_on }}
          sarif_file: ${{ inputs.scout_sarif_upload && 'scout.sarif.json' || '' }}
          sarif_upload: ${{ inputs.scout_sarif_upload }}
          sarif_category: docker-scout-${{ inputs.image_name }}
          summary: 'true'
          # Push events have no PR to comment on.
          write_comment: 'false'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Record image to Scout environment
        if: inputs.scout_record_environment != ''
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/docker-scout-scan@main
        with:
          image: registry://${{ env.IMAGE_REF }}:${{ env.IMAGE_VERSION }}
          command: environment
          environment: ${{ inputs.scout_record_environment }}
          organization: ${{ inputs.scout_organization }}
          # Re-using the login from the previous step in this job.
          skip_login: 'true'
          # `environment` produces no findings to comment / upload.
          sarif_file: ''
          sarif_upload: 'false'
          summary: 'true'
          write_comment: 'false'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ env.IMAGE_REF }}:${{ env.IMAGE_VERSION }}
          STATUS: ${{ job.status }}
          RECORD_ENV: ${{ inputs.scout_record_environment }}
        run: |
          {
            echo "## Docker Scout (published)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image          | \`${IMAGE}\` |"
            echo "| Command        | \`${{ inputs.scout_command }}\` |"
            echo "| Severities     | \`${{ inputs.scout_severities }}\` |"
            echo "| SARIF uploaded | \`${{ inputs.scout_sarif_upload }}\` |"
            echo "| Recorded to    | \`${RECORD_ENV:-n/a}\` |"
            echo "| Status         | \`${STATUS}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # Docker Scout — repository enrollment.
  #
  # Idempotently ensures the Docker Hub repository is enrolled in Docker
  # Scout's continuous-monitoring service. New repos are NOT automatically
  # indexed by Scout until enrolled — this closes that gap so every release
  # surfaces in the Scout dashboard without manual onboarding.
  #
  # Runs in parallel with `scout-published` (both depend only on `manifest`)
  # so the enrollment side-effect doesn't gate SARIF upload.
  # ---------------------------------------------------------------------------
  scout-enable-repo:
    name: Enroll repo in Docker Scout
    needs: [setup, manifest]
    if: needs.setup.outputs.push == 'true' && inputs.scout_enable_repo && needs.manifest.result == 'success'
    # Keep Scout-side enrollment on x64 too for consistency with the
    # main Scout scan path.
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(vars.RUNNER_X64, '[') && vars.RUNNER_X64 || format('"{0}"', vars.RUNNER_X64 || 'ubuntu-latest')) }}
    timeout-minutes: 5
    steps:
      - name: Enroll repository in Docker Scout
        uses: blackoutsecure/bos-automation-hub/.github/actions/docker-scout-enable-repo@main
        with:
          repository: ${{ needs.setup.outputs.namespace }}/${{ inputs.image_name }}
          username:   ${{ secrets.DOCKERHUB_USERNAME }}
          password:   ${{ secrets.DOCKERHUB_TOKEN }}

