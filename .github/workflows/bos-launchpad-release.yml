# Blackout Secure Launchpad — automated release / deploy meta-workflow.
#
# Single front-door for every deploy topology this org runs. Composes the
# stage-level reusable workflows into one end-to-end loop so consumer repos
# can drive a full pipeline from a thin ~15-line caller:
#
#   1. monitor-upstream-release.yml   — poll upstream version, commit a
#                                       tracking file, emit `changed` flag.
#                                       Skipped when `upstream_repo` is empty.
#   2. release.yml                    — Docker → Balena → GitHub Release
#                                       against the resolved upstream version.
#                                       Requires an upstream version (i.e. the
#                                       monitor stage must have run); skipped
#                                       in static-site / direct-deploy mode.
#   3. deploy-cloudflare-pages.yml    — stage and publish a static site to
#                                       Cloudflare Pages (optionally generate
#                                       sitemap/robots/security.txt/manifest;
#                                       optional post-deploy edge purge).
#                                       Independent of the monitor/release
#                                       path; can run on its own on every push.
#   0. bos-launchpad-code-scan.yml         — opt-in security scanning stage shared
#                                       with `bos-launchpad-marketplace.yml`.
#                                       Wraps `bos-code-scanning-kit@v1`
#                                       (posture + scanners) AND
#                                       `github/codeql-action` (matrix).
#                                       Gated by `enable_security_scan` input,
#                                       default `false`. Runs in PARALLEL
#                                       with monitor (no `needs:`) and is
#                                       INDEPENDENT of release — findings
#                                       surface in the Security tab + (when
#                                       `security_scan_fail_on: fail`) mark
#                                       the workflow run failed, but do NOT
#                                       block the deploy stages. This is the
#                                       advisory model that matches Docker
#                                       Scout's role inside `docker-build-push`.
#                                       For hard-gated security scanning,
#                                       run a separate PR-time caller using
#                                       `bos-launchpad-code-scan.yml` directly.
#
# Two canonical use cases:
#
#   A. Upstream-tracked container release (cron-driven)
#      `upstream_repo:` set, `docker|balena|github_release: true`,
#      `cloudflare_pages: false`. The classic Launchpad loop.
#
#   B. Static-site continuous deploy (push-driven)
#      `upstream_repo:` empty, `docker|balena|github_release: false`,
#      `cloudflare_pages: true`. Monitor and release stages are skipped.
#      The cloudflare-pages job runs straight off the caller event.
#
# Mixing is supported (e.g. tracked container release **and** companion
# docs site deploy in the same run) — every stage is independently togglable.#
# Stage toggle policy:
#   Every stage toggle (`docker`, `balena`, `github_release`,
#   `cloudflare_pages`) defaults to `false`. Callers MUST explicitly opt
#   into each capability they want to use. This is a forward-compatibility
#   guarantee: when we add a new stage to this workflow later (a 4th, 5th,
#   \u2026), existing kickstarted callers continue to run exactly the stages\n#   they originally asked for \u2014 nothing more, nothing less.#
# Trigger model: this workflow is intended to be called from a thin caller
# in a product repo (typically a 6h cron for upstream-tracked releases, or
# `push: branches: [main]` for static sites). It is **not** intended to be
# triggered directly on this repo. See the README "Quick start" section for
# copy-paste caller examples covering both use cases.
#
# Constraints:
#   * When the monitor stage runs, upstream tag must be SemVer
#     (`X.Y.Z[-suffix]`, optionally `v`-prefixed). The release stage rejects
#     calendar-versioned or non-SemVer tags.
#   * The release stage creates a GitHub Release whose tag is
#     `v<upstream_version>`, pointing at the default-branch HEAD that the
#     monitor ran on. It is **not** reachable in static-site mode (no tag
#     to resolve) — for tag-driven container releases without upstream
#     polling, call `release.yml` directly instead.
name: Blackout Secure Launchpad (reusable meta-workflow)

"on":
  workflow_call:
    inputs:
      # ----- Monitor stage --------------------------------------------------
      upstream_repo:
        description: 'Upstream GitHub repo, as `owner/name`. Required for `source: github_release`, `github_branch_file`, and `github_tags`.'
        required: false
        type: string
        default: ''
      track_file:
        description: 'Repo-relative path to the tracking JSON file.'
        required: false
        type: string
        default: .github/upstream/tracked-release.json
      force_run:
        description: >-
          When `true`, run the pipeline even if the upstream version is
          unchanged. Forwards `force_dispatch` to the monitor stage and
          unconditionally runs the release job (subject to the per-stage
          toggles `docker`/`balena`/`github_release`/`cloudflare_pages`).
          Intended for `workflow_dispatch` callers re-triggering on demand.
        required: false
        type: boolean
        default: false
      source:
        description: >-
          Upstream-version discovery strategy. Forwarded to the monitor
          stage. See `monitor-upstream-release.yml` for the full provider
          list (`github_release`, `github_branch_file`, `github_tags`,
          `container_image`, `npm`, `pypi`, `generic_url`).
        required: false
        type: string
        default: github_release
      upstream_branch:
        description: >-
          Branch to track when `source: github_branch_file`. Required for
          that mode, ignored otherwise.
        required: false
        type: string
        default: ''
      version_file_path:
        description: >-
          Repo-relative path to the version file inside `upstream_branch`.
          Used only when `source: github_branch_file`. Default `version`.
        required: false
        type: string
        default: 'version'
      image_ref:
        description: >-
          Container image reference (e.g. `docker.io/library/nginx`).
          Required when `source: container_image`.
        required: false
        type: string
        default: ''
      package_name:
        description: >-
          Package name. Required when `source: npm` (scoped names allowed)
          or `source: pypi`.
        required: false
        type: string
        default: ''
      version_url:
        description: 'URL to fetch when `source: generic_url`.'
        required: false
        type: string
        default: ''
      version_regex:
        description: >-
          Regex applied to `version_url` body; first capture group is the
          version. Required when `source: generic_url`.
        required: false
        type: string
        default: ''
      tag_pattern:
        description: >-
          Optional regex used to filter candidate tags for `github_tags` and
          `container_image` before SemVer ranking. Default accepts
          `[v]X.Y.Z[-suffix]`.
        required: false
        type: string
        default: ''

      # ----- Release pipeline: stage toggles -------------------------------
      # Policy: every stage toggle defaults to `false`. Callers must
      # **explicitly opt in** to each capability they want to use. This
      # protects existing kickstarted callers from silently enabling new
      # stages we add to this workflow later — a caller written today only
      # runs the stages it asks for today, even if we add five more stages
      # tomorrow.
      docker:
        description: 'Run the docker-build-push stage. Default `false` — opt in explicitly.'
        required: false
        type: boolean
        default: false
      balena:
        description: 'Run the balena-block-publish stage. Default `false` — opt in explicitly.'
        required: false
        type: boolean
        default: false
      github_release:
        description: 'Run the github-release publish stage. Default `false` — opt in explicitly.'
        required: false
        type: boolean
        default: false
      companion_docker:
        description: 'Run the companion docker-build-push stage. Default `false` — opt in explicitly.'
        required: false
        type: boolean
        default: false

      # ----- Release pipeline: Docker stage --------------------------------
      image_name:
        description: 'Docker image name (no namespace). Required when `docker: true`.'
        required: false
        type: string
        default: ''
      dockerhub_namespace:
        description: 'Docker Hub namespace. Required when `docker: true`.'
        required: false
        type: string
        default: ''
      docker_extra_tags:
        description: 'Newline-separated extra tags applied to the manifest.'
        required: false
        type: string
        default: ''
      docker_short_description:
        description: 'Docker Hub short description (<=100 chars). Empty leaves it untouched.'
        required: false
        type: string
        default: ''
      docker_latest:
        description: 'Also tag :latest when pushing.'
        required: false
        type: boolean
        default: true
      docker_multi_arch:
        description: 'Build linux/amd64 + linux/arm64.'
        required: false
        type: boolean
        default: true
      docker_update_description:
        description: 'Sync the README + short description to Docker Hub after a successful push.'
        required: false
        type: boolean
        default: true
      docker_force:
        description: >-
          Force a fresh docker build by passing `no-cache: true` to
          docker/build-push-action. Bypasses GHA layer cache so every layer
          re-executes from scratch. Pair with `balena_force: true` when you
          want a forced rebuild to actually reach devices (otherwise balena
          will reuse the previous release for the same source SHA).
        required: false
        type: boolean
        default: false
      companion_image_name:
        description: 'Companion Docker image name (no namespace). Required when `companion_docker: true`.'
        required: false
        type: string
        default: ''
      companion_build_target:
        description: 'Optional Dockerfile stage target for the companion image build.'
        required: false
        type: string
        default: ''
      companion_docker_short_description:
        description: 'Docker Hub short description for the companion image (<=100 chars). Empty leaves it untouched.'
        required: false
        type: string
        default: ''

      # ----- Release pipeline: Docker Scout (forwarded to release.yml) -----
      docker_enable_scout:
        description: 'Run Docker Scout against the published image.'
        required: false
        type: boolean
        default: true
      docker_scout_command:
        description: 'Scout command (default `cves`). Comma-separated for multiple.'
        required: false
        type: string
        default: cves
      docker_scout_severities:
        description: 'Severities to keep.'
        required: false
        type: string
        default: 'critical,high'
      docker_scout_only_fixed:
        description: 'Filter to CVEs with a fix available.'
        required: false
        type: boolean
        default: false
      docker_scout_ignore_base:
        description: 'Ignore vulnerabilities inherited from the base image.'
        required: false
        type: boolean
        default: false
      docker_scout_organization:
        description: 'Scout organization (Docker Hub namespace).'
        required: false
        type: string
        default: ''
      docker_scout_record_environment:
        description: 'Scout environment to record the image into (e.g. `production`).'
        required: false
        type: string
        default: ''
      docker_scout_sarif_upload:
        description: 'Upload the SARIF report to GitHub code scanning.'
        required: false
        type: boolean
        default: true
      docker_scout_exit_code:
        description: 'Fail the Docker stage if Scout finds matching vulnerabilities.'
        required: false
        type: boolean
        default: false
      docker_scout_enable_repo:
        description: >-
          After a successful publish, ensure the Docker Hub repository
          is enrolled in Docker Scout's continuous-monitoring service.
          Idempotent — no-op when the repo is already enabled.
        required: false
        type: boolean
        default: true

      # ----- Release pipeline: Balena stage --------------------------------
      block_name:
        description: >-
          Balena block slug (without namespace). Defaults to `image_name`
          when empty \u2014 most repos publish the docker image and the balena
          block under the same slug. Required only when `balena: true` and
          the two intentionally diverge.
        required: false
        type: string
        default: ''
      balena_namespace:
        description: 'Balena namespace (user/org). Required when `balena: true`.'
        required: false
        type: string
        default: ''
      balena_sync_yml:
        description: 'Rewrite balena.yml `version:` and commit it back when publishing.'
        required: false
        type: boolean
        default: true
      balena_draft:
        description: 'Publish as a draft (sets `finalize: false`).'
        required: false
        type: boolean
        default: false
      balena_force:
        description: >-
          Force a fresh balena release even when an existing release
          matches the current source revision. Forwarded to `release.yml`
          → `balena-block-publish.yml` as `force:`, which sets
          `cache: false` on `deploy-to-balena-action`. Pair with
          `force_run: true` to bypass both the upstream-moved gate and
          balena's same-commit cache for a full forced rebuild.
        required: false
        type: boolean
        default: false
      balena_generate_yml:
        description: >-
          Render `balena.yml` dynamically inside the balena stage instead
          of reading it from the caller repo. Lets consumer repos drop the
          checked-in `balena.yml` entirely. When `true`, the balena commit-
          back job is skipped (the manifest is regenerated each run).
        required: false
        type: boolean
        default: false
      balena_type:
        description: >-
          Top-level `type:` written to the rendered manifest. Used only
          when `balena_generate_yml: true`.
        required: false
        type: string
        default: sw.block
      balena_description:
        description: >-
          Rendered `description:` field. Optional. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_post_provisioning:
        description: >-
          Rendered `post-provisioning:` Markdown. Multi-line; pass as a
          YAML literal block (`|`). Used only when `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_repository_url:
        description: >-
          `assets.repository.data.url` for the rendered manifest. When
          empty, defaults to the caller repo URL. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_logo_url:
        description: >-
          Optional `assets.logo.data.url`. Must be `https://` when set.
          Used only when `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_default_device_type:
        description: >-
          `data.defaultDeviceType` slug. Optional — when empty, the
          renderer uses the first entry of the resolved
          `supportedDeviceTypes`. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_supported_device_types:
        description: >-
          Explicit `data.supportedDeviceTypes` (newline- and/or
          comma-separated balena device-type slugs). Optional — when
          empty, the renderer derives the list automatically from the
          published docker image (`needs.docker.outputs.image` +
          version) and falls back to the workflow-level `platforms`
          input (which already defaults to `linux/amd664,linux/arm64`).
          Set this only to force a specific list. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''

      # ----- Cloudflare Pages stage ----------------------------------------
      # Runs independently of the monitor + release path. Enable for static-
      # site repos (push-driven continuous deploy) or alongside the container
      # pipeline for projects that ship a companion docs site. All inputs
      # are forwarded verbatim to `deploy-cloudflare-pages.yml` — see that
      # workflow's input reference for the full semantics of each field.
      cloudflare_pages:
        description: 'Run the deploy-cloudflare-pages stage. Default `false` — opt in explicitly.'
        required: false
        type: boolean
        default: false
      cloudflare_project_name:
        description: 'Cloudflare Pages project name. Required when `cloudflare_pages: true`.'
        required: false
        type: string
        default: ''
      cloudflare_deployment_environment:
        description: >-
          Optional GitHub Environment to bind the deploy job to (production
          gates, env-scoped secrets).
        required: false
        type: string
        default: ''
      cloudflare_site_url:
        description: 'Canonical site URL. Required when any Cloudflare generator is enabled.'
        required: false
        type: string
        default: ''
      cloudflare_public_dir:
        description: 'Source directory in the caller repo to copy from.'
        required: false
        type: string
        default: '.'
      cloudflare_deploy_dir:
        description: 'Staging directory uploaded to Cloudflare Pages.'
        required: false
        type: string
        default: './dist'
      cloudflare_clean_deploy_dir:
        description: 'Remove `cloudflare_deploy_dir` before staging files.'
        required: false
        type: boolean
        default: true
      cloudflare_copy_files:
        description: 'Newline-separated files (or globs) under `cloudflare_public_dir` copied into the root of `cloudflare_deploy_dir`.'
        required: false
        type: string
        default: ''
      cloudflare_copy_dirs:
        description: 'Newline-separated `SRC[:DEST]` directory entries copied recursively into `cloudflare_deploy_dir`.'
        required: false
        type: string
        default: ''
      cloudflare_prebuild_command:
        description: >-
          Optional shell command run before staging (e.g. `npm ci && npm run build`).
          ⚠️ SECURITY: executed verbatim under `bash -c` — never interpolate
          untrusted data (PR titles, issue bodies, `github.event.*` strings,
          repository_dispatch payloads).
        required: false
        type: string
        default: ''
      cloudflare_working_directory:
        description: 'Working dir for `cloudflare_prebuild_command` and wrangler.'
        required: false
        type: string
        default: ''
      cloudflare_branch:
        description: 'Override the deploy branch passed to `wrangler pages deploy`.'
        required: false
        type: string
        default: ''
      cloudflare_commit_message:
        description: 'Override the Pages deploy commit message.'
        required: false
        type: string
        default: ''
      cloudflare_wrangler_version:
        description: 'Pin wrangler (e.g. `4`, `^4.0.0`, `latest`). Empty uses the action default.'
        required: false
        type: string
        default: ''
      cloudflare_extra_wrangler_args:
        description: 'Extra args appended to `wrangler pages deploy` (newlines = spaces).'
        required: false
        type: string
        default: ''
      cloudflare_deploy:
        description: "`'true'`/`'false'` to force the deploy step. Empty deploys only on default-branch pushes."
        required: false
        type: string
        default: ''
      cloudflare_runs_on:
        description: >-
          Optional runner override for the Cloudflare Pages deploy job. Empty
          inherits from org-shared `vars.DEFAULT_RUNNER`. See the deploy-
          cloudflare-pages workflow for accepted shapes.
        required: false
        type: string
        default: ''
      cloudflare_checkout_fetch_depth:
        description: '`fetch-depth` passed to `actions/checkout` for the Cloudflare stage.'
        required: false
        type: number
        default: 0
      cloudflare_purge_cache:
        description: >-
          Purge the entire Cloudflare edge cache for the production
          zone after a successful deploy. The zone is taken from
          `secrets.CLOUDFLARE_ZONE_ID` when set, otherwise auto-resolved
          from `cloudflare_site_url` via the Cloudflare API.
        required: false
        type: boolean
        default: true
      cloudflare_generate_sitemap:
        description: 'Run the Blackout Secure sitemap generator before deploy.'
        required: false
        type: boolean
        default: false
      cloudflare_generate_robots:
        description: 'Run the Blackout Secure robots.txt generator before deploy.'
        required: false
        type: boolean
        default: false
      cloudflare_generate_security_txt:
        description: 'Run the Blackout Secure security.txt generator before deploy.'
        required: false
        type: boolean
        default: false
      cloudflare_security_contact:
        description: '`Contact:` value written to `/.well-known/security.txt`. Required when `cloudflare_generate_security_txt: true`.'
        required: false
        type: string
        default: ''
      cloudflare_generate_manifest:
        description: 'Run the Blackout Secure Web App Manifest generator before deploy.'
        required: false
        type: boolean
        default: false
      cloudflare_manifest_name:
        description: 'PWA manifest `name`. Required when `cloudflare_generate_manifest: true`.'
        required: false
        type: string
        default: ''
      cloudflare_manifest_short_name:
        description: 'PWA manifest `short_name`.'
        required: false
        type: string
        default: ''
      cloudflare_manifest_description:
        description: 'PWA manifest `description`.'
        required: false
        type: string
        default: ''
      cloudflare_manifest_orientation:
        description: 'PWA manifest `orientation`.'
        required: false
        type: string
        default: ''
      cloudflare_manifest_theme_color:
        description: 'PWA manifest `theme_color` (CSS hex).'
        required: false
        type: string
        default: ''
      cloudflare_manifest_background_color:
        description: 'PWA manifest `background_color` (CSS hex).'
        required: false
        type: string
        default: ''
      cloudflare_manifest_lang:
        description: 'PWA manifest `lang` (BCP 47 tag).'
        required: false
        type: string
        default: ''
      cloudflare_manifest_dir:
        description: 'PWA manifest `dir` (`ltr`/`rtl`/`auto`).'
        required: false
        type: string
        default: ''
      cloudflare_manifest_categories:
        description: 'PWA manifest `categories` (comma-separated).'
        required: false
        type: string
        default: ''
      cloudflare_manifest_icons_dir:
        description: 'Directory inside `cloudflare_deploy_dir` to scan for icons (e.g. `/assets/`).'
        required: false
        type: string
        default: ''

      # ----- _headers generator (hub-local composite action) --------------
      cloudflare_generate_headers:
        description: >-
          Run the hub's `cf-pages-headers-generate` composite action
          before deploy to dynamically build a Cloudflare Pages
          `_headers` file from composable presets. See the
          `.bos-launchpad.yaml` `cloudflare.headers.*` block for the
          full input schema.
        required: false
        type: boolean
        default: false
      cloudflare_headers_presets:
        description: >-
          Comma-separated preset list. Tokens: `security`, `cache`,
          `cors-fonts`, `opkg-feed`, or `none` (alone with
          `cloudflare_headers_custom_rules` for fully custom output).
          Default `security,cache`.
        required: false
        type: string
        default: 'security,cache'
      cloudflare_headers_csp:
        description: >-
          Optional `Content-Security-Policy` value. Appended to the
          security preset's `/*` block. Single-line only.
        required: false
        type: string
        default: ''
      cloudflare_headers_hsts_max_age:
        description: >-
          `Strict-Transport-Security` max-age in seconds. Default
          `63072000` (2 years). Set to `0` to suppress HSTS.
        required: false
        type: string
        default: '63072000'
      cloudflare_headers_permissions_policy:
        description: >-
          `Permissions-Policy` value. Defaults to a safe denylist for
          static sites. Set empty to omit.
        required: false
        type: string
        default: 'accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()'
      cloudflare_headers_cache_html_control:
        description: '`Cache-Control` value applied to `/*` by the `cache` preset.'
        required: false
        type: string
        default: 'public, max-age=0, must-revalidate'
      cloudflare_headers_cache_assets_pattern:
        description: >-
          Path pattern for the long-cache rule emitted by the `cache`
          preset. Default `/assets/*`.
        required: false
        type: string
        default: '/assets/*'
      cloudflare_headers_cache_assets_control:
        description: '`Cache-Control` value applied to `cloudflare_headers_cache_assets_pattern`.'
        required: false
        type: string
        default: 'public, max-age=31536000, immutable'
      cloudflare_headers_custom_rules:
        description: >-
          Raw `_headers` content appended verbatim AFTER preset
          blocks. Use for per-site rules the presets don't cover.
        required: false
        type: string
        default: ''
      cloudflare_headers_replace_existing:
        description: >-
          When `false` (default), the generator fails if a `_headers`
          file already exists in `deploy_dir`. Safety interlock
          against clobbering a hand-maintained file during migration.
        required: false
        type: boolean
        default: false

      # ----- Release pipeline: GitHub Release stage ------------------------
      release_template_path:
        description: 'Path to a Markdown template inside the caller repo.'
        required: false
        type: string
        default: ''
      release_extra_context:
        description: >-
          Newline-separated `KEY=VALUE` pairs interpolated into the release
          notes template. Resolved upstream metadata (`UPSTREAM_REPO`,
          `UPSTREAM_TAG`, `UPSTREAM_COMMIT`) is appended automatically and
          available to the template even if you pass nothing here.
        required: false
        type: string
        default: ''
      generate_release_notes:
        description: "Append GitHub's auto-generated PR/contributor notes after the rendered body."
        required: false
        type: boolean
        default: true
      release_files:
        description: 'Newline-separated globs of artifacts to attach to the release.'
        required: false
        type: string
        default: ''
      release_draft:
        description: 'Create the release as a draft.'
        required: false
        type: boolean
        default: false

      # ----- Security scan stage (opt-in) ----------------------------------
      # Independent advisory stage: runs in parallel with `monitor` and
      # has no `needs:` cascade into `release` or `cloudflare-pages`.
      # Findings surface in the caller repo's Security tab via SARIF
      # upload, and — when `security_scan_fail_on: fail` — a failing
      # finding marks the workflow run failed, but does NOT block any
      # deploy stage. Mirrors the Docker Scout pattern already in
      # `docker-build-push.yml`: scanners are observational, deploy
      # gating is via explicit toggles + the operator's eyeballs.
      #
      # PERMISSIONS REQUIREMENT (STATIC, UNCONDITIONAL):
      # The caller workflow MUST grant `security-events: write` and
      # `actions: read` at workflow level (and cascade them to the
      # `launchpad` job's `permissions:` block) REGARDLESS of whether
      # `enable_security_scan` is set. GitHub validates the nested-job
      # permission cascade at workflow-load time, BEFORE evaluating the
      # job's `if:` gate. Omitting the grants when `enable_security_scan:
      # false` produces a hard load-time failure:
      #   The nested job 'security_scan' is requesting
      #   'actions: read, security-events: write', but is only allowed
      #   'actions: none, security-events: none'.
      # NOTE: all existing `bos-launchpad-release.yml` callers already grant
      # `actions: write` (superset of `read`) for the nested monitor
      # job's `gh workflow run` calls, and `security-events: write` for
      # Docker Scout SARIF upload — so this requirement happens to be
      # met by the existing perm block, but it is not redundant.
      #
      # The default `fail_on: never` is intentionally LOOSER than the
      # Marketplace launchpad's `fail_on: fail` default — deploy
      # pipelines are time-sensitive (cron-driven container releases,
      # push-driven site deploys), and a posture rule misfire shouldn't
      # mark an otherwise-clean release as failed. Override to `fail`
      # in `.bos-launchpad.yaml` / caller `with:` once findings have
      # been triaged.
      enable_security_scan:
        description: 'Enable consolidated security scanning (kit composite + CodeQL) via the launchpad. Default `false`. NOTE: caller MUST grant `security-events: write` + `actions: read` at workflow level UNCONDITIONALLY (even when this input is `false`) — GitHub validates the nested `security_scan` job''s permission cascade statically, before the `if:` gate.'
        required: false
        type: boolean
        default: false
      security_scan_fail_on:
        description: 'Forwarded to the kit `fail_on`. `never` (default for deploy context) surfaces findings without marking the workflow failed; `fail` gates the workflow on findings (but still does NOT block the deploy stages — see header doc).'
        required: false
        type: string
        default: never
      security_scan_enable_kit_composite:
        description: 'Run the published `bos-code-scanning-kit@v1` composite sub-job inside the wrapper. Default `true`. Set `false` for CodeQL-only mode.'
        required: false
        type: boolean
        default: true
      security_scan_enable_posture:
        description: 'Forwarded to the kit. Run the posture audit step. Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_enable_scanners:
        description: 'Forwarded to the kit. Run the bundled scanners (actionlint / gitleaks / shellcheck). Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_enable_upload:
        description: 'Forwarded to the kit. Upload merged SARIF to GHAS. Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_codeql_languages:
        description: 'JSON array string of CodeQL languages (e.g. `["javascript-typescript"]` for sites, empty for Dockerfile-only repos). Empty (default) skips the CodeQL sub-job entirely. MUST be valid JSON with double-quoted strings — `[javascript-typescript]` is REJECTED by `fromJSON`.'
        required: false
        type: string
        default: ''
      security_scan_codeql_queries:
        description: 'CodeQL query suite. `security-and-quality` (default), `security-extended`, or `security`. Ignored when `security_scan_codeql_languages` is empty.'
        required: false
        type: string
        default: security-and-quality
      security_scan_use_advanced_pat:
        description: >-
          Forwarded to the kit composite as `use_advanced_pat`. When `true`
          AND `secrets.scanning_pat` is non-empty, the elevated posture
          probes (PS001 code-scanning default-setup, PS002 secret-scanning
          enablement, PS003 Dependabot alerts) authenticate with the
          forwarded PAT instead of the default `GITHUB_TOKEN` — they
          otherwise return `skip` because `GITHUB_TOKEN` lacks the
          required `repo` + `admin:org` scopes. No-op when the secret is
          empty (the kit transparently falls back to `GITHUB_TOKEN`), so
          flipping this on a repo whose org has not provisioned
          `SCANNING_PAT` is safe rather than a hard failure. Default
          `false`. Ignored when `security_scan_enable_kit_composite: false`.
        required: false
        type: boolean
        default: false

      # ----- Shared / advanced ---------------------------------------------
      platforms:
        description: 'Platform list reported in release notes.'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'

    secrets:
      DOCKERHUB_USERNAME:
        description: 'Docker Hub username. Required when `docker: true`.'
        required: false
      DOCKERHUB_TOKEN:
        description: 'Docker Hub access token. Required when `docker: true`.'
        required: false
      BALENA_API_TOKEN:
        description: 'balenaCloud API token. Required when `balena: true`.'
        required: false
      CLOUDFLARE_API_TOKEN:
        description: >-
          Cloudflare API token. Required when `cloudflare_pages: true`.
          Needs `Account → Cloudflare Pages → Edit`; add `Zone → Cache
          Purge → Purge` for the post-deploy purge step, and
          `Zone → Zone → Read` so the purge step can auto-resolve the
          zone ID from `cloudflare_site_url` (lets you skip
          `CLOUDFLARE_ZONE_ID` entirely). One token can carry all three
          scopes.
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        description: >-
          Cloudflare account ID (32-char hex). Optional — when
          `cloudflare_pages: true` and this secret is unset, the
          deploy workflow auto-resolves it via `GET /accounts` against
          `CLOUDFLARE_API_TOKEN`. An account-scoped Pages:Edit token
          returns exactly one account, so the lookup is unambiguous.
          Provide it explicitly only when the token can access
          multiple accounts, or to skip the lookup round trip on
          every run.
        required: false
      CLOUDFLARE_ZONE_ID:
        description: >-
          Cloudflare zone ID (32-char hex) for the production domain.
          Optional — when `cloudflare_purge_cache: true` (the default)
          the purge step auto-resolves the zone from
          `cloudflare_site_url` via the Cloudflare API, so most callers
          can leave this unset as long as `CLOUDFLARE_API_TOKEN` carries
          `Zone → Zone → Read`. Provide it explicitly only when the
          token cannot be widened, or to skip the lookup round trip on
          every run.
        required: false
      UPSTREAM_TOKEN:
        description: >-
          Optional PAT/App token used to authenticate to the GitHub API when
          polling the upstream repository. Forwarded to
          `monitor-upstream-release.yml`. Required when `upstream_repo` is a
          **private** repo outside the caller. See that workflow for scope
          details. Falls back to `GITHUB_TOKEN`.
        required: false
      scanning_pat:
        description: >-
          Optional PAT forwarded to the consolidated security-scan stage's
          kit composite for the elevated posture probes PS001/PS002/PS003
          (code-scanning default-setup, secret-scanning enablement,
          Dependabot alerts enablement) which need `repo` + `admin:org`
          beyond the default `GITHUB_TOKEN`. Ignored unless
          `inputs.security_scan_use_advanced_pat` is `true`. Easiest
          pass-through from the caller: declare `secrets: inherit` on the
          launchpad `uses:` block and define `SCANNING_PAT` as an org or
          repo secret. Fine-grained PAT minimum permissions on each target
          repo:
            * Code scanning alerts: Read   (PS001)
            * Secret scanning alerts: Read (PS002)
            * Dependabot alerts: Read      (PS003)
            * Administration: Read         (for branch-protection probes)
          Classic PAT equivalent: `repo` + `admin:org` scopes (the latter
          granted by an org owner), authorized for any SAML SSO orgs the
          PAT will scan against.
        required: false

    outputs:
      changed:
        description: '`true` when the upstream version differed from the tracked file. Empty when the monitor stage was skipped (no `upstream_repo`).'
        value: ${{ jobs.monitor.outputs.changed }}
      upstream_version:
        description: 'Latest upstream version (with `v` stripped). Empty when the monitor stage was skipped.'
        value: ${{ jobs.monitor.outputs.upstream_version }}
      upstream_tag:
        description: 'Raw upstream tag name. Empty when the monitor stage was skipped.'
        value: ${{ jobs.monitor.outputs.upstream_tag }}
      upstream_commit:
        description: 'Resolved upstream commit SHA at the release tag. Empty when the monitor stage was skipped.'
        value: ${{ jobs.monitor.outputs.upstream_commit }}
      tag_name:
        description: 'Resolved release tag (with `v` prefix). Empty when the release stage was skipped.'
        value: ${{ jobs.release.outputs.tag_name }}
      version:
        description: 'Resolved version (tag with leading `v` stripped). Empty when the release stage was skipped.'
        value: ${{ jobs.release.outputs.version }}
      image:
        description: 'Fully qualified Docker image reference (when the docker stage ran).'
        value: ${{ jobs.release.outputs.image }}
      companion_image:
        description: 'Fully qualified companion Docker image reference (when the companion docker stage ran).'
        value: ${{ jobs.release.outputs.companion_image }}
      release_url:
        description: 'GitHub Release HTML URL (when the github-release stage ran).'
        value: ${{ jobs.release.outputs.release_url }}
      cloudflare_deployed:
        description: '`true` when the Cloudflare Pages stage actually pushed a deploy.'
        value: ${{ jobs.cloudflare-pages.outputs.deployed }}
      cloudflare_deployment_url:
        description: 'Primary Cloudflare Pages deployment URL (when the cloudflare-pages stage ran).'
        value: ${{ jobs.cloudflare-pages.outputs.deployment_url }}
      cloudflare_deployment_id:
        description: 'Cloudflare Pages deployment ID (when the cloudflare-pages stage ran).'
        value: ${{ jobs.cloudflare-pages.outputs.deployment_id }}
      cloudflare_environment:
        description: 'Cloudflare Pages environment (`production` or `preview`) for the deploy.'
        value: ${{ jobs.cloudflare-pages.outputs.environment }}
      cloudflare_purged:
        description: '`true` when the post-deploy zone cache purge ran successfully.'
        value: ${{ jobs.cloudflare-pages.outputs.purged }}

permissions:
  contents: read

concurrency:
  # Single in-flight upstream-tracked release per ref. We never cancel —
  # a partial release can leave the registry / fleet in a half-published
  # state that subsequent re-runs reconcile.
  group: bos-launchpad-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 0 — Consolidated security scan (opt-in, advisory).
  # Runs in parallel with `monitor` (no `needs:`). Has NO downstream
  # `needs:` consumers — findings are advisory, not deploy-gating. See the
  # top-of-file header doc for the full rationale.
  #
  # Caller MUST grant `security-events: write` + `actions: read` at workflow
  # level so the permission cascade reaches both sub-jobs inside
  # `bos-launchpad-code-scan.yml` (the kit composite AND the CodeQL matrix).
  # ---------------------------------------------------------------------------
  security_scan:
    name: Security scan
    if: inputs.enable_security_scan
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: blackoutsecure/bos-automation-hub/.github/workflows/bos-launchpad-code-scan.yml@main
    with:
      fail_on:              ${{ inputs.security_scan_fail_on }}
      enable_kit_composite: ${{ inputs.security_scan_enable_kit_composite }}
      enable_posture:       ${{ inputs.security_scan_enable_posture }}
      enable_scanners:      ${{ inputs.security_scan_enable_scanners }}
      enable_upload:        ${{ inputs.security_scan_enable_upload }}
      codeql_languages:     ${{ inputs.security_scan_codeql_languages }}
      codeql_queries:       ${{ inputs.security_scan_codeql_queries }}
      use_advanced_pat:     ${{ inputs.security_scan_use_advanced_pat }}
    secrets:
      # Optional pass-through. The code-scan reusable only consults this
      # when `use_advanced_pat` is `true`; otherwise the kit composite
      # falls back to the runner's default `github.token`. `secrets:`
      # block on a reusable-job invocation may NOT use `secrets: inherit`
      # syntax when forwarding into another reusable, so the assignment
      # is explicit. Callers forward via `secrets: inherit` at the OUTER
      # `uses:` block, which is what makes `secrets.scanning_pat`
      # resolvable here.
      scanning_pat: ${{ secrets.scanning_pat }}

  # ---------------------------------------------------------------------------
  # Stage 1 — detect upstream change (commits tracking file on the default branch).
  # `target_workflows` is left empty so we chain to the release job via `needs:`
  # instead of dispatching a separate workflow run (no DISPATCH_TOKEN needed).
  #
  # Skipped in static-site / direct-deploy mode — i.e. when NO upstream source
  # identifier is supplied. The monitor stage supports six `source` modes and
  # each one has its own required identifier input; the gate below admits any
  # of them:
  #   * `github_release` / `github_branch_file` / `github_tags` → `upstream_repo`
  #   * `container_image`                                       → `image_ref`
  #   * `npm` / `pypi`                                          → `package_name`
  #   * `generic_url`                                           → `version_url`
  # A skipped job still satisfies `needs:` for downstream jobs, but its outputs
  # come back as empty strings — the release gate below treats that as "no
  # release possible" and skips the release stage too.
  # ---------------------------------------------------------------------------
  monitor:
    # Display whichever identifier the caller used so the job name stays
    # meaningful for non-`github_release` sources (container_image, npm, etc.).
    name: >-
      Monitor ${{
        inputs.upstream_repo
        || inputs.image_ref
        || inputs.package_name
        || inputs.version_url
      }}
    # Gate: any non-empty upstream source identifier opts the caller into the
    # monitor stage. See the comment block above for the per-`source` mapping.
    # Don't tighten this to `source`-conditional checks: callers that supply
    # the wrong identifier for their chosen source mode should surface that as
    # a clear validation error inside the monitor stage itself, NOT as a
    # silently-skipped job (which is what the prior `upstream_repo`-only gate
    # did to `source: container_image` callers — every downstream job was
    # skipped with zero diagnostics).
    if: >-
      ${{
        inputs.upstream_repo != ''
        || inputs.image_ref    != ''
        || inputs.package_name != ''
        || inputs.version_url  != ''
      }}
    permissions:
      contents: write   # commit the tracking file
      actions:  write   # nested `monitor-upstream-release.yml` declares this for
                        # `gh workflow run`; GitHub validates the permission at
                        # workflow-call time even when `target_workflows: ''`
                        # means it is never actually invoked at runtime.
    uses: blackoutsecure/bos-automation-hub/.github/workflows/monitor-upstream-release.yml@main
    with:
      upstream_repo:     ${{ inputs.upstream_repo }}
      track_file:        ${{ inputs.track_file }}
      target_workflows:  ''
      force_dispatch:    ${{ inputs.force_run && 'true' || 'false' }}
      source:            ${{ inputs.source }}
      upstream_branch:   ${{ inputs.upstream_branch }}
      version_file_path: ${{ inputs.version_file_path }}
      image_ref:         ${{ inputs.image_ref }}
      package_name:      ${{ inputs.package_name }}
      version_url:       ${{ inputs.version_url }}
      version_regex:     ${{ inputs.version_regex }}
      tag_pattern:       ${{ inputs.tag_pattern }}
    secrets:
      # Forward upstream auth so callers tracking a private upstream repo
      # can supply a PAT with `contents: read` on it. Unset = fall back to
      # `GITHUB_TOKEN` inside the monitor (works for public upstreams only).
      UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 2 — run the full release pipeline against the new upstream version.
  # Skipped when nothing changed unless the operator passed `force_run`.
  # Also skipped entirely when the monitor stage didn't run (static-site mode
  # has no upstream version to release against — use `release.yml` directly
  # for tag-driven container releases without upstream polling).
  # ---------------------------------------------------------------------------
  release:
    name: Release v${{ needs.monitor.outputs.upstream_version }}
    needs: monitor
    # Four gates, all must hold:
    #   1. The run is NOT cancelled. `always()` alone would happily start
    #      the release job after a web-UI "Cancel workflow" click, which
    #      defeats the whole point of the cancel button (see GitHub docs:
    #      `always()` returns true even when the workflow has been
    #      cancelled; pair it with `!cancelled()` to honour cancels).
    #   2. The monitor stage actually ran (i.e. the caller supplied at least
    #      one upstream source identifier — `upstream_repo`, `image_ref`,
    #      `package_name`, or `version_url`). Otherwise there is no
    #      `upstream_version` to release.
    #   3. Either the upstream version changed or the operator forced a re-run.
    #   4. At least one of the release stages is enabled (skip the whole job
    #      when the caller only wants the Cloudflare Pages stage).
    if: >-
      always()
      && !cancelled()
      && needs.monitor.result == 'success'
      && (needs.monitor.outputs.changed == 'true' || inputs.force_run)
      && (inputs.docker || inputs.companion_docker || inputs.balena || inputs.github_release)
    permissions:
      contents:        write   # balena sync_balena_yml + GitHub Release publish
      pull-requests:   write   # nested docker-build-push declares this for Docker
                               # Scout PR-annotation paths; statically validated
                               # at workflow-call time regardless of runtime path.
      security-events: write   # nested docker-build-push declares this for SARIF
                               # upload to the GHAS code-scanning dashboard.
    uses: ./.github/workflows/release.yml
    with:
      tag_name:                        v${{ needs.monitor.outputs.upstream_version }}
      docker:                          ${{ inputs.docker }}
      companion_docker:                ${{ inputs.companion_docker }}
      balena:                          ${{ inputs.balena }}
      github_release:                  ${{ inputs.github_release }}
      image_name:                      ${{ inputs.image_name }}
      companion_image_name:            ${{ inputs.companion_image_name }}
      companion_build_target:          ${{ inputs.companion_build_target }}
      dockerhub_namespace:             ${{ inputs.dockerhub_namespace }}
      # Smart defaults so thin callers don't have to wire these every time.
      # Override by passing the matching input on the caller side.
      docker_extra_tags:               ${{ inputs.docker_extra_tags        || format('sha-{0}', github.sha) }}
      docker_short_description:        ${{ inputs.docker_short_description || github.event.repository.description }}
      docker_latest:                   ${{ inputs.docker_latest }}
      docker_multi_arch:               ${{ inputs.docker_multi_arch }}
      docker_update_description:       ${{ inputs.docker_update_description }}
      docker_force:                    ${{ inputs.docker_force }}
      companion_docker_short_description: ${{ inputs.companion_docker_short_description }}
      docker_enable_scout:             ${{ inputs.docker_enable_scout }}
      docker_scout_command:            ${{ inputs.docker_scout_command }}
      docker_scout_severities:         ${{ inputs.docker_scout_severities }}
      docker_scout_only_fixed:         ${{ inputs.docker_scout_only_fixed }}
      docker_scout_ignore_base:        ${{ inputs.docker_scout_ignore_base }}
      docker_scout_organization:       ${{ inputs.docker_scout_organization }}
      docker_scout_record_environment: ${{ inputs.docker_scout_record_environment }}
      docker_scout_sarif_upload:       ${{ inputs.docker_scout_sarif_upload }}
      docker_scout_exit_code:          ${{ inputs.docker_scout_exit_code }}
      docker_scout_enable_repo:        ${{ inputs.docker_scout_enable_repo }}
      # `block_name` defaults to `image_name` when empty \u2014 the overwhelming
      # majority of consumer repos publish a Docker image and a Balena block
      # under the same slug. Override only when they intentionally diverge.
      block_name:                      ${{ inputs.block_name || inputs.image_name }}
      balena_namespace:                ${{ inputs.balena_namespace }}
      balena_sync_yml:                 ${{ inputs.balena_sync_yml }}
      balena_draft:                    ${{ inputs.balena_draft }}
      balena_force:                    ${{ inputs.balena_force }}
      balena_generate_yml:             ${{ inputs.balena_generate_yml }}
      balena_type:                     ${{ inputs.balena_type }}
      balena_repository_url:           ${{ inputs.balena_repository_url }}
      # Default to `<default-branch>/logo.png` in the caller repo so blocks
      # render with a logo out of the box. Override to pin a different path.
      balena_logo_url:                 ${{ inputs.balena_logo_url || format('https://raw.githubusercontent.com/{0}/{1}/logo.png', github.repository, github.event.repository.default_branch) }}
      balena_default_device_type:      ${{ inputs.balena_default_device_type }}
      # `|-` strips the trailing newline that a plain `|` block would add at
      # each forwarding hop, so multi-line caller values stay byte-stable.
      balena_description: |-
        ${{ inputs.balena_description }}
      balena_post_provisioning: |-
        ${{ inputs.balena_post_provisioning }}
      balena_supported_device_types: |-
        ${{ inputs.balena_supported_device_types }}
      release_template_path:           ${{ inputs.release_template_path }}
      release_extra_context: |
        UPSTREAM_REPO=${{ inputs.upstream_repo }}
        UPSTREAM_TAG=${{ needs.monitor.outputs.upstream_tag }}
        UPSTREAM_COMMIT=${{ needs.monitor.outputs.upstream_commit }}
        ${{ inputs.release_extra_context }}
      generate_release_notes:          ${{ inputs.generate_release_notes }}
      release_files:                   ${{ inputs.release_files }}
      release_draft:                   ${{ inputs.release_draft }}
      platforms:                       ${{ inputs.platforms }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 3 — Cloudflare Pages deploy (static-site path).
  #
  # Independent of the monitor + release stages: runs straight off the caller
  # event (typically `push: branches: [main]` for continuous deploy) and does
  # not require an upstream version. Static-site repos enable this stage and
  # leave `docker|balena|github_release` off; mixed repos can enable it
  # alongside the container pipeline (e.g. companion docs site).
  #
  # Skipped via the explicit `cloudflare_pages` toggle, default `false`, so
  # existing upstream-tracked callers stay byte-stable.
  # ---------------------------------------------------------------------------
  cloudflare-pages:
    name: Cloudflare Pages deploy
    if: ${{ inputs.cloudflare_pages }}
    permissions:
      contents: read
    uses: blackoutsecure/bos-automation-hub/.github/workflows/deploy-cloudflare-pages.yml@main
    with:
      cloudflare_project_name:    ${{ inputs.cloudflare_project_name }}
      deployment_environment:     ${{ inputs.cloudflare_deployment_environment }}
      site_url:                   ${{ inputs.cloudflare_site_url }}
      public_dir:                 ${{ inputs.cloudflare_public_dir }}
      deploy_dir:                 ${{ inputs.cloudflare_deploy_dir }}
      clean_deploy_dir:           ${{ inputs.cloudflare_clean_deploy_dir }}
      # `|-` strips the trailing newline that a plain `|` block would add at
      # each forwarding hop, so multi-line caller values (one path per line)
      # stay byte-stable across the launchpad → deploy-cloudflare-pages hop.
      copy_files: |-
        ${{ inputs.cloudflare_copy_files }}
      copy_dirs: |-
        ${{ inputs.cloudflare_copy_dirs }}
      prebuild_command:           ${{ inputs.cloudflare_prebuild_command }}
      working_directory:          ${{ inputs.cloudflare_working_directory }}
      branch:                     ${{ inputs.cloudflare_branch }}
      commit_message:             ${{ inputs.cloudflare_commit_message }}
      wrangler_version:           ${{ inputs.cloudflare_wrangler_version }}
      extra_wrangler_args:        ${{ inputs.cloudflare_extra_wrangler_args }}
      deploy:                     ${{ inputs.cloudflare_deploy }}
      runs_on:                    ${{ inputs.cloudflare_runs_on }}
      checkout_fetch_depth:       ${{ inputs.cloudflare_checkout_fetch_depth }}
      purge_cache:                ${{ inputs.cloudflare_purge_cache }}
      generate_sitemap:           ${{ inputs.cloudflare_generate_sitemap }}
      generate_robots:            ${{ inputs.cloudflare_generate_robots }}
      generate_security_txt:      ${{ inputs.cloudflare_generate_security_txt }}
      security_contact:           ${{ inputs.cloudflare_security_contact }}
      generate_manifest:          ${{ inputs.cloudflare_generate_manifest }}
      manifest_name:              ${{ inputs.cloudflare_manifest_name }}
      manifest_short_name:        ${{ inputs.cloudflare_manifest_short_name }}
      manifest_description:       ${{ inputs.cloudflare_manifest_description }}
      manifest_orientation:       ${{ inputs.cloudflare_manifest_orientation }}
      manifest_theme_color:       ${{ inputs.cloudflare_manifest_theme_color }}
      manifest_background_color:  ${{ inputs.cloudflare_manifest_background_color }}
      manifest_lang:              ${{ inputs.cloudflare_manifest_lang }}
      manifest_dir:               ${{ inputs.cloudflare_manifest_dir }}
      manifest_categories:        ${{ inputs.cloudflare_manifest_categories }}
      manifest_icons_dir:         ${{ inputs.cloudflare_manifest_icons_dir }}
      generate_headers:           ${{ inputs.cloudflare_generate_headers }}
      headers_presets:            ${{ inputs.cloudflare_headers_presets }}
      headers_csp:                ${{ inputs.cloudflare_headers_csp }}
      headers_hsts_max_age:       ${{ inputs.cloudflare_headers_hsts_max_age }}
      headers_permissions_policy: ${{ inputs.cloudflare_headers_permissions_policy }}
      headers_cache_html_control: ${{ inputs.cloudflare_headers_cache_html_control }}
      headers_cache_assets_pattern: ${{ inputs.cloudflare_headers_cache_assets_pattern }}
      headers_cache_assets_control: ${{ inputs.cloudflare_headers_cache_assets_control }}
      headers_custom_rules:       ${{ inputs.cloudflare_headers_custom_rules }}
      headers_replace_existing:   ${{ inputs.cloudflare_headers_replace_existing }}
    secrets:
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
