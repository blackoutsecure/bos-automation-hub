name: Cloudflare Pages Deploy (reusable)

"on":
  workflow_call:
    inputs:
      cloudflare_project_name:
        description: 'Cloudflare Pages project name (lowercase letters, digits, hyphens; 1–58 chars).'
        required: true
        type: string
      deployment_environment:
        description: >-
          Optional GitHub Environment to bind the deploy job to. When
          set, the job runs under that environment and inherits its
          protection rules (required reviewers, wait timer, branch
          policy) and environment-scoped secrets. Leave empty to skip
          environment binding.
        required: false
        type: string
        default: ''
      site_url:
        description: >-
          Canonical site URL (e.g. `https://example.com`). Required when any
          generator is enabled; otherwise optional and only used for the job
          summary.
        required: false
        type: string
        default: ''
      public_dir:
        description: 'Source directory in the caller repo to copy from.'
        required: false
        type: string
        default: '.'
      deploy_dir:
        description: >-
          Staging directory that gets uploaded to Cloudflare Pages. Created
          on demand. Must be a repo-relative path.
        required: false
        type: string
        default: './dist'
      clean_deploy_dir:
        description: 'Remove `deploy_dir` before staging files.'
        required: false
        type: boolean
        default: true
      copy_files:
        description: >-
          Newline-separated list of files (or globs) under `public_dir`
          to copy into the root of `deploy_dir`. Globs are expanded by the
          shell; missing entries fail the run.
        required: false
        type: string
        default: ''
      copy_dirs:
        description: >-
          Newline-separated list of directories to copy recursively into
          `deploy_dir`. Each entry is `SRC` or `SRC:DEST`, where `DEST` is
          the path inside `deploy_dir` (defaults to the basename of `SRC`).
          Both paths must be repo-relative and must not contain `..`.
        required: false
        type: string
        default: ''
      prebuild_command:
        description: >-
          Optional shell command run from `working_directory` (or repo root
          when empty) before files are staged. Useful for `npm ci && npm run build`.
          ⚠️ SECURITY: this string is executed verbatim under `bash -c`. NEVER
          interpolate untrusted data into it (PR titles, issue bodies,
          `github.event.*` strings, repository_dispatch payloads, etc.) —
          doing so is a shell-injection sink. Only pass commands authored by
          the calling workflow itself.
        required: false
        type: string
        default: ''
      working_directory:
        description: >-
          Working directory used for `prebuild_command` and `wrangler-action`.
          Empty means the repository root.
        required: false
        type: string
        default: ''
      branch:
        description: >-
          Branch to publish to. Cloudflare Pages treats deploys whose branch
          matches the project's production branch as production; everything
          else is a preview. Empty defers to wrangler's default
          (`github.ref_name` on push events, the head ref on PRs).
        required: false
        type: string
        default: ''
      commit_message:
        description: 'Override the commit message attached to the Pages deploy.'
        required: false
        type: string
        default: ''
      wrangler_version:
        description: 'Pin wrangler to a specific version, range, or tag (e.g. `4`, `^4.0.0`, `latest`). Empty uses the action default.'
        required: false
        type: string
        default: ''
      extra_wrangler_args:
        description: >-
          Extra arguments appended (verbatim) to `wrangler pages deploy`.
          Newlines are converted to spaces. Use with care.
        required: false
        type: string
        default: ''
      deploy:
        description: >-
          `'true'`/`'false'` to force the deploy step. Empty (default) deploys
          only on push events to the repository's default branch.
        required: false
        type: string
        default: ''
      runs_on:
        description: >-
          Optional runner override for the build/deploy job. When empty
          (the default), resolves from the org-shared `vars.DEFAULT_RUNNER`.
          Accepts either a bare label (e.g. `ubuntu-latest`) or a JSON-array
          string of labels (e.g. `["self-hosted","Linux","ARM64"]`); both
          shapes are parsed at runtime via `fromJSON` so GHA sees a real
          label list rather than a single literal string. No silent
          fallback: `vars.DEFAULT_RUNNER` is validated by the
          `preflight-runner-config` job (see README.md "Runner
          configuration") so a job that reaches this stage is
          guaranteed to evaluate against a valid label set.
        required: false
        type: string
        default: ''
      checkout_fetch_depth:
        description: >-
          `fetch-depth` passed to `actions/checkout`. Defaults to `0`
          (full history) so generators that derive `<lastmod>` from git
          have what they need. Set to `1` to speed up shallow clones.
        required: false
        type: number
        default: 0

      # ── Edge cache purge ───────────────────────────────────────────
      purge_cache:
        description: >-
          When `true` (default), purge the entire Cloudflare edge cache
          for the production zone after a successful deploy, so subsequent
          requests pull the freshly published assets. Has no effect when
          the deploy step is skipped. The zone is identified in this
          order: (1) `vars.CLOUDFLARE_ZONE_ID` if set, (2)
          `secrets.CLOUDFLARE_ZONE_ID` for back-compat, (3) auto-resolved
          from the `site_url` input via the Cloudflare API (requires the
          API token to carry `Zone:Read`). When none are available the
          purge is skipped with a notice annotation. Set to `false` to
          disable purging regardless of zone configuration.
        required: false
        type: boolean
        default: true

      # ── Sitemap generator ──────────────────────────────────────────
      generate_sitemap:
        description: 'Run the Blackout Secure sitemap generator before deploy.'
        required: false
        type: boolean
        default: false

      # ── robots.txt generator ───────────────────────────────────────
      generate_robots:
        description: 'Run the Blackout Secure robots.txt generator before deploy.'
        required: false
        type: boolean
        default: false

      # ── security.txt generator ─────────────────────────────────────
      generate_security_txt:
        description: 'Run the Blackout Secure security.txt generator before deploy.'
        required: false
        type: boolean
        default: false
      security_contact:
        description: >-
          `Contact:` value written to `/.well-known/security.txt` (an email
          address or `https://` URL). Required when `generate_security_txt`
          is `true`.
        required: false
        type: string
        default: ''

      # ── Web App Manifest generator ─────────────────────────────────
      generate_manifest:
        description: 'Run the Blackout Secure Web Application Manifest generator before deploy.'
        required: false
        type: boolean
        default: false
      manifest_name:
        description: 'PWA manifest `name`. Required when `generate_manifest` is `true`.'
        required: false
        type: string
        default: ''
      manifest_short_name:
        description: 'PWA manifest `short_name`.'
        required: false
        type: string
        default: ''
      manifest_description:
        description: 'PWA manifest `description`.'
        required: false
        type: string
        default: ''
      manifest_orientation:
        description: 'PWA manifest `orientation` (e.g. `portrait-primary`).'
        required: false
        type: string
        default: ''
      manifest_theme_color:
        description: 'PWA manifest `theme_color` as a CSS hex colour (`#000` or `#000000`).'
        required: false
        type: string
        default: ''
      manifest_background_color:
        description: 'PWA manifest `background_color` as a CSS hex colour (`#000` or `#000000`).'
        required: false
        type: string
        default: ''
      manifest_lang:
        description: 'PWA manifest `lang` (BCP 47 tag, e.g. `en-US`).'
        required: false
        type: string
        default: ''
      manifest_dir:
        description: 'PWA manifest `dir` (`ltr`, `rtl`, or `auto`).'
        required: false
        type: string
        default: ''
      manifest_categories:
        description: 'PWA manifest `categories` as a comma-separated list (e.g. `business,productivity`).'
        required: false
        type: string
        default: ''
      manifest_icons_dir:
        description: 'Directory inside `deploy_dir` to scan for icon files (e.g. `/assets/`).'
        required: false
        type: string
        default: ''

      # ── _headers generator (hub-local composite action) ────────────
      generate_headers:
        description: >-
          Run the hub's `cf-pages-headers-generate` composite action
          before deploy. Writes `_headers` into `deploy_dir` from
          composable presets (security, cache, cors-fonts, opkg-feed)
          plus optional CSP and custom rules. See
          `.github/actions/cf-pages-headers-generate/action.yml` for
          full input docs.
        required: false
        type: boolean
        default: false
      headers_presets:
        description: >-
          Comma-separated preset list for the `_headers` generator.
          Tokens: `security`, `cache`, `cors-fonts`, `opkg-feed`, or
          `none` (alone, with `headers_custom_rules` for fully custom
          output). Default `security,cache`.
        required: false
        type: string
        default: 'security,cache'
      headers_csp:
        description: >-
          Optional `Content-Security-Policy` value appended to the
          security preset's `/*` block. Must be a single line
          (Cloudflare limit: 2000 chars per line).
        required: false
        type: string
        default: ''
      headers_hsts_max_age:
        description: >-
          `Strict-Transport-Security` max-age in seconds. Default
          `63072000` (2 years, preload-list requirement). Set to `0`
          to suppress HSTS entirely.
        required: false
        type: string
        default: '63072000'
      headers_permissions_policy:
        description: >-
          `Permissions-Policy` value. Default disables the high-risk
          feature set a static site never needs. Set empty to omit.
        required: false
        type: string
        default: 'accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()'
      headers_cache_html_control:
        description: >-
          `Cache-Control` value applied to `/*` by the `cache` preset.
          Default `public, max-age=0, must-revalidate`.
        required: false
        type: string
        default: 'public, max-age=0, must-revalidate'
      headers_cache_assets_pattern:
        description: >-
          Path pattern for the long-cache rule emitted by the `cache`
          preset. Default `/assets/*`. Override for framework-specific
          fingerprinted paths (e.g. `/_next/static/*`).
        required: false
        type: string
        default: '/assets/*'
      headers_cache_assets_control:
        description: >-
          `Cache-Control` value applied to `headers_cache_assets_pattern`.
          Default `public, max-age=31536000, immutable`. Safe ONLY for
          fingerprinted assets — never apply to mutable paths.
        required: false
        type: string
        default: 'public, max-age=31536000, immutable'
      headers_custom_rules:
        description: >-
          Raw `_headers` content appended verbatim AFTER all preset
          blocks. One URL/path per line followed by `  Name: Value`
          lines indented with two spaces.
        required: false
        type: string
        default: ''
      headers_replace_existing:
        description: >-
          When `false` (default), the generator fails if `_headers`
          already exists in `deploy_dir`. Set `true` once you have
          migrated away from a hand-maintained `_headers` (or
          permanently once the consumer is fully generator-driven).
        required: false
        type: boolean
        default: false
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: >-
          Cloudflare API token. Requires `Account → Cloudflare Pages →
          Edit` for the deploy step, plus `Zone → Cache Purge → Purge`
          on the target zone when `purge_cache` is enabled. The same
          token can carry both scopes.
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        description: >-
          **Back-compat input. Prefer `vars.CLOUDFLARE_ACCOUNT_ID`** —
          account IDs are public Cloudflare identifiers, not secrets,
          and storing them as secrets makes the runner mask the value
          (which prevents `needs.<job>.outputs.account_id` from being
          readable in downstream jobs). When neither this secret nor
          the var is set, the workflow auto-resolves the account via
          `GET /accounts` against `CLOUDFLARE_API_TOKEN`. An account-
          scoped Pages:Edit token returns exactly one account, so the
          lookup is unambiguous. Provide it explicitly only when the
          token can access multiple accounts, or to skip the lookup
          round trip on every run.
        required: false
      CLOUDFLARE_ZONE_ID:
        description: >-
          **Back-compat input. Prefer `vars.CLOUDFLARE_ZONE_ID`** —
          zone IDs are public Cloudflare identifiers. Optional — the
          cache-purge step auto-resolves the zone from the `site_url`
          input via the Cloudflare API when neither the var nor the
          secret is set, so most callers can leave it empty and just
          ensure their `CLOUDFLARE_API_TOKEN` carries `Zone → Zone →
          Read`. Provide it explicitly only when the API token cannot
          be widened, or to skip the lookup round trip on every run.
        required: false
    outputs:
      deployed:
        description: '`true` when wrangler actually pushed a deploy.'
        value: ${{ jobs.deploy.outputs.deployed }}
      deployment_url:
        description: 'Primary deployment URL returned by wrangler-action.'
        value: ${{ jobs.deploy.outputs.deployment_url }}
      deployment_id:
        description: 'Cloudflare Pages deployment ID.'
        value: ${{ jobs.deploy.outputs.deployment_id }}
      deployment_alias_url:
        description: 'Pages deployment alias URL (set on preview/branch deploys).'
        value: ${{ jobs.deploy.outputs.deployment_alias_url }}
      environment:
        description: 'Cloudflare Pages environment (`production` or `preview`).'
        value: ${{ jobs.deploy.outputs.environment }}
      account_id:
        description: >-
          Resolved Cloudflare account ID. Sourced from
          `vars.CLOUDFLARE_ACCOUNT_ID` when set, otherwise
          `secrets.CLOUDFLARE_ACCOUNT_ID` (back-compat), otherwise
          auto-resolved via `GET /accounts`. When sourced from a
          secret (back-compat path) the runner auto-masks it and this
          output arrives **empty** in downstream jobs reading
          `needs.<job>.outputs.account_id` — migrate to
          `vars.CLOUDFLARE_ACCOUNT_ID` to fix.
        value: ${{ jobs.deploy.outputs.account_id }}
      purged:
        description: '`true` when the post-deploy zone cache purge ran successfully; `false` when skipped or failed.'
        value: ${{ jobs.deploy.outputs.purged }}

permissions:
  contents: read

concurrency:
  # Cloudflare Pages serialises deploys per project; never cancel an in-flight push.
  group: cloudflare-pages-${{ github.workflow }}-${{ inputs.cloudflare_project_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — validate `vars.DEFAULT_RUNNER` once before any downstream job
  # evaluates its `runs-on:` expression. See release.yml for full rationale.
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          # Forward all three runner vars so the log shows the full
          # org-var state, not just the ones this workflow enforces.
          # The `require_*` flags determine which must be set.
          default_runner: ${{ vars.DEFAULT_RUNNER }}
          runner_x64: ${{ vars.RUNNER_X64 }}
          runner_arm64: ${{ vars.RUNNER_ARM64 }}

  deploy:
    name: Build & deploy to Cloudflare Pages
    needs: preflight-runner-config
    # Resolve runner: explicit `inputs.runs_on` override beats org-shared
    # `vars.DEFAULT_RUNNER`. Presence and shape of `vars.DEFAULT_RUNNER`
    # are enforced by `preflight-runner-config` — see README.md ("Runner
    # configuration") for the full rationale. The `fromJSON` + `startsWith`
    # dance supports both bare-label and JSON-array shapes.
    runs-on: ${{ fromJSON(startsWith(inputs.runs_on || vars.DEFAULT_RUNNER, '[') && (inputs.runs_on || vars.DEFAULT_RUNNER) || format('"{0}"', inputs.runs_on || vars.DEFAULT_RUNNER)) }}
    timeout-minutes: 30
    environment: ${{ inputs.deployment_environment }}
    env:
      # Hoist inputs that several steps read so they live in one place
      # and never get expanded inline inside `run:` bodies.
      PROJECT_NAME: ${{ inputs.cloudflare_project_name }}
      DEPLOYMENT_ENVIRONMENT: ${{ inputs.deployment_environment }}
      SITE_URL: ${{ inputs.site_url }}
      PUBLIC_DIR: ${{ inputs.public_dir }}
      DEPLOY_DIR: ${{ inputs.deploy_dir }}
      WORKING_DIRECTORY: ${{ inputs.working_directory }}
      BRANCH: ${{ inputs.branch }}
      DEPLOY_OVERRIDE: ${{ inputs.deploy }}
      WRANGLER_VERSION: ${{ inputs.wrangler_version }}
      # Cloudflare account/zone IDs: prefer `vars.*` (public identifiers,
      # no runner masking, can flow through `GITHUB_OUTPUT` to downstream
      # jobs); fall back to `secrets.*` for back-compat with callers who
      # provisioned them as secrets before the vars-first convention.
      # Secrets get auto-masked by the runner — validation still works,
      # but `needs.<job>.outputs.account_id` will arrive empty.
      ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZONE_ID:    ${{ vars.CLOUDFLARE_ZONE_ID    || secrets.CLOUDFLARE_ZONE_ID }}
    outputs:
      deployed: ${{ steps.gate.outputs.deploy }}
      deployment_url: ${{ steps.deploy.outputs.deployment-url }}
      deployment_id: ${{ steps.deploy.outputs.pages-deployment-id }}
      deployment_alias_url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
      environment: ${{ steps.deploy.outputs.pages-environment }}
      account_id: ${{ steps.account.outputs.value }}
      purged: ${{ steps.purge.outputs.purged || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: ${{ inputs.checkout_fetch_depth }}
          persist-credentials: false

      # `cloudflare/wrangler-action` installs wrangler via `npm install -g`
      # and needs Node + npm on PATH. GitHub-hosted runners ship Node,
      # but self-hosted runners (e.g. balena-deployed actions-runner
      # containers) typically don't — set up Node explicitly so the hub
      # workflow is runner-agnostic. Idempotent on GitHub-hosted runners.
      # Also covers `prebuild_command` callers that run `npm ci`.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'   # current LTS; wrangler 4 supports 18/20/22

      # Account ID resolution: prefer the inherited `env.ACCOUNT_ID`
      # (set from `vars.*` or back-compat `secrets.*` at the job level).
      # When neither is set, look the account up via `GET /accounts`.
      - name: Auto-resolve Cloudflare account ID
        id: account_autoresolve
        if: env.ACCOUNT_ID == ''
        env:
          API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, re, sys, urllib.error, urllib.request

          token = (os.environ.get("API_TOKEN") or "").strip()
          if not token:
              sys.exit("ERROR: CLOUDFLARE_API_TOKEN is required for account auto-resolve")
          if any(c.isspace() for c in token):
              sys.exit("ERROR: CLOUDFLARE_API_TOKEN contains whitespace/newlines")

          req = urllib.request.Request(
              "https://api.cloudflare.com/client/v4/accounts",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                  "User-Agent": "bos-automation-hub/deploy-cloudflare-pages",
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  status, payload = resp.status, json.loads(resp.read() or b"{}")
          except urllib.error.HTTPError as exc:
              status = exc.code
              payload = json.loads(exc.read() or b"{}") if exc.headers.get("Content-Type", "").startswith("application/json") else {"_raw": (exc.read() or b"").decode("utf-8", "replace")}

          if status != 200 or not payload.get("success"):
              print(f"ERROR: Cloudflare /accounts returned HTTP {status}", file=sys.stderr)
              print("Hint: token must be valid and have at least one account-scoped permission.", file=sys.stderr)
              print(json.dumps(payload)[:600], file=sys.stderr)
              sys.exit(1)

          result = payload.get("result") or []
          if not result:
              sys.exit("ERROR: token returned zero accounts (no account-scoped permissions).")
          if len(result) > 1:
              names = ", ".join(a.get("name", "?") for a in result)
              sys.exit(
                  f"ERROR: token can access {len(result)} accounts; set vars.CLOUDFLARE_ACCOUNT_ID "
                  f"(or the back-compat secret) explicitly to pick one. Accounts: {names}"
              )

          acct_id = (result[0].get("id") or "").strip()
          if not re.match(r"^[0-9a-f]{32}$", acct_id):
              sys.exit(f"ERROR: parsed account ID is not 32-char hex: {acct_id!r}")

          print(f"Auto-resolved Cloudflare account ID: {acct_id}", file=sys.stderr)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"value={acct_id}\n")
          PY

      - name: Resolve & validate Cloudflare account ID
        id: account
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/cloudflare-resolve-id@main
        with:
          value: ${{ env.ACCOUNT_ID || steps.account_autoresolve.outputs.value }}
          kind: account

      - name: Preflight validation
        env:
          # PROJECT_NAME, SITE_URL, PUBLIC_DIR, DEPLOY_DIR,
          # WORKING_DIRECTORY, BRANCH, DEPLOY_OVERRIDE, WRANGLER_VERSION,
          # DEPLOYMENT_ENVIRONMENT inherited from job-level env.
          GENERATE_SITEMAP: ${{ inputs.generate_sitemap }}
          GENERATE_ROBOTS: ${{ inputs.generate_robots }}
          GENERATE_SECURITY_TXT: ${{ inputs.generate_security_txt }}
          GENERATE_MANIFEST: ${{ inputs.generate_manifest }}
          GENERATE_HEADERS: ${{ inputs.generate_headers }}
          SECURITY_CONTACT: ${{ inputs.security_contact }}
          MANIFEST_NAME: ${{ inputs.manifest_name }}
          MANIFEST_THEME_COLOR: ${{ inputs.manifest_theme_color }}
          MANIFEST_BACKGROUND_COLOR: ${{ inputs.manifest_background_color }}
          MANIFEST_DIR: ${{ inputs.manifest_dir }}
          MANIFEST_LANG: ${{ inputs.manifest_lang }}
          MANIFEST_ORIENTATION: ${{ inputs.manifest_orientation }}
          HEADERS_PRESETS: ${{ inputs.headers_presets }}
          HEADERS_HSTS_MAX_AGE: ${{ inputs.headers_hsts_max_age }}
          HEADERS_CACHE_ASSETS_PATTERN: ${{ inputs.headers_cache_assets_pattern }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          # A stray newline in a secret silently truncates GITHUB_OUTPUT
          # for any downstream step, so reject it explicitly.
          check_singleline() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is missing"; return; }
            case "${val}" in
              *[$'\n\r\t ']*) fail "${name} contains whitespace/newlines" ;;
            esac
          }

          # Repo-relative path: no leading slash, no '..' segment, no NUL.
          check_relpath() {
            local name="$1" val="$2"
            [ -n "${val}" ] || { fail "${name} is empty"; return; }
            case "${val}" in
              /*)        fail "${name} must be a repo-relative path (got '${val}')" ;;
              *..*)      fail "${name} must not contain '..' (got '${val}')" ;;
              *[$'\n\r']*) fail "${name} must not contain newlines" ;;
            esac
          }

          # Cloudflare Pages project names: lowercase a-z, 0-9 and '-',
          # 1-58 chars, can't start or end with '-'.
          if ! printf '%s' "${PROJECT_NAME}" \
            | grep -Eq '^[a-z0-9]([a-z0-9-]{0,56}[a-z0-9])?$'; then
            fail "input 'cloudflare_project_name' is not a valid Pages project name: '${PROJECT_NAME}'"
          fi

          check_singleline "secret 'CLOUDFLARE_API_TOKEN'"  "${CLOUDFLARE_API_TOKEN}"

          # GitHub Environment names: 1–255 chars, no control chars or '/'.
          if [ -n "${DEPLOYMENT_ENVIRONMENT}" ]; then
            check_singleline "input 'deployment_environment'" "${DEPLOYMENT_ENVIRONMENT}"
            if ! printf '%s' "${DEPLOYMENT_ENVIRONMENT}" \
              | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,254}$'; then
              fail "input 'deployment_environment' is not a valid GitHub Environment name: '${DEPLOYMENT_ENVIRONMENT}'"
            fi
          fi

          check_relpath "input 'public_dir'" "${PUBLIC_DIR}"
          check_relpath "input 'deploy_dir'" "${DEPLOY_DIR}"
          if [ -n "${WORKING_DIRECTORY}" ]; then
            check_relpath "input 'working_directory'" "${WORKING_DIRECTORY}"
          fi

          if [ -n "${BRANCH}" ]; then
            check_singleline "input 'branch'" "${BRANCH}"
            # Allow git-ref shape: letters, digits, '/', '-', '_', '.'.
            if ! printf '%s' "${BRANCH}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._/-]{0,254}$'; then
              fail "input 'branch' is not a valid branch name: '${BRANCH}'"
            fi
          fi

          if [ -n "${DEPLOY_OVERRIDE}" ]; then
            case "${DEPLOY_OVERRIDE}" in
              true|false) ;;
              *) fail "input 'deploy' must be empty, 'true', or 'false' (got '${DEPLOY_OVERRIDE}')" ;;
            esac
          fi

          if [ -n "${WRANGLER_VERSION}" ]; then
            check_singleline "input 'wrangler_version'" "${WRANGLER_VERSION}"
          fi

          # Anything that gets baked into static asset URLs must be a
          # well-formed absolute http(s) URL.
          needs_url=false
          [ "${GENERATE_SITEMAP}"       = "true" ] && needs_url=true
          [ "${GENERATE_ROBOTS}"        = "true" ] && needs_url=true
          [ "${GENERATE_SECURITY_TXT}"  = "true" ] && needs_url=true
          if [ "${needs_url}" = "true" ]; then
            [ -n "${SITE_URL}" ] || fail "input 'site_url' is required when any generator is enabled"
            if [ -n "${SITE_URL}" ] && ! printf '%s' "${SITE_URL}" \
              | grep -Eq '^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[^[:space:]]*)?$'; then
              fail "input 'site_url' must be an http(s) URL (got '${SITE_URL}')"
            fi
          elif [ -n "${SITE_URL}" ]; then
            # Still validate when supplied.
            if ! printf '%s' "${SITE_URL}" \
              | grep -Eq '^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/[^[:space:]]*)?$'; then
              fail "input 'site_url' must be an http(s) URL (got '${SITE_URL}')"
            fi
          fi

          if [ "${GENERATE_SECURITY_TXT}" = "true" ]; then
            [ -n "${SECURITY_CONTACT}" ] \
              || fail "input 'security_contact' is required when 'generate_security_txt' is true"
            if [ -n "${SECURITY_CONTACT}" ] && ! printf '%s' "${SECURITY_CONTACT}" \
              | grep -Eq '^(mailto:[^[:space:]@]+@[^[:space:]@]+|https?://[^[:space:]]+|[^[:space:]@]+@[^[:space:]@]+)$'; then
              fail "input 'security_contact' must be an email or http(s) URL (got '${SECURITY_CONTACT}')"
            fi
          fi

          if [ "${GENERATE_MANIFEST}" = "true" ]; then
            [ -n "${MANIFEST_NAME}" ] \
              || fail "input 'manifest_name' is required when 'generate_manifest' is true"

            for color_name in MANIFEST_THEME_COLOR MANIFEST_BACKGROUND_COLOR; do
              eval "color_val=\${$color_name}"
              if [ -n "${color_val}" ] \
                && ! printf '%s' "${color_val}" | grep -Eq '^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$'; then
                fail "input '$(echo "${color_name}" | tr '[:upper:]' '[:lower:]')' must be a CSS hex colour (got '${color_val}')"
              fi
            done

            if [ -n "${MANIFEST_DIR}" ]; then
              case "${MANIFEST_DIR}" in
                ltr|rtl|auto) ;;
                *) fail "input 'manifest_dir' must be 'ltr', 'rtl', or 'auto' (got '${MANIFEST_DIR}')" ;;
              esac
            fi

            if [ -n "${MANIFEST_LANG}" ] && ! printf '%s' "${MANIFEST_LANG}" \
              | grep -Eq '^[A-Za-z]{2,3}(-[A-Za-z0-9]{2,8})*$'; then
              fail "input 'manifest_lang' is not a BCP 47 tag (got '${MANIFEST_LANG}')"
            fi

            if [ -n "${MANIFEST_ORIENTATION}" ]; then
              case "${MANIFEST_ORIENTATION}" in
                any|natural|landscape|landscape-primary|landscape-secondary|portrait|portrait-primary|portrait-secondary) ;;
                *) fail "input 'manifest_orientation' is not a valid PWA orientation (got '${MANIFEST_ORIENTATION}')" ;;
              esac
            fi
          fi

          if [ "${GENERATE_HEADERS}" = "true" ]; then
            # Tokenize headers_presets and reject unknown / malformed values
            # at the workflow boundary, so callers get a fast actionable
            # error before the composite action runs.
            saw_none=false
            saw_other=false
            _hp_toks=()
            if [ -n "${HEADERS_PRESETS}" ]; then
              IFS=',' read -ra _hp_toks <<< "${HEADERS_PRESETS}"
            fi
            for tok in "${_hp_toks[@]:-}"; do
              tok="${tok#"${tok%%[![:space:]]*}"}"
              tok="${tok%"${tok##*[![:space:]]}"}"
              tok="$(printf '%s' "${tok}" | tr '[:upper:]' '[:lower:]')"
              [ -z "${tok}" ] && continue
              case "${tok}" in
                security|cache|cors-fonts|opkg-feed) saw_other=true ;;
                none) saw_none=true ;;
                *) fail "input 'headers_presets' contains unknown token '${tok}' (allowed: security, cache, cors-fonts, opkg-feed, none)" ;;
              esac
            done
            if [ "${saw_none}" = "true" ] && [ "${saw_other}" = "true" ]; then
              fail "input 'headers_presets': 'none' must appear alone"
            fi

            case "${HEADERS_HSTS_MAX_AGE}" in
              ''|*[!0-9]*) fail "input 'headers_hsts_max_age' must be a non-negative integer (got '${HEADERS_HSTS_MAX_AGE}')" ;;
            esac

            # Path pattern shape check: starts with '/' or 'http(s)://'.
            case "${HEADERS_CACHE_ASSETS_PATTERN}" in
              /*|http://*|https://*) ;;
              *) fail "input 'headers_cache_assets_pattern' must start with '/' or 'http(s)://' (got '${HEADERS_CACHE_ASSETS_PATTERN}')" ;;
            esac
          fi

          [ "${ERR}" -eq 0 ] || { echo "Preflight validation failed." >&2; exit 1; }
          echo "Preflight OK."

      - name: Resolve deploy gate
        id: gate
        env:
          # DEPLOY_OVERRIDE inherited from job-level env.
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          if [ -n "${DEPLOY_OVERRIDE}" ]; then
            DECISION="${DEPLOY_OVERRIDE}"
          elif [ "${EVENT_NAME}" = "push" ] && [ "${REF}" = "refs/heads/${DEFAULT_BRANCH}" ]; then
            DECISION="true"
          else
            DECISION="false"
          fi
          echo "deploy=${DECISION}" >> "${GITHUB_OUTPUT}"
          echo "deploy=${DECISION}"

      - name: Run prebuild command
        if: inputs.prebuild_command != ''
        env:
          PREBUILD_COMMAND: ${{ inputs.prebuild_command }}
          # WORKING_DIRECTORY inherited from job-level env.
        run: |
          set -euo pipefail
          if [ -n "${WORKING_DIRECTORY}" ]; then
            cd "${WORKING_DIRECTORY}"
          fi
          # ⚠️ SECURITY: the caller-provided command is executed verbatim under
          # bash. The caller workflow is responsible for ensuring nothing
          # untrusted (PR titles, issue bodies, github.event.* strings,
          # repository_dispatch payloads, etc.) is interpolated into
          # `inputs.prebuild_command` — doing so would be a shell-injection
          # sink. See the input description for the full warning.
          bash -eo pipefail -c "${PREBUILD_COMMAND}"

      - name: Stage deploy directory
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/stage-deploy-dir@main
        with:
          public_dir: ${{ inputs.public_dir }}
          deploy_dir: ${{ inputs.deploy_dir }}
          clean: ${{ inputs.clean_deploy_dir }}
          copy_files: ${{ inputs.copy_files }}
          copy_dirs: ${{ inputs.copy_dirs }}

      # ──────────────────────────────────────────────────────────────
      # Generators (each opt-in). Pinned by SHA — Dependabot bumps
      # them together with the rest of the actions in this repo.
      # ──────────────────────────────────────────────────────────────

      - name: Generate sitemap
        if: inputs.generate_sitemap
        uses: blackoutsecure/bos-sitemap-generator@5ec7fbce9a419a47c2e7d58bcb0ae28c02c84cda # v1.0.1
        with:
          site_url: ${{ inputs.site_url }}
          public_dir: ${{ inputs.deploy_dir }}

      - name: Generate Web App Manifest
        if: inputs.generate_manifest
        uses: blackoutsecure/bos-web-application-manifest-generator@80a4378040f636d8ce2941026f47aad22bb75256 # v1.0.8
        with:
          name: ${{ inputs.manifest_name }}
          short_name: ${{ inputs.manifest_short_name }}
          description: ${{ inputs.manifest_description }}
          orientation: ${{ inputs.manifest_orientation }}
          theme_color: ${{ inputs.manifest_theme_color }}
          background_color: ${{ inputs.manifest_background_color }}
          lang: ${{ inputs.manifest_lang }}
          dir: ${{ inputs.manifest_dir }}
          categories: ${{ inputs.manifest_categories }}
          public_dir: ${{ inputs.deploy_dir }}
          icons_dir: ${{ inputs.manifest_icons_dir }}

      - name: Generate robots.txt
        if: inputs.generate_robots
        uses: blackoutsecure/bos-robotstxt-generator@0a4523ab7fd22579799d5406247f7724b6728293 # v1.2.0
        with:
          site_url: ${{ inputs.site_url }}
          public_dir: ${{ inputs.deploy_dir }}

      - name: Generate security.txt
        if: inputs.generate_security_txt
        uses: blackoutsecure/bos-securitytxt-generator@7ca9d802b9ff2fff07e4e514c72cc8f241b2494f # v1.2.0
        with:
          security_contact: ${{ inputs.security_contact }}
          site_url: ${{ inputs.site_url }}
          public_dir: ${{ inputs.deploy_dir }}

      # Hub-local composite action — not pinned because it lives in the
      # same repo as this workflow. Runs LAST among the generators so
      # `_headers` lands in the staged deploy dir after every other
      # generator-emitted asset is in place.
      - name: Generate _headers
        if: inputs.generate_headers
        uses: blackoutsecure/bos-automation-hub/.github/actions/cf-pages-headers-generate@main
        with:
          output_dir: ${{ inputs.deploy_dir }}
          presets: ${{ inputs.headers_presets }}
          csp: ${{ inputs.headers_csp }}
          hsts_max_age: ${{ inputs.headers_hsts_max_age }}
          permissions_policy: ${{ inputs.headers_permissions_policy }}
          cache_html_control: ${{ inputs.headers_cache_html_control }}
          cache_assets_pattern: ${{ inputs.headers_cache_assets_pattern }}
          cache_assets_control: ${{ inputs.headers_cache_assets_control }}
          custom_rules: ${{ inputs.headers_custom_rules }}
          replace_existing: ${{ inputs.headers_replace_existing }}

      - name: Compose wrangler command
        id: cmd
        if: steps.gate.outputs.deploy == 'true'
        uses: blackoutsecure/bos-automation-hub/.github/actions/cloudflare-pages-compose-command@main
        with:
          deploy_dir: ${{ inputs.deploy_dir }}
          project_name: ${{ inputs.cloudflare_project_name }}
          branch: ${{ inputs.branch }}
          commit_message: ${{ inputs.commit_message }}
          extra_args: ${{ inputs.extra_wrangler_args }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: steps.gate.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ steps.account.outputs.value }}
          wranglerVersion: ${{ inputs.wrangler_version }}
          workingDirectory: ${{ inputs.working_directory }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: ${{ steps.cmd.outputs.command }}

      - name: Resolve cache-purge gate
        id: purge_gate
        if: always()
        env:
          DEPLOY_GATE: ${{ steps.gate.outputs.deploy }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          PURGE_REQUESTED: ${{ inputs.purge_cache }}
          # ZONE_ID inherited from job-level env (vars.CLOUDFLARE_ZONE_ID
          # || secrets.CLOUDFLARE_ZONE_ID, prefer vars).
          SITE_URL: ${{ inputs.site_url }}
        run: |
          set -euo pipefail
          decide() {
            echo "purge=$1"  >> "${GITHUB_OUTPUT}"
            echo "reason=$2" >> "${GITHUB_OUTPUT}"
            echo "purge=$1 reason=$2"
          }
          if [ "${DEPLOY_GATE}" != "true" ]; then
            decide false "deploy-skipped"
            exit 0
          fi
          if [ "${DEPLOY_OUTCOME}" != "success" ]; then
            decide false "deploy-${DEPLOY_OUTCOME:-unknown}"
            exit 0
          fi
          if [ "${PURGE_REQUESTED}" != "true" ]; then
            decide false "opt-out"
            exit 0
          fi
          ZONE_ID_CLEAN="$(printf '%s' "${ZONE_ID:-}" | tr -d '[:space:]')"
          if [ -n "${ZONE_ID_CLEAN}" ]; then
            # Shape (`^[0-9a-f]{32}$`) is validated inside the purge
            # action via shared/cloudflare-resolve-id — a malformed
            # value fails loudly there.
            decide true "explicit-zone-id"
            exit 0
          fi
          if [ -n "${SITE_URL}" ]; then
            # The action will auto-resolve via the Cloudflare API. The
            # token needs `Zone:Read` in addition to `Cache Purge` for
            # this path to work.
            decide true "autoresolve-from-site-url"
            exit 0
          fi
          echo "::notice::purge_cache=true but no zone source available (set vars.CLOUDFLARE_ZONE_ID or pass site_url). Skipping cache purge."
          decide false "no-zone-source"

      - name: Purge Cloudflare zone cache
        id: purge
        if: steps.purge_gate.outputs.purge == 'true'
        uses: blackoutsecure/bos-automation-hub/.github/actions/cloudflare-zone-purge@main
        with:
          zone_id: ${{ env.ZONE_ID }}
          site_url: ${{ inputs.site_url }}
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Job summary
        if: always()
        env:
          DEPLOYED: ${{ steps.gate.outputs.deploy }}
          # PROJECT_NAME, DEPLOY_DIR, BRANCH, SITE_URL,
          # DEPLOYMENT_ENVIRONMENT inherited from job-level env.
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ID: ${{ steps.deploy.outputs.pages-deployment-id }}
          DEPLOYMENT_ALIAS: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
          PAGES_ENVIRONMENT: ${{ steps.deploy.outputs.pages-environment }}
          PURGE_DECISION: ${{ steps.purge_gate.outputs.purge }}
          PURGE_REASON: ${{ steps.purge_gate.outputs.reason }}
          PURGED: ${{ steps.purge.outputs.purged }}
          PURGE_HTTP: ${{ steps.purge.outputs.http_code }}
        run: |
          {
            echo "## Cloudflare Pages Deploy"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Project          | \`${PROJECT_NAME}\` |"
            echo "| Deployed         | \`${DEPLOYED}\` |"
            echo "| Deploy dir       | \`${DEPLOY_DIR}\` |"
            echo "| Branch           | \`${BRANCH:-<wrangler default>}\` |"
            echo "| GitHub env       | \`${DEPLOYMENT_ENVIRONMENT:-<none>}\` |"
            echo "| Pages env        | \`${PAGES_ENVIRONMENT:-n/a}\` |"
            echo "| Site URL         | ${SITE_URL:-n/a} |"
            echo "| Deployment URL   | ${DEPLOYMENT_URL:-n/a} |"
            echo "| Alias URL        | ${DEPLOYMENT_ALIAS:-n/a} |"
            echo "| Deployment ID    | \`${DEPLOYMENT_ID:-n/a}\` |"
            echo "| Cache purge      | \`${PURGED:-${PURGE_DECISION:-n/a}}\` (reason: \`${PURGE_REASON:-n/a}\`${PURGE_HTTP:+, HTTP \`${PURGE_HTTP}\`}) |"
          } >> "${GITHUB_STEP_SUMMARY}"
