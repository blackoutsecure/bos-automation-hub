# Marketplace-compliant release: dev -> main allowlist promotion + GitHub Release.
#
# Designed for **GitHub Marketplace Action repos**, where the default
# branch MUST NOT contain any `.github/workflows/*.yml` files
# (Marketplace publishing prerequisite, see
# https://docs.github.com/en/actions/how-tos/create-and-publish-actions/publish-in-github-marketplace).
#
# Pipeline (two stages):
#   1. promote   — `bos-marketplace-kit/.github/actions/promote@v0.1.1`
#                  copies an allowlisted set of paths from
#                  `source_branch` to `target_branch`, tags
#                  `target_branch`.
#   2. release   — calls `github-release.yml@main` against the new tag
#                  to render notes and create the GitHub Release.
#
# Implementation: the promote primitive lives in the published
# [bos-marketplace-kit](https://github.com/marketplace/actions/blackout-secure-marketplace-kit)
# Action. This workflow is the ergonomic layer (toggles for
# Dependabot / metadata auto-sync, GitHub Release chaining) around
# it.
# Trigger model: this workflow is intended to be called from the hub
# meta-workflow [`bos-marketplace-launchpad.yml`](./bos-marketplace-launchpad.yml),
# which is itself called from a thin caller on the SOURCE branch
# (typically `dev`) — see
# [`examples/bos-marketplace-launchpad.example.yaml`](../../examples/bos-marketplace-launchpad.example.yaml).
# Triggers normally include `workflow_dispatch` (operator types the
# version) and may include `push: tags: ['v*']` when the operator
# prefers to tag on dev first.
#
# Hard constraints enforced by the underlying composite:
#   * `.github/workflows/**` paths in the allowlist are rejected.
#   * Existing tags cannot be overwritten.
#   * `source_branch` and `target_branch` must differ.
#   * Tag must match SemVer (`vX.Y.Z[-suffix]`).
name: Release promote (reusable)

"on":
  workflow_call:
    inputs:
      # ----- Promotion ------------------------------------------------------
      source_branch:
        description: >-
          Branch to promote FROM (e.g. `dev`). Must exist on origin.
        required: true
        type: string
      target_branch:
        description: >-
          Branch to promote TO (e.g. `main`). Created from
          `source_branch` if it does not exist on origin.
        required: false
        type: string
        default: 'main'
      allowlist_paths:
        description: >-
          Newline-separated repo-relative paths to copy from
          `source_branch` to `target_branch`. Direct listing of
          `.github/workflows` or paths under it is hard-blocked;
          listing a PARENT directory (e.g. bare `.github`) is allowed
          and the `.github/workflows/` subtree is silently stripped
          from the staged tree before commit. Every listed path MUST
          exist on `source_branch`. Anything on `target_branch` NOT
          in the merged allowlist is REMOVED on this commit.
        required: true
        type: string
      include_dependabot_config:
        description: >-
          When `true` (default), `.github/dependabot.yml` is
          auto-appended to the effective allowlist if it exists on
          `source_branch`. Strongly recommended for Marketplace
          Action repos because Dependabot reads its config ONLY from
          the default branch — a `dev`-only `dependabot.yml` is
          ignored by Dependabot entirely.

          The file is auto-skipped (with a notice) if absent, so this
          input is safe to leave `true` even on repos that don't use
          Dependabot.
        required: false
        type: boolean
        default: true
      include_github_metadata:
        description: >-
          When `true`, the following Marketplace-safe `.github/*`
          metadata files are auto-appended to the effective allowlist
          if they exist on `source_branch`:

            * `.github/CODEOWNERS`
            * `.github/FUNDING.yml`
            * `.github/SECURITY.md`
            * `.github/CONTRIBUTING.md`
            * `.github/ISSUE_TEMPLATE`
            * `.github/PULL_REQUEST_TEMPLATE.md`
            * `.github/PULL_REQUEST_TEMPLATE`

          Each is skipped silently if absent. Default `false` because
          most repos either curate these explicitly via
          `allowlist_paths` or don't use them. Set `true` to opt into
          the convenience batch.
        required: false
        type: boolean
        default: false
      extra_sync_paths:
        description: >-
          Operator-supplied newline-separated paths merged into the
          effective allowlist. Same syntax as `allowlist_paths`, BUT
          entries that don't exist on `source_branch` are silently
          skipped. Use this for paths that may legitimately be absent
          on some forks/snapshots.

          Subject to the same hard-block on direct `.github/workflows*`
          entries; transitive workflow inclusion via a parent
          directory is silently stripped post-checkout.
        required: false
        type: string
        default: ''
      tag_name:
        description: >-
          Tag to create on the new `target_branch` commit.
          SemVer (`vX.Y.Z[-suffix]`).

          OPTIONAL: when empty, this workflow auto-resolves to the
          next-patch bump of the latest stable SemVer tag on
          `source_branch` (or `v0.1.0` for a never-released repo).
          Pre-release tags (`vX.Y.Z-suffix`) are intentionally
          excluded from "latest" for auto-resolve — operators wanting
          a minor/major bump or any pre-release suffix MUST pass an
          explicit value here.

          Required-by-convention for the underlying `promote`
          composite, which validates the SemVer shape; the empty
          case is handled before the composite runs.
        required: false
        type: string
        default: ''
      commit_message:
        description: >-
          Commit message for the promotion commit. Default
          `release: <tag_name>`.
        required: false
        type: string
        default: ''
      dry_run:
        description: >-
          When `true`, validates inputs and stages the diff but does
          not commit, tag, push, or create a release.
        required: false
        type: boolean
        default: false

      # ----- GitHub Release publishing (forwarded to github-release.yml) ----
      release_name:
        description: 'Release title. Defaults to `tag_name`.'
        required: false
        type: string
        default: ''
      release_template_path:
        description: >-
          Path to a Markdown release-notes template (resolved on the
          PROMOTED tag, i.e. the `target_branch` snapshot). Empty uses
          the bundled default in `render-release-notes`.
        required: false
        type: string
        default: ''
      release_extra_context:
        description: 'Newline-separated `KEY=VALUE` pairs interpolated into the release notes template.'
        required: false
        type: string
        default: ''
      release_draft:
        description: 'Create the release as a draft.'
        required: false
        type: boolean
        default: false
      release_prerelease:
        description: "`true`/`false` to force pre-release. Empty lets the renderer auto-detect from `vX.Y.Z-<suffix>`."
        required: false
        type: string
        default: ''
      release_make_latest:
        description: '`true`/`false`/`legacy`. Forwarded to softprops/action-gh-release.'
        required: false
        type: string
        default: 'true'
      release_generate_notes:
        description: "Append GitHub's auto-generated PR/contributor notes after the rendered body."
        required: false
        type: boolean
        default: true
      release_files:
        description: 'Newline-separated globs of artifacts to attach to the release.'
        required: false
        type: string
        default: ''

    outputs:
      target_sha:
        description: 'SHA on `target_branch` after the promotion commit (empty when no-op or dry-run).'
        value: ${{ jobs.promote.outputs.target_sha }}
      source_sha:
        description: 'SHA on `source_branch` that was promoted.'
        value: ${{ jobs.promote.outputs.source_sha }}
      tag_name:
        description: 'Resolved tag name (echoed for caller convenience).'
        value: ${{ jobs.promote.outputs.tag_name }}
      promoted:
        description: '`true` when a new commit + tag were created and pushed.'
        value: ${{ jobs.promote.outputs.promoted }}
      removed_paths:
        description: >-
          Newline-separated list of paths that were present on the
          OLD `target_branch` tree but were removed by this promote.
          Includes any Marketplace-violating files that drifted onto
          `target_branch` since the last promote.
        value: ${{ jobs.promote.outputs.removed_paths }}
      removed_violations:
        description: >-
          Newline-separated subset of `removed_paths` that matched
          known Marketplace-prohibited patterns (currently
          `.github/workflows/**`). Empty when target_branch was
          already compliant.
        value: ${{ jobs.promote.outputs.removed_violations }}
      release_url:
        description: 'GitHub Release HTML URL (when the release stage ran).'
        value: ${{ jobs.release.outputs.release_url }}

permissions:
  contents: read

concurrency:
  # Tag-scoped — a re-run for the same version waits in line behind
  # the previous run rather than racing it (matches `release.yml`).
  group: release-promote-${{ github.workflow }}-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — validate `vars.DEFAULT_RUNNER` once before any downstream
  # job evaluates its `runs-on:` expression. See README "Runner resolution".
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          default_runner: ${{ vars.DEFAULT_RUNNER }}

  # ---------------------------------------------------------------------------
  # Stage 1 — promote source_branch -> target_branch (allowlist) + tag.
  # ---------------------------------------------------------------------------
  promote:
    name: Promote and tag
    needs: preflight-runner-config
    # Resolves `vars.DEFAULT_RUNNER` (bare label or JSON-array string).
    # Shape is enforced by `preflight-runner-config`, so no fallback —
    # see README ("Runner resolution") for the full rationale.
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER)) }}
    timeout-minutes: 10
    permissions:
      # `contents: write` is required for the push of the promotion
      # commit + tag. The default `GITHUB_TOKEN` is used; if the
      # `target_branch` is gated by a ruleset/branch-protection that
      # excludes `github-actions[bot]` from push, the caller must
      # bypass via a ruleset bypass actor (recommended) or pass a PAT
      # via a secret-forwarded checkout.
      contents: write
    outputs:
      target_sha:         ${{ steps.promote.outputs.target_sha }}
      source_sha:         ${{ steps.promote.outputs.source_sha }}
      tag_name:           ${{ steps.promote.outputs.tag_name }}
      promoted:           ${{ steps.promote.outputs.promoted }}
      removed_paths:      ${{ steps.promote.outputs.removed_paths }}
      removed_violations: ${{ steps.promote.outputs.removed_violations }}
    steps:
      - name: Checkout source_branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.source_branch }}
          # Full history is required so the worktree-based promotion
          # can fetch + checkout arbitrary refs. As a side-effect,
          # `fetch-depth: 0` also fetches all tags — which the
          # `Resolve tag` step below relies on to compute the
          # auto-bumped next tag when `tag_name` is empty.
          fetch-depth: 0
          # We re-push via the same checkout — persist the bot token.
          persist-credentials: true

      # Resolve the effective tag for this release.
      #
      # `inputs.tag_name` is intentionally OPTIONAL on the caller's
      # workflow_dispatch input schema, because the same dispatch
      # form is shared with `mode: name-check` (which doesn't take a
      # tag) and GitHub Actions has no way to mark an input as
      # "required iff mode == release". So the empty-string case has
      # to be handled at runtime, here — and rather than failing the
      # operator out, we auto-resolve to the next-patch bump of the
      # latest stable SemVer tag (or `v0.1.0` for a never-released
      # repo).
      #
      # Algorithm:
      #   1. If `inputs.tag_name` is non-empty, pass through verbatim
      #      — the `promote` composite enforces SemVer shape, so we
      #      don't duplicate that regex here.
      #   2. Else, find the highest tag matching the strict stable
      #      pattern `^v?[0-9]+\.[0-9]+\.[0-9]+$` (pre-release tags
      #      like `v1.2.3-rc1` are intentionally excluded from
      #      "latest" — pre-releases should not auto-promote to the
      #      next stable; the operator types those explicitly).
      #   3. Bump the patch component by 1. Preserve the leading `v`
      #      prefix from the source tag (the typical convention) or
      #      add one if the tag was bare.
      #   4. If no stable tags exist at all, default to `v0.1.0` —
      #      the canonical "first release" SemVer per
      #      https://semver.org/#how-should-i-deal-with-revisions-in-the-0yz-initial-development-phase.
      #
      # Overrides: operators wanting a minor/major bump (or any
      # pre-release suffix) MUST type the full target tag into the
      # `tag_name` dispatch field. Auto-resolve is intentionally
      # patch-only — it's the safest "I forgot to type the tag"
      # fallback and never accidentally cuts a breaking-change
      # release.
      - name: Resolve tag
        id: resolve_tag
        env:
          TAG_NAME_INPUT: ${{ inputs.tag_name }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${TAG_NAME_INPUT}" ]; then
            RESOLVED="${TAG_NAME_INPUT}"
            echo "Using operator-supplied tag_name: ${RESOLVED}"
            echo "auto_resolved=false" >> "${GITHUB_OUTPUT}"
            echo "previous_tag=" >> "${GITHUB_OUTPUT}"
          else
            # Find the highest stable SemVer tag. `sort -V` handles
            # SemVer ordering correctly for the strict X.Y.Z shape.
            LATEST="$(git tag --list \
              | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1 || true)"

            if [ -z "${LATEST}" ]; then
              RESOLVED='v0.1.0'
              echo "No stable SemVer tags found on this repo; defaulting to ${RESOLVED} (first release)."
              echo "auto_resolved=true" >> "${GITHUB_OUTPUT}"
              echo "previous_tag=" >> "${GITHUB_OUTPUT}"
            else
              # Preserve the source tag's `v` prefix (or lack thereof).
              case "${LATEST}" in
                v*) PREFIX='v'; CORE="${LATEST#v}" ;;
                *)  PREFIX='v'; CORE="${LATEST}" ;;  # always normalize to v-prefixed
              esac
              MAJOR="${CORE%%.*}"
              REST="${CORE#*.}"
              MINOR="${REST%%.*}"
              PATCH="${REST#*.}"
              # Defensive: confirm components are pure integers.
              case "${MAJOR}${MINOR}${PATCH}" in
                ''|*[!0-9]*)
                  echo "::error title=Tag parse failed::Could not parse '${LATEST}' as X.Y.Z (got MAJOR='${MAJOR}' MINOR='${MINOR}' PATCH='${PATCH}'). Re-dispatch with an explicit tag_name." >&2
                  exit 1
                  ;;
              esac
              PATCH_NEW=$((PATCH + 1))
              RESOLVED="${PREFIX}${MAJOR}.${MINOR}.${PATCH_NEW}"
              echo "No tag_name supplied; auto-resolved to ${RESOLVED} (patch-bump from latest stable tag ${LATEST})."
              echo "auto_resolved=true" >> "${GITHUB_OUTPUT}"
              echo "previous_tag=${LATEST}" >> "${GITHUB_OUTPUT}"
            fi
          fi

          echo "tag_name=${RESOLVED}" >> "${GITHUB_OUTPUT}"

      - name: Resolve extra allowlist (toggles + operator paths)
        id: extras
        env:
          INCLUDE_DEPENDABOT: ${{ inputs.include_dependabot_config }}
          INCLUDE_METADATA:   ${{ inputs.include_github_metadata }}
          EXTRA_SYNC_PATHS:   ${{ inputs.extra_sync_paths }}
        shell: bash
        run: |
          set -euo pipefail
          # Build the effective extra-allowlist list from:
          #   1. operator-supplied extra_sync_paths
          #   2. include_dependabot_config toggle
          #   3. include_github_metadata toggle
          #
          # Each path is optional on the underlying composite
          # (silently skipped if absent on source_branch), so it's
          # safe to enumerate aggressively here.
          EXTRAS=()

          if [ -n "${EXTRA_SYNC_PATHS}" ]; then
            while IFS= read -r raw || [ -n "${raw}" ]; do
              for token in ${raw}; do
                [ -z "${token}" ] && continue
                case "${token}" in \#*) continue ;; esac
                EXTRAS+=("${token}")
              done
            done <<< "${EXTRA_SYNC_PATHS}"
          fi

          case "${INCLUDE_DEPENDABOT}" in
            true)  EXTRAS+=('.github/dependabot.yml') ;;
            false) ;;
            *) echo "::error::include_dependabot_config must be 'true' or 'false', got '${INCLUDE_DEPENDABOT}'" >&2; exit 1 ;;
          esac

          case "${INCLUDE_METADATA}" in
            true)
              EXTRAS+=(
                '.github/CODEOWNERS'
                '.github/FUNDING.yml'
                '.github/SECURITY.md'
                '.github/CONTRIBUTING.md'
                '.github/ISSUE_TEMPLATE'
                '.github/PULL_REQUEST_TEMPLATE.md'
                '.github/PULL_REQUEST_TEMPLATE'
              )
              ;;
            false) ;;
            *) echo "::error::include_github_metadata must be 'true' or 'false', got '${INCLUDE_METADATA}'" >&2; exit 1 ;;
          esac

          if [ "${#EXTRAS[@]}" -gt 0 ]; then
            echo "Effective extra_allowlist_paths (${#EXTRAS[@]} entries, missing entries silently skipped):"
            printf '  - %s\n' "${EXTRAS[@]}"
          else
            echo "No extra allowlist paths configured."
          fi

          {
            echo 'extra_allowlist_paths<<__END_EXTRAS__'
            if [ "${#EXTRAS[@]}" -gt 0 ]; then
              printf '%s\n' "${EXTRAS[@]}"
            fi
            echo '__END_EXTRAS__'
          } >> "${GITHUB_OUTPUT}"

      - name: Promote (allowlist)
        id: promote
        # Marketplace promote primitive comes from the published
        # `bos-marketplace-kit` Action. SHA-pinned per the hub's
        # GHA pin policy (org/repo@<sha> # vX.Y.Z). Dependabot bumps
        # both halves in lockstep.
        #
        # `tag_name` is the resolved value from the `Resolve tag`
        # step above (operator-supplied verbatim OR auto-bumped
        # next-patch) — never `inputs.tag_name` directly, because
        # that can be empty.
        uses: blackoutsecure/bos-marketplace-kit/.github/actions/promote@8cb53a2c81712c47b61af1031a1db69058bc5be3 # v0.1.2
        with:
          source_branch:         ${{ inputs.source_branch }}
          target_branch:         ${{ inputs.target_branch }}
          allowlist_paths:       ${{ inputs.allowlist_paths }}
          extra_allowlist_paths: ${{ steps.extras.outputs.extra_allowlist_paths }}
          tag_name:              ${{ steps.resolve_tag.outputs.tag_name }}
          commit_message:        ${{ inputs.commit_message }}
          dry_run:               ${{ inputs.dry_run }}

      - name: Job summary
        if: always()
        env:
          PROMOTED:           ${{ steps.promote.outputs.promoted }}
          SOURCE_BRANCH:      ${{ inputs.source_branch }}
          TARGET_BRANCH:      ${{ inputs.target_branch }}
          SOURCE_SHA:         ${{ steps.promote.outputs.source_sha }}
          TARGET_SHA:         ${{ steps.promote.outputs.target_sha }}
          TAG_NAME:           ${{ steps.resolve_tag.outputs.tag_name }}
          AUTO_RESOLVED:      ${{ steps.resolve_tag.outputs.auto_resolved }}
          PREVIOUS_TAG:       ${{ steps.resolve_tag.outputs.previous_tag }}
          DRY_RUN:            ${{ inputs.dry_run }}
          REMOVED_PATHS:      ${{ steps.promote.outputs.removed_paths }}
          REMOVED_VIOLATIONS: ${{ steps.promote.outputs.removed_violations }}
        run: |
          # Render the tag cell with a hint when we picked it for the
          # operator, so the summary self-documents what happened
          # (no need to dig through step logs to see "why this tag?").
          if [ "${AUTO_RESOLVED}" = 'true' ]; then
            if [ -n "${PREVIOUS_TAG}" ]; then
              TAG_CELL="\`${TAG_NAME}\` _(auto-resolved: patch-bump from \`${PREVIOUS_TAG}\`)_"
            else
              TAG_CELL="\`${TAG_NAME}\` _(auto-resolved: first release, no prior tags)_"
            fi
          else
            TAG_CELL="\`${TAG_NAME}\`"
          fi

          {
            echo "## Release promote"
            echo ""
            echo "| Field          | Value |"
            echo "|----------------|-------|"
            echo "| Source branch  | \`${SOURCE_BRANCH}\` |"
            echo "| Target branch  | \`${TARGET_BRANCH}\` |"
            echo "| Source SHA     | \`${SOURCE_SHA:-n/a}\` |"
            echo "| Target SHA     | \`${TARGET_SHA:-n/a}\` |"
            echo "| Tag            | ${TAG_CELL} |"
            echo "| Promoted       | \`${PROMOTED}\` |"
            echo "| Dry run        | \`${DRY_RUN}\` |"
            echo ""

            if [ -n "${REMOVED_VIOLATIONS}" ]; then
              echo "### ⚠️ Marketplace violations removed"
              echo ""
              echo "Files matching prohibited paths were present on \`${TARGET_BRANCH}\` and have been removed by this promote:"
              echo ""
              echo '```'
              printf '%s\n' "${REMOVED_VIOLATIONS}"
              echo '```'
              echo ""
              echo "This typically means the platform-level ruleset is missing or has a bypass route. See \`scripts/marketplace-repo/\` in the hub."
              echo ""
            fi

            if [ -n "${REMOVED_PATHS}" ]; then
              REMOVED_COUNT="$(printf '%s\n' "${REMOVED_PATHS}" | grep -cv '^$' || true)"
              echo "### Files removed from \`${TARGET_BRANCH}\` (${REMOVED_COUNT})"
              echo ""
              echo '<details><summary>Show removed paths</summary>'
              echo ""
              echo '```'
              printf '%s\n' "${REMOVED_PATHS}"
              echo '```'
              echo "</details>"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  # ---------------------------------------------------------------------------
  # Stage 2 — publish the GitHub Release on the new tag.
  #
  # Skipped when the promote stage was a no-op (no commit created),
  # when `dry_run: true`, or when the promote stage failed.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: promote
    if: ${{ needs.promote.outputs.promoted == 'true' && !inputs.dry_run }}
    permissions:
      contents: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/github-release.yml@main
    with:
      tag_name:               ${{ needs.promote.outputs.tag_name }}
      release_name:           ${{ inputs.release_name }}
      template_path:          ${{ inputs.release_template_path }}
      extra_context:          ${{ inputs.release_extra_context }}
      draft:                  ${{ inputs.release_draft }}
      prerelease:             ${{ inputs.release_prerelease }}
      make_latest:            ${{ inputs.release_make_latest }}
      generate_release_notes: ${{ inputs.release_generate_notes }}
      target_commitish:       ${{ needs.promote.outputs.target_sha }}
      files:                  ${{ inputs.release_files }}
