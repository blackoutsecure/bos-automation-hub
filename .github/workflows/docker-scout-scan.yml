name: Docker Scout Scan (reusable)

# Standalone Scout scan of an already-published image. Use cases:
#   * scheduled re-scans of `:latest` (CVE feeds catch up days after release).
#   * out-of-band scans of an arbitrary image not built by this org's
#     pipeline (e.g. a third-party base image we depend on).
#   * recording an image into a Scout `environment` from a deploy job
#     that lives outside `docker-build-push.yml`.
#
# This workflow does NOT build anything. For "build → push → scan"
# wire-up use `docker-build-push.yml`, which embeds the Scout scan
# steps inline so the PR comment renders against the exact image that
# the matrix build produced.

"on":
  workflow_call:
    inputs:
      image:
        description: >-
          Image reference to scan, e.g. `docker.io/acme/widget:1.2.3`.
          May include a Scout prefix (`image://`, `registry://`,
          `local://`, `oci-dir://`, `archive://`, `fs://`, `sbom://`).
        required: true
        type: string
      command:
        description: >-
          Single Scout command or comma-separated list executed in
          order. Allowed: `quickview`, `cves`, `compare`,
          `recommendations`, `sbom`, `environment`.
        required: false
        type: string
        default: cves
      to:
        description: '`compare` only: image reference to compare against.'
        required: false
        type: string
        default: ''
      to_env:
        description: '`compare` only: Scout environment to compare against (requires `organization`).'
        required: false
        type: string
        default: ''
      to_latest:
        description: '`compare` only: compare against the latest indexed image (requires `organization`).'
        required: false
        type: boolean
        default: false
      environment:
        description: '`environment` command only: name of the environment to record the image into.'
        required: false
        type: string
        default: ''
      organization:
        description: 'Docker Scout organization (Docker Hub namespace).'
        required: false
        type: string
        default: ''
      platform:
        description: 'Platform to analyse (e.g. `linux/amd64`). Empty uses the runner platform.'
        required: false
        type: string
        default: ''
      severities:
        description: 'Comma-separated severities to keep (`critical,high,medium,low,unspecified`).'
        required: false
        type: string
        default: 'critical,high'
      only_fixed:
        description: 'Filter to CVEs that have a fix available.'
        required: false
        type: boolean
        default: false
      only_unfixed:
        description: 'Filter to CVEs that have no fix available.'
        required: false
        type: boolean
        default: false
      only_cisa_kev:
        description: 'Filter to CVEs in the CISA KEV catalogue.'
        required: false
        type: boolean
        default: false
      ignore_base:
        description: 'Ignore vulnerabilities inherited from the base image (`cves` only).'
        required: false
        type: boolean
        default: false
      ignore_unchanged:
        description: 'Filter out unchanged packages (`compare` only).'
        required: false
        type: boolean
        default: true
      exit_code:
        description: 'Exit non-zero if Scout finds matching vulnerabilities / changes.'
        required: false
        type: boolean
        default: false
      exit_on:
        description: '`compare` only: comma-separated worsening conditions to fail on (`vulnerability,policy`).'
        required: false
        type: string
        default: ''
      sarif:
        description: >-
          Generate a SARIF report. When `true`, written to
          `scout.sarif.json` and (by default) uploaded to GitHub
          code scanning. Forces `command: cves` if it would
          otherwise be omitted.
        required: false
        type: boolean
        default: true
      sarif_upload:
        description: 'Upload the SARIF report to GitHub code scanning. No-op when `sarif: false`.'
        required: false
        type: boolean
        default: true
      sarif_category:
        description: 'SARIF category — disambiguates parallel uploads on the same ref.'
        required: false
        type: string
        default: 'docker-scout'
      summary:
        description: 'Render the Scout output as a job summary.'
        required: false
        type: boolean
        default: true
      write_comment:
        description: 'Post a PR comment with the Scout output (only relevant on `pull_request` triggers).'
        required: false
        type: boolean
        default: true
      keep_previous_comments:
        description: 'Keep previous Scout comments hidden instead of updating one in place.'
        required: false
        type: boolean
        default: false
      registry:
        description: 'Hostname of a non–Docker Hub registry to log in to. Empty uses Docker Hub only.'
        required: false
        type: string
        default: ''
      runs_on:
        description: >-
          Optional runner override. Empty resolves from the org-shared
          `vars.RUNNER_X64` (fallback `ubuntu-latest`). Accepts either
          a bare label (e.g. `ubuntu-latest`) or a JSON-array string of
          labels (e.g. `["self-hosted","Linux","ARM64"]`); both shapes are
          parsed at runtime via `fromJSON` so GHA sees a real label list
          rather than a single 35-character "label".
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Per-job timeout in minutes.'
        required: false
        type: number
        default: 15
    secrets:
      DOCKERHUB_USERNAME:
        description: 'Docker Hub username — Scout requires Hub auth even for local image scans.'
        required: true
      DOCKERHUB_TOKEN:
        description: 'Docker Hub access token (PAT, not the password).'
        required: true
      REGISTRY_USERNAME:
        description: 'Optional username for `inputs.registry` (non–Docker Hub).'
        required: false
      REGISTRY_PASSWORD:
        description: 'Optional password/PAT for `inputs.registry` (non–Docker Hub).'
        required: false
    outputs:
      sarif_file:
        description: 'Path to the SARIF file written by Scout (empty when SARIF was disabled).'
        value: ${{ jobs.scout.outputs.sarif_file }}

permissions:
  contents: read

concurrency:
  group: docker-scout-${{ github.workflow }}-${{ github.ref }}-${{ inputs.image }}
  cancel-in-progress: false

jobs:
  scout:
    name: Docker Scout
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (JSON-array-shaped vars/inputs in `runs-on:`).
    runs-on: ${{ fromJSON(startsWith(inputs.runs_on || vars.RUNNER_X64, '[') && (inputs.runs_on || vars.RUNNER_X64) || format('"{0}"', inputs.runs_on || vars.RUNNER_X64 || 'ubuntu-latest')) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read
      # required by github/codeql-action/upload-sarif
      security-events: write
      # required by docker/scout-action to post PR comments
      pull-requests: write
    outputs:
      sarif_file: ${{ steps.scout.outputs.sarif_file }}
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Docker Scout
        id: scout
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/docker-scout-scan@main
        with:
          image: ${{ inputs.image }}
          command: ${{ inputs.command }}
          to: ${{ inputs.to }}
          to_env: ${{ inputs.to_env }}
          to_latest: ${{ inputs.to_latest }}
          environment: ${{ inputs.environment }}
          organization: ${{ inputs.organization }}
          platform: ${{ inputs.platform }}
          severities: ${{ inputs.severities }}
          only_fixed: ${{ inputs.only_fixed }}
          only_unfixed: ${{ inputs.only_unfixed }}
          only_cisa_kev: ${{ inputs.only_cisa_kev }}
          ignore_base: ${{ inputs.ignore_base }}
          ignore_unchanged: ${{ inputs.ignore_unchanged }}
          exit_code: ${{ inputs.exit_code }}
          exit_on: ${{ inputs.exit_on }}
          sarif_file: ${{ inputs.sarif && 'scout.sarif.json' || '' }}
          sarif_upload: ${{ inputs.sarif_upload }}
          sarif_category: ${{ inputs.sarif_category }}
          summary: ${{ inputs.summary }}
          write_comment: ${{ inputs.write_comment }}
          keep_previous_comments: ${{ inputs.keep_previous_comments }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: ${{ inputs.registry }}
          registry_username: ${{ secrets.REGISTRY_USERNAME }}
          registry_password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Job summary
        if: always()
        env:
          IMAGE: ${{ inputs.image }}
          COMMAND: ${{ inputs.command }}
          STATUS: ${{ job.status }}
        run: |
          {
            echo "## Docker Scout"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image   | \`${IMAGE}\` |"
            echo "| Command | \`${COMMAND}\` |"
            echo "| Status  | \`${STATUS}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
