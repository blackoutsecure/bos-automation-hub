# Reusable wrapper around `.github/actions/nginx-config-validate`. Each
# consumer with an in-repo nginx config tree (e.g. docker-tar1090,
# docker-graphs1090, docker-dump978) calls this in PR / push CI to catch
# nginx syntax errors at merge time instead of at container start.
#
# Validates a single (config_path, templates_path) pair per call. For
# repos with multiple nginx config trees, call this workflow N times
# from one caller workflow (each call is one job).
name: Validate nginx config

on:
  workflow_call:
    inputs:
      config_path:
        description: >-
          Repo-relative path to `nginx.conf`. Defaults to the BOS image
          convention (`root/etc/nginx/nginx.conf`).
        required: false
        type: string
        default: 'root/etc/nginx/nginx.conf'
      templates_path:
        description: >-
          Repo-relative path to a directory of `*.conf.template` files.
          Defaults to the BOS image convention (`root/etc/nginx/http.d`).
          Set to an empty string to disable template rendering.
        required: false
        type: string
        default: 'root/etc/nginx/http.d'
      template_vars:
        description: >-
          Newline-separated `KEY=VALUE` pairs passed to `envsubst` when
          rendering templates. Only the listed keys are substituted â€”
          nginx's own `$remote_addr`, `$status`, etc. pass through
          unchanged.
        required: false
        type: string
        default: ''
      templates_target_dir:
        description: >-
          Absolute path inside the validation container where rendered
          templates land. Must match the `include` directive in
          `nginx.conf`.
        required: false
        type: string
        default: '/run/nginx/http.d'
      nginx_image:
        description: >-
          Container image used for validation. Pin to a major +
          distribution flavor (e.g. `1.27-alpine`) so Dependabot's
          docker ecosystem can bump it.
        required: false
        type: string
        default: 'docker.io/library/nginx:1.27-alpine'
      runs_on:
        description: >-
          Optional runner override for the validate job. When empty
          (the default), resolves from the org-shared
          `vars.DEFAULT_RUNNER`. Accepts either a bare label
          (e.g. `ubuntu-latest`) or a JSON-array string of labels
          (e.g. `["self-hosted","Linux","X64"]`); both shapes are
          parsed at runtime via `fromJSON` so GHA sees a real label
          list rather than a single literal string. The workload is a
          single `docker run` so the resolved runner just needs Docker
          available â€” either arch is fine. No silent fallback:
          `vars.DEFAULT_RUNNER` is validated by the
          `preflight-runner-config` job (see README.md "Runner
          configuration").
        required: false
        type: string
        default: ''
      timeout_minutes:
        description: 'Per-job timeout.'
        required: false
        type: number
        default: 5

    outputs:
      validated:
        description: '`true` when `nginx -t` exited 0.'
        value: ${{ jobs.validate.outputs.validated }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Preflight â€” validate `vars.DEFAULT_RUNNER` once before the validate job
  # evaluates its `runs-on:` expression. See release.yml for full rationale.
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          default_runner: ${{ vars.DEFAULT_RUNNER }}

  validate:
    name: nginx -t
    needs: preflight-runner-config
    # Resolve runner: explicit `inputs.runs_on` override beats org-shared
    # `vars.DEFAULT_RUNNER`. Presence and shape of `vars.DEFAULT_RUNNER`
    # are enforced by `preflight-runner-config`. The `fromJSON` +
    # `startsWith` dance supports both bare-label and JSON-array shapes.
    runs-on: ${{ fromJSON(startsWith(inputs.runs_on || vars.DEFAULT_RUNNER, '[') && (inputs.runs_on || vars.DEFAULT_RUNNER) || format('"{0}"', inputs.runs_on || vars.DEFAULT_RUNNER)) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    outputs:
      validated: ${{ steps.validate.outputs.validated }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate
        id: validate
        uses: blackoutsecure/bos-automation-hub/.github/actions/nginx-config-validate@main
        with:
          config_path:          ${{ inputs.config_path }}
          templates_path:       ${{ inputs.templates_path }}
          template_vars:        ${{ inputs.template_vars }}
          templates_target_dir: ${{ inputs.templates_target_dir }}
          nginx_image:          ${{ inputs.nginx_image }}
