name: Monitor Upstream Release (reusable)

"on":
  workflow_call:
    inputs:
      upstream_repo:
        description: 'Upstream repo to watch, as `owner/name`. Required for `source: github_release`, `github_branch_file`, and `github_tags`.'
        required: false
        type: string
        default: ''
      track_file:
        description: >-
          Repo-relative path to the tracking JSON file. Created on first
          run; rewritten each time the upstream version changes.
        required: false
        type: string
        default: .github/upstream/tracked-release.json
      target_workflows:
        description: >-
          Newline-separated list of workflow file names (e.g. `release.yml`)
          in the caller repo to dispatch when a new version is detected.
          Empty disables dispatching (commit-only mode).
        required: false
        type: string
        default: ''
      force_dispatch:
        description: >-
          When `'true'`, dispatch the target workflows even if the upstream
          version is unchanged. Intended for `workflow_dispatch` callers
          that want to re-trigger downstream pipelines on demand.
        required: false
        type: string
        default: 'false'
      source:
        description: >-
          Where to read the upstream version from. Delegated to the
          [bos-upstream-watcher](https://github.com/blackoutsecure/bos-upstream-watcher)
          composite action.

          * `github_release` — poll
            `GET /repos/<repo>/releases/latest`. Default. Set
            `include_prereleases: 'true'` for upstreams that ship only
            `-rc`/`-beta` releases (e.g. `actions/runner`).
          * `github_branch_file` — fetch a single
            file from a branch's HEAD; the raw contents are the version
            string. Use for rolling-build projects that never cut a Release
            (e.g. `wiedehopf/readsb` `dev`).
          * `github_tags` — list `repos/<repo>/tags`, pick the highest
            SemVer-matching tag.
          * `container_image` — list registry tags for an image, pick the
            highest SemVer. Supports `docker.io`, `ghcr.io`, and `quay.io`
            (public images only on `ghcr.io`/`quay.io` in this revision).
          * `npm` — `registry.npmjs.org/<package>/latest`.
          * `pypi` — `pypi.org/pypi/<package>/json`.
          * `generic_url` — fetch a URL and extract the version via a
            user-supplied regex (first capture group).
        required: false
        type: string
        default: github_release
      upstream_branch:
        description: >-
          Branch to track when `source: github_branch_file`. Required for
          that mode, ignored otherwise.
        required: false
        type: string
        default: ''
      version_file_path:
        description: >-
          Repo-relative path inside the upstream branch whose raw contents are
          the version string. Used only when `source: github_branch_file`.
          Default `version` matches the convention used by `wiedehopf/readsb`
          and similar projects.
        required: false
        type: string
        default: 'version'
      image_ref:
        description: >-
          Container image reference. Required when `source: container_image`.
          Supported registries: `docker.io/<ns>/<image>`,
          `ghcr.io/<owner>/<image>` (public images only),
          `quay.io/<ns>/<image>` (public repos only). Bare names
          (`<ns>/<image>` or `<image>`) assume Docker Hub. Other
          registries are rejected with an explicit error.
        required: false
        type: string
        default: ''
      package_name:
        description: >-
          Package name for `source: npm` (scoped names allowed) or
          `source: pypi`.
        required: false
        type: string
        default: ''
      version_url:
        description: 'URL to fetch when `source: generic_url`.'
        required: false
        type: string
        default: ''
      version_regex:
        description: >-
          Python regex applied to the `version_url` body. The first capture
          group is taken as the version. Required when `source: generic_url`.
        required: false
        type: string
        default: ''
      tag_pattern:
        description: >-
          Optional regex used to filter candidate tags/versions for
          `github_tags`, `container_image`, and `github_release` (when
          `include_prereleases: true`) before SemVer ranking. Default
          accepts `[v]X.Y.Z[-suffix]`.
        required: false
        type: string
        default: ''
      include_prereleases:
        description: >-
          When `'true'`, `source: github_release` lists
          `repos/{repo}/releases` (including pre-releases) instead of
          `releases/latest`, filters by `tag_pattern`, and picks the highest
          SemVer. Required for upstreams that ship only pre-releases
          (e.g. `actions/runner`). Default `'false'` preserves the legacy
          `releases/latest` behavior. Ignored for all other providers.
        required: false
        type: string
        default: 'false'
      strip_v_prefix:
        description: 'Strip a leading `v` from the upstream tag before storing it.'
        required: false
        type: boolean
        default: true
      commit_message_template:
        description: >-
          Commit message template. Supports `{repo}` and `{version}`
          placeholders.
        required: false
        type: string
        default: 'chore(ci): track {repo} {version}'
      git_user_name:
        description: 'Git author name for the tracking-file commit.'
        required: false
        type: string
        default: 'github-actions[bot]'
      git_user_email:
        description: 'Git author email for the tracking-file commit.'
        required: false
        type: string
        default: '41898282+github-actions[bot]@users.noreply.github.com'
      push_retries:
        description: 'Retry attempts for the `git push` (handles concurrent commits).'
        required: false
        type: number
        default: 3
    secrets:
      DISPATCH_TOKEN:
        description: >-
          Optional PAT/App token used to dispatch the downstream workflows.
          Falls back to `GITHUB_TOKEN`. Required only if a target workflow
          itself triggers further `workflow_run`/`workflow_dispatch` chains
          that the default `GITHUB_TOKEN` is not allowed to start.
        required: false
      UPSTREAM_TOKEN:
        description: >-
          Optional PAT/App token used to authenticate to the GitHub REST /
          git APIs when polling the upstream repository. Falls back to
          `GITHUB_TOKEN`, which only has access to the *caller* repository
          — set this when `upstream_repo` (or the upstream behind
          `source: github_branch_file` / `github_tags`) is a **private**
          repo in another org/account. Needs `contents: read` scope on the
          upstream repo (fine-grained PAT) or `repo` scope (classic PAT).
          Ignored for `source: container_image` / `npm` / `pypi` /
          `generic_url`, which do not call the GitHub API.
        required: false
    outputs:
      changed:
        description: '`true` when the upstream version differed from the tracked file.'
        value: ${{ jobs.monitor.outputs.changed }}
      upstream_version:
        description: 'Latest upstream version (with `v` stripped when `strip_v_prefix` is true).'
        value: ${{ jobs.monitor.outputs.upstream_version }}
      upstream_tag:
        description: 'Raw upstream tag name (always with `v` if upstream uses one).'
        value: ${{ jobs.monitor.outputs.upstream_tag }}
      upstream_commit:
        description: >-
          Resolved upstream commit SHA. Empty for sources that do not map
          to a commit (`container_image`, `npm`, `pypi`, `generic_url`).
        value: ${{ jobs.monitor.outputs.upstream_commit }}
      upstream_source_url:
        description: 'URL that was consulted, for traceability.'
        value: ${{ jobs.monitor.outputs.upstream_source_url }}
      upstream_label:
        description: >-
          Canonical identifier for the upstream (forwarded from
          `bos-upstream-watcher`'s `label` output): `owner/name` for GitHub
          sources, package name for `npm`/`pypi`, `<registry>/<ns>/<image>`
          for `container_image`, or the URL for `generic_url`. Use this in
          downstream notifications instead of an `inputs.* || inputs.*`
          fallback chain.
        value: ${{ jobs.monitor.outputs.upstream_label }}
      upstream_release_url:
        description: '`source: github_release` only. HTML URL of the GitHub Release.'
        value: ${{ jobs.monitor.outputs.upstream_release_url }}
      upstream_release_name:
        description: '`source: github_release` only. Release display name (may differ from the tag).'
        value: ${{ jobs.monitor.outputs.upstream_release_name }}
      upstream_release_body:
        description: '`source: github_release` only. Markdown release notes (multi-line).'
        value: ${{ jobs.monitor.outputs.upstream_release_body }}
      upstream_published_at:
        description: '`source: github_release` only. ISO 8601 publication timestamp.'
        value: ${{ jobs.monitor.outputs.upstream_published_at }}
      dispatched:
        description: 'Newline-separated list of workflows actually dispatched.'
        value: ${{ jobs.monitor.outputs.dispatched }}

permissions:
  contents: read

concurrency:
  # Single in-flight monitor per (workflow, ref) — prevents two scheduled
  # runs from racing on the marker-file push.
  group: monitor-upstream-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    name: Monitor ${{ inputs.upstream_repo || inputs.package_name || inputs.image_ref || inputs.version_url }}
    # Pinned to `ubuntu-latest` (NOT `vars.DEFAULT_RUNNER`). The monitor
    # job's entire workload is `curl` + `jq` against public registries
    # (Docker Hub, GHCR, GitHub releases). Zero benefit from self-hosted
    # hardware.
    #
    # More importantly, routing this stage to a self-hosted fleet
    # creates a chicken-and-egg deadlock for consumers whose runner
    # IS the fleet being monitored/deployed (e.g. `blackoutmode/runner`
    # → fleet `blackoutsecure/runner-arm64`). When a deploy happens
    # concurrent with a monitor run:
    #   1. Monitor job picks up on a fleet runner (e.g. `simple-moon`).
    #   2. Balena finishes downloading the new image & restarts the
    #      whole compose group to materialize the topology change.
    #   3. Runner container dies mid-step before recording "Set up job".
    #   4. GHA's heartbeat timeout (10-15 min) eventually marks the
    #      run as failed — until then it shows `steps: []` and looks
    #      hung. The run is unrecoverable; manual `gh run cancel` is
    #      required to unblock subsequent runs.
    # See `bos-launchpad` consumer in `blackoutmode/runner` repo —
    # this exact symptom hit on the Phase 15 commit `2ab7780`.
    #
    # If a future consumer genuinely needs monitor on self-hosted
    # (e.g. IP-allowlisted upstream), promote `runs-on:` to a workflow
    # input so they can opt in without re-introducing the deadlock.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    outputs:
      changed: ${{ steps.discover.outputs.changed }}
      upstream_version: ${{ steps.discover.outputs.version }}
      upstream_tag: ${{ steps.discover.outputs.tag }}
      upstream_commit: ${{ steps.discover.outputs.commit }}
      upstream_source_url: ${{ steps.discover.outputs.source_url }}
      upstream_label: ${{ steps.discover.outputs.label }}
      upstream_release_url: ${{ steps.discover.outputs.release_url }}
      upstream_release_name: ${{ steps.discover.outputs.release_name }}
      upstream_release_body: ${{ steps.discover.outputs.release_body }}
      upstream_published_at: ${{ steps.discover.outputs.published_at }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - name: Preflight validation
        env:
          TRACK_FILE: ${{ inputs.track_file }}
          TARGET_WORKFLOWS: ${{ inputs.target_workflows }}
          FORCE_DISPATCH: ${{ inputs.force_dispatch }}
          PUSH_RETRIES: ${{ inputs.push_retries }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          # Per-source input validation is delegated to the discover action
          # — keep this block focused on cross-cutting workflow concerns
          # (paths, target-workflows list, retry count).
          case "${TRACK_FILE}" in
            /*|*..*) fail "input 'track_file' must be a repo-relative path: '${TRACK_FILE}'" ;;
            '')      fail "input 'track_file' is required" ;;
          esac

          case "${FORCE_DISPATCH}" in
            true|false) ;;
            *) fail "input 'force_dispatch' must be 'true' or 'false' (got '${FORCE_DISPATCH}')" ;;
          esac

          case "${PUSH_RETRIES}" in
            ''|*[!0-9]*) fail "input 'push_retries' must be a positive integer (got '${PUSH_RETRIES}')" ;;
          esac

          if [ -n "${TARGET_WORKFLOWS}" ]; then
            while IFS= read -r raw || [ -n "${raw}" ]; do
              wf="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "${wf}" ] && continue
              case "${wf}" in \#*) continue ;; esac
              # Workflow file names are simple — no slashes, no '..'.
              if ! printf '%s' "${wf}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*\.ya?ml$'; then
                fail "target workflow '${wf}' is not a valid '<name>.yml' file"
              fi
            done <<< "${TARGET_WORKFLOWS}"
          fi

          [ "${ERR}" -eq 0 ] || { echo "Preflight failed." >&2; exit 1; }

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need credentials to push the marker-file commit back.
          persist-credentials: true

      - name: Discover upstream version
        id: discover
        uses: blackoutsecure/bos-upstream-watcher@v1
        with:
          source:              ${{ inputs.source }}
          upstream_repo:       ${{ inputs.upstream_repo }}
          upstream_branch:     ${{ inputs.upstream_branch }}
          version_file_path:   ${{ inputs.version_file_path }}
          image_ref:           ${{ inputs.image_ref }}
          package_name:        ${{ inputs.package_name }}
          version_url:         ${{ inputs.version_url }}
          version_regex:       ${{ inputs.version_regex }}
          tag_pattern:         ${{ inputs.tag_pattern }}
          include_prereleases: ${{ inputs.include_prereleases }}
          strip_v_prefix:      ${{ inputs.strip_v_prefix }}
          tracker_path:        ${{ inputs.track_file }}
          github_token:        ${{ secrets.UPSTREAM_TOKEN || github.token }}

      # Dispatch happens BEFORE the commit so a transient dispatch failure
      # leaves the marker file unchanged and the next scheduled run retries.
      - name: Dispatch downstream workflows
        id: dispatch
        if: steps.discover.outputs.changed == 'true' || inputs.force_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TARGET_WORKFLOWS: ${{ inputs.target_workflows }}
          UPSTREAM_VERSION: ${{ steps.discover.outputs.version }}
        run: |
          set -euo pipefail
          DISPATCHED=()
          if [ -z "${TARGET_WORKFLOWS//[[:space:]]/}" ]; then
            echo "No target_workflows configured; skipping dispatch."
            echo "dispatched=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          while IFS= read -r raw || [ -n "${raw}" ]; do
            wf="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [ -z "${wf}" ] && continue
            case "${wf}" in \#*) continue ;; esac
            echo "Dispatching ${wf} on ${DEFAULT_BRANCH} (upstream=${UPSTREAM_VERSION})"
            gh workflow run "${wf}" \
              --repo "${REPO}" \
              --ref "${DEFAULT_BRANCH}"
            DISPATCHED+=("${wf}")
          done <<< "${TARGET_WORKFLOWS}"

          {
            echo "dispatched<<__EOF__"
            if [ "${#DISPATCHED[@]}" -gt 0 ]; then
              printf '%s\n' "${DISPATCHED[@]}"
            fi
            echo "__EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve commit message
        id: msg
        if: steps.discover.outputs.changed == 'true'
        env:
          # Use the action's canonical `label` output — resolves to
          # `owner/name` (GitHub sources), package name (npm/pypi),
          # `<registry>/<ns>/<image>` (container_image), or the URL
          # (generic_url). One source of truth, no fallback chain.
          UPSTREAM_LABEL: ${{ steps.discover.outputs.label }}
          UPSTREAM_VERSION: ${{ steps.discover.outputs.version }}
          MSG_TEMPLATE: ${{ inputs.commit_message_template }}
        run: |
          set -euo pipefail
          MSG="${MSG_TEMPLATE//\{repo\}/${UPSTREAM_LABEL}}"
          MSG="${MSG//\{version\}/${UPSTREAM_VERSION}}"
          # Reject newlines defensively — `commit-and-push` requires single-line.
          case "${MSG}" in
            *$'\n'*) echo "ERROR: rendered commit message contains a newline" >&2; exit 1 ;;
          esac
          echo "value=${MSG}" >> "${GITHUB_OUTPUT}"

      - name: Commit and push tracking file
        if: steps.discover.outputs.changed == 'true'
        uses: blackoutsecure/bos-automation-hub/.github/actions/shared/commit-and-push@main
        with:
          files: ${{ inputs.track_file }}
          message: ${{ steps.msg.outputs.value }}
          git_user_name: ${{ inputs.git_user_name }}
          git_user_email: ${{ inputs.git_user_email }}
          push_retries: ${{ inputs.push_retries }}

      - name: Job summary
        if: always()
        env:
          # bos-upstream-watcher@v1 writes its own "🔍 Upstream Watcher"
          # block to $GITHUB_STEP_SUMMARY (source, label, tag, version,
          # commit, source_url, release info). This wrapper-side summary
          # is deliberately scoped to what the WRAPPER did on top of that:
          # the changed flag (which drove the dispatch decision) and the
          # list of downstream workflows it actually triggered.
          CHANGED: ${{ steps.discover.outputs.changed }}
          DISPATCHED: ${{ steps.dispatch.outputs.dispatched }}
        run: |
          {
            echo "## Upstream Release Monitor — wrapper"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Changed       | \`${CHANGED:-false}\` |"
            if [ -n "${DISPATCHED:-}" ]; then
              echo "| Dispatched    | \`$(printf '%s' "${DISPATCHED}" | tr '\n' ' ')\` |"
            else
              echo "| Dispatched    | _(none)_ |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
