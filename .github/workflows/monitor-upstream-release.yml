name: Monitor Upstream Release (reusable)

"on":
  workflow_call:
    inputs:
      upstream_repo:
        description: 'Upstream repo to watch, as `owner/name` (e.g. `actions/runner`).'
        required: true
        type: string
      track_file:
        description: >-
          Repo-relative path to the tracking JSON file. Created on first
          run; rewritten each time the upstream version changes.
        required: false
        type: string
        default: .github/upstream/tracked-release.json
      target_workflows:
        description: >-
          Newline-separated list of workflow file names (e.g. `release.yml`)
          in the caller repo to dispatch when a new version is detected.
          Empty disables dispatching (commit-only mode).
        required: false
        type: string
        default: ''
      force_dispatch:
        description: >-
          When `'true'`, dispatch the target workflows even if the upstream
          version is unchanged. Intended for `workflow_dispatch` callers
          that want to re-trigger downstream pipelines on demand.
        required: false
        type: string
        default: 'false'
      source:
        description: >-
          Where to read the upstream version from.

          * `latest_release` (default) — poll `GET /repos/<repo>/releases/latest`.
            Requires the upstream to publish GitHub Releases.
          * `branch_head`    — fetch a single file from a branch's HEAD; the
            file's raw contents are the version string. Use this when the
            upstream ships rolling builds off a development branch and never
            cuts GitHub Releases (e.g. `wiedehopf/readsb` `dev`). The
            synthesized `upstream_tag` output equals `upstream_version`.
        required: false
        type: string
        default: latest_release
      upstream_branch:
        description: >-
          Branch to track when `source: branch_head`. Ignored otherwise.
          Required when `source: branch_head`.
        required: false
        type: string
        default: ''
      version_file_path:
        description: >-
          Repo-relative path inside the upstream branch whose raw contents are
          the version string. Used only when `source: branch_head`. Default
          `version` matches the convention used by `wiedehopf/readsb` and
          similar projects.
        required: false
        type: string
        default: 'version'
      strip_v_prefix:
        description: 'Strip a leading `v` from the upstream tag before storing it.'
        required: false
        type: boolean
        default: true
      commit_message_template:
        description: >-
          Commit message template. Supports `{repo}` and `{version}`
          placeholders.
        required: false
        type: string
        default: 'chore(ci): track {repo} {version}'
      git_user_name:
        description: 'Git author name for the tracking-file commit.'
        required: false
        type: string
        default: 'github-actions[bot]'
      git_user_email:
        description: 'Git author email for the tracking-file commit.'
        required: false
        type: string
        default: '41898282+github-actions[bot]@users.noreply.github.com'
      push_retries:
        description: 'Retry attempts for the `git push` (handles concurrent commits).'
        required: false
        type: number
        default: 3
    secrets:
      DISPATCH_TOKEN:
        description: >-
          Optional PAT/App token used to dispatch the downstream workflows.
          Falls back to `GITHUB_TOKEN`. Required only if a target workflow
          itself triggers further `workflow_run`/`workflow_dispatch` chains
          that the default `GITHUB_TOKEN` is not allowed to start.
        required: false
    outputs:
      changed:
        description: '`true` when the upstream version differed from the tracked file.'
        value: ${{ jobs.monitor.outputs.changed }}
      upstream_version:
        description: 'Latest upstream version (with `v` stripped when `strip_v_prefix` is true).'
        value: ${{ jobs.monitor.outputs.upstream_version }}
      upstream_tag:
        description: 'Raw upstream tag name (always with `v` if upstream uses one).'
        value: ${{ jobs.monitor.outputs.upstream_tag }}
      upstream_commit:
        description: 'Resolved upstream commit SHA at the release tag.'
        value: ${{ jobs.monitor.outputs.upstream_commit }}
      dispatched:
        description: 'Newline-separated list of workflows actually dispatched.'
        value: ${{ jobs.monitor.outputs.dispatched }}

permissions:
  contents: read

concurrency:
  # Single in-flight monitor per (workflow, ref) — prevents two scheduled
  # runs from racing on the marker-file push.
  group: monitor-upstream-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    name: Monitor ${{ inputs.upstream_repo }}
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_tag: ${{ steps.check.outputs.upstream_tag }}
      upstream_commit: ${{ steps.check.outputs.upstream_commit }}
      dispatched: ${{ steps.dispatch.outputs.dispatched }}
    steps:
      - name: Preflight validation
        env:
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          TRACK_FILE: ${{ inputs.track_file }}
          TARGET_WORKFLOWS: ${{ inputs.target_workflows }}
          FORCE_DISPATCH: ${{ inputs.force_dispatch }}
          PUSH_RETRIES: ${{ inputs.push_retries }}
          SOURCE: ${{ inputs.source }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          VERSION_FILE_PATH: ${{ inputs.version_file_path }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          if ! printf '%s' "${UPSTREAM_REPO}" \
            | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*/[A-Za-z0-9._-]+$'; then
            fail "input 'upstream_repo' must be 'owner/name' (got '${UPSTREAM_REPO}')"
          fi

          case "${TRACK_FILE}" in
            /*|*..*) fail "input 'track_file' must be a repo-relative path: '${TRACK_FILE}'" ;;
            '')      fail "input 'track_file' is required" ;;
          esac

          case "${FORCE_DISPATCH}" in
            true|false) ;;
            *) fail "input 'force_dispatch' must be 'true' or 'false' (got '${FORCE_DISPATCH}')" ;;
          esac

          case "${PUSH_RETRIES}" in
            ''|*[!0-9]*) fail "input 'push_retries' must be a positive integer (got '${PUSH_RETRIES}')" ;;
          esac

          # `source` enum + per-mode required-input checks. The two modes have
          # disjoint required inputs, so we validate them together rather than
          # silently ignoring stale values from the unused mode.
          case "${SOURCE}" in
            latest_release)
              if [ -n "${UPSTREAM_BRANCH}" ]; then
                fail "input 'upstream_branch' is only valid when 'source: branch_head' (got '${UPSTREAM_BRANCH}')"
              fi
              ;;
            branch_head)
              if [ -z "${UPSTREAM_BRANCH}" ]; then
                fail "input 'upstream_branch' is required when 'source: branch_head'"
              fi
              # Branch names can contain '/', so we restrict only against the
              # characters Git itself rejects: spaces, '..', leading '-', etc.
              if printf '%s' "${UPSTREAM_BRANCH}" | grep -Eq '(^-|[[:space:]]|\.\.|~|\^|:|\?|\*|\[|\\)'; then
                fail "input 'upstream_branch' contains characters Git rejects: '${UPSTREAM_BRANCH}'"
              fi
              case "${VERSION_FILE_PATH}" in
                ''|/*|*..*) fail "input 'version_file_path' must be a non-empty repo-relative path: '${VERSION_FILE_PATH}'" ;;
              esac
              ;;
            *)
              fail "input 'source' must be one of: latest_release, branch_head (got '${SOURCE}')"
              ;;
          esac

          if [ -n "${TARGET_WORKFLOWS}" ]; then
            while IFS= read -r raw || [ -n "${raw}" ]; do
              wf="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
              [ -z "${wf}" ] && continue
              case "${wf}" in \#*) continue ;; esac
              # Workflow file names are simple — no slashes, no '..'.
              if ! printf '%s' "${wf}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]*\.ya?ml$'; then
                fail "target workflow '${wf}' is not a valid '<name>.yml' file"
              fi
            done <<< "${TARGET_WORKFLOWS}"
          fi

          [ "${ERR}" -eq 0 ] || { echo "Preflight failed." >&2; exit 1; }

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need credentials to push the marker-file commit back.
          persist-credentials: true

      - name: Fetch upstream release and detect change
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          TRACK_FILE: ${{ inputs.track_file }}
          STRIP_V_PREFIX: ${{ inputs.strip_v_prefix }}
          SOURCE: ${{ inputs.source }}
          UPSTREAM_BRANCH: ${{ inputs.upstream_branch }}
          VERSION_FILE_PATH: ${{ inputs.version_file_path }}
        run: |
          set -euo pipefail

          mkdir -p "$(dirname "${TRACK_FILE}")"

          case "${SOURCE}" in
            latest_release)
              UPSTREAM_TAG="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')"
              if [ -z "${UPSTREAM_TAG}" ] || [ "${UPSTREAM_TAG}" = "null" ]; then
                echo "ERROR: upstream ${UPSTREAM_REPO} has no latest release tag" >&2
                exit 1
              fi

              # `commits/<tag>` resolves both lightweight and annotated tags to
              # the underlying commit SHA in a single call. The Git Refs API
              # would return the tag-object SHA for annotated tags, which is
              # NOT the commit.
              UPSTREAM_COMMIT="$(gh api "repos/${UPSTREAM_REPO}/commits/${UPSTREAM_TAG}" --jq '.sha // empty')"
              [ -n "${UPSTREAM_COMMIT}" ] || { echo "ERROR: could not resolve commit for ${UPSTREAM_TAG}" >&2; exit 1; }

              if [ "${STRIP_V_PREFIX}" = "true" ]; then
                UPSTREAM_VERSION="${UPSTREAM_TAG#v}"
              else
                UPSTREAM_VERSION="${UPSTREAM_TAG}"
              fi

              # `published_at` deliberately omitted — a re-published release
              # would otherwise produce false-positive change events. Schema
              # held byte-stable for back-compat with existing tracker files.
              jq -n \
                --arg repo "${UPSTREAM_REPO}" \
                --arg tag "${UPSTREAM_TAG}" \
                --arg version "${UPSTREAM_VERSION}" \
                --arg commit "${UPSTREAM_COMMIT}" \
                '{repo: $repo, tag: $tag, version: $version, commit: $commit}' \
                > /tmp/upstream-release.json
              ;;

            branch_head)
              # No upstream Release to consume. Read the version straight out
              # of a file at the branch HEAD via raw.githubusercontent.com,
              # then resolve the commit SHA via `git ls-remote` (cheaper than
              # a shallow clone). Synthesize `upstream_tag = upstream_version`
              # so downstream consumers see a uniform output shape across
              # both source modes.
              VERSION_URL="https://raw.githubusercontent.com/${UPSTREAM_REPO}/${UPSTREAM_BRANCH}/${VERSION_FILE_PATH}"
              UPSTREAM_VERSION="$(curl -fsSL --retry 3 --retry-delay 5 "${VERSION_URL}" | tr -d '[:space:]')"
              if [ -z "${UPSTREAM_VERSION}" ]; then
                echo "ERROR: empty version string at ${VERSION_URL}" >&2
                exit 1
              fi

              UPSTREAM_COMMIT="$(git ls-remote "https://github.com/${UPSTREAM_REPO}.git" \
                "refs/heads/${UPSTREAM_BRANCH}" | cut -f1)"
              if [ -z "${UPSTREAM_COMMIT}" ]; then
                echo "ERROR: branch '${UPSTREAM_BRANCH}' not found in ${UPSTREAM_REPO}" >&2
                exit 1
              fi

              # SemVer-validate here (the latest_release path doesn't, because
              # upstream Release tags are operator-controlled). A non-SemVer
              # string would otherwise be rejected mid-pipeline by `release.yml`
              # with a confusing error — better to fail loud at the monitor.
              if ! printf '%s' "${UPSTREAM_VERSION}" \
                | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
                echo "ERROR: version '${UPSTREAM_VERSION}' at ${VERSION_URL} is not SemVer" >&2
                exit 1
              fi

              UPSTREAM_TAG="${UPSTREAM_VERSION}"

              # Distinct schema for branch_head mode — includes `source` and
              # `branch` so the tracker file is self-describing on inspection.
              jq -n \
                --arg repo    "${UPSTREAM_REPO}" \
                --arg branch  "${UPSTREAM_BRANCH}" \
                --arg version "${UPSTREAM_VERSION}" \
                --arg commit  "${UPSTREAM_COMMIT}" \
                '{repo: $repo, source: "branch_head", branch: $branch, version: $version, commit: $commit}' \
                > /tmp/upstream-release.json
              ;;
          esac

          {
            echo "upstream_tag=${UPSTREAM_TAG}"
            echo "upstream_version=${UPSTREAM_VERSION}"
            echo "upstream_commit=${UPSTREAM_COMMIT}"
          } >> "${GITHUB_OUTPUT}"

          if [ -f "${TRACK_FILE}" ] && cmp -s "${TRACK_FILE}" /tmp/upstream-release.json; then
            echo "No change: ${UPSTREAM_REPO} still at ${UPSTREAM_TAG}"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Change detected for ${UPSTREAM_REPO}:"
            if [ -f "${TRACK_FILE}" ]; then
              diff -u "${TRACK_FILE}" /tmp/upstream-release.json || true
            else
              echo "(no previous tracking file — treating as first run)"
            fi
            cp /tmp/upstream-release.json "${TRACK_FILE}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      # Dispatch happens BEFORE the commit so a transient dispatch failure
      # leaves the marker file unchanged and the next scheduled run retries.
      - name: Dispatch downstream workflows
        id: dispatch
        if: steps.check.outputs.changed == 'true' || inputs.force_dispatch == 'true'
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          TARGET_WORKFLOWS: ${{ inputs.target_workflows }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
        run: |
          set -euo pipefail
          DISPATCHED=()
          if [ -z "${TARGET_WORKFLOWS//[[:space:]]/}" ]; then
            echo "No target_workflows configured; skipping dispatch."
            echo "dispatched=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          while IFS= read -r raw || [ -n "${raw}" ]; do
            wf="$(printf '%s' "${raw}" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            [ -z "${wf}" ] && continue
            case "${wf}" in \#*) continue ;; esac
            echo "Dispatching ${wf} on ${DEFAULT_BRANCH} (upstream=${UPSTREAM_VERSION})"
            gh workflow run "${wf}" \
              --repo "${REPO}" \
              --ref "${DEFAULT_BRANCH}"
            DISPATCHED+=("${wf}")
          done <<< "${TARGET_WORKFLOWS}"

          {
            echo "dispatched<<__EOF__"
            if [ "${#DISPATCHED[@]}" -gt 0 ]; then
              printf '%s\n' "${DISPATCHED[@]}"
            fi
            echo "__EOF__"
          } >> "${GITHUB_OUTPUT}"

      - name: Commit and push tracking file
        if: steps.check.outputs.changed == 'true'
        env:
          TRACK_FILE: ${{ inputs.track_file }}
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
          GIT_USER_NAME: ${{ inputs.git_user_name }}
          GIT_USER_EMAIL: ${{ inputs.git_user_email }}
          MSG_TEMPLATE: ${{ inputs.commit_message_template }}
          PUSH_RETRIES: ${{ inputs.push_retries }}
        run: |
          set -euo pipefail

          git config user.name  "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"
          git add -- "${TRACK_FILE}"

          if git diff --cached --quiet; then
            echo "No tracking-file changes to commit."
            exit 0
          fi

          MSG="${MSG_TEMPLATE//\{repo\}/${UPSTREAM_REPO}}"
          MSG="${MSG//\{version\}/${UPSTREAM_VERSION}}"
          git commit -m "${MSG}"

          # Retry with rebase to handle concurrent commits to default branch.
          for attempt in $(seq 1 "${PUSH_RETRIES}"); do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Pushed tracking file (attempt ${attempt})."
              exit 0
            fi
            if [ "${attempt}" -eq "${PUSH_RETRIES}" ]; then
              echo "ERROR: git push failed after ${PUSH_RETRIES} attempts" >&2
              exit 1
            fi
            echo "git push attempt ${attempt}/${PUSH_RETRIES} failed; rebasing and retrying..."
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          done

      - name: Job summary
        if: always()
        env:
          UPSTREAM_REPO: ${{ inputs.upstream_repo }}
          UPSTREAM_TAG: ${{ steps.check.outputs.upstream_tag }}
          UPSTREAM_VERSION: ${{ steps.check.outputs.upstream_version }}
          UPSTREAM_COMMIT: ${{ steps.check.outputs.upstream_commit }}
          CHANGED: ${{ steps.check.outputs.changed }}
          DISPATCHED: ${{ steps.dispatch.outputs.dispatched }}
        run: |
          {
            echo "## Upstream Release Monitor"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Upstream repo | \`${UPSTREAM_REPO}\` |"
            echo "| Latest tag    | \`${UPSTREAM_TAG:-n/a}\` |"
            echo "| Version       | \`${UPSTREAM_VERSION:-n/a}\` |"
            echo "| Commit        | \`${UPSTREAM_COMMIT:-n/a}\` |"
            echo "| Changed       | \`${CHANGED:-false}\` |"
            if [ -n "${DISPATCHED:-}" ]; then
              echo "| Dispatched    | \`$(printf '%s' "${DISPATCHED}" | tr '\n' ' ')\` |"
            else
              echo "| Dispatched    | _(none)_ |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
