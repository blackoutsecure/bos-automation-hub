# Tag-driven release **pipeline** (reusable meta-workflow).
#
# Acts as the orchestrator / "guider" for a release: composes the three
# single-purpose reusable workflows in this repo into one end-to-end pipeline.
#
#   1. docker-build-push.yml    — multi-arch image to Docker Hub
#   2. balena-block-publish.yml — publish source tree as a balenaBlock
#   3. github-release.yml       — create/update the GitHub Release
#
# Each stage is independently togglable so the same pipeline can power a
# Docker-only release, a Balena-only release, or any combination.
#
# Trigger model: this workflow is the *outcome* side of a release. It is
# normally driven by a tag push, a `release` event, or a `workflow_dispatch`
# from a sibling trigger workflow such as `monitor-upstream-release.yml`.
# It is intended to be called from a thin caller workflow in a product repo
# (see the "Quick start" section of this repo's README) and is **not**
# intended to be triggered directly on this repo.
name: Release pipeline (reusable meta-workflow)

"on":
  workflow_call:
    inputs:
      # ----- Tag / version --------------------------------------------------
      tag_name:
        description: >-
          Explicit release tag (e.g. `v1.2.3`). When empty, auto-resolved
          from the calling event: `github.ref_name` for tag pushes and
          `github.event.release.tag_name` for `release` events. Required
          for `workflow_dispatch` callers — they must pass the tag through.
        required: false
        type: string
        default: ''

      # ----- Stage toggles --------------------------------------------------
      docker:
        description: 'Run the docker-build-push stage.'
        required: false
        type: boolean
        default: true
      balena:
        description: 'Run the balena-block-publish stage.'
        required: false
        type: boolean
        default: true
      github_release:
        description: 'Run the github-release publish stage.'
        required: false
        type: boolean
        default: true
      companion_docker:
        description: 'Run the companion docker-build-push stage.'
        required: false
        type: boolean
        default: false

      # ----- Docker stage inputs -------------------------------------------
      image_name:
        description: 'Docker image name (no namespace). Required when `docker: true`.'
        required: false
        type: string
        default: ''
      dockerhub_namespace:
        description: 'Docker Hub namespace. Required when `docker: true`.'
        required: false
        type: string
        default: ''
      docker_extra_tags:
        description: 'Newline-separated extra tags applied to the manifest.'
        required: false
        type: string
        default: ''
      docker_short_description:
        description: 'Docker Hub short description (<=100 chars). Empty leaves it untouched.'
        required: false
        type: string
        default: ''
      docker_latest:
        description: 'Also tag :latest when pushing.'
        required: false
        type: boolean
        default: true
      docker_multi_arch:
        description: 'Build linux/amd64 + linux/arm64.'
        required: false
        type: boolean
        default: true
      docker_update_description:
        description: 'Sync the README + short description to Docker Hub after a successful push.'
        required: false
        type: boolean
        default: true
      docker_force:
        description: >-
          Force a fresh docker build by passing `no-cache: true` to
          docker/build-push-action. Bypasses GHA layer cache; every layer
          re-executed from scratch. Use when the source SHA is unchanged but
          you need fresh layers (e.g. to pick up newer base image patches).
        required: false
        type: boolean
        default: false
      companion_image_name:
        description: 'Companion Docker image name (no namespace). Required when `companion_docker: true`.'
        required: false
        type: string
        default: ''
      companion_build_target:
        description: 'Optional Dockerfile stage target for the companion image build.'
        required: false
        type: string
        default: ''
      companion_docker_short_description:
        description: 'Docker Hub short description for the companion image (<=100 chars). Empty leaves it untouched.'
        required: false
        type: string
        default: ''

      # ----- Docker Scout (forwarded to docker-build-push.yml) -------------
      docker_enable_scout:
        description: >-
          Run Docker Scout against the image. Default `true` — every
          release is scanned and (on success) the SARIF report is
          uploaded to GitHub code scanning.
        required: false
        type: boolean
        default: true
      docker_scout_command:
        description: 'Scout command (default `cves`). Comma-separated for multiple.'
        required: false
        type: string
        default: cves
      docker_scout_severities:
        description: 'Severities to keep.'
        required: false
        type: string
        default: 'critical,high'
      docker_scout_only_fixed:
        description: 'Filter to CVEs with a fix available.'
        required: false
        type: boolean
        default: false
      docker_scout_ignore_base:
        description: 'Ignore vulnerabilities inherited from the base image.'
        required: false
        type: boolean
        default: false
      docker_scout_organization:
        description: 'Scout organization (Docker Hub namespace). Required for env-related features.'
        required: false
        type: string
        default: ''
      docker_scout_record_environment:
        description: >-
          When set, record the published image into this Scout
          environment (e.g. `production`) — enables `compare` against
          the live release on later PRs.
        required: false
        type: string
        default: ''
      docker_scout_sarif_upload:
        description: 'Upload the SARIF report to GitHub code scanning.'
        required: false
        type: boolean
        default: true
      docker_scout_exit_code:
        description: 'Fail the Docker stage if Scout finds matching vulnerabilities.'
        required: false
        type: boolean
        default: false
      docker_scout_enable_repo:
        description: >-
          After a successful publish, ensure the Docker Hub repository
          is enrolled in Docker Scout's continuous-monitoring service.
          Idempotent — no-op when the repo is already enabled.
        required: false
        type: boolean
        default: true

      # ----- Balena stage inputs -------------------------------------------
      block_name:
        description: 'Balena block slug (without namespace). Required when `balena: true`.'
        required: false
        type: string
        default: ''
      balena_namespace:
        description: 'Balena namespace (user/org). Required when `balena: true`.'
        required: false
        type: string
        default: ''
      balena_sync_yml:
        description: 'Rewrite balena.yml `version:` and commit it back when publishing.'
        required: false
        type: boolean
        default: true
      balena_draft:
        description: 'Publish as a draft (sets `finalize: false`).'
        required: false
        type: boolean
        default: false
      balena_force:
        description: >-
          Force a fresh balena release even when an existing release
          matches the current source revision. Forwarded to
          `balena-block-publish.yml` as `force:`, which sets
          `cache: false` on `deploy-to-balena-action`. Useful when
          re-running an unchanged release to bump the release timestamp,
          re-trigger device pulls, or recover from a partial publish.
        required: false
        type: boolean
        default: false
      balena_generate_yml:
        description: >-
          Render `balena.yml` dynamically inside the balena stage instead
          of reading it from the caller repo. Lets consumer repos drop the
          checked-in `balena.yml` entirely. When `true`, the balena commit-
          back job is skipped (the manifest is regenerated each run).
        required: false
        type: boolean
        default: false
      balena_type:
        description: >-
          Top-level `type:` written to the rendered manifest. Used only
          when `balena_generate_yml: true`.
        required: false
        type: string
        default: sw.block
      balena_description:
        description: >-
          Rendered `description:` field. Optional. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_post_provisioning:
        description: >-
          Rendered `post-provisioning:` Markdown. Multi-line; pass as a
          YAML literal block (`|`). Used only when `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_repository_url:
        description: >-
          `assets.repository.data.url` for the rendered manifest. When
          empty, defaults to the caller repo URL. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_logo_url:
        description: >-
          Optional `assets.logo.data.url`. Must be `https://` when set.
          Used only when `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_default_device_type:
        description: >-
          `data.defaultDeviceType` slug. Optional — when empty, the
          renderer uses the first entry of the resolved
          `supportedDeviceTypes`. Validated to appear in the resolved
          list either way. Used only when `balena_generate_yml: true`.
        required: false
        type: string
        default: ''
      balena_supported_device_types:
        description: >-
          Explicit `data.supportedDeviceTypes` (newline- and/or
          comma-separated balena device-type slugs). Optional — when
          empty, the balena stage automatically derives the list from
          the published docker image (`needs.docker.outputs.image` +
          version) and falls back to the workflow-level `platforms`
          input (which already defaults to `linux/amd64,linux/arm64`).
          Set this only to force a specific list. Used only when
          `balena_generate_yml: true`.
        required: false
        type: string
        default: ''

      # ----- GitHub Release stage inputs -----------------------------------
      release_template_path:
        description: 'Path to a Markdown template inside the caller repo. Empty uses the bundled default.'
        required: false
        type: string
        default: ''
      release_extra_context:
        description: 'Newline-separated `KEY=VALUE` pairs interpolated into the release notes template.'
        required: false
        type: string
        default: ''
      generate_release_notes:
        description: "Append GitHub's auto-generated PR/contributor notes after the rendered body."
        required: false
        type: boolean
        default: true
      release_files:
        description: 'Newline-separated globs of artifacts to attach to the release.'
        required: false
        type: string
        default: ''
      release_draft:
        description: 'Create the release as a draft.'
        required: false
        type: boolean
        default: false
      release_prerelease:
        description: "`true`/`false` to force the pre-release flag. Empty lets the renderer auto-detect from `vX.Y.Z-<suffix>`."
        required: false
        type: string
        default: ''

      # ----- Shared / advanced ---------------------------------------------
      platforms:
        description: 'Platform list reported in release notes (e.g. `linux/amd64,linux/arm64`).'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'

    secrets:
      DOCKERHUB_USERNAME:
        description: 'Docker Hub username. Required when `docker: true`.'
        required: false
      DOCKERHUB_TOKEN:
        description: 'Docker Hub access token. Required when `docker: true`.'
        required: false
      BALENA_API_TOKEN:
        description: 'balenaCloud API token. Required when `balena: true`.'
        required: false

    outputs:
      tag_name:
        description: 'Resolved release tag (with `v` prefix when present).'
        value: ${{ jobs.resolve.outputs.tag_name }}
      version:
        description: 'Resolved version (tag with leading `v` stripped).'
        value: ${{ jobs.resolve.outputs.version }}
      image:
        description: 'Fully qualified Docker image reference (when the docker stage ran).'
        value: ${{ jobs.docker.outputs.image }}
      companion_image:
        description: 'Fully qualified companion Docker image reference (when the companion docker stage ran).'
        value: ${{ jobs.docker-companion.outputs.image }}
      release_url:
        description: 'GitHub Release HTML URL (when the github-release stage ran).'
        value: ${{ jobs.github-release.outputs.release_url }}

permissions:
  contents: read

concurrency:
  # Tag-scoped: a re-tag of the same version is the rare case where you
  # actively *want* the previous run to be superseded — but we treat each
  # release as durable and serialize instead.
  group: release-meta-${{ github.workflow }}-${{ inputs.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — validate `vars.DEFAULT_RUNNER` once before any downstream job
  # evaluates its `runs-on:` expression. Fails fast with a clear annotation
  # when the variable is missing or malformed, instead of leaving jobs
  # queued indefinitely against an unmatched label. Runs on `ubuntu-latest`
  # because the validator must run on a runner that is always present.
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          # Forward all three runner vars so the log shows the full
          # org-var state, not just the ones this workflow enforces.
          # The `require_*` flags determine which must be set.
          default_runner: ${{ vars.DEFAULT_RUNNER }}
          runner_x64: ${{ vars.RUNNER_X64 }}
          runner_arm64: ${{ vars.RUNNER_ARM64 }}
  # ---------------------------------------------------------------------------
  resolve:
    name: Resolve tag
    needs: preflight-runner-config
    # Resolves `vars.DEFAULT_RUNNER` (bare label or JSON-array string).
    # Both presence and shape are enforced by `preflight-runner-config`,
    # so this expression has no fallback — see README.md ("Runner
    # configuration") for the full rationale.
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER)) }}
    timeout-minutes: 2
    outputs:
      tag_name: ${{ steps.tag.outputs.value }}
      version:  ${{ steps.tag.outputs.version }}
    steps:
      - id: tag
        env:
          OVERRIDE:    ${{ inputs.tag_name }}
          EVENT_NAME:  ${{ github.event_name }}
          REF_TYPE:    ${{ github.ref_type }}
          REF_NAME:    ${{ github.ref_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ -n "${OVERRIDE}" ]; then
            TAG="${OVERRIDE}"
            SOURCE="input"
          else
            case "${EVENT_NAME}" in
              push)
                if [ "${REF_TYPE}" != "tag" ]; then
                  echo "ERROR: 'tag_name' input is empty and event is not a tag push (ref_type='${REF_TYPE}')." >&2
                  exit 1
                fi
                TAG="${REF_NAME}"
                SOURCE="push.tag"
                ;;
              release)
                TAG="${RELEASE_TAG}"
                SOURCE="release.event"
                ;;
              *)
                echo "ERROR: 'tag_name' input is required for event '${EVENT_NAME}'." >&2
                exit 1
                ;;
            esac
          fi

          case "${TAG}" in
            *[$'\n\r\t ']*)
              echo "ERROR: resolved tag '${TAG}' contains whitespace." >&2
              exit 1
              ;;
          esac

          if ! printf '%s' "${TAG}" \
            | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$'; then
            echo "ERROR: tag '${TAG}' is not a SemVer release tag (vX.Y.Z[-suffix])." >&2
            exit 1
          fi

          {
            echo "value=${TAG}"
            echo "version=${TAG#v}"
            echo "source=${SOURCE}"
          } >> "${GITHUB_OUTPUT}"

          echo "Resolved tag '${TAG}' (source: ${SOURCE})."

  # ---------------------------------------------------------------------------
  # Stage 1 — Docker Hub
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Hub
    if: ${{ inputs.docker }}
    needs: resolve
    permissions:
      contents: read
      # Forwarded to docker-build-push.yml so Scout can post PR comments
      # and upload SARIF reports — no-op for `release.yml` push events
      # but keeps the job topology consistent if release.yml is ever
      # called from a PR-driven flow.
      pull-requests: write
      security-events: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/docker-build-push.yml@main
    with:
      image_name:                ${{ inputs.image_name }}
      dockerhub_namespace:       ${{ inputs.dockerhub_namespace }}
      image_version:             ${{ needs.resolve.outputs.version }}
      push:                      'true'
      force:                     ${{ inputs.docker_force }}
      latest:                    ${{ inputs.docker_latest }}
      multi_arch:                ${{ inputs.docker_multi_arch }}
      extra_tags:                ${{ inputs.docker_extra_tags }}
      short_description:         ${{ inputs.docker_short_description }}
      update_description:        ${{ inputs.docker_update_description }}
      enable_scout:              ${{ inputs.docker_enable_scout }}
      scout_command:             ${{ inputs.docker_scout_command }}
      scout_severities:          ${{ inputs.docker_scout_severities }}
      scout_only_fixed:          ${{ inputs.docker_scout_only_fixed }}
      scout_ignore_base:         ${{ inputs.docker_scout_ignore_base }}
      scout_organization:        ${{ inputs.docker_scout_organization }}
      scout_record_environment:  ${{ inputs.docker_scout_record_environment }}
      scout_sarif_upload:        ${{ inputs.docker_scout_sarif_upload }}
      scout_exit_code:           ${{ inputs.docker_scout_exit_code }}
      scout_enable_repo:         ${{ inputs.docker_scout_enable_repo }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 1b — Companion Docker Hub image
  # ---------------------------------------------------------------------------
  docker-companion:
    name: Docker Hub (companion)
    if: ${{ inputs.companion_docker }}
    needs: resolve
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/docker-build-push.yml@main
    with:
      image_name:                ${{ inputs.companion_image_name }}
      build_target:              ${{ inputs.companion_build_target }}
      dockerhub_namespace:       ${{ inputs.dockerhub_namespace }}
      image_version:             ${{ needs.resolve.outputs.version }}
      push:                      'true'
      force:                     ${{ inputs.docker_force }}
      latest:                    ${{ inputs.docker_latest }}
      multi_arch:                ${{ inputs.docker_multi_arch }}
      extra_tags:                ${{ inputs.docker_extra_tags }}
      short_description:         ${{ inputs.companion_docker_short_description }}
      update_description:        ${{ inputs.docker_update_description }}
      enable_scout:              ${{ inputs.docker_enable_scout }}
      scout_command:             ${{ inputs.docker_scout_command }}
      scout_severities:          ${{ inputs.docker_scout_severities }}
      scout_only_fixed:          ${{ inputs.docker_scout_only_fixed }}
      scout_ignore_base:         ${{ inputs.docker_scout_ignore_base }}
      scout_organization:        ${{ inputs.docker_scout_organization }}
      scout_record_environment:  ${{ inputs.docker_scout_record_environment }}
      scout_sarif_upload:        ${{ inputs.docker_scout_sarif_upload }}
      scout_exit_code:           ${{ inputs.docker_scout_exit_code }}
      scout_enable_repo:         ${{ inputs.docker_scout_enable_repo }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 2 — Balena block
  # ---------------------------------------------------------------------------
  balena:
    name: Balena block
    if: ${{ inputs.balena }}
    needs: [resolve, docker]
    permissions:
      contents: write   # allow `sync_balena_yml` commit-back
    uses: blackoutsecure/bos-automation-hub/.github/workflows/balena-block-publish.yml@main
    with:
      block_name:       ${{ inputs.block_name }}
      balena_namespace: ${{ inputs.balena_namespace }}
      version:          ${{ needs.resolve.outputs.version }}
      publish:          'true'
      sync_balena_yml:  ${{ inputs.balena_sync_yml }}
      draft:            ${{ inputs.balena_draft }}
      force:            ${{ inputs.balena_force }}
      generate_balena_yml:          ${{ inputs.balena_generate_yml }}
      block_type:                   ${{ inputs.balena_type }}
      block_assets_repository_url:  ${{ inputs.balena_repository_url }}
      block_assets_logo_url:        ${{ inputs.balena_logo_url }}
      block_default_device_type:    ${{ inputs.balena_default_device_type }}
      # When the balena stage runs `generate_balena_yml: true` and the
      # caller did not pass an explicit `balena_supported_device_types`,
      # the renderer derives the device list automatically from (in
      # waterfall order) the live docker manifest -> `block_platforms`.
      # `block_image_ref` is the most authoritative source (it reflects
      # what was actually pushed); we only set it when the docker stage
      # ran successfully, so a skipped or failed docker stage falls
      # through cleanly to the `platforms` fallback.
      block_image_ref: ${{ needs.docker.result == 'success' && format('{0}:{1}', needs.docker.outputs.image, needs.resolve.outputs.version) || '' }}
      block_platforms:              ${{ inputs.platforms }}
      # Long / multi-line passthroughs use `|-` (strip-final-newline) literal
      # blocks so multi-line caller values survive the YAML interpolation
      # without accumulating trailing blank lines at every hop.
      block_description: |-
        ${{ inputs.balena_description }}
      block_post_provisioning: |-
        ${{ inputs.balena_post_provisioning }}
      block_supported_device_types: |-
        ${{ inputs.balena_supported_device_types }}
    secrets:
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # Stage 3 — GitHub Release
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    # Run when the caller wants it, no prerequisite stage failed/cancelled,
    # and optional stages are either successful or intentionally skipped.
    if: >-
      always()
      && inputs.github_release
      && !cancelled()
      && needs.resolve.result == 'success'
      && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
      && (needs.docker-companion.result == 'success' || needs.docker-companion.result == 'skipped')
      && (needs.balena.result == 'success' || needs.balena.result == 'skipped')
    needs: [resolve, docker, docker-companion, balena]
    permissions:
      contents: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/github-release.yml@main
    with:
      tag_name:               ${{ needs.resolve.outputs.tag_name }}
      version:                ${{ needs.resolve.outputs.version }}
      image_ref:              ${{ needs.docker.outputs.image }}
      platforms:              ${{ inputs.platforms }}
      template_path:          ${{ inputs.release_template_path }}
      extra_context:          ${{ inputs.release_extra_context }}
      draft:                  ${{ inputs.release_draft }}
      prerelease:             ${{ inputs.release_prerelease }}
      generate_release_notes: ${{ inputs.generate_release_notes }}
      files:                  ${{ inputs.release_files }}

