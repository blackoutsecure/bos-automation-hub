name: Blackout Secure Launchpad (reusable)

"on":
  workflow_call:
    inputs:
      upstream_repo:
        description: 'Upstream repo to track, as `owner/name`.'
        required: true
        type: string
      track_file:
        description: 'Repo-relative path to the upstream tracking JSON file.'
        required: false
        type: string
        default: .github/upstream/tracked-release.json
      docker:
        description: 'Run the Docker publish stage.'
        required: false
        type: boolean
        default: true
      balena:
        description: 'Run the balena block publish stage.'
        required: false
        type: boolean
        default: true
      github_release:
        description: 'Run the GitHub Release publish stage.'
        required: false
        type: boolean
        default: true
      force_run:
        description: 'Force a release run even when upstream is unchanged.'
        required: false
        type: boolean
        default: false
      docker_force:
        description: 'Reserved for caller compatibility. Currently no-op; use `force_run`.'
        required: false
        type: boolean
        default: false
      balena_force:
        description: 'Reserved for caller compatibility. Currently no-op; use `force_run`.'
        required: false
        type: boolean
        default: false
      image_name:
        description: 'Primary Docker image name (no namespace).' 
        required: true
        type: string
      dockerhub_namespace:
        description: 'Docker Hub namespace for published images.'
        required: true
        type: string
      docker_extra_tags:
        description: 'Newline-separated extra tags for the primary image.'
        required: false
        type: string
        default: ''
      docker_short_description:
        description: 'Docker Hub short description for the primary image.'
        required: false
        type: string
        default: ''
      docker_latest:
        description: 'Also tag the primary image as latest.'
        required: false
        type: boolean
        default: true
      docker_multi_arch:
        description: 'Build linux/amd64 + linux/arm64 for the primary image.'
        required: false
        type: boolean
        default: true
      docker_update_description:
        description: 'Sync the README and short description to Docker Hub for the primary image.'
        required: false
        type: boolean
        default: true
      docker_enable_scout:
        description: 'Run Docker Scout for the primary image.'
        required: false
        type: boolean
        default: true
      docker_scout_command:
        description: 'Scout command(s) for the primary image.'
        required: false
        type: string
        default: cves
      docker_scout_severities:
        description: 'Severities to keep for the primary image.'
        required: false
        type: string
        default: 'critical,high'
      docker_scout_only_fixed:
        description: 'Filter primary-image Scout findings to fixed CVEs.'
        required: false
        type: boolean
        default: false
      docker_scout_ignore_base:
        description: 'Ignore vulnerabilities inherited from the base image.'
        required: false
        type: boolean
        default: false
      docker_scout_organization:
        description: 'Docker Scout organization.'
        required: false
        type: string
        default: ''
      docker_scout_record_environment:
        description: 'Scout environment to record the primary image into.'
        required: false
        type: string
        default: ''
      docker_scout_sarif_upload:
        description: 'Upload Scout SARIF for the primary image.'
        required: false
        type: boolean
        default: true
      docker_scout_exit_code:
        description: 'Fail the primary Docker stage on matching Scout findings.'
        required: false
        type: boolean
        default: false
      companion_docker:
        description: 'Publish an additional companion Docker image from the same repo.'
        required: false
        type: boolean
        default: false
      companion_image_name:
        description: 'Companion Docker image name (no namespace).' 
        required: false
        type: string
        default: ''
      companion_build_target:
        description: 'Dockerfile stage target for the companion image.'
        required: false
        type: string
        default: ''
      companion_dockerfile:
        description: 'Dockerfile path for the companion image build.'
        required: false
        type: string
        default: ./Dockerfile
      companion_build_context:
        description: 'Build context for the companion image.'
        required: false
        type: string
        default: .
      companion_docker_extra_tags:
        description: 'Newline-separated extra tags for the companion image.'
        required: false
        type: string
        default: ''
      companion_docker_short_description:
        description: 'Docker Hub short description for the companion image.'
        required: false
        type: string
        default: ''
      companion_docker_latest:
        description: 'Also tag the companion image as latest.'
        required: false
        type: boolean
        default: true
      companion_docker_multi_arch:
        description: 'Build linux/amd64 + linux/arm64 for the companion image.'
        required: false
        type: boolean
        default: true
      companion_docker_update_description:
        description: 'Sync the README and short description to Docker Hub for the companion image.'
        required: false
        type: boolean
        default: true
      companion_docker_enable_scout:
        description: 'Run Docker Scout for the companion image.'
        required: false
        type: boolean
        default: true
      companion_docker_scout_command:
        description: 'Scout command(s) for the companion image.'
        required: false
        type: string
        default: cves
      companion_docker_scout_severities:
        description: 'Severities to keep for the companion image.'
        required: false
        type: string
        default: 'critical,high'
      companion_docker_scout_only_fixed:
        description: 'Filter companion-image Scout findings to fixed CVEs.'
        required: false
        type: boolean
        default: false
      companion_docker_scout_ignore_base:
        description: 'Ignore base-image vulnerabilities for the companion image.'
        required: false
        type: boolean
        default: false
      companion_docker_scout_organization:
        description: 'Docker Scout organization for the companion image.'
        required: false
        type: string
        default: ''
      companion_docker_scout_record_environment:
        description: 'Scout environment to record the companion image into.'
        required: false
        type: string
        default: ''
      companion_docker_scout_sarif_upload:
        description: 'Upload Scout SARIF for the companion image.'
        required: false
        type: boolean
        default: true
      companion_docker_scout_exit_code:
        description: 'Fail the companion Docker stage on matching Scout findings.'
        required: false
        type: boolean
        default: false
      block_name:
        description: 'Balena block slug (defaults to `image_name`).'
        required: false
        type: string
        default: ''
      balena_namespace:
        description: 'Balena namespace for the block publish stage.'
        required: false
        type: string
        default: ''
      balena_generate_yml:
        description: 'Render `balena.yml` dynamically in the shared launchpad instead of requiring it in the caller repo.'
        required: false
        type: boolean
        default: false
      balena_default_device_type:
        description: 'Default balena device-type slug written into the generated manifest.'
        required: false
        type: string
        default: ''
      balena_supported_device_types:
        description: 'Newline-separated device-type slugs written into the generated manifest.'
        required: false
        type: string
        default: ''
      balena_description:
        description: 'Optional top-level `description:` for the generated balena manifest.'
        required: false
        type: string
        default: ''
      balena_post_provisioning:
        description: 'Optional top-level `post-provisioning:` for the generated balena manifest.'
        required: false
        type: string
        default: ''
      release_prerelease:
        description: '`true`/`false` to force prerelease; empty auto-detects.'
        required: false
        type: string
        default: ''
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      BALENA_API_TOKEN:
        required: false
    outputs:
      changed:
        description: '`true` when the upstream version differed from the tracked file.'
        value: ${{ jobs.release.outputs.changed }}
      version:
        description: 'Resolved version (tag with leading `v` stripped).'
        value: ${{ jobs.release.outputs.version }}
      tag_name:
        description: 'Resolved release tag (with `v` prefix).'
        value: ${{ jobs.release.outputs.tag_name }}
      image:
        description: 'Fully qualified primary Docker image reference.'
        value: ${{ jobs.release.outputs.image }}
      companion_image:
        description: 'Fully qualified companion Docker image reference (when published).'
        value: ${{ jobs.companion-image.outputs.image }}
      balena_release_id:
        description: 'Balena release id (when the shared launchpad published the block).' 
        value: ${{ jobs.balena.outputs.release_id }}
      release_url:
        description: 'GitHub Release HTML URL.'
        value: ${{ jobs.release.outputs.release_url }}

permissions:
  contents: read

concurrency:
  group: bos-launchpad-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Main release
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/release-from-upstream.yml
    with:
      upstream_repo:                    ${{ inputs.upstream_repo }}
      track_file:                       ${{ inputs.track_file }}
      force_release:                    ${{ inputs.force_run }}
      docker:                           ${{ inputs.docker }}
      github_release:                   ${{ inputs.github_release }}
      image_name:                       ${{ inputs.image_name }}
      dockerhub_namespace:              ${{ inputs.dockerhub_namespace }}
      docker_extra_tags:                ${{ inputs.docker_extra_tags }}
      docker_short_description:         ${{ inputs.docker_short_description }}
      docker_latest:                    ${{ inputs.docker_latest }}
      docker_multi_arch:                ${{ inputs.docker_multi_arch }}
      docker_update_description:        ${{ inputs.docker_update_description }}
      docker_enable_scout:              ${{ inputs.docker_enable_scout }}
      docker_scout_command:             ${{ inputs.docker_scout_command }}
      docker_scout_severities:          ${{ inputs.docker_scout_severities }}
      docker_scout_only_fixed:          ${{ inputs.docker_scout_only_fixed }}
      docker_scout_ignore_base:         ${{ inputs.docker_scout_ignore_base }}
      docker_scout_organization:        ${{ inputs.docker_scout_organization }}
      docker_scout_record_environment:  ${{ inputs.docker_scout_record_environment }}
      docker_scout_sarif_upload:        ${{ inputs.docker_scout_sarif_upload }}
      docker_scout_exit_code:           ${{ inputs.docker_scout_exit_code }}
      block_name:                       ${{ inputs.block_name != '' && inputs.block_name || inputs.image_name }}
      balena:                           false
      balena_namespace:                 ''
      release_prerelease:               ${{ inputs.release_prerelease }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}

  balena:
    name: Balena block
    needs: release
    if: >-
      inputs.balena
      && (needs.release.outputs.changed == 'true' || inputs.force_run)
    permissions:
      contents: read
    runs-on: ${{ vars.DEFAULT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 60
    outputs:
      release_id: ${{ steps.deploy.outputs.release_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Render balena.yml
        if: inputs.balena_generate_yml
        env:
          OUT_PATH: ./balena.yml
          BLOCK_NAME: ${{ inputs.block_name != '' && inputs.block_name || inputs.image_name }}
          BLOCK_VERSION: ${{ needs.release.outputs.version }}
          BLOCK_TYPE: sw.application
          DESCRIPTION: ${{ inputs.balena_description }}
          POST_PROVISIONING: ${{ inputs.balena_post_provisioning }}
          DEFAULT_DEVICE_TYPE: ${{ inputs.balena_default_device_type }}
          SUPPORTED_DEVICE_TYPES: ${{ inputs.balena_supported_device_types }}
          ASSETS_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import sys
          import yaml

          def fail(msg):
              print(f"ERROR: {msg}", file=sys.stderr)
              sys.exit(1)

          out_path = os.environ["OUT_PATH"].strip()
          if out_path.startswith("/") or ".." in out_path.split("/"):
              fail(f"balena_yml_path must be repo-relative: {out_path!r}")

          default_dt = os.environ.get("DEFAULT_DEVICE_TYPE", "").strip()
          supported = [
              s.strip()
              for s in os.environ.get("SUPPORTED_DEVICE_TYPES", "").splitlines()
              if s.strip()
          ]
          if not default_dt:
              fail("balena_default_device_type is required when balena_generate_yml=true")
          if not supported:
              fail("balena_supported_device_types is required when balena_generate_yml=true")
          if default_dt not in supported:
              fail("balena_default_device_type must appear in balena_supported_device_types")

          doc = {
              "name": os.environ["BLOCK_NAME"],
              "type": os.environ["BLOCK_TYPE"],
              "version": os.environ["BLOCK_VERSION"],
              "data": {
                  "defaultDeviceType": default_dt,
                  "supportedDeviceTypes": supported,
              },
          }
          if os.environ.get("DESCRIPTION", "").strip():
              doc["description"] = os.environ["DESCRIPTION"]
          if os.environ.get("POST_PROVISIONING", "").strip():
              doc["post-provisioning"] = os.environ["POST_PROVISIONING"]
          if os.environ.get("ASSETS_REPO_URL", "").strip():
              doc["assets"] = {
                  "repository": {
                      "type": "blob.asset",
                      "data": {"url": os.environ["ASSETS_REPO_URL"].strip()},
                  }
              }

          parent = os.path.dirname(out_path)
          if parent:
              os.makedirs(parent, exist_ok=True)
          with open(out_path, "w", encoding="utf-8") as fh:
              yaml.safe_dump(doc, fh, sort_keys=False)
          PY

      - name: Require checked-in balena.yml when generation is disabled
        if: ${{ !inputs.balena_generate_yml }}
        run: |
          set -euo pipefail
          [ -f ./balena.yml ] || { echo "ERROR: balena.yml not found and balena_generate_yml=false" >&2; exit 1; }

      - name: Publish to balenaCloud
        id: deploy
        uses: balena-io/deploy-to-balena-action@60c9255a5329ffa07e0313b155491dc393a97fb9 # v2.1.0
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: ${{ inputs.balena_namespace }}/${{ inputs.block_name != '' && inputs.block_name || inputs.image_name }}
          source: .
          cache: true
          layer_cache: true
          debug: false
          finalize: true

  companion-image:
    name: Companion image
    needs: release
    if: >-
      inputs.companion_docker
      && inputs.docker
      && (needs.release.outputs.changed == 'true' || inputs.force_run)
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    uses: ./.github/workflows/docker-build-push.yml
    with:
      image_name:                ${{ inputs.companion_image_name }}
      dockerhub_namespace:       ${{ inputs.dockerhub_namespace }}
      dockerfile:                ${{ inputs.companion_dockerfile }}
      build_context:             ${{ inputs.companion_build_context }}
      build_target:              ${{ inputs.companion_build_target }}
      image_version:             ${{ needs.release.outputs.version }}
      push:                      ${{ 'true' }}
      latest:                    ${{ inputs.companion_docker_latest }}
      multi_arch:                ${{ inputs.companion_docker_multi_arch }}
      extra_tags:                ${{ inputs.companion_docker_extra_tags }}
      short_description:         ${{ inputs.companion_docker_short_description }}
      update_description:        ${{ inputs.companion_docker_update_description }}
      enable_scout:              ${{ inputs.companion_docker_enable_scout }}
      scout_command:             ${{ inputs.companion_docker_scout_command }}
      scout_severities:          ${{ inputs.companion_docker_scout_severities }}
      scout_only_fixed:          ${{ inputs.companion_docker_scout_only_fixed }}
      scout_ignore_base:         ${{ inputs.companion_docker_scout_ignore_base }}
      scout_organization:        ${{ inputs.companion_docker_scout_organization != '' && inputs.companion_docker_scout_organization || inputs.dockerhub_namespace }}
      scout_record_environment:  ${{ inputs.companion_docker_scout_record_environment }}
      scout_sarif_upload:        ${{ inputs.companion_docker_scout_sarif_upload }}
      scout_exit_code:           ${{ inputs.companion_docker_scout_exit_code }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}