# Track new releases of wiedehopf/readsb and propose them upstream as a
# pull request to openwrt/packages — bumping PKG_VERSION, PKG_HASH and
# resetting PKG_RELEASE in utils/readsb-wiedehopf/Makefile.
#
# The PR is opened from a bot-owned fork (vars.FORK_OWNER/FORK_REPO) using
# secrets.OPENWRT_PR_TOKEN; this repository is never written to. One PR
# per upstream version, no auto-merge — a human OpenWrt maintainer reviews.
name: OpenWrt readsb-wiedehopf bump

"on":
  # Scheduled runs disabled for now. To re-enable, uncomment the two
  # lines below; daily at 06:00 UTC was the previous cadence.
  # schedule:
  #   - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: >-
          Optional upstream version to bump to (with or without leading `v`).
          Empty uses the latest non-prerelease release of wiedehopf/readsb.
        required: false
        type: string
  repository_dispatch:
    # Upstream's release workflow may fire this with
    # `{"event_type":"readsb-wiedehopf-release","client_payload":{"version":"3.16.11"}}`.
    types: [readsb-wiedehopf-release]

permissions:
  # All writes target the bot's fork of openwrt/packages via OPENWRT_PR_TOKEN.
  contents: read

concurrency:
  # Don't cancel — a partial run can leave the fork branch pushed but the
  # PR not yet opened.
  group: openwrt-readsb-wiedehopf-bump-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # ---- Identity (locked; intentionally NOT vars-overridable) -----------
  # The upstream project we track and the OpenWrt package we maintain.
  # Repointing these would change what this workflow is, not how it runs,
  # so they're hard-coded along with the path allowlist below.
  UPSTREAM_PROJECT_OWNER: wiedehopf
  UPSTREAM_PROJECT_REPO: readsb
  PKG_NAME: readsb-wiedehopf
  ALLOWED_PKG_PATH: utils/readsb-wiedehopf/Makefile
  BRANCH_PREFIX: readsb-wiedehopf/bump-
  BOT_NAME: readsb-wiedehopf-bot
  BOT_EMAIL: readsb-wiedehopf-bot@users.noreply.github.com

  # ---- Deployment config (overridable via repo/org `vars`) -------------
  # Where the PR lands. Defaults match the public openwrt/packages repo.
  UPSTREAM_OWNER: ${{ vars.UPSTREAM_OWNER || 'openwrt' }}
  UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO || 'packages' }}
  UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH || 'master' }}
  # Validated against ALLOWED_PKG_PATH in preflight — defence-in-depth so
  # a misconfigured `vars.PKG_PATH` cannot retarget the bot at any other
  # file in openwrt/packages.
  PKG_PATH: ${{ vars.PKG_PATH || 'utils/readsb-wiedehopf/Makefile' }}
  # The bot-owned fork the PR head branch lives on. FORK_OWNER is
  # required (no sensible default) and checked in preflight.
  FORK_OWNER: ${{ vars.FORK_OWNER }}
  FORK_REPO: ${{ vars.FORK_REPO || 'packages' }}

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — validate `vars.DEFAULT_RUNNER` once before any downstream job
  # evaluates its `runs-on:` expression. See release.yml for full rationale.
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          default_runner: ${{ vars.DEFAULT_RUNNER }}

  bump:
    name: Bump readsb-wiedehopf in openwrt/packages
    needs: preflight-runner-config
    # Resolves `vars.DEFAULT_RUNNER` (bare label or JSON-array string).
    # Both presence and shape are enforced by `preflight-runner-config`,
    # so this expression has no fallback — see README.md ("Runner
    # configuration") for the full rationale.
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER)) }}
    timeout-minutes: 15
    steps:
      - name: Preflight validation
        env:
          OPENWRT_PR_TOKEN: ${{ secrets.OPENWRT_PR_TOKEN }}
        run: |
          set -euo pipefail
          ERR=0
          fail() { echo "ERROR: $*" >&2; ERR=1; }

          # Required: cross-repo PRs against openwrt/packages can't be opened
          # with the default GITHUB_TOKEN.
          [ -n "${OPENWRT_PR_TOKEN:-}" ] || fail "secret 'OPENWRT_PR_TOKEN' is required"
          [ -n "${FORK_OWNER:-}" ]       || fail "repo variable 'FORK_OWNER' is required"

          if [ "${PKG_PATH}" != "${ALLOWED_PKG_PATH}" ]; then
            fail "PKG_PATH must be '${ALLOWED_PKG_PATH}' (got '${PKG_PATH}')"
          fi

          for v in UPSTREAM_OWNER UPSTREAM_REPO UPSTREAM_BRANCH FORK_OWNER FORK_REPO; do
            val="${!v}"
            if ! printf '%s' "${val}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
              fail "${v}='${val}' contains unexpected characters"
            fi
          done

          [ "${ERR}" -eq 0 ] || { echo "Preflight failed." >&2; exit 1; }

      - name: Resolve target version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail

          strip_v() { printf '%s' "${1#v}"; }

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$(strip_v "${INPUT_VERSION}")"
            SOURCE="workflow_dispatch input"
          elif [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="$(strip_v "${DISPATCH_VERSION}")"
            SOURCE="repository_dispatch payload"
          else
            # Page through `releases` (not `releases/latest`) and filter
            # locally so a mistakenly-published prerelease can't trigger.
            RELEASES_JSON="$(gh api \
              "repos/${UPSTREAM_PROJECT_OWNER}/${UPSTREAM_PROJECT_REPO}/releases?per_page=50")"
            TAG="$(printf '%s' "${RELEASES_JSON}" | jq -r '
              map(select(.draft == false and .prerelease == false))
              | map(select(.tag_name | test("-(rc|beta|alpha|pre)"; "i") | not))
              | sort_by(.published_at) | reverse
              | .[0].tag_name // empty
            ')"
            [ -n "${TAG}" ] || {
              echo "ERROR: no non-prerelease release for ${UPSTREAM_PROJECT_OWNER}/${UPSTREAM_PROJECT_REPO}" >&2
              exit 1
            }
            VERSION="$(strip_v "${TAG}")"
            SOURCE="latest non-prerelease release"
          fi

          # Strict release-tag shape — never a branch name or arbitrary ref.
          if ! printf '%s' "${VERSION}" | grep -Eq '^[0-9][0-9A-Za-z.+-]*$'; then
            echo "ERROR: resolved version '${VERSION}' has unexpected shape" >&2
            exit 1
          fi

          echo "Target version: ${VERSION} (source: ${SOURCE})"
          {
            echo "version=${VERSION}"
            echo "source=${SOURCE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Read current PKG_VERSION from upstream Makefile
        id: current
        run: |
          set -euo pipefail

          RAW_URL="https://raw.githubusercontent.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}/${UPSTREAM_BRANCH}/${PKG_PATH}"
          echo "Fetching ${RAW_URL}"
          MAKEFILE="$(curl -fsSL --retry 3 --retry-delay 5 "${RAW_URL}")"

          CURRENT="$(printf '%s\n' "${MAKEFILE}" | sed -n 's/^PKG_VERSION:=\(.*\)$/\1/p' | head -n1)"
          [ -n "${CURRENT}" ] || {
            echo "ERROR: could not read PKG_VERSION from ${RAW_URL}" >&2
            exit 1
          }

          echo "Current upstream PKG_VERSION: ${CURRENT}"
          echo "version=${CURRENT}" >> "${GITHUB_OUTPUT}"

      - name: Decide whether to bump
        id: decide
        env:
          TARGET: ${{ steps.version.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
        run: |
          set -euo pipefail
          if [ "${TARGET}" = "${CURRENT}" ]; then
            echo "Already at ${CURRENT}; nothing to do."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Will bump ${CURRENT} -> ${TARGET}"
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Compute sha256 of release tarball
        if: steps.decide.outputs.changed == 'true'
        id: hash
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          URL="https://codeload.github.com/${UPSTREAM_PROJECT_OWNER}/${UPSTREAM_PROJECT_REPO}/tar.gz/v${PKG_VERSION}"
          TARBALL="$(mktemp)"
          trap 'rm -f "${TARBALL}"' EXIT

          echo "Downloading ${URL}"
          curl -fsSL --retry 3 --retry-delay 5 -o "${TARBALL}" "${URL}"

          BYTES="$(wc -c < "${TARBALL}")"
          if [ "${BYTES}" -lt 1024 ]; then
            echo "ERROR: tarball suspiciously small (${BYTES} bytes) — refusing to hash" >&2
            exit 1
          fi

          SHA="$(sha256sum "${TARBALL}" | awk '{print $1}')"
          if ! printf '%s' "${SHA}" | grep -Eq '^[0-9a-f]{64}$'; then
            echo "ERROR: sha256sum produced unexpected output '${SHA}'" >&2
            exit 1
          fi

          echo "sha256(${URL}) = ${SHA}"
          echo "sha256=${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Check for existing PR for this version
        if: steps.decide.outputs.changed == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.OPENWRT_PR_TOKEN }}
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          BRANCH="${BRANCH_PREFIX}${PKG_VERSION}"
          HEAD="${FORK_OWNER}:${BRANCH}"

          EXISTING="$(gh pr list \
            --repo "${UPSTREAM_OWNER}/${UPSTREAM_REPO}" \
            --state open \
            --head "${HEAD}" \
            --json number,url \
            --jq '.[0].url // empty')"

          if [ -n "${EXISTING}" ]; then
            echo "PR already open for ${HEAD}: ${EXISTING}"
            echo "exists=true"  >> "${GITHUB_OUTPUT}"
            echo "url=${EXISTING}" >> "${GITHUB_OUTPUT}"
          else
            echo "No open PR for ${HEAD}; will create one."
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Sync fork master with upstream
        if: steps.decide.outputs.changed == 'true' && steps.existing.outputs.exists != 'true'
        env:
          OPENWRT_PR_TOKEN: ${{ secrets.OPENWRT_PR_TOKEN }}
        run: |
          set -euo pipefail

          # Belt-and-braces: the token is already a registered secret, but
          # mask it again so even an accidental `set -x` later in the job
          # would not leak it via the embedded-credential clone URL.
          echo "::add-mask::${OPENWRT_PR_TOKEN}"

          WORKDIR="$(mktemp -d)"
          echo "WORKDIR=${WORKDIR}" >> "${GITHUB_ENV}"

          cd "${WORKDIR}"

          # Clone the fork. Token lives only in this working copy's
          # .git/config — never written to a global credential helper.
          git clone --quiet \
            "https://x-access-token:${OPENWRT_PR_TOKEN}@github.com/${FORK_OWNER}/${FORK_REPO}.git" \
            packages

          cd packages
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"

          git remote add upstream "https://github.com/${UPSTREAM_OWNER}/${UPSTREAM_REPO}.git"
          git fetch --quiet --no-tags upstream "${UPSTREAM_BRANCH}"

          # The fork's master is owned by the bot solely as a base for PR
          # branches, so a hard sync with --force-with-lease is the
          # documented model.
          git checkout -B "${UPSTREAM_BRANCH}" "upstream/${UPSTREAM_BRANCH}"
          git push --force-with-lease origin "${UPSTREAM_BRANCH}"

      - name: Apply bump and push branch
        if: steps.decide.outputs.changed == 'true' && steps.existing.outputs.exists != 'true'
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
          PKG_HASH: ${{ steps.hash.outputs.sha256 }}
          OLD_PKG_VERSION: ${{ steps.current.outputs.version }}
        run: |
          set -euo pipefail

          cd "${WORKDIR}/packages"

          [ -f "${PKG_PATH}" ] || {
            echo "ERROR: ${PKG_PATH} not found in fork — refusing to create the file." >&2
            exit 1
          }

          # Surface drift between the fork's synced state and what we read
          # from upstream raw — not fatal, the fork was just synced.
          OLD_IN_FILE="$(sed -n 's/^PKG_VERSION:=\(.*\)$/\1/p' "${PKG_PATH}" | head -n1)"
          if [ "${OLD_IN_FILE}" != "${OLD_PKG_VERSION}" ]; then
            echo "::warning::PKG_VERSION in synced fork ('${OLD_IN_FILE}') != upstream raw ('${OLD_PKG_VERSION}')."
          fi

          # The ONLY allowed sed shape. Never generalise this.
          sed -i \
            -e "s/^PKG_VERSION:=.*/PKG_VERSION:=${PKG_VERSION}/" \
            -e "s/^PKG_RELEASE:=.*/PKG_RELEASE:=1/" \
            -e "s/^PKG_HASH:=.*/PKG_HASH:=${PKG_HASH}/" \
            "${PKG_PATH}"

          # Guard 1: only PKG_PATH was modified.
          CHANGED_FILES="$(git status --porcelain | awk '{print $2}')"
          if [ "${CHANGED_FILES}" != "${PKG_PATH}" ]; then
            echo "ERROR: unexpected files changed:" >&2
            git status --porcelain >&2
            exit 1
          fi

          # Guard 2: the diff only touches PKG_VERSION/PKG_RELEASE/PKG_HASH.
          # Anything else (formatting, maintainer, comments) fails loudly —
          # the bot is forbidden from editing those.
          BAD_LINES="$(git diff --unified=0 -- "${PKG_PATH}" \
            | grep -E '^[+-][^+-]' \
            | grep -Ev '^[+-]PKG_(VERSION|RELEASE|HASH):=' \
            || true)"
          if [ -n "${BAD_LINES}" ]; then
            echo "ERROR: diff touches lines other than PKG_VERSION/PKG_RELEASE/PKG_HASH:" >&2
            printf '%s\n' "${BAD_LINES}" >&2
            echo "--- full diff ---" >&2
            git --no-pager diff -- "${PKG_PATH}" >&2
            exit 1
          fi

          BRANCH="${BRANCH_PREFIX}${PKG_VERSION}"
          echo "BRANCH=${BRANCH}" >> "${GITHUB_ENV}"

          # If a stale branch from a prior crashed run exists, reset it on
          # top of freshly-synced master.
          git checkout -B "${BRANCH}"
          git add -- "${PKG_PATH}"
          git commit -m "${PKG_NAME}: update to ${PKG_VERSION}"
          git push --force-with-lease origin "${BRANCH}"

      - name: Open pull request
        if: steps.decide.outputs.changed == 'true' && steps.existing.outputs.exists != 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.OPENWRT_PR_TOKEN }}
          PKG_VERSION: ${{ steps.version.outputs.version }}
          OLD_PKG_VERSION: ${{ steps.current.outputs.version }}
          PKG_HASH: ${{ steps.hash.outputs.sha256 }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          HEAD="${FORK_OWNER}:${BRANCH}"
          BODY_FILE="$(mktemp)"
          trap 'rm -f "${BODY_FILE}"' EXIT

          cat > "${BODY_FILE}" <<EOF
          Automated bump of \`${PKG_NAME}\` to upstream version \`${PKG_VERSION}\`.

          - Upstream release: https://github.com/${UPSTREAM_PROJECT_OWNER}/${UPSTREAM_PROJECT_REPO}/releases/tag/v${PKG_VERSION}
          - \`PKG_VERSION\`: \`${OLD_PKG_VERSION}\` → \`${PKG_VERSION}\`
          - \`PKG_HASH\` (sha256 of \`v${PKG_VERSION}.tar.gz\`): \`${PKG_HASH}\`
          - \`PKG_RELEASE\` reset to \`1\` because \`PKG_VERSION\` changed.

          Only \`${PKG_PATH}\` was modified. \`PKG_MAINTAINER\`, \`PKG_SOURCE\`,
          \`PKG_SOURCE_URL\` and any other field were left untouched.

          Generated by [\`${GITHUB_REPOSITORY}\`](${RUN_URL}). Auto-merge is
          intentionally disabled — a human OpenWrt maintainer should review.
          EOF

          PR_URL="$(gh pr create \
            --repo "${UPSTREAM_OWNER}/${UPSTREAM_REPO}" \
            --base "${UPSTREAM_BRANCH}" \
            --head "${HEAD}" \
            --title "${PKG_NAME}: update to ${PKG_VERSION}" \
            --body-file "${BODY_FILE}")"

          echo "Opened ${PR_URL}"
          echo "url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Job summary
        if: always()
        env:
          CHANGED: ${{ steps.decide.outputs.changed }}
          TARGET: ${{ steps.version.outputs.version }}
          CURRENT: ${{ steps.current.outputs.version }}
          SOURCE: ${{ steps.version.outputs.source }}
          PKG_HASH: ${{ steps.hash.outputs.sha256 }}
          EXISTING_URL: ${{ steps.existing.outputs.url }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          set -euo pipefail
          {
            echo "## ${PKG_NAME} bump"
            echo
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Upstream project | \`${UPSTREAM_PROJECT_OWNER}/${UPSTREAM_PROJECT_REPO}\` |"
            echo "| Target package   | \`${UPSTREAM_OWNER}/${UPSTREAM_REPO}:${PKG_PATH}\` |"
            echo "| Resolved version | \`${TARGET:-?}\` (${SOURCE:-n/a}) |"
            echo "| Current version  | \`${CURRENT:-?}\` |"
            echo "| Changed?         | \`${CHANGED:-false}\` |"
            [ -z "${PKG_HASH:-}" ]     || echo "| sha256           | \`${PKG_HASH}\` |"
            [ -z "${EXISTING_URL:-}" ] || echo "| Existing PR      | ${EXISTING_URL} |"
            [ -z "${PR_URL:-}" ]       || echo "| Opened PR        | ${PR_URL} |"
          } >> "${GITHUB_STEP_SUMMARY}"
