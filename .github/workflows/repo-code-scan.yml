name: Repository code scan

"on":
  schedule:
    - cron: '19 3 * * 1'   # Monday 03:19 UTC
  workflow_dispatch:
    inputs:
      advanced_scanning:
        description: 'Enable advanced posture probes (PS002/PS003) with SCANNING_PAT.'
        required: false
        default: false
        type: boolean
      require_pat:
        description: 'Fail if advanced scanning is requested but SCANNING_PAT is not set.'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - '.github/workflows/repo-code-scan.yml'
      - '.bos-scan.yml'
  workflow_call:
    inputs:
      advanced_scanning:
        description: 'Enable advanced posture probes (PS002/PS003) with SCANNING_PAT.'
        required: false
        default: false
        type: boolean
      require_pat:
        description: 'Fail if advanced scanning is requested but SCANNING_PAT is not set.'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: repo-code-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: mode
        name: Resolve scan mode
        env:
          INPUT_ADVANCED: ${{ ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.advanced_scanning) && 'true' || '' }}
          INPUT_REQUIRE_PAT: ${{ ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.require_pat) && 'true' || '' }}
          VAR_ADVANCED: ${{ vars['BOS_SCAN_ADVANCED'] }}
          VAR_REQUIRE_PAT: ${{ vars['BOS_SCAN_REQUIRE_PAT'] }}
          HAS_PAT: ${{ secrets['SCANNING_PAT'] != '' && 'true' || 'false' }}
        run: |
          set -euo pipefail

          is_true() {
            case "${1:-}" in
              true|TRUE|True|1|yes|YES|on|ON) return 0 ;;
              *) return 1 ;;
            esac
          }

          advanced_requested=false
          if [ -n "${INPUT_ADVANCED}" ]; then
            advanced_requested=true
          elif is_true "${VAR_ADVANCED}"; then
            advanced_requested=true
          fi

          require_pat=false
          if [ -n "${INPUT_REQUIRE_PAT}" ]; then
            require_pat=true
          elif is_true "${VAR_REQUIRE_PAT}"; then
            require_pat=true
          fi

          use_pat=false
          if [ "${advanced_requested}" = "true" ] && [ "${HAS_PAT}" = "true" ]; then
            use_pat=true
          fi

          if [ "${advanced_requested}" = "true" ] && [ "${HAS_PAT}" != "true" ] && [ "${require_pat}" = "true" ]; then
            echo "::error::Advanced scanning was requested, but secret SCANNING_PAT is not configured."
            exit 1
          fi

          if [ "${advanced_requested}" = "true" ] && [ "${HAS_PAT}" != "true" ]; then
            echo "::warning::Advanced scanning requested but SCANNING_PAT is missing. Falling back to GITHUB_TOKEN (PS002/PS003 will be skipped)."
          fi

          if [ "${advanced_requested}" != "true" ] && [ "${HAS_PAT}" = "true" ]; then
            echo "::notice::SCANNING_PAT is configured but advanced scanning is off. Set BOS_SCAN_ADVANCED=true or pass advanced_scanning=true from the caller."
          fi

          echo "advanced_requested=${advanced_requested}" >> "${GITHUB_OUTPUT}"
          echo "require_pat=${require_pat}" >> "${GITHUB_OUTPUT}"
          echo "use_pat=${use_pat}" >> "${GITHUB_OUTPUT}"

      - name: Run BOS Code Scanning Kit
        uses: blackoutsecure/bos-code-scanning-kit@v1
        with:
          github_token: ${{ steps.mode.outputs.use_pat == 'true' && secrets['SCANNING_PAT'] || secrets.GITHUB_TOKEN }}
          enable_posture: 'true'
          enable_scanners: 'true'
          enable_upload: 'true'

      - name: Scan mode summary
        run: |
          set -euo pipefail
          if [ "${{ steps.mode.outputs.use_pat }}" = "true" ]; then
            echo "Advanced scanning enabled (SCANNING_PAT in use)."
          elif [ "${{ steps.mode.outputs.advanced_requested }}" = "true" ]; then
            echo "Advanced scanning requested, but SCANNING_PAT unavailable. Running baseline mode."
          else
            echo "Baseline mode (GITHUB_TOKEN). Advanced probes are disabled."
          fi
