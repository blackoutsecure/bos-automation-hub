# Reusable wrapper around the published `blackoutsecure/bos-code-scanning-kit`
# Marketplace Action AND the GitHub-hosted `github/codeql-action`. Lets ANY
# caller (Marketplace Launchpad, delivery Launchpad, hand-authored callers,
# etc.) gate runs on:
#
#   1. The kit composite — posture audit + bundled scanners (actionlint /
#      gitleaks / shellcheck) + unified SARIF upload to GHAS.
#   2. CodeQL — GitHub's first-party semantic source analysis, run as a
#      parallel matrix over `inputs.codeql_languages` and uploaded to the
#      caller's Security tab.
#
# The two stages are independent: callers can enable either, both, or
# neither. Both write to the caller's Security tab via separate SARIF
# uploads keyed off distinct `category` values so they coexist cleanly.
#
# Hosted in the hub so a single bump of the `@v1` kit pin (or the
# `github/codeql-action` SHA pins) here propagates to every caller that
# opts in. Both launchpads — the Marketplace publishing launchpad
# (`bos-launchpad-marketplace.yml`) AND the container / site delivery
# launchpad (`bos-launchpad-release.yml`) — plus direct callers (kit
# `bos-launchpad-code-scan.yml` files in producer repos like
# `bos-marketplace-kit` and `bos-code-scanning-kit`) all consume this
# one wrapper. Naming convention is `bos-launchpad-<domain>.yml` to
# match the rest of the launchpad-family reusables. A byte-identical
# `repo-security-scan.yml` duplicate that pre-dated the naming
# convention was removed May 27 2026 — if you find lingering
# references to that name in old branches or external docs, they
# should point here.
#
# Caller hosting model: SARIF gets uploaded to the CALLER repo's Security
# tab — `actions/checkout` clones the caller repo, then the kit / CodeQL
# run against that working tree. The kit composite itself handles
# `actions/setup-python` + `pip install`, so this wrapper stays minimal.
#
# Producer-kit escape hatch: kits that produce the published
# `bos-code-scanning-kit@v1` (or otherwise want to run CodeQL via this
# wrapper without invoking the published composite against their dev
# source) can set `enable_kit_composite: false`. That skips the `scan`
# job entirely while still allowing the `codeql` matrix job to fire when
# `codeql_languages` is non-empty.
#
# IMPORTANT: the `@v1` floating tag on the kit invocation is intentional
# so the hub automatically tracks v1.x patch and minor releases. If a
# regression ships and breaks downstream callers, override at the hub
# level by pinning a SHA in a follow-up commit rather than asking callers
# to rev — that's the whole reason this wrapper exists.

name: Repo Security Scan (reusable)

"on":
  workflow_call:
    inputs:
      fail_on:
        description: >-
          Forwarded to the kit's `fail_on`. `fail` (default) exits non-zero
          when posture has any FAIL findings or any bundled scanner reports
          a result — gates the build. `never` collects findings but always
          exits 0 (useful for first-time rollouts and for the
          `enable_upload: true` audit-only mode).
        required: false
        type: string
        default: fail
      enable_kit_composite:
        description: >-
          Run the published `bos-code-scanning-kit@v1` composite as the
          `scan` job. Default `true`. Set `false` for producer-kit
          callers that want CodeQL coverage from this wrapper but do NOT
          want the published kit running against their own dev source
          (CodeQL-only mode). When `false`, the `enable_posture` /
          `enable_scanners` / `enable_upload` inputs become irrelevant.
        required: false
        type: boolean
        default: true
      enable_posture:
        description: 'Forwarded to the kit. Run the posture audit step. Default `true`.'
        required: false
        type: boolean
        default: true
      enable_scanners:
        description: 'Forwarded to the kit. Run the bundled scanners (actionlint / gitleaks / shellcheck). Default `true`.'
        required: false
        type: boolean
        default: true
      enable_upload:
        description: 'Forwarded to the kit. Upload merged SARIF to GitHub Advanced Security. Default `true`.'
        required: false
        type: boolean
        default: true
      codeql_languages:
        description: >-
          What CodeQL should analyse. Three modes:

          1. Empty string (default) — skip the `codeql` job entirely.
             Cheapest option; pick this when the kit composite alone is
             enough or when the repo has no CodeQL-supported source.

          2. Literal string `'auto'` — language autodetect. The
             `resolve-codeql-languages` job calls the GitHub linguist
             API (`/repos/{owner}/{repo}/languages`) to identify the
             dominant source languages in the caller repo, then maps
             them to CodeQL's supported set:
             `Python→python`, `JavaScript|TypeScript→javascript-typescript`,
             `Go→go`, `Java|Kotlin→java-kotlin`, `C|C++→c-cpp`,
             `C#→csharp`, `Ruby→ruby`, `Swift→swift`. The presence of
             any `.github/workflows/*.{yml,yaml}` file additionally adds
             `actions` (covers reusable-workflow taint analysis). If the
             detected set is empty the `codeql` job is silently skipped
             — no failure. Matches the language-selection behaviour of
             GitHub's own "CodeQL default setup" UI.

          3. JSON array string of CodeQL language identifiers (e.g.
             `["python", "actions"]`, `["javascript-typescript"]`,
             `["go"]`). The value is parsed with `fromJSON` to drive a
             matrix, so entries MUST be double-quoted JSON strings —
             YAML's flow-list shorthand `[python, actions]` is REJECTED
             with `fromJSON: Unexpected symbol: 'python'`. Pick this
             mode when you want deterministic language coverage
             regardless of how the repo's linguist stats drift over time
             (recommended for producer kits whose source mix is stable
             and audit-relevant — e.g. bos-marketplace-kit pins
             `["python", "actions"]`).
        required: false
        type: string
        default: ''
      codeql_queries:
        description: >-
          CodeQL query suite. `security-and-quality` (default) covers both
          vulnerability and code-quality patterns; `security-extended`
          raises recall at the cost of noise; `security` is the smallest /
          lowest-noise set. Ignored when `codeql_languages` is empty.
        required: false
        type: string
        default: security-and-quality
      codeql_timeout_minutes:
        description: 'Per-language CodeQL job timeout in minutes.'
        required: false
        type: number
        default: 30
      runs_on:
        description: >-
          Optional runner override for the scan/codeql jobs. When empty
          (the default), resolves from the org-shared
          `vars.DEFAULT_RUNNER`. Accepts either a bare label
          (e.g. `ubuntu-latest`) or a JSON-array string of labels
          (e.g. `["self-hosted","Linux","X64"]`); both shapes are
          parsed at runtime via `fromJSON` so GHA sees a real label
          list rather than a single literal string. No silent
          fallback: `vars.DEFAULT_RUNNER` is validated by the
          `preflight-runner-config` job (see README.md "Runner
          configuration") so a job that reaches this stage is
          guaranteed to evaluate against a valid label set.
          NOTE: This input drives the `scan` (kit composite) job
          only. The `codeql` matrix job has its own `codeql_runs_on`
          input because the CodeQL CLI has no `linux/arm64` build
          AND because the bundled Temurin 21 JIT cannot survive
          x86_64 emulation — see `codeql_runs_on` below for the
          full rationale.
        required: false
        type: string
        default: ''
      codeql_runs_on:
        description: >-
          Optional runner override for the CodeQL matrix job.
          Independent from `runs_on` because the CodeQL CLI does NOT
          support `linux/arm64` (see
          https://codeql.github.com/docs/codeql-overview/system-requirements/),
          AND because CodeQL's bundled Temurin 21 JIT routinely
          SIGILLs on x86_64 containers running under qemu-user
          emulation or on CPUs lacking modern instruction extensions
          — a class of failure observed on self-hosted "X64"-labelled
          runner pools that turned out to be amd64 images running on
          arm64 hardware. Resolution order when empty:
          1. `inputs.codeql_runs_on`  (caller override — set to a
             self-hosted label only if you have VERIFIED-native
             amd64 hardware whose CPU can JIT Temurin 21 without
             SIGILL; the hub deliberately does NOT auto-fall-back
             to `vars.RUNNER_X64` because that var's hardware
             topology is opaque to the hub).
          2. `ubuntu-latest`          (hosted x64 fallback — free
             for public repos, real amd64, full instruction set;
             the strongly-recommended default for CodeQL).
          Accepts a bare label or a JSON-array string of labels;
          parsed via `fromJSON` at runtime like `runs_on`.
        required: false
        type: string
        default: ''
      use_advanced_pat:
        description: >-
          When `true` AND the caller forwards a non-empty `scanning_pat`
          secret (typically via `secrets: inherit` from a caller that
          defines `secrets.SCANNING_PAT`), pass that PAT to the kit
          composite as `github_token`. Enables the kit's advanced
          posture probes (PS002 secret-scanning posture, PS003
          Dependabot posture) which require `repo` + admin scope
          beyond what the default `GITHUB_TOKEN` grants. When `false`
          (default) or the secret is empty, the kit uses the runner's
          default `github.token` — the standard baseline scan.
        required: false
        type: boolean
        default: false
    secrets:
      scanning_pat:
        description: >-
          PAT with `repo` + admin scope, used by the kit composite for
          advanced posture probes (PS002/PS003). Optional. Ignored
          unless `inputs.use_advanced_pat` is `true`. Easiest pass-through
          from caller: `secrets: inherit` and define `SCANNING_PAT` at
          the org or repo level.
        required: false
    outputs:
      scan_outcome:
        description: >-
          Severity-tier verdict from the kit composite: `success` (no
          findings at any level), `warn` (only warning/note-level
          findings), `failure` (at least one error-level finding), or
          empty string (the `scan` job was skipped via
          `enable_kit_composite: false`). Lets callers (notably the
          `bos-launchpad-release.yml` launchpad) gate downstream jobs
          on the verdict independently of whether the `scan` job
          itself exited non-zero — useful when `fail_on: never`
          collapses error-level findings into a green job.
        value: ${{ jobs.scan.outputs.outcome }}

permissions: {}

jobs:
  # ---------------------------------------------------------------------------
  # Preflight — validate `vars.DEFAULT_RUNNER` once before any downstream job
  # evaluates its `runs-on:` expression. See release.yml for full rationale.
  # ---------------------------------------------------------------------------
  preflight-runner-config:
    name: Preflight (runner config)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - uses: blackoutsecure/bos-automation-hub/.github/actions/shared/preflight-runner-config@main
        with:
          # Forward all three runner vars so the log shows the full
          # org-var state, not just the ones this workflow enforces.
          # The `require_*` flags determine which must be set.
          default_runner: ${{ vars.DEFAULT_RUNNER }}
          runner_x64: ${{ vars.RUNNER_X64 }}
          runner_arm64: ${{ vars.RUNNER_ARM64 }}

  # ---------------------------------------------------------------------------
  # Resolve the CodeQL language matrix. Single source of truth that the
  # `codeql` job consumes — handles all three modes of `codeql_languages`:
  #
  #   * `'auto'`           — linguist API + workflow-file scan. Matches
  #                          GitHub's first-party "CodeQL default setup"
  #                          UX. See input docs above for the language
  #                          mapping table.
  #   * JSON array string  — echoed back unchanged (caller-supplied
  #                          deterministic list).
  #   * empty string       — job is skipped entirely (the `if:` gate);
  #                          downstream `codeql` job allows `skipped`
  #                          via its `!cancelled()` guard and then
  #                          drops itself entirely via the matrix
  #                          `|| '[]'` fallback (no Checks UI row).
  #
  # Always runs on hosted `ubuntu-latest` — the work is a single API call
  # plus a sparse-checkout filename scan, no compute weight. Stays off
  # `vars.DEFAULT_RUNNER` to avoid the same self-hosted-arch traps that
  # forced `codeql` itself to default to hosted (see `codeql_runs_on`).
  # ---------------------------------------------------------------------------
  resolve-codeql-languages:
    name: Resolve CodeQL languages
    needs: preflight-runner-config
    if: inputs.codeql_languages != ''
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # `gh api repos/{owner}/{repo}/languages` works on the default
      # `GITHUB_TOKEN` for both public and private repos — `contents:
      # read` is the minimum the languages endpoint asserts. We also
      # sparse-checkout `.github/workflows/` to detect the `actions`
      # language, which is the same `contents: read` scope.
      contents: read
    outputs:
      languages: ${{ steps.resolve.outputs.languages }}
    steps:
      # Only checkout when we need to inspect `.github/workflows/`.
      # Sparse-checkout avoids fetching the whole tree just to list
      # one directory.
      - if: inputs.codeql_languages == 'auto'
        name: Checkout (sparse — workflows only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: .github/workflows
          sparse-checkout-cone-mode: false
      - id: resolve
        name: Resolve language matrix
        env:
          INPUT_LANGUAGES: ${{ inputs.codeql_languages }}
          # Prefer the org-level SCANNING_PAT (when the caller opts
          # into `use_advanced_pat` AND forwards a non-empty secret)
          # for the default-setup probe. That endpoint requires
          # `Administration: read`, a scope the workflow's default
          # `GITHUB_TOKEN` cannot grant. With only `github.token` the
          # probe falls back gracefully (403 → "could not determine")
          # and we proceed with normal resolution.
          GH_TOKEN: ${{ (inputs.use_advanced_pat && secrets.scanning_pat != '') && secrets.scanning_pat || github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # ---- Preflight: default-setup conflict detection ---------
          # GitHub disallows running an advanced CodeQL workflow
          # against a repo that has CodeQL default setup enabled —
          # the SARIF upload is rejected with "CodeQL analyses from
          # advanced configurations cannot be processed when the
          # default setup is enabled". Detect the conflict ourselves
          # and skip the codeql job entirely instead of burning CPU
          # on an analyze that we know will fail to upload.
          #
          # The endpoint needs `Administration: read` which the
          # default `GITHUB_TOKEN` cannot grant. The probe uses
          # SCANNING_PAT when available, falls back to `github.token`
          # otherwise. Any failure (403, 404, network) is treated as
          # "could not determine" — we proceed with normal resolution
          # and let the codeql job's upload surface the conflict if
          # there is one.
          #
          # The probe runs unconditionally (before input-mode
          # dispatch) because the conflict applies regardless of how
          # the caller specified `codeql_languages` — an explicit
          # `'["actions"]'` collides with default setup just as much
          # as an `'auto'`-resolved one.
          ds_state="$(gh api "repos/${REPO}/code-scanning/default-setup" --jq '.state' 2>/dev/null || true)"
          if [ "${ds_state}" = 'configured' ]; then
            ds_langs="$(gh api "repos/${REPO}/code-scanning/default-setup" --jq '.languages | join(",")' 2>/dev/null || echo '?')"
            echo "::warning::CodeQL default setup is enabled on ${REPO} (languages: ${ds_langs}). Skipping advanced CodeQL to avoid the mutually-exclusive 'advanced configurations cannot be processed when default setup is enabled' upload error. To use the advanced workflow instead, disable default setup at Settings → Code security → Code scanning → CodeQL → Disable."
            echo 'languages=[]' >> "${GITHUB_OUTPUT}"
            echo "Mode: default-setup-skip. Default setup owns CodeQL on this repo."
            exit 0
          elif [ -z "${ds_state}" ]; then
            echo "Default-setup state could not be determined (probe call failed or insufficient permissions). Proceeding with normal language resolution; the codeql job will surface a clear error if there is a conflict."
          else
            echo "Default-setup state: ${ds_state} (no conflict)."
          fi

          if [ "${INPUT_LANGUAGES}" != 'auto' ]; then
            # Mode 3: deterministic JSON array — echo back verbatim.
            # `fromJSON` validation happens later in the codeql
            # job's matrix expression; a malformed value fails LOUDLY
            # there rather than silently here.
            printf 'languages=%s\n' "${INPUT_LANGUAGES}" >> "${GITHUB_OUTPUT}"
            echo "Mode: deterministic. Forwarded language list: ${INPUT_LANGUAGES}"
            exit 0
          fi

          # Mode 2: auto-detect via linguist API.
          echo "Mode: auto. Querying linguist for ${REPO}"
          api_json="$(gh api "repos/${REPO}/languages" 2>/dev/null || echo '{}')"
          echo "linguist response: ${api_json}"

          # Map linguist's source-language names to CodeQL-supported
          # language identifiers. Keep this list in sync with
          # https://codeql.github.com/docs/codeql-overview/supported-languages-and-frameworks/
          # Note: linguist returns historical names (e.g. "C++" with the
          # plus signs literal, "C#" with the hash literal) — quote them
          # carefully in the case statement below.
          map_lang() {
            case "$1" in
              Python)              echo python ;;
              JavaScript|TypeScript) echo javascript-typescript ;;
              Go)                  echo go ;;
              Java|Kotlin)         echo java-kotlin ;;
              C|'C++')             echo c-cpp ;;
              'C#')                echo csharp ;;
              Ruby)                echo ruby ;;
              Swift)               echo swift ;;
              *)                   echo '' ;;
            esac
          }

          detected=()
          while IFS= read -r lang; do
            [ -z "${lang}" ] && continue
            mapped="$(map_lang "${lang}")"
            [ -n "${mapped}" ] && detected+=("${mapped}")
          done < <(printf '%s' "${api_json}" | jq -r 'keys[]?')

          # `actions` is its own CodeQL language (analyses workflow
          # files for taint, untrusted-input expressions, etc.). Always
          # include when ANY workflow file is present, regardless of
          # what linguist reported (linguist often miscounts YAML
          # because workflow files are <2KB each).
          if compgen -G ".github/workflows/*.yml"  > /dev/null 2>&1 \
             || compgen -G ".github/workflows/*.yaml" > /dev/null 2>&1; then
            detected+=(actions)
          fi

          if [ ${#detected[@]} -eq 0 ]; then
            # No CodeQL-supported language detected — emit `[]` so the
            # codeql job's `if:` guard skips it cleanly.
            echo 'languages=[]' >> "${GITHUB_OUTPUT}"
            echo 'No CodeQL-supported languages detected. The codeql job will be skipped.'
            exit 0
          fi

          # Deduplicate (e.g. JavaScript + TypeScript both → javascript-typescript).
          # awk preserves first-occurrence order so the matrix-job display order is stable.
          result="$(printf '%s\n' "${detected[@]}" | awk '!seen[$0]++' | jq -R . | jq -s -c .)"
          printf 'languages=%s\n' "${result}" >> "${GITHUB_OUTPUT}"
          echo "Detected CodeQL languages: ${result}"

  scan:
    name: bos-code-scanning-kit
    needs: preflight-runner-config
    if: inputs.enable_kit_composite
    # Resolve runner: explicit `inputs.runs_on` override beats org-shared
    # `vars.DEFAULT_RUNNER`. Presence and shape of `vars.DEFAULT_RUNNER`
    # are enforced by `preflight-runner-config`. The `fromJSON` +
    # `startsWith` dance supports both bare-label and JSON-array shapes.
    runs-on: ${{ fromJSON(startsWith(inputs.runs_on || vars.DEFAULT_RUNNER, '[') && (inputs.runs_on || vars.DEFAULT_RUNNER) || format('"{0}"', inputs.runs_on || vars.DEFAULT_RUNNER)) }}
    # Permissions are scoped at the job level rather than the workflow level
    # so the calling workflow's effective-permissions cascade is explicit.
    # `security-events: write` is required for the kit's SARIF upload;
    # `actions: read` is required by codeql-action/upload-sarif for
    # workflow context; `contents: read` is the checkout minimum.
    permissions:
      contents:        read
      security-events: write
      actions:         read
    # Surface the kit's severity-tier `outcome` as a job output so the
    # workflow-level `scan_outcome` can forward it to callers. Captured
    # from the kit composite's `summary` step output. Empty string when
    # the kit step itself errored before reaching the summary step (e.g.
    # network failure during `pip install`) — treat empty as "unknown
    # outcome" in callers, not as success.
    outputs:
      outcome: ${{ steps.kit.outputs.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The kit doesn't push anything; revoke push capability so a
          # supply-chain compromise of the kit can't escalate to repo
          # writes via the runner's GITHUB_TOKEN.
          persist-credentials: false

      - id: kit
        name: Run BOS Code Scanning Kit
        # `@v1` floats across v1.x.y for automatic patch + minor uptake.
        # Bump this pin (or switch to a SHA) here to roll out a new
        # major across every opted-in kit in one hub commit.
        #
        # `github_token`: when the caller opts into `use_advanced_pat`
        # AND forwards a non-empty `scanning_pat` secret, pass that PAT
        # so the kit can run PS002 (secret-scanning posture) and PS003
        # (Dependabot posture) — both require `repo` + admin scope
        # beyond the default `GITHUB_TOKEN`. Otherwise fall through to
        # the runner's default `github.token` for the baseline scan.
        uses: blackoutsecure/bos-code-scanning-kit@v1
        with:
          github_token:    ${{ (inputs.use_advanced_pat && secrets.scanning_pat != '') && secrets.scanning_pat || github.token }}
          enable_posture:  ${{ inputs.enable_posture }}
          enable_scanners: ${{ inputs.enable_scanners }}
          enable_upload:   ${{ inputs.enable_upload }}
          fail_on:         ${{ inputs.fail_on }}

  # ---------------------------------------------------------------------------
  # CodeQL matrix job — first-party `github/codeql-action` semantic analysis.
  # Runs only when `codeql_languages` is a non-empty JSON array string. Each
  # language gets its own parallel job (matrix), uploads its own SARIF, and
  # surfaces under `Analyze (<language>)` in the Checks UI — conventional
  # naming that external dashboards / required-check rules can key off.
  # ---------------------------------------------------------------------------
  codeql:
    name: Analyze (${{ matrix.language }})
    needs: [preflight-runner-config, resolve-codeql-languages]
    # IMPORTANT — this `if:` MUST evaluate to true in the no-work
    # case, not short-circuit to false. The job's `name:` template
    # references `matrix.language`; if the job-level `if:` is false
    # the matrix never expands and the Checks UI shows the literal
    # placeholder string `Analyze (${{ matrix.language }})` as a
    # skipped row (ugly + confuses required-check rules).
    #
    # To OMIT the job entirely (no skipped row at all) the `if:` has
    # to pass AND the matrix has to evaluate to `[]` — only then does
    # GitHub Actions drop the job from the run completely.
    #
    # So this guard intentionally allows `resolve-codeql-languages`
    # to be EITHER `success` OR `skipped`:
    #   * `success` + non-empty array  → matrix expands → jobs spawn.
    #   * `success` + `'[]'` (autodetect found nothing)
    #                                  → matrix `|| '[]'` → `[]` → omitted.
    #   * `skipped` (caller passed `codeql_languages: ''`)
    #                                  → outputs is `''` → matrix
    #                                    `|| '[]'` → `[]` → omitted.
    # Only `failure` / `cancelled` upstream actually skips this job
    # (and produces the placeholder row), which is the correct
    # behaviour for a real upstream failure — operator needs to see it.
    if: >-
      !cancelled()
      && needs.preflight-runner-config.result == 'success'
      && (needs.resolve-codeql-languages.result == 'success'
          || needs.resolve-codeql-languages.result == 'skipped')
    # CodeQL has TWO independent reasons not to share `runs_on` /
    # `vars.DEFAULT_RUNNER` with the `scan` job:
    #   (a) CodeQL CLI has no `linux/arm64` build — see
    #       https://codeql.github.com/docs/codeql-overview/system-requirements/
    #       — so an arm64 `DEFAULT_RUNNER` fails with `Exec format
    #       error` when CodeQL invokes its bundled
    #       `tools/linux64/java` binary.
    #   (b) Even on "X64"-labelled self-hosted pools, CodeQL's
    #       bundled Temurin 21 JIT routinely SIGILLs on amd64
    #       containers running under qemu-user emulation (common
    #       when the pool is actually arm64 hardware advertising an
    #       X64 label) or on older CPUs missing modern instruction
    #       extensions. Observed in bos-marketplace-kit run
    #       26553990634 with `c1` (basic JIT) failing inside a
    #       trivial `Spliterator.forEachRemaining` — a fingerprint
    #       consistent with emulation, not a CodeQL bug.
    # The hub therefore deliberately does NOT auto-fall-back to
    # `vars.RUNNER_X64`. Callers with VERIFIED-native amd64 hardware
    # can opt back into self-hosted by passing `codeql_runs_on`
    # explicitly (e.g. via `security_scan_codeql_runs_on` on the
    # launchpad wrappers).
    # Resolution order:
    #   1. `inputs.codeql_runs_on`  — caller override; accepts a
    #      bare label or a JSON-array string of labels.
    #   2. `ubuntu-latest`          — hosted x64 fallback. Free for
    #      public repos and inexpensive for private ones; CodeQL has
    #      no compute weight that justifies forcing self-hosted, and
    #      hosted runners guarantee a CPU + Java JIT combination
    #      that CodeQL was actually tested against.
    runs-on: ${{ fromJSON(startsWith(inputs.codeql_runs_on || 'ubuntu-latest', '[') && (inputs.codeql_runs_on || 'ubuntu-latest') || format('"{0}"', inputs.codeql_runs_on || 'ubuntu-latest')) }}
    timeout-minutes: ${{ inputs.codeql_timeout_minutes }}
    permissions:
      # Required by github/codeql-action to upload SARIF to the
      # calling repo's Security tab.
      security-events: write
      # Required by actions/checkout.
      contents: read
      # Documented "starter" permission in GitHub's CodeQL template.
      # Not strictly required for public repos, but included for parity
      # with the kit-side starter template that consumers receive via
      # `marketplace-kit generate-policy codeql-workflow`.
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Consume the resolver's output rather than `inputs.codeql_languages`
        # directly so the `'auto'` mode works without special-casing here.
        # For deterministic-mode callers the resolver echoes the input
        # back unchanged, so behaviour is identical to the pre-autodetect
        # version.
        #
        # The `|| '[]'` fallback is THE skip mechanism for the no-work
        # cases (caller passed `codeql_languages: ''` so resolver was
        # skipped → outputs is `''`; or autodetect found no supported
        # languages → outputs is `'[]'`). The job-level `if:` above
        # intentionally lets both flow through to here; this matrix
        # then evaluates to `[]` and GitHub Actions DROPS THE JOB
        # ENTIRELY from the run (no skipped row in the Checks UI).
        #
        # The empty-string handling is critical because skipped jobs
        # propagate `''` for their outputs and `fromJSON('')` is
        # invalid JSON. Without `|| '[]'` GitHub falls back to
        # instantiating a single placeholder matrix entry with no
        # expanded values and surfaces the literal job-name template
        # (`Analyze (${{ matrix.language }})`) as a skipped row.
        language: ${{ fromJSON(needs.resolve-codeql-languages.outputs.languages || '[]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries:   ${{ inputs.codeql_queries }}

      # No `Autobuild` step: the default supported languages here
      # (`python`, `actions`) are interpreted / YAML and need no build.
      # Consumers analyzing compiled languages should set
      # `codeql_languages` to a build-capable set and add an inline
      # build step in their own workflow that runs BEFORE this
      # reusable — or invoke `github/codeql-action` directly.

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"

      # CodeQL itself writes nothing to $GITHUB_STEP_SUMMARY — alerts land
      # silently in the Security tab. The kit's posture audit writes a
      # visible per-run summary; this step gives CodeQL feedback parity so
      # operators don't have to context-switch to the Security tab just to
      # confirm a run produced zero alerts (the most common case).
      #
      # The count is repo-wide for the ref (not per-language) because the
      # `code-scanning/alerts` API has no language filter — every matrix
      # leg shows the same total, clearly labelled. Each leg still gets
      # its own header so the operator can confirm both arches uploaded.
      #
      # The 5-second sleep closes the race between the analyze step's
      # SARIF upload completing and GHAS indexing the alerts. On query
      # failure (slow indexing, missing permission, API hiccup) the step
      # degrades to a "could not query" line and never fails the matrix
      # leg — `if: always()` ensures it also runs on analyze failure so
      # the operator sees a row in the summary even when the run errored.
      - name: CodeQL summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO:     ${{ github.repository }}
          REF:      ${{ github.ref }}
          LANG:     ${{ matrix.language }}
        shell: bash
        run: |
          # `set -u` only — never let a query failure mark the job red.
          set -u
          sleep 5
          count="$(gh api \
            "repos/${REPO}/code-scanning/alerts?tool_name=CodeQL&ref=${REF}&state=open&per_page=100" \
            --jq 'length' 2>/dev/null || echo '?')"
          ref_enc="$(printf '%s' "${REF}" | sed 's|/|%2F|g')"
          security_url="https://github.com/${REPO}/security/code-scanning?query=tool%3ACodeQL+ref%3A${ref_enc}"
          {
            echo "## CodeQL · \`${LANG}\` · ref \`${REF}\`"
            echo ""
            case "${count}" in
              0)
                echo "**0 open CodeQL alerts** on \`${REF}\`. Scan completed, nothing to fix."
                ;;
              '?')
                echo "Could not query the code-scanning alerts API — the SARIF upload may still be indexing, or this token lacks \`security_events: read\`. Check the [Security tab](${security_url}) directly."
                ;;
              *)
                echo "**${count} open CodeQL alert(s)** on \`${REF}\`. [View in Security tab](${security_url})."
                ;;
            esac
          } >> "${GITHUB_STEP_SUMMARY}"
