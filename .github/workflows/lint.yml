# Lint reusable workflows + composite actions on PR / push.
name: Lint workflows

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/actionlint.yaml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/actionlint.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    # See monitor-upstream-release.yml for the `fromJSON` + `startsWith`
    # rationale (GHA treats JSON-array-shaped vars as a single label
    # unless explicitly parsed).
    runs-on: ${{ fromJSON(startsWith(vars.DEFAULT_RUNNER, '[') && vars.DEFAULT_RUNNER || format('"{0}"', vars.DEFAULT_RUNNER || 'ubuntu-latest')) }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # raven-actions/actionlint@v2.1.2 shells out `npm install @actions/tool-cache`
      # in its setup. ubuntu-latest has npm preinstalled; our self-hosted runner
      # image (docker-github-runner) does NOT — the runner only bundles node20
      # under _externals/ for its own JS-action execution, not on the system PATH.
      # setup-node downloads a fresh Node distribution via its bundled tool-cache
      # (no shell-out to npm), and after it runs `npm` is on PATH for the next
      # step. Cheap on hosted runners (action is no-op when the requested version
      # is already cached); required on self-hosted. See:
      # https://github.com/raven-actions/actionlint/blob/main/action.yml
      - name: Ensure Node.js (provides npm for raven-actions/actionlint)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2
        with:
          matcher: true
          fail-on-error: true
          shellcheck: true
