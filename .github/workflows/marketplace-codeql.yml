# Blackout Secure Marketplace CodeQL — reusable CodeQL analysis stage.
#
# A single-job reusable workflow that runs `github/codeql-action`
# against a matrix of languages and uploads SARIF to the calling
# repo's Security tab. Designed to be invoked by the Marketplace
# Launchpad (`bos-marketplace-launchpad.yml`) so consumer kits do
# not need to maintain their own per-repo `codeql.yml`.
#
# Hosting model: this reusable runs in the CALLER's repo context
# (standard GitHub reusable-workflow semantics) and so uploads SARIF
# to the CALLER's Security tab — not the hub's. The calling
# workflow MUST grant the `analyze` sub-job:
#   * security-events: write   (SARIF upload to GHAS)
#   * contents: read           (actions/checkout)
#   * actions: read            (CodeQL workflow telemetry)
#
# The launchpad's `codeql` job declares these permissions; each
# consumer kit's launchpad caller MUST mirror them at the workflow
# level so the cascade reaches this reusable.
#
# `name: CodeQL` is intentionally conventional (not the
# `Word · …` pattern used elsewhere): GitHub's Security tab
# surfaces this value as the SARIF tool name, and external
# dashboards key off it.
name: CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: >-
          JSON array string of CodeQL languages to analyze.
          Common values: `[python, actions]` (default — covers
          Python source + workflow / composite-action YAML),
          `[javascript-typescript]`, `[go]`, `[ruby]`. The string
          is parsed with `fromJSON` to drive a matrix; entries
          must be valid CodeQL language identifiers.
        required: false
        type: string
        default: '[python, actions]'
      queries:
        description: >-
          CodeQL query suite. `security-and-quality` (default)
          covers both vulnerability and code-quality patterns;
          `security-extended` raises recall at the cost of noise;
          `security` is the smallest / lowest-noise set.
        required: false
        type: string
        default: security-and-quality
      timeout_minutes:
        description: 'Per-language job timeout in minutes.'
        required: false
        type: number
        default: 30
      runs_on:
        description: 'Runner label (e.g. `ubuntu-latest`).'
        required: false
        type: string
        default: ubuntu-latest

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}

    permissions:
      # Required by github/codeql-action to upload SARIF to the
      # calling repo's Security tab.
      security-events: write
      # Required by actions/checkout.
      contents: read
      # Documented "starter" permission in GitHub's CodeQL
      # template. Not strictly required for public repos, but
      # included for parity with the kit-side starter template
      # that consumers receive via `marketplace-kit generate-policy
      # codeql-workflow`.
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}

      # No `Autobuild` step: the default supported languages here
      # (`python`, `actions`) are interpreted / YAML and need no
      # build. Consumers analyzing compiled languages should call
      # this reusable indirectly via the launchpad's `codeql` job
      # and ensure their `languages` input matches a build-capable
      # set, or invoke `github/codeql-action` directly.

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
