# Blackout Secure Marketplace Launchpad — automated CI / guard / release
# meta-workflow for GitHub Marketplace Action repos.
#
# Single front-door for the Marketplace publishing loop. Composes the three
# stage-level reusable workflows into one event-routed orchestrator so
# consumer Marketplace Action repos can drive a full pipeline from a thin
# ~50-line caller workflow:
#
#   1. marketplace-action-ci.yml      — PR-time `check` (manifest + LICENSE
#                                       + README + branding + community-
#                                       health) + `branding-preview`
#                                       (Marketplace card SVG, uploaded as
#                                       artifact) + opt-in `name-check`
#                                       (Marketplace name availability).
#                                       Routed for `pull_request`, `push`,
#                                       and `workflow_dispatch` mode
#                                       `name-check`.
#   2. bos-launchpad-code-scan.yml         — consolidated security scanning
#                                       stage (ON by default). Wraps the
#                                       published
#                                       `blackoutsecure/bos-code-scanning-
#                                       kit@v1` Marketplace Action
#                                       (posture audit + bundled scanners:
#                                       actionlint / gitleaks / shellcheck)
#                                       AND `github/codeql-action`
#                                       (matrix-parallel CodeQL analysis).
#                                       Both produce SARIF that lands in
#                                       the caller's Security tab via
#                                       independent uploads. Routed for
#                                       `pull_request` + `push`. Gated by
#                                       `enable_security_scan` input
#                                       (default `true`); CodeQL within
#                                       the stage is further gated by
#                                       `security_scan_codeql_languages`
#                                       being non-empty. Shared with the
#                                       delivery `bos-launchpad`
#                                       reusable so a single wrapper bump
#                                       propagates everywhere.
#   3. marketplace-repo-guard.yml     — PR-time block on workflow files or
#                                       other prohibited paths landing on
#                                       `main`, plus required-files
#                                       enforcement. Routed for
#                                       `pull_request_target`.
#   4. release-promote.yml            — `dev` → `main` allowlist promotion,
#                                       tag the promoted SHA, publish a
#                                       GitHub Release. Routed for
#                                       `workflow_dispatch` mode `release`.
#
# Event routing (the whole reason this reusable exists): the consumer
# caller subscribes to events and forwards a small set of context inputs
# (`event_name`, `dispatched_mode`, PR SHAs); this reusable then if-gates
# each sub-job so exactly one stage runs per invocation. Consumer callers
# stay tiny and uniform across all Marketplace Action repos — every per-
# repo customization is an input to this reusable, not boilerplate to
# duplicate in N consumer files.
#
#   pull_request (base = dev)         → ci      stage runs
#   push (branch = dev)               → ci      stage runs (post-merge re-verify)
#   pull_request_target (base = main) → guard   stage runs
#   workflow_dispatch mode=release    → release stage runs
#   workflow_dispatch mode=name-check → ci      stage runs (name-check on)
#
# Per-job permissions are scoped least-privilege at the sub-reusable level:
#   * ci            — `contents: read` only.
#   * security_scan — `security-events: write`, `contents: read`,
#                     `actions: read` (ON by default; only suppressed
#                     when the caller passes `enable_security_scan:
#                     false`). Covers BOTH the kit composite sub-job
#                     AND the CodeQL matrix sub-job inside the wrapper.
#   * guard         — `contents: read`, `pull-requests: read`.
#   * release       — `contents: write`.
#
# Concurrency is the CALLER's responsibility — it owns the event subscription
# and is what GitHub schedules. Recommended caller pattern: scope concurrency
# by event-type so a release in-flight is never cancelled by an incoming PR.
# See `examples/bos-launchpad-marketplace.example.yaml` for the canonical
# caller shape.
#
# Trigger model: this workflow is intended to be called from a thin caller
# in a Marketplace Action repo's `dev` branch (typically triggered on
# `pull_request`/`push` to `dev`, `pull_request_target` against `main`, and
# `workflow_dispatch` for releases / name-checks). It is **not** intended
# to be triggered directly on this repo. See the README "Marketplace Action
# repo enrollment" section for copy-paste caller examples.
#
# NOT THE SAME FILE AS `bos-launchpad-release.yml`. That sibling reusable handles
# container/Balena/GitHub Release/Cloudflare Pages delivery for the
# `docker-*` and site repos. The two share no inputs, no stages, and no
# event model — they are deliberately separate orchestrators for two
# different domains. Use this one for Marketplace Action repos.
name: Blackout Secure Marketplace Launchpad (reusable meta-workflow)

"on":
  workflow_call:
    inputs:
      # =====================================================================
      # Event-routing context (caller-forwarded).
      # The caller subscribes to events; the reusable can't see the caller's
      # `github.event_name` directly, so the caller must forward it. PR SHAs
      # are similarly forwarded for the guard stage. Missing values are
      # tolerated (sub-job `if:` gates short-circuit when the inputs don't
      # match the stage's event).
      # =====================================================================
      event_name:
        description: >-
          Forwarded from `github.event_name` on the caller. Drives which
          sub-job runs. Recognised values: `pull_request`, `push`,
          `pull_request_target`, `workflow_dispatch`.
        required: true
        type: string
      dispatched_mode:
        description: >-
          Sub-command when `event_name == workflow_dispatch`. Recognised
          values: `release`, `name-check`. Ignored for other events.
        required: false
        type: string
        default: ''
      pr_base_sha:
        description: >-
          `github.event.pull_request.base.sha` from the caller. Forwarded
          to the guard stage. Empty when not a PR event.
        required: false
        type: string
        default: ''
      pr_head_sha:
        description: >-
          `github.event.pull_request.head.sha` from the caller. Forwarded
          to the guard stage. Empty when not a PR event.
        required: false
        type: string
        default: ''

      # =====================================================================
      # Shared customization (used by multiple stages).
      # =====================================================================
      runtime_artifact_dir:
        description: >-
          Directory holding the Action's runtime artifact. `dist` for JS
          Actions (compiled bundle), `src` for composite Actions (Python
          / Shell / Docker `runs:` entry point). Auto-appended to both
          `allowlist_paths` (release stage) and `required_paths` (guard
          stage) so a single input drives both protections.
        required: false
        type: string
        default: 'src'

      # =====================================================================
      # CI stage inputs — forwarded to marketplace-action-ci.yml.
      # See that reusable for full descriptions.
      # =====================================================================
      action_yml_path:
        required: false
        type: string
        default: 'action.yml'
      fail_on_warning:
        required: false
        type: boolean
        default: false
      skip_checks:
        required: false
        type: string
        default: ''
      check_org_health:
        required: false
        type: boolean
        default: true
      org_health_repo:
        required: false
        type: string
        default: ''
      require_security:
        required: false
        type: string
        default: 'warn'
      require_code_of_conduct:
        required: false
        type: string
        default: 'warn'
      require_contributing:
        required: false
        type: string
        default: 'warn'
      require_support:
        required: false
        type: string
        default: 'skip'
      require_issue_templates:
        required: false
        type: string
        default: 'skip'
      require_pr_template:
        required: false
        type: string
        default: 'skip'
      require_funding:
        required: false
        type: string
        default: 'skip'

      # ----- community-health source mode (CH/SC `*_source` overrides) -----
      # Lets callers declare *where* each community-health file is expected
      # to live so removing a local copy in favour of the org `.github`
      # repo doesn't silently degrade to a warn. Forwarded to the kit
      # check composite via the CI stage. See the kit's
      # `community_health_source` docs for full semantics.
      #   * `local`   — file must be in this repo (org fallback disabled).
      #   * `inherit` — file expected at `${org_health_repo}`; local copy
      #                 intentionally absent and NOT consulted.
      #   * `either`  — local first, fall back to org (default, back-compat).
      community_health_source:
        description: 'Global default source mode for CH/SC files. `local` | `inherit` | `either`. Default `either`.'
        required: false
        type: string
        default: 'either'
      security_source:
        description: 'Per-rule source for SECURITY.md (SC003). Empty = use global.'
        required: false
        type: string
        default: ''
      code_of_conduct_source:
        description: 'Per-rule source for CODE_OF_CONDUCT.md (CH001). Empty = use global.'
        required: false
        type: string
        default: ''
      contributing_source:
        description: 'Per-rule source for CONTRIBUTING.md (CH002). Empty = use global.'
        required: false
        type: string
        default: ''
      support_source:
        description: 'Per-rule source for SUPPORT.md (CH003). Empty = use global.'
        required: false
        type: string
        default: ''
      issue_templates_source:
        description: 'Per-rule source for issue templates (CH004). Empty = use global.'
        required: false
        type: string
        default: ''
      pr_template_source:
        description: 'Per-rule source for PR template (CH005). Empty = use global.'
        required: false
        type: string
        default: ''
      funding_source:
        description: 'Per-rule source for FUNDING.yml (CH006). Empty = use global.'
        required: false
        type: string
        default: ''

      # ----- DP/CQ/LT/GH/MS/SR rule policies (kit v0.2.0+ families) --------
      # Forwarded to the kit `check` composite via the CI stage. Same
      # `fail | warn | skip` semantics as the CH/SC rules above. Defaults
      # mirror the kit's own defaults (additive, back-compat for existing
      # callers).
      require_dependabot:
        description: 'Policy for `.github/dependabot.yml` presence (DP001). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_codeql:
        description: 'Policy for a CodeQL workflow (CQ001). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_editorconfig:
        description: 'Policy for `.editorconfig` presence (LT001). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_gitattributes:
        description: 'Policy for `.gitattributes` presence (LT002). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_gitignore:
        description: 'Policy for `.gitignore` presence (LT003). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_markdownlint:
        description: 'Policy for markdownlint config presence (LT004). Default `skip`.'
        required: false
        type: string
        default: 'skip'
      require_yamllint:
        description: 'Policy for yamllint config presence (LT005). Default `skip`.'
        required: false
        type: string
        default: 'skip'
      require_ghas_code_scanning:
        description: 'Policy for code-scanning enabled at repo level (GH001). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_ghas_secret_scanning:
        description: 'Policy for secret-scanning enabled at repo level (GH002). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_dependabot_alerts:
        description: 'Policy for Dependabot alerts enabled at repo level (GH003). Default `warn`.'
        required: false
        type: string
        default: 'warn'
      require_security_devops:
        description: 'Policy for Microsoft Security DevOps workflow presence (MS001). Default `skip`.'
        required: false
        type: string
        default: 'skip'
      require_scorecard:
        description: 'Policy for OpenSSF Scorecard workflow presence (SR001). Default `skip`.'
        required: false
        type: string
        default: 'skip'

      # ----- Security scan stage (ON by default) -----
      # When `enable_security_scan` is true (the default), the launchpad
      # runs the consolidated `bos-launchpad-code-scan.yml` wrapper against
      # the consumer kit on the same events as `ci` (pull_request + push to
      # dev). The wrapper has TWO independent sub-jobs:
      #   * `scan`   — the published `blackoutsecure/bos-code-scanning-
      #               kit@v1` composite: posture audit + bundled scanners
      #               (actionlint / gitleaks / shellcheck) + unified
      #               SARIF upload. Gated by `security_scan_enable_kit_
      #               composite` (default true).
      #   * `codeql` — `github/codeql-action` matrix analysis. Gated by
      #               `security_scan_codeql_languages` being non-empty
      #               (default empty string = skip).
      # Producer-kit pattern: kits that produce the published
      # `bos-code-scanning-kit@v1` should set
      # `security_scan_enable_kit_composite: false` so they don't run
      # the published @v1 against their own dev source while still
      # getting CodeQL coverage via the wrapper.
      # Producer-kit pattern: kits that produce the published
      # `bos-code-scanning-kit@v1` should set
      # `security_scan_enable_kit_composite: false` so they don't run
      # the published @v1 against their own dev source while still
      # getting CodeQL coverage via the wrapper.
      #
      # PERMISSIONS REQUIREMENT (STATIC, UNCONDITIONAL):
      # The caller workflow MUST grant `security-events: write` and
      # `actions: read` at workflow level (and cascade them to the
      # `launchpad` job's `permissions:` block) REGARDLESS of whether
      # `enable_security_scan` is set. GitHub validates the nested-job
      # permission cascade at workflow-load time, BEFORE evaluating the
      # job's `if:` gate. Omitting the grants — even when the caller
      # explicitly sets `enable_security_scan: false` to disable the
      # stage — produces a hard load-time failure:
      #   The nested job 'security_scan' is requesting
      #   'actions: read, security-events: write', but is only allowed
      #   'actions: none, security-events: none'.
      enable_security_scan:
        description: 'Enable consolidated security scanning (kit composite + CodeQL) via the launchpad. Default `true`. NOTE: caller MUST grant `security-events: write` + `actions: read` at workflow level UNCONDITIONALLY (even when this input is `false`) — GitHub validates the nested `security_scan` job''s permission cascade statically, before the `if:` gate.'
        required: false
        type: boolean
        default: true
      security_scan_use_advanced_pat:
        description: >-
          Forwarded to the code-scan wrapper as `use_advanced_pat`. When
          `true` AND the caller forwards a non-empty `scanning_pat`
          secret (typically via `secrets: inherit` from a caller that
          defines `secrets.SCANNING_PAT`), the kit composite runs the
          elevated posture probes PS001 (code scanning default-setup),
          PS002 (secret scanning enabled), and PS003 (Dependabot
          alerts enabled) which require `repo` + admin scope beyond
          what the default `GITHUB_TOKEN` grants. When `false` (default)
          or the secret is empty, those probes are surfaced as `skip`
          findings and the rest of the scan still runs with the
          baseline `GITHUB_TOKEN`.
        required: false
        type: boolean
        default: false
      security_scan_fail_on:
        description: 'Forwarded to the kit `fail_on`. `fail` (default) gates the build on findings; `never` only surfaces them.'
        required: false
        type: string
        default: fail
      security_scan_enable_kit_composite:
        description: 'Run the published `bos-code-scanning-kit@v1` composite sub-job inside the wrapper. Default `true`. Set `false` for producer-kit callers that want CodeQL only.'
        required: false
        type: boolean
        default: true
      security_scan_enable_posture:
        description: 'Forwarded to the kit. Run the posture audit step. Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_enable_scanners:
        description: 'Forwarded to the kit. Run the bundled scanners. Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_enable_upload:
        description: 'Forwarded to the kit. Upload merged SARIF to GHAS. Default `true`. Ignored when `security_scan_enable_kit_composite: false`.'
        required: false
        type: boolean
        default: true
      security_scan_codeql_languages:
        description: 'JSON array string of CodeQL languages (e.g. `["python", "actions"]`). Empty (default) skips the CodeQL sub-job entirely. MUST be valid JSON with double-quoted strings — `[python, actions]` is REJECTED by `fromJSON`.'
        required: false
        type: string
        default: ''
      security_scan_codeql_queries:
        description: 'CodeQL query suite. `security-and-quality` (default), `security-extended`, or `security`. Ignored when `security_scan_codeql_languages` is empty.'
        required: false
        type: string
        default: security-and-quality

      proposed_name:
        description: 'Marketplace name to probe; empty reads `name:` from manifest. Only used when `dispatched_mode: name-check`.'
        required: false
        type: string
        default: ''
      name_check_fail_on_collision:
        required: false
        type: boolean
        default: true
      run_branding_preview:
        required: false
        type: boolean
        default: true
      branding_preview_feather_ref:
        required: false
        type: string
        default: 'v4.28.0'
      branding_preview_artifact_name:
        required: false
        type: string
        default: 'marketplace-card'
      branding_preview_artifact_retention_days:
        required: false
        type: number
        default: 14

      # =====================================================================
      # Guard stage inputs — forwarded to marketplace-repo-guard.yml.
      # =====================================================================
      check_pr_diff:
        required: false
        type: boolean
        default: true
      check_tree_state:
        required: false
        type: boolean
        default: true
      guard_require_action_yml:
        description: 'Forwarded to guard stage as `require_action_yml`. Renamed here for symmetry with `action_yml_path` (CI stage).'
        required: false
        type: boolean
        default: true
      blocked_paths:
        description: 'Newline-separated git pathspec patterns that may not be added/modified on the protected branch.'
        required: false
        type: string
        default: '.github/workflows/'
      required_paths:
        description: >-
          Newline-separated paths the protected branch MUST carry. The
          `runtime_artifact_dir` is auto-appended; do not duplicate it
          here. Defaults to the Marketplace minimum
          (`action.yml`, `LICENSE`, `NOTICE`, `README.md`,
          `.github/dependabot.yml`).
        required: false
        type: string
        default: |
          .github/dependabot.yml
          action.yml
          LICENSE
          NOTICE
          README.md
      guard_checkout_ref:
        description: 'Forwarded to guard stage as `checkout_ref`.'
        required: false
        type: string
        default: ''

      # =====================================================================
      # Release stage inputs — forwarded to release-promote.yml.
      # =====================================================================
      source_branch:
        required: false
        type: string
        default: 'dev'
      target_branch:
        required: false
        type: string
        default: 'main'
      allowlist_paths:
        description: >-
          Newline-separated paths to promote from `source_branch` to
          `target_branch`. The `runtime_artifact_dir` is auto-appended;
          do not duplicate it here. Defaults to the Marketplace minimum
          (`action.yml`, `LICENSE`, `NOTICE`, `README.md`).
        required: false
        type: string
        default: |
          action.yml
          LICENSE
          NOTICE
          README.md
      include_dependabot_config:
        required: false
        type: boolean
        default: true
      include_github_metadata:
        required: false
        type: boolean
        default: true
      extra_sync_paths:
        required: false
        type: string
        default: ''
      tag_name:
        description: 'SemVer release tag (`vX.Y.Z[-suffix]`). Optional for release runs: when empty, the release-promote stage auto-bumps the patch of the latest stable SemVer tag on `source_branch` (defaulting to `v0.1.0` for a first release). Pass an explicit value for minor/major bumps or pre-release suffixes. Ignored for non-release events.'
        required: false
        type: string
        default: ''
      commit_message:
        required: false
        type: string
        default: ''
      dry_run:
        required: false
        type: boolean
        default: false
      release_name:
        required: false
        type: string
        default: ''
      release_template_path:
        required: false
        type: string
        default: ''
      release_extra_context:
        required: false
        type: string
        default: ''
      release_draft:
        required: false
        type: boolean
        default: false
      release_prerelease:
        required: false
        type: string
        default: ''
      release_make_latest:
        required: false
        type: string
        default: 'true'
      release_generate_notes:
        required: false
        type: boolean
        default: true
      release_files:
        required: false
        type: string
        default: ''

    secrets:
      scanning_pat:
        description: >-
          PAT forwarded to the consolidated security-scan stage's kit
          composite, used for the elevated posture probes PS001/PS002/
          PS003 (code-scanning default-setup, secret-scanning enablement,
          Dependabot alerts enablement) which need `repo` + admin scope
          beyond the default `GITHUB_TOKEN`. Optional. Ignored unless
          `inputs.security_scan_use_advanced_pat` is `true`. Easiest
          pass-through from the caller: declare `secrets: inherit` on
          the launchpad `uses:` block and define `SCANNING_PAT` as an
          org or repo secret. Fine-grained PAT minimum permissions on
          each target repo:
            * Code scanning alerts: Read   (PS001)
            * Secret scanning alerts: Read (PS002)
            * Dependabot alerts: Read      (PS003)
            * Administration: Read         (for branch-protection probes)
          Classic PAT equivalent: `repo` scope, granted by an org owner
          or repo admin.
        required: false

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — Marketplace Action CI (PR-time check + branding + name-check).
  # Fires on:
  #   * pull_request (base = dev)
  #   * push (branch = dev) — post-merge re-verify
  #   * workflow_dispatch + dispatched_mode == 'name-check' — one-shot probe
  # ---------------------------------------------------------------------------
  ci:
    name: Marketplace CI
    if: >-
      inputs.event_name == 'pull_request'
      || inputs.event_name == 'push'
      || (inputs.event_name == 'workflow_dispatch' && inputs.dispatched_mode == 'name-check')
    permissions:
      contents: read
    uses: blackoutsecure/bos-automation-hub/.github/workflows/marketplace-action-ci.yml@main
    with:
      action_yml_path:                          ${{ inputs.action_yml_path }}
      fail_on_warning:                          ${{ inputs.fail_on_warning }}
      skip_checks:                              ${{ inputs.skip_checks }}
      check_org_health:                         ${{ inputs.check_org_health }}
      org_health_repo:                          ${{ inputs.org_health_repo }}
      require_security:                         ${{ inputs.require_security }}
      require_code_of_conduct:                  ${{ inputs.require_code_of_conduct }}
      require_contributing:                     ${{ inputs.require_contributing }}
      require_support:                          ${{ inputs.require_support }}
      require_issue_templates:                  ${{ inputs.require_issue_templates }}
      require_pr_template:                      ${{ inputs.require_pr_template }}
      require_funding:                          ${{ inputs.require_funding }}
      community_health_source:                  ${{ inputs.community_health_source }}
      security_source:                          ${{ inputs.security_source }}
      code_of_conduct_source:                   ${{ inputs.code_of_conduct_source }}
      contributing_source:                      ${{ inputs.contributing_source }}
      support_source:                           ${{ inputs.support_source }}
      issue_templates_source:                   ${{ inputs.issue_templates_source }}
      pr_template_source:                       ${{ inputs.pr_template_source }}
      funding_source:                           ${{ inputs.funding_source }}
      require_dependabot:                       ${{ inputs.require_dependabot }}
      require_codeql:                           ${{ inputs.require_codeql }}
      require_editorconfig:                     ${{ inputs.require_editorconfig }}
      require_gitattributes:                    ${{ inputs.require_gitattributes }}
      require_gitignore:                        ${{ inputs.require_gitignore }}
      require_markdownlint:                     ${{ inputs.require_markdownlint }}
      require_yamllint:                         ${{ inputs.require_yamllint }}
      require_ghas_code_scanning:               ${{ inputs.require_ghas_code_scanning }}
      require_ghas_secret_scanning:             ${{ inputs.require_ghas_secret_scanning }}
      require_dependabot_alerts:                ${{ inputs.require_dependabot_alerts }}
      require_security_devops:                  ${{ inputs.require_security_devops }}
      require_scorecard:                        ${{ inputs.require_scorecard }}
      run_name_check:                           ${{ inputs.event_name == 'workflow_dispatch' && inputs.dispatched_mode == 'name-check' }}
      proposed_name:                            ${{ inputs.proposed_name }}
      name_check_fail_on_collision:             ${{ inputs.name_check_fail_on_collision }}
      run_branding_preview:                     ${{ inputs.run_branding_preview }}
      branding_preview_feather_ref:             ${{ inputs.branding_preview_feather_ref }}
      branding_preview_artifact_name:           ${{ inputs.branding_preview_artifact_name }}
      branding_preview_artifact_retention_days: ${{ inputs.branding_preview_artifact_retention_days }}

  # ---------------------------------------------------------------------------
  # Stage 1.5 — Consolidated security scan (opt-in).
  # Wraps two independent sub-jobs in `bos-launchpad-code-scan.yml`:
  #   * `scan`   — published `bos-code-scanning-kit@v1` composite.
  #   * `codeql` — `github/codeql-action` matrix analysis.
  # Fires on the same events as `ci` so PR-time and post-merge runs both
  # get coverage; intentionally NOT on `pull_request_target` (guard stage
  # — the dev PR's scan already covered the code) and NOT on
  # `dispatched_mode == 'release'` (release just promotes already-checked
  # code). Caller MUST grant `security-events: write` + `actions: read`
  # at workflow level so the cascade reaches BOTH sub-jobs inside the
  # wrapper.
  # ---------------------------------------------------------------------------
  security_scan:
    name: Security scan
    if: >-
      inputs.enable_security_scan
      && (inputs.event_name == 'pull_request' || inputs.event_name == 'push')
    permissions:
      security-events: write
      contents: read
      actions: read
    uses: blackoutsecure/bos-automation-hub/.github/workflows/bos-launchpad-code-scan.yml@main
    with:
      fail_on:              ${{ inputs.security_scan_fail_on }}
      enable_kit_composite: ${{ inputs.security_scan_enable_kit_composite }}
      enable_posture:       ${{ inputs.security_scan_enable_posture }}
      enable_scanners:      ${{ inputs.security_scan_enable_scanners }}
      enable_upload:        ${{ inputs.security_scan_enable_upload }}
      codeql_languages:     ${{ inputs.security_scan_codeql_languages }}
      codeql_queries:       ${{ inputs.security_scan_codeql_queries }}
      use_advanced_pat:     ${{ inputs.security_scan_use_advanced_pat }}
    secrets:
      # Optional pass-through. The code-scan reusable only consults this
      # when `use_advanced_pat` is `true`; otherwise the kit composite
      # falls back to the runner's default `github.token`. `secrets:`
      # block on a reusable-job invocation may NOT use `secrets: inherit`
      # syntax when forwarding into another reusable, so the assignment
      # is explicit. Callers forward via `secrets: inherit` at the OUTER
      # `uses:` block, which is what makes `secrets.scanning_pat`
      # resolvable here.
      scanning_pat: ${{ secrets.scanning_pat }}

  # ---------------------------------------------------------------------------
  # Stage 2 — Marketplace repo compliance guard.
  # Fires on:
  #   * pull_request_target (base = main) — PR-time block on workflow files
  #     landing on `main` + required-files enforcement
  #
  # `runtime_artifact_dir` is auto-appended to `required_paths` so a single
  # input drives both allowlist (release) and required (guard) protections.
  # ---------------------------------------------------------------------------
  guard:
    name: Marketplace guard
    if: inputs.event_name == 'pull_request_target'
    permissions:
      contents: read
      pull-requests: read
    uses: blackoutsecure/bos-automation-hub/.github/workflows/marketplace-repo-guard.yml@main
    with:
      pr_base_sha:        ${{ inputs.pr_base_sha }}
      pr_head_sha:        ${{ inputs.pr_head_sha }}
      check_pr_diff:      ${{ inputs.check_pr_diff }}
      check_tree_state:   ${{ inputs.check_tree_state }}
      require_action_yml: ${{ inputs.guard_require_action_yml }}
      blocked_paths:      ${{ inputs.blocked_paths }}
      required_paths: |
        ${{ inputs.required_paths }}
        ${{ inputs.runtime_artifact_dir }}
      checkout_ref:       ${{ inputs.guard_checkout_ref }}

  # ---------------------------------------------------------------------------
  # Stage 3 — Marketplace-compliant release (dev → main promote + GH Release).
  # Fires on:
  #   * workflow_dispatch + dispatched_mode == 'release'
  #
  # `runtime_artifact_dir` is auto-appended to `allowlist_paths`. Anything on
  # `target_branch` NOT in the merged allowlist is REMOVED on this commit —
  # this is what keeps `.github/workflows/**` off the default branch (along
  # with the hard-block in the underlying `promote` Action).
  # ---------------------------------------------------------------------------
  release:
    name: Release ${{ inputs.tag_name }}
    if: inputs.event_name == 'workflow_dispatch' && inputs.dispatched_mode == 'release'
    permissions:
      contents: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/release-promote.yml@main
    with:
      source_branch: ${{ inputs.source_branch }}
      target_branch: ${{ inputs.target_branch }}
      allowlist_paths: |
        ${{ inputs.allowlist_paths }}
        ${{ inputs.runtime_artifact_dir }}
      include_dependabot_config: ${{ inputs.include_dependabot_config }}
      include_github_metadata:   ${{ inputs.include_github_metadata }}
      extra_sync_paths:          ${{ inputs.extra_sync_paths }}
      tag_name:                  ${{ inputs.tag_name }}
      commit_message:            ${{ inputs.commit_message }}
      dry_run:                   ${{ inputs.dry_run }}
      release_name:              ${{ inputs.release_name }}
      release_template_path:     ${{ inputs.release_template_path }}
      release_extra_context:     ${{ inputs.release_extra_context }}
      release_draft:             ${{ inputs.release_draft }}
      release_prerelease:        ${{ inputs.release_prerelease }}
      release_make_latest:       ${{ inputs.release_make_latest }}
      release_generate_notes:    ${{ inputs.release_generate_notes }}
      release_files:             ${{ inputs.release_files }}
