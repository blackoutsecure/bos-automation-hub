# Poll an upstream GitHub repo's `latest` release on a schedule via the org's
# reusable workflow. When the version changes, dispatch downstream workflows in
# this repo. A small JSON tracking file is committed so subsequent runs detect
# the next change.
#
# Source: blackoutsecure/platform-automation/.github/workflow-templates/monitor-upstream-release.yml
#
# Required repo configuration:
#   none      Uses the built-in GITHUB_TOKEN for the upstream API read and the
#             local workflow dispatch. No caller-side secrets required.
#
# Edit before use:
#   upstream_repo     Owner/name of the repo whose releases to track.
#   target_workflows  Workflow files in this repo to dispatch on a new release.
name: Monitor upstream release

on:
  schedule:
    # Stagger off :00 to avoid org-wide cron pile-ups.
    - cron: '17 */6 * * *'
  workflow_dispatch:
    inputs:
      force_dispatch:
        description: Dispatch downstream workflows even if upstream is unchanged.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: monitor-upstream-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    uses: blackoutsecure/platform-automation/.github/workflows/monitor-upstream-release.yml@main
    permissions:
      contents: write   # commit the tracking file
      actions:  write   # dispatch the target workflows
    with:
      upstream_repo:    actions/runner
      track_file:       .github/upstream/actions-runner.json
      # One workflow file name per line. Comments and blank lines are ignored.
      target_workflows: |
        publish.yml
        release.yml
      force_dispatch: ${{ github.event_name == 'workflow_dispatch' && inputs.force_dispatch && 'true' || 'false' }}
