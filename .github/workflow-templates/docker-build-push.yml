# Build and push a multi-arch image to Docker Hub via the org's reusable workflow.
#
# Source: blackoutsecure/platform-automation/.github/workflow-templates/docker-build-push.yml
#
# Required repo configuration:
#   vars     IMAGE_NAME           Docker image name (no namespace)
#            DOCKERHUB_NAMESPACE  Docker Hub namespace for the image
#   secrets  DOCKERHUB_USERNAME   Docker Hub user with write access
#            DOCKERHUB_TOKEN      Docker Hub access token (never the password)
#
# Pull requests run a build-only validation; secrets from forks are never exposed.
name: Docker Build and Push

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]
  workflow_dispatch:
    inputs:
      push:
        description: Push to Docker Hub (false = validate only).
        type: boolean
        default: false
      image_version:
        description: 'Version tag (e.g. "1.2.3"). Blank => auto-resolve.'
        type: string
        default: ''
      extra_tags:
        description: Newline-separated extra tags.
        type: string
        default: ''
      latest:
        description: Also tag :latest when pushing.
        type: boolean
        default: true
      multi_arch:
        description: Build linux/amd64 + linux/arm64.
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

jobs:
  docker:
    uses: blackoutsecure/platform-automation/.github/workflows/docker-build-push.yml@main
    with:
      image_name:          ${{ vars.IMAGE_NAME }}
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE }}
      push:                ${{ github.event_name == 'workflow_dispatch' && format('{0}', inputs.push) || '' }}
      image_version:       ${{ inputs.image_version || '' }}
      extra_tags:          ${{ inputs.extra_tags || '' }}
      latest:              ${{ github.event_name != 'workflow_dispatch' || inputs.latest }}
      multi_arch:          ${{ github.event_name != 'workflow_dispatch' || inputs.multi_arch }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
