# Tag-driven release pipeline.
#
# Thin caller for the `release.yml` reusable **meta-workflow** in
# blackoutsecure/platform-automation, which itself orchestrates:
#   1. docker-build-push.yml   — multi-arch image to Docker Hub
#   2. balena-block-publish.yml — publish source tree as a balenaBlock
#   3. github-release.yml       — render notes and create/update the Release
#
# Source: blackoutsecure/platform-automation/.github/workflow-templates/release.yml
#
# Required repo configuration:
#   vars     IMAGE_NAME           Docker image name (no namespace)
#            DOCKERHUB_NAMESPACE  Docker Hub namespace for the image
#            BALENA_BLOCK_NAME    Balena block slug (without namespace)
#            BALENA_NAMESPACE     Balena user/org that owns the block
#   secrets  DOCKERHUB_USERNAME   Docker Hub user with write access
#            DOCKERHUB_TOKEN      Docker Hub access token (never the password)
#            BALENA_API_TOKEN     balenaCloud API token
#
# Disable a stage by setting `docker: false`, `balena: false`, or
# `github_release: false` on the `release` job below.
name: Release (tag-driven)

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+', 'v[0-9]+.[0-9]+.[0-9]+-*']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.2.3).'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    permissions:
      contents: write   # balena sync_balena_yml + GitHub Release publish
    uses: blackoutsecure/platform-automation/.github/workflows/release.yml@main
    with:
      # Empty => meta-workflow auto-resolves from the triggering event.
      # workflow_dispatch must pass the tag through explicitly.
      tag_name:                ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || '' }}
      image_name:              ${{ vars.IMAGE_NAME }}
      dockerhub_namespace:     ${{ vars.DOCKERHUB_NAMESPACE }}
      docker_extra_tags:       sha-${{ github.sha }}
      docker_short_description: ${{ github.event.repository.description }}
      block_name:              ${{ vars.BALENA_BLOCK_NAME }}
      balena_namespace:        ${{ vars.BALENA_NAMESPACE }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}
