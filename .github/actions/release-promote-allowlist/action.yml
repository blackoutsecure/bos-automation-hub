name: Release promote (allowlist)
description: >-
  Promote a curated set of paths from a source branch (typically `dev`)
  to a target branch (typically `main`), tag the target, and push.

  Designed for **GitHub Marketplace Action repos**, where the
  default branch MUST NOT contain any `.github/workflows/*.yml` files
  (Marketplace publishing prerequisite, see
  https://docs.github.com/en/actions/how-tos/create-and-publish-actions/publish-in-github-marketplace).
  This action implements the dev/main split: CI workflows live on the
  source branch, only the curated allowlist makes it to the target
  branch, the target branch is what Marketplace sees.

  The allowlist is enforced strictly:
    * Each entry must match an existing path (file or directory) on
      the source branch — typos fail loudly.
    * `.github/workflows/**` is HARD-BLOCKED — listing such a path
      raises a fatal error, even if the operator explicitly opts in.
      This is the whole point of the action; bypassing it would
      defeat Marketplace compliance.
    * Path traversal (`..`), absolute paths, and unescaped wildcards
      are rejected.

  Mechanics:
    1. Resolve source SHA (HEAD of `source_branch`).
    2. Fetch + reset to `target_branch` (creating it from
       `source_branch` if it does not exist remotely).
    3. Use `git read-tree` + `git checkout-index` to materialize ONLY
       the allowlisted paths at the source-branch tree state, then
       remove anything else on the target tree (so deletions on the
       source branch propagate cleanly).
    4. Stage, commit, tag, push (atomic push of branch + tag).

  Pure git + bash. No third-party actions consumed.

inputs:
  source_branch:
    description: >-
      Branch to promote FROM (e.g. `dev`). Must exist on origin.
    required: true
  target_branch:
    description: >-
      Branch to promote TO (e.g. `main`). Created from `source_branch`
      if it does not exist on origin.
    required: false
    default: 'main'
  allowlist_paths:
    description: >-
      Newline- and/or whitespace-separated list of repo-relative paths
      (files or directories) to copy from `source_branch` to
      `target_branch`. Comments (`# ...`) and blank lines are ignored.

      Marketplace policy on workflow files is enforced as follows:

        * Direct listing of `.github/workflows` or any path under it
          (e.g. `.github/workflows/ci.yml`) is HARD-BLOCKED — the
          operator's intent is rejected with a fatal error.
        * Indirect inclusion via a parent directory (e.g. listing
          bare `.github` to bring across dependabot.yml, CODEOWNERS,
          ISSUE_TEMPLATE/, etc.) is ALLOWED — but the
          `.github/workflows/` subtree is silently stripped from the
          staged tree before the commit. A `::notice` is emitted so
          the operator sees what was filtered.

      Every listed path MUST exist on `source_branch` — typos / stale
      entries fail loudly. (Use `extra_allowlist_paths` for paths
      that may legitimately be absent.)

      Directories are copied recursively (their full subtree from the
      source branch ends up on the target branch, minus
      `.github/workflows/` as above). Files are copied individually.

      Anything on the target branch that is NOT in the merged
      allowlist is REMOVED on this commit. There is no "additive"
      mode.
    required: true
  extra_allowlist_paths:
    description: >-
      Newline-separated list of OPTIONAL paths merged into the
      effective allowlist. Same syntax + validation as
      `allowlist_paths`, BUT entries that don't exist on
      `source_branch` are silently skipped (logged as a notice). Use
      this for paths that may legitimately be absent in some repos —
      e.g. `.github/dependabot.yml`, `.github/CODEOWNERS`,
      `.github/FUNDING.yml`, `.github/SECURITY.md`.

      Subject to the same hard-block on direct `.github/workflows*`
      entries; transitive workflow inclusion via a parent directory
      is silently stripped just like for `allowlist_paths`.
    required: false
    default: ''
  tag_name:
    description: >-
      Tag to create on the new target-branch commit (e.g. `v1.2.3`).
      Must match `^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$`
      (SemVer, optional `v` prefix, optional pre-release suffix).
      Refuses to overwrite an existing tag.
    required: true
  commit_message:
    description: >-
      Commit message for the promotion commit. Must be non-empty,
      single-line. Default: `release: <tag_name>`.
    required: false
    default: ''
  git_user_name:
    description: 'Git author name for the promotion commit.'
    required: false
    default: 'github-actions[bot]'
  git_user_email:
    description: 'Git author email for the promotion commit.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  push_retries:
    description: >-
      Retry attempts for `git push` (1-10). Each retry runs
      `git fetch` + `git reset --hard origin/<target_branch>` and
      re-applies the allowlist on top of the new HEAD.
    required: false
    default: '3'
  dry_run:
    description: >-
      When `true`, performs all validation + staging but does not
      commit, tag, or push. Useful for canary callers.
    required: false
    default: 'false'

outputs:
  target_sha:
    description: >-
      SHA of the new commit on `target_branch` (empty when `dry_run`).
    value: ${{ steps.run.outputs.target_sha }}
  source_sha:
    description: 'SHA on `source_branch` that was promoted.'
    value: ${{ steps.run.outputs.source_sha }}
  tag_name:
    description: 'Resolved tag name (echoed back for caller convenience).'
    value: ${{ steps.run.outputs.tag_name }}
  promoted:
    description: >-
      `true` when a new commit was created and pushed; `false` when
      the target branch already matched the allowlisted source tree
      (no-op) or when `dry_run: true`.
    value: ${{ steps.run.outputs.promoted }}
  removed_paths:
    description: >-
      Newline-separated list of paths that were present on the OLD
      target tree but absent from the NEW target tree (i.e. removed
      by this promotion). Includes any Marketplace-violating files
      that drifted onto the target branch since the last promote
      (workflow files, etc.). Empty when no removals or on `dry_run`.
    value: ${{ steps.run.outputs.removed_paths }}
  removed_violations:
    description: >-
      Newline-separated subset of `removed_paths` that matched known
      Marketplace-prohibited path patterns (currently
      `.github/workflows/**`). Empty when no violations were
      cleaned up. Useful for surfacing "the promote rescued main
      from drift" in the job summary.
    value: ${{ steps.run.outputs.removed_violations }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        SOURCE_BRANCH:         ${{ inputs.source_branch }}
        TARGET_BRANCH:         ${{ inputs.target_branch }}
        ALLOWLIST_PATHS:       ${{ inputs.allowlist_paths }}
        EXTRA_ALLOWLIST_PATHS: ${{ inputs.extra_allowlist_paths }}
        TAG_NAME_INPUT:        ${{ inputs.tag_name }}
        COMMIT_MESSAGE:        ${{ inputs.commit_message }}
        GIT_USER_NAME:   ${{ inputs.git_user_name }}
        GIT_USER_EMAIL:  ${{ inputs.git_user_email }}
        PUSH_RETRIES:    ${{ inputs.push_retries }}
        DRY_RUN:         ${{ inputs.dry_run }}
      run: |
        set -euo pipefail

        die() { echo "::error title=release-promote-allowlist::$*" >&2; exit 1; }

        # ----- Validate scalar inputs ---------------------------------------
        case "${SOURCE_BRANCH}" in
          ''|*$'\n'*|refs/*|*' '*) die "input 'source_branch' is required and must be a bare ref name (got: '${SOURCE_BRANCH}')" ;;
        esac
        case "${TARGET_BRANCH}" in
          ''|*$'\n'*|refs/*|*' '*) die "input 'target_branch' is required and must be a bare ref name (got: '${TARGET_BRANCH}')" ;;
        esac
        if [ "${SOURCE_BRANCH}" = "${TARGET_BRANCH}" ]; then
          die "'source_branch' and 'target_branch' must differ (both: '${SOURCE_BRANCH}')"
        fi

        case "${TAG_NAME_INPUT}" in
          ''|*$'\n'*|*' '*) die "input 'tag_name' is required and must be a single bare tag name (got: '${TAG_NAME_INPUT}')" ;;
        esac
        if ! printf '%s' "${TAG_NAME_INPUT}" \
          | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.+-]+)?$'; then
          die "input 'tag_name' must match SemVer 'vX.Y.Z[-suffix]' (got: '${TAG_NAME_INPUT}')"
        fi

        case "${GIT_USER_NAME}" in
          ''|*$'\n'*) die "input 'git_user_name' is required and must be single-line" ;;
        esac
        case "${GIT_USER_EMAIL}" in
          ''|*$'\n'*) die "input 'git_user_email' is required and must be single-line" ;;
        esac

        case "${PUSH_RETRIES}" in
          ''|*[!0-9]*) die "input 'push_retries' must be an integer 1-10 (got: '${PUSH_RETRIES}')" ;;
        esac
        if [ "${PUSH_RETRIES}" -lt 1 ] || [ "${PUSH_RETRIES}" -gt 10 ]; then
          die "input 'push_retries' must be in 1-10 (got: ${PUSH_RETRIES})"
        fi

        case "${DRY_RUN}" in
          true|false) ;;
          *) die "input 'dry_run' must be 'true' or 'false' (got: '${DRY_RUN}')" ;;
        esac

        COMMIT_MSG="${COMMIT_MESSAGE:-release: ${TAG_NAME_INPUT}}"
        case "${COMMIT_MSG}" in
          *$'\n'*) die "input 'commit_message' must be single-line" ;;
        esac

        # ----- Parse + validate REQUIRED allowlist --------------------------
        ALLOW_LIST=()
        while IFS= read -r raw || [ -n "${raw}" ]; do
          for token in ${raw}; do
            [ -z "${token}" ] && continue
            case "${token}" in
              \#*) continue ;;
              /*) die "allowlist path must be repo-relative, got absolute: '${token}'" ;;
              *..*) die "allowlist path must not contain '..': '${token}'" ;;
              *$'\n'*|*$'\r'*) die "allowlist path contains newline: '${token}'" ;;
              *'*'*|*'?'*|*'['*) die "allowlist path must not contain glob characters (\\*, ?, [): '${token}'" ;;
            esac
            # Strip any trailing slash for normalization.
            token="${token%/}"
            ALLOW_LIST+=("${token}")
          done
        done <<< "${ALLOWLIST_PATHS}"

        if [ "${#ALLOW_LIST[@]}" -eq 0 ]; then
          die "input 'allowlist_paths' resolved to zero paths"
        fi

        # ----- Parse + validate OPTIONAL extra allowlist --------------------
        # Same syntax as `allowlist_paths` but entries that don't
        # resolve on source_branch are silently skipped (logged as
        # notices). Use case: opt-in toggles in release-promote.yml
        # that include files which not every repo carries
        # (`.github/dependabot.yml`, `.github/CODEOWNERS`, etc.).
        EXTRA_LIST=()
        if [ -n "${EXTRA_ALLOWLIST_PATHS}" ]; then
          while IFS= read -r raw || [ -n "${raw}" ]; do
            for token in ${raw}; do
              [ -z "${token}" ] && continue
              case "${token}" in
                \#*) continue ;;
                /*) die "extra_allowlist path must be repo-relative, got absolute: '${token}'" ;;
                *..*) die "extra_allowlist path must not contain '..': '${token}'" ;;
                *$'\n'*|*$'\r'*) die "extra_allowlist path contains newline: '${token}'" ;;
                *'*'*|*'?'*|*'['*) die "extra_allowlist path must not contain glob characters (\\*, ?, [): '${token}'" ;;
              esac
              token="${token%/}"
              EXTRA_LIST+=("${token}")
            done
          done <<< "${EXTRA_ALLOWLIST_PATHS}"
        fi

        # ----- Hard block: explicit `.github/workflows*` entries ------------
        # Only DIRECT listing of the workflows path (or files under
        # it) is rejected. The operator's intent to publish a workflow
        # file is unambiguous and must fail loudly — silently dropping
        # would mask the bug.
        #
        # Indirect inclusion via a parent directory (e.g. listing
        # bare `.github` to bring across dependabot.yml + CODEOWNERS
        # + ISSUE_TEMPLATE) is intentionally NOT blocked here —
        # `promote_into_worktree()` strips the workflows subtree
        # post-checkout so the parent-directory pattern stays
        # ergonomic.
        check_blocked() {
          local p="$1"
          case "${p}" in
            .github/workflows|.github/workflows/*)
              die "allowlist contains '${p}' under '.github/workflows/', which is hard-blocked. GitHub Marketplace publishing requires the default branch contain no workflow files. (To bring across other '.github/*' files via a parent directory, list bare '.github' instead — the workflows subtree is auto-stripped.)"
              ;;
          esac
        }
        for p in "${ALLOW_LIST[@]}"; do check_blocked "${p}"; done
        for p in "${EXTRA_LIST[@]}"; do check_blocked "${p}"; done

        # ----- Configure git ------------------------------------------------
        git config user.name  "${GIT_USER_NAME}"
        git config user.email "${GIT_USER_EMAIL}"

        # We need full history + both branches.
        git fetch --no-tags --prune origin \
          "+refs/heads/${SOURCE_BRANCH}:refs/remotes/origin/${SOURCE_BRANCH}" || \
          die "failed to fetch source_branch '${SOURCE_BRANCH}' from origin"

        # Target branch may not exist yet on first release — that's fine,
        # we'll create it locally from the source tree.
        TARGET_EXISTS=true
        if ! git fetch --no-tags --prune origin \
              "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" 2>/dev/null; then
          TARGET_EXISTS=false
          echo "Notice: target_branch '${TARGET_BRANCH}' does not exist on origin; will create it."
        fi

        # Refuse to clobber an existing tag.
        if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME_INPUT}" >/dev/null 2>&1; then
          die "tag '${TAG_NAME_INPUT}' already exists on origin; refusing to overwrite. Cut a new tag instead."
        fi

        SOURCE_SHA="$(git rev-parse "refs/remotes/origin/${SOURCE_BRANCH}")"

        # ----- Validate every REQUIRED allowlist path exists on source ------
        for p in "${ALLOW_LIST[@]}"; do
          if ! git cat-file -e "${SOURCE_SHA}:${p}" 2>/dev/null; then
            die "allowlist entry '${p}' does not exist on source_branch '${SOURCE_BRANCH}' (SHA: ${SOURCE_SHA})"
          fi
        done

        # ----- Filter EXTRA allowlist: keep only paths that exist -----------
        # Missing paths are silently skipped (logged as a notice) so
        # opt-in toggles work uniformly across repos that have / don't
        # have an optional file.
        EXTRA_PRESENT=()
        for p in "${EXTRA_LIST[@]}"; do
          if git cat-file -e "${SOURCE_SHA}:${p}" 2>/dev/null; then
            EXTRA_PRESENT+=("${p}")
          else
            echo "::notice title=release-promote-allowlist::extra_allowlist_paths entry '${p}' not found on source_branch '${SOURCE_BRANCH}' — skipping (extra allowlist paths are optional)."
          fi
        done

        # ----- Merge required + optional into final allowlist ---------------
        # De-duplicate so an entry listed in both inputs is processed
        # once. Preserves order: required first, then extras.
        MERGED_ALLOW=()
        declare -A SEEN_ALLOW=()
        for p in "${ALLOW_LIST[@]}" "${EXTRA_PRESENT[@]}"; do
          if [ -z "${SEEN_ALLOW[${p}]:-}" ]; then
            MERGED_ALLOW+=("${p}")
            SEEN_ALLOW["${p}"]=1
          fi
        done
        echo "Effective allowlist (${#MERGED_ALLOW[@]} paths):"
        printf '  - %s\n' "${MERGED_ALLOW[@]}"

        # ----- Promote: build the target tree from the allowlist ------------
        # Strategy: do everything via plumbing on a worktree so the caller's
        # checkout is unaffected. We materialize a fresh worktree at
        # target_branch (or initialize a new branch from an empty tree if
        # target does not exist), then `git rm -r` everything, then
        # `git checkout` allowlisted paths from source.
        WORKTREE_DIR="$(mktemp -d -t promote-XXXXXXXX)"
        trap 'git worktree remove --force "${WORKTREE_DIR}" 2>/dev/null || true; rm -rf "${WORKTREE_DIR}"' EXIT

        if [ "${TARGET_EXISTS}" = "true" ]; then
          git worktree add --force -B "${TARGET_BRANCH}" \
            "${WORKTREE_DIR}" "refs/remotes/origin/${TARGET_BRANCH}"
        else
          # No remote target yet — create the branch from the source-branch
          # parent so the first promotion has a meaningful first-parent.
          git worktree add --force -B "${TARGET_BRANCH}" \
            "${WORKTREE_DIR}" "${SOURCE_SHA}"
        fi

        # Scratch files used across promote attempts to track what was
        # removed from the OLD target tree (for `removed_paths` output)
        # and which removals were Marketplace policy violations cleaned
        # up by this promote (for `removed_violations` output).
        OLD_TREE_LIST="$(mktemp -t old-tree-XXXXXX.txt)"
        NEW_TREE_LIST="$(mktemp -t new-tree-XXXXXX.txt)"
        REMOVED_LIST="$(mktemp -t removed-XXXXXX.txt)"
        # shellcheck disable=SC2064
        trap "git worktree remove --force '${WORKTREE_DIR}' 2>/dev/null || true; rm -rf '${WORKTREE_DIR}' '${OLD_TREE_LIST}' '${NEW_TREE_LIST}' '${REMOVED_LIST}'" EXIT

        promote_into_worktree() {
          local sha="$1"

          # ----- Snapshot OLD target tree (pre-wipe) ----------------------
          # Captured per-attempt: on retries the target tip moves and
          # we want to report removals relative to the LATEST tip we
          # promoted on top of, not the original.
          ( cd "${WORKTREE_DIR}" && git ls-files ) > "${OLD_TREE_LIST}"

          (
            cd "${WORKTREE_DIR}"
            # Wipe everything tracked. `git rm -r` only removes files git
            # knows about, so untracked debris (shouldn't be any in a
            # fresh worktree) is untouched.
            if [ -n "$(git ls-files)" ]; then
              git ls-files -z | xargs -0 git rm -f -q --
            fi
            # Materialize allowlisted paths from the source SHA into the
            # worktree's index + working tree.
            for path in "${MERGED_ALLOW[@]}"; do
              # `git checkout <sha> -- <path>` reads the path from <sha>
              # into the index and the working tree, recursively for
              # directories.
              git checkout "${sha}" -- "${path}"
            done

            # ----- Strip `.github/workflows/` if pulled in transitively ----
            # Operators may legitimately list a parent directory (most
            # commonly bare `.github`) to bring across dependabot.yml,
            # CODEOWNERS, ISSUE_TEMPLATE/, etc. without enumerating
            # each file. Marketplace publishing prohibits ANY workflow
            # file on the default branch, so we silently strip the
            # subtree from both the working tree and the index before
            # the commit happens.
            #
            # Direct listing of `.github/workflows*` paths is rejected
            # earlier by `check_blocked()` — this only handles the
            # implicit / transitive case.
            if [ -e .github/workflows ]; then
              STRIPPED="$(git ls-files -- '.github/workflows' '.github/workflows/*' 2>/dev/null || true)"
              if [ -n "${STRIPPED}" ]; then
                echo "::notice title=release-promote-allowlist::Stripping '.github/workflows/' from staged tree (pulled in transitively via a parent directory in the allowlist; Marketplace publishing prohibits workflow files on the default branch):"
                printf '  - %s\n' ${STRIPPED}
                git rm -rf --quiet --ignore-unmatch -- .github/workflows >/dev/null 2>&1 || true
              fi
              # Belt-and-braces: ensure the directory is gone from
              # the worktree even if the index removal raced.
              rm -rf .github/workflows
            fi

            git add -A
          )

          # ----- Compliance verification (defense-in-depth) -------------
          # The merged allowlist excludes workflow files by
          # construction, but a recursive directory checkout could
          # theoretically pull them in if a future operator extended
          # the hard-block surface incorrectly. Verify the STAGED tree
          # contains zero Marketplace-violating paths before we let
          # the commit happen.
          STAGED_VIOLATIONS="$(
            cd "${WORKTREE_DIR}" && \
            git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml' || true
          )"
          if [ -n "${STAGED_VIOLATIONS}" ]; then
            echo "::error title=release-promote-allowlist::compliance verification FAILED — staged tree contains Marketplace-violating files:" >&2
            printf '  %s\n' ${STAGED_VIOLATIONS} >&2
            die "staged tree would publish workflow files to target_branch '${TARGET_BRANCH}'. This is a bug in this action — file an issue. Refusing to commit."
          fi

          # ----- Compute removed paths (OLD - NEW) ----------------------
          # Always recomputed per attempt so retries report against the
          # latest target tip.
          ( cd "${WORKTREE_DIR}" && git ls-files ) > "${NEW_TREE_LIST}"
          comm -23 <(sort -u "${OLD_TREE_LIST}") <(sort -u "${NEW_TREE_LIST}") > "${REMOVED_LIST}"
          if [ -s "${REMOVED_LIST}" ]; then
            echo "Files removed from target tree by this promote ($(wc -l < "${REMOVED_LIST}" | tr -d ' ')):"
            sed 's/^/  - /' "${REMOVED_LIST}"
          fi
        }

        # Helper to read REMOVED_LIST + compute the violations subset,
        # writing both as multi-line `GITHUB_OUTPUT` blocks. Called
        # from each of the three exit paths (no-op, dry-run, success).
        emit_removal_outputs() {
          local violations=''
          if [ -s "${REMOVED_LIST}" ]; then
            violations="$(grep -E '^\.github/workflows/' "${REMOVED_LIST}" || true)"
          fi
          {
            echo 'removed_paths<<__END_REMOVED__'
            if [ -s "${REMOVED_LIST}" ]; then
              cat "${REMOVED_LIST}"
            fi
            echo '__END_REMOVED__'
            echo 'removed_violations<<__END_VIOLATIONS__'
            if [ -n "${violations}" ]; then
              printf '%s\n' "${violations}"
            fi
            echo '__END_VIOLATIONS__'
          } >> "${GITHUB_OUTPUT}"

          if [ -n "${violations}" ]; then
            echo "::warning title=release-promote-allowlist::Marketplace-violating files were present on '${TARGET_BRANCH}' and have been removed by this promote:"
            printf '  - %s\n' ${violations}
          fi
        }

        promote_into_worktree "${SOURCE_SHA}"

        # ----- Detect no-op -------------------------------------------------
        if ( cd "${WORKTREE_DIR}" && git diff --cached --quiet ); then
          echo "Target branch '${TARGET_BRANCH}' already matches the allowlisted source tree; nothing to promote."
          {
            echo "promoted=false"
            echo "target_sha="
            echo "source_sha=${SOURCE_SHA}"
            echo "tag_name=${TAG_NAME_INPUT}"
          } >> "${GITHUB_OUTPUT}"
          emit_removal_outputs
          exit 0
        fi

        if [ "${DRY_RUN}" = "true" ]; then
          echo "dry_run=true; staged diff (not committing):"
          ( cd "${WORKTREE_DIR}" && git diff --cached --stat )
          {
            echo "promoted=false"
            echo "target_sha="
            echo "source_sha=${SOURCE_SHA}"
            echo "tag_name=${TAG_NAME_INPUT}"
          } >> "${GITHUB_OUTPUT}"
          emit_removal_outputs
          exit 0
        fi

        # ----- Commit + tag + push (with retry on race) ---------------------
        # Each retry: re-fetch target, re-apply allowlist, recommit, retag.
        attempt=1
        while :; do
          (
            cd "${WORKTREE_DIR}"
            git commit -m "${COMMIT_MSG}"
            git tag -a "${TAG_NAME_INPUT}" -m "${COMMIT_MSG}"
          )

          # Atomic push: branch + tag together. If either ref-update fails
          # (e.g. someone else pushed), atomic guarantees neither is
          # applied, so retry logic stays clean.
          if (
            cd "${WORKTREE_DIR}"
            git push --atomic origin \
              "HEAD:refs/heads/${TARGET_BRANCH}" \
              "refs/tags/${TAG_NAME_INPUT}"
          ); then
            TARGET_SHA="$( cd "${WORKTREE_DIR}" && git rev-parse HEAD )"
            echo "Promoted ${SOURCE_SHA:0:12} -> ${TARGET_BRANCH}@${TARGET_SHA:0:12}, tagged ${TAG_NAME_INPUT} (attempt ${attempt})."
            {
              echo "promoted=true"
              echo "target_sha=${TARGET_SHA}"
              echo "source_sha=${SOURCE_SHA}"
              echo "tag_name=${TAG_NAME_INPUT}"
            } >> "${GITHUB_OUTPUT}"
            emit_removal_outputs
            exit 0
          fi

          if [ "${attempt}" -ge "${PUSH_RETRIES}" ]; then
            die "git push failed after ${PUSH_RETRIES} attempts"
          fi

          echo "Push attempt ${attempt}/${PUSH_RETRIES} failed; refreshing target_branch and retrying..."
          attempt=$((attempt + 1))

          # Refresh: re-fetch, reset the worktree to the new tip, replay.
          # Also re-check that the tag has not been claimed since the last
          # check (someone else racing the same release version).
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME_INPUT}" >/dev/null 2>&1; then
            die "tag '${TAG_NAME_INPUT}' was created on origin during retry; refusing to overwrite"
          fi

          git fetch --no-tags --prune origin \
            "+refs/heads/${TARGET_BRANCH}:refs/remotes/origin/${TARGET_BRANCH}" || \
            die "retry: failed to refetch target_branch"

          (
            cd "${WORKTREE_DIR}"
            # Drop the in-progress commit + local tag, hard-reset to new tip.
            git tag -d "${TAG_NAME_INPUT}" >/dev/null
            git reset --hard "refs/remotes/origin/${TARGET_BRANCH}"
          )
          promote_into_worktree "${SOURCE_SHA}"
        done
