name: Marketplace repo guard
description: >-
  Check that the current ref / PR diff complies with GitHub Marketplace
  Action publishing requirements.

  Marketplace publishing requires the default branch contain NO
  `.github/workflows/*.yml` files (see
  https://docs.github.com/en/actions/how-tos/create-and-publish-actions/publish-in-github-marketplace).

  Five checks (each independently togglable):

    1. **PR diff (added paths)** — when `pr_base_sha` and `pr_head_sha`
       are set, fail if any path under `blocked_paths` is added or
       modified in the diff. This is the primary defense for PRs from
       dev -> main: it stops the bad state from reaching main BEFORE
       merge.

    2. **PR diff (removed required paths)** — when `required_paths`
       is non-empty AND both SHAs are set, fail if the PR diff
       DELETES any required path. Catches the inverse regression
       (e.g. someone removes `.github/dependabot.yml` from `dev`,
       which would silently break Dependabot once the next release
       propagates the deletion to `main`).

    3. **Tree state on the current ref (blocked)** — fail if any
       `blocked_paths` entry is currently tracked at the working
       tree's HEAD. This is the post-merge check (also runs on direct
       pushes to the protected branch).

    4. **Tree state on the current ref (required)** — fail if any
       `required_paths` entry is currently absent from the working
       tree's HEAD. Catches drift on the protected branch (e.g. main
       lost `.github/dependabot.yml` somehow — the guard tells you
       on the next PR).

    5. **action.yml presence** — verify that `action.yml` or
       `action.yaml` exists at the repo root, since this action is
       only meaningful for Marketplace Action repos. Disabled by
       default; opt in with `require_action_yml: 'true'`.

  Pure git + bash. No third-party actions consumed.

inputs:
  pr_base_sha:
    description: >-
      PR base SHA. When BOTH `pr_base_sha` and `pr_head_sha` are set,
      the PR-diff check runs. Caller passes
      `github.event.pull_request.base.sha`.
    required: false
    default: ''
  pr_head_sha:
    description: >-
      PR head SHA. When BOTH are set, the PR-diff check runs. Caller
      passes `github.event.pull_request.head.sha`.
    required: false
    default: ''
  check_pr_diff:
    description: '`true` to run the PR-diff check (requires both SHAs).'
    required: false
    default: 'true'
  check_tree_state:
    description: '`true` to run the tree-state check on the current ref.'
    required: false
    default: 'true'
  require_action_yml:
    description: '`true` to require `action.yml` (or `.yaml`) at the repo root.'
    required: false
    default: 'false'
  blocked_paths:
    description: >-
      Newline-separated git pathspec patterns that may not be added or
      modified. Defaults to the Marketplace prohibition
      (`.github/workflows/`). Operators can extend with extra paths
      (e.g. legacy `.travis.yml`) but the default is the minimum.
    required: false
    default: '.github/workflows/'
  required_paths:
    description: >-
      Newline-separated repo-relative paths that MUST exist on the
      protected branch AND must not be deleted by an incoming PR.
      Symmetric inverse of `blocked_paths`.

      Use this to protect files that downstream platform integrations
      rely on being present on the default branch — most notably
      `.github/dependabot.yml`, since Dependabot reads its config
      ONLY from the default branch (a `dev`-only `dependabot.yml` is
      silently ignored). Common entries:

        * `.github/dependabot.yml`
        * `action.yml` (already covered by `require_action_yml` —
          listing it here also catches PRs that DELETE it)
        * `LICENSE` — required by Marketplace policy
        * `README.md` — appears on the Marketplace listing

      Default empty (opt-in). When non-empty, both the PR-diff
      removal check AND the tree-state presence check run. Each path
      is validated for shape (repo-relative, no `..`, no newlines).
    required: false
    default: ''

outputs:
  violations:
    description: 'Newline-separated list of paths that violated the policy (empty when clean).'
    value: ${{ steps.run.outputs.violations }}
  missing_required:
    description: >-
      Newline-separated list of `required_paths` entries absent from
      the current ref's tree (empty when clean or when
      `required_paths` is empty).
    value: ${{ steps.run.outputs.missing_required }}
  removed_required:
    description: >-
      Newline-separated list of `required_paths` entries that the PR
      diff DELETES (empty when clean or when no PR-diff check ran).
    value: ${{ steps.run.outputs.removed_required }}
  pr_diff_checked:
    description: '`true` when the PR-diff check ran.'
    value: ${{ steps.run.outputs.pr_diff_checked }}
  tree_checked:
    description: '`true` when the tree-state check ran.'
    value: ${{ steps.run.outputs.tree_checked }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        PR_BASE_SHA:        ${{ inputs.pr_base_sha }}
        PR_HEAD_SHA:        ${{ inputs.pr_head_sha }}
        CHECK_PR_DIFF:      ${{ inputs.check_pr_diff }}
        CHECK_TREE_STATE:   ${{ inputs.check_tree_state }}
        REQUIRE_ACTION_YML: ${{ inputs.require_action_yml }}
        BLOCKED_PATHS:      ${{ inputs.blocked_paths }}
        REQUIRED_PATHS:     ${{ inputs.required_paths }}
      run: |
        set -euo pipefail

        die() { echo "::error title=Marketplace guard::$*" >&2; exit 1; }

        # ----- Validate booleans -------------------------------------------
        for var_name in CHECK_PR_DIFF CHECK_TREE_STATE REQUIRE_ACTION_YML; do
          val="${!var_name}"
          case "${val}" in
            true|false) ;;
            *) die "input ${var_name,,} must be 'true' or 'false' (got: '${val}')" ;;
          esac
        done

        # ----- Parse blocked paths -----------------------------------------
        BLOCKED=()
        while IFS= read -r raw || [ -n "${raw}" ]; do
          for token in ${raw}; do
            [ -z "${token}" ] && continue
            case "${token}" in
              \#*) continue ;;
              /*) die "blocked path must be repo-relative, got absolute: '${token}'" ;;
              *..*) die "blocked path must not contain '..': '${token}'" ;;
            esac
            BLOCKED+=("${token}")
          done
        done <<< "${BLOCKED_PATHS}"

        if [ "${#BLOCKED[@]}" -eq 0 ]; then
          die "input 'blocked_paths' resolved to zero paths"
        fi

        # ----- Parse required paths (optional) -----------------------------
        # Same validation as blocked_paths but empty is allowed (the
        # required-paths checks are opt-in by populating this input).
        REQUIRED=()
        if [ -n "${REQUIRED_PATHS}" ]; then
          while IFS= read -r raw || [ -n "${raw}" ]; do
            for token in ${raw}; do
              [ -z "${token}" ] && continue
              case "${token}" in
                \#*) continue ;;
                /*) die "required path must be repo-relative, got absolute: '${token}'" ;;
                *..*) die "required path must not contain '..': '${token}'" ;;
                *$'\n'*|*$'\r'*) die "required path contains newline: '${token}'" ;;
              esac
              REQUIRED+=("${token}")
            done
          done <<< "${REQUIRED_PATHS}"
        fi

        VIOLATIONS=()
        MISSING_REQUIRED=()
        REMOVED_REQUIRED=()
        PR_CHECKED="false"
        TREE_CHECKED="false"

        # ----- action.yml presence ------------------------------------------
        if [ "${REQUIRE_ACTION_YML}" = "true" ]; then
          if [ ! -f action.yml ] && [ ! -f action.yaml ]; then
            die "require_action_yml=true but no 'action.yml' or 'action.yaml' at repo root. This guard is only meaningful for Marketplace Action repos."
          fi
          echo "action.yml present at repo root - ok"
        fi

        # ----- PR diff check -----------------------------------------------
        # Inspect the diff between base and head; fail if any blocked
        # pathspec is added or modified. `--diff-filter=AM` excludes
        # deletions (removing a workflow file is FINE — it brings the
        # repo INTO compliance).
        if [ "${CHECK_PR_DIFF}" = "true" ] && [ -n "${PR_BASE_SHA}" ] && [ -n "${PR_HEAD_SHA}" ]; then
          PR_CHECKED="true"

          # Ensure both SHAs are present locally. `actions/checkout`
          # with default `fetch-depth: 1` may not have the base — fetch
          # it explicitly if not already present.
          for sha in "${PR_BASE_SHA}" "${PR_HEAD_SHA}"; do
            if ! git cat-file -e "${sha}^{commit}" 2>/dev/null; then
              echo "Fetching ${sha} (not present locally)..."
              git fetch --no-tags --depth=200 origin "${sha}" || \
                die "failed to fetch PR SHA ${sha} (try increasing fetch-depth in actions/checkout)"
            fi
          done

          # Build `--` pathspec args from BLOCKED.
          set -- --
          for p in "${BLOCKED[@]}"; do
            set -- "$@" "${p}"
          done

          # `diff --name-only --diff-filter=AM` against the two SHAs.
          # We use the symmetric three-dot range so the base is the
          # merge-base, not the literal base — matches GitHub's PR
          # diff semantics.
          while IFS= read -r changed_path; do
            [ -z "${changed_path}" ] && continue
            VIOLATIONS+=("${changed_path}")
          done < <(git diff --name-only --diff-filter=AM \
                     "${PR_BASE_SHA}...${PR_HEAD_SHA}" "$@" || true)

          if [ "${#VIOLATIONS[@]}" -gt 0 ]; then
            echo "::error title=Marketplace guard::PR adds or modifies files in blocked paths:"
            for v in "${VIOLATIONS[@]}"; do
              echo "::error file=${v}::Marketplace publishing prohibits this path on the default branch. Move CI workflow files to your source branch (e.g. dev) and use 'release-promote.yml' to publish."
            done
          else
            echo "PR diff check (blocked) - ok (no blocked paths added or modified)"
          fi

          # ----- PR diff (removed required paths) ------------------------
          # Inverse direction: fail if the PR diff DELETES a path the
          # protected branch needs to keep. `--diff-filter=D` returns
          # only deletions.
          if [ "${#REQUIRED[@]}" -gt 0 ]; then
            set -- --
            for p in "${REQUIRED[@]}"; do
              set -- "$@" "${p}"
            done

            while IFS= read -r removed_path; do
              [ -z "${removed_path}" ] && continue
              REMOVED_REQUIRED+=("${removed_path}")
            done < <(git diff --name-only --diff-filter=D \
                       "${PR_BASE_SHA}...${PR_HEAD_SHA}" "$@" || true)

            if [ "${#REMOVED_REQUIRED[@]}" -gt 0 ]; then
              echo "::error title=Marketplace guard::PR removes required paths:"
              for v in "${REMOVED_REQUIRED[@]}"; do
                echo "::error file=${v}::This path is in required_paths — removing it from the source branch would cascade to the default branch on the next promote, silently breaking downstream integrations (e.g. Dependabot for '.github/dependabot.yml'). Restore the file or remove the path from required_paths if the deletion is intentional."
              done
            else
              echo "PR diff check (required) - ok (no required paths deleted)"
            fi
          fi
        fi

        # ----- Tree state check --------------------------------------------
        # Inspect the current HEAD tree. Fails if ANY blocked path is
        # present, even if untouched by the most recent commit.
        if [ "${CHECK_TREE_STATE}" = "true" ]; then
          TREE_CHECKED="true"

          # Build `--` pathspec args from BLOCKED.
          set -- --
          for p in "${BLOCKED[@]}"; do
            set -- "$@" "${p}"
          done

          TREE_HITS=()
          while IFS= read -r tracked_path; do
            [ -z "${tracked_path}" ] && continue
            TREE_HITS+=("${tracked_path}")
          done < <(git ls-files "$@" || true)

          if [ "${#TREE_HITS[@]}" -gt 0 ]; then
            echo "::error title=Marketplace guard::Tracked files in blocked paths on current ref:"
            for v in "${TREE_HITS[@]}"; do
              echo "::error file=${v}::Marketplace publishing prohibits this path on the default branch."
              VIOLATIONS+=("${v}")
            done
          else
            echo "Tree state check (blocked) - ok (no blocked paths tracked)"
          fi

          # ----- Tree state: required paths must EXIST -------------------
          # For each required path, check whether ls-files returns at
          # least one tracked file under it. Files and directories
          # both work: pathspec `foo` matches a tracked file named
          # `foo` OR any tracked file under directory `foo/`.
          if [ "${#REQUIRED[@]}" -gt 0 ]; then
            for p in "${REQUIRED[@]}"; do
              if [ -z "$(git ls-files -- "${p}" 2>/dev/null)" ]; then
                MISSING_REQUIRED+=("${p}")
              fi
            done
            if [ "${#MISSING_REQUIRED[@]}" -gt 0 ]; then
              echo "::error title=Marketplace guard::Required paths missing from current ref:"
              for v in "${MISSING_REQUIRED[@]}"; do
                echo "::error::Required path '${v}' is absent from the current ref's tree. This file MUST exist on the protected branch — add it via your normal release workflow (e.g. enable the relevant include_* toggle on release-promote.yml so the next promote auto-syncs it)."
              done
            else
              echo "Tree state check (required) - ok (all required paths present)"
            fi
          fi
        fi

        # ----- Emit outputs + final verdict --------------------------------
        # De-duplicate violations (PR diff + tree state may overlap).
        TOTAL_FAILURES=0
        if [ "${#VIOLATIONS[@]}" -gt 0 ]; then
          # shellcheck disable=SC2207
          UNIQUE=($(printf '%s\n' "${VIOLATIONS[@]}" | sort -u))
          {
            echo 'violations<<__END_VIOLATIONS__'
            printf '%s\n' "${UNIQUE[@]}"
            echo '__END_VIOLATIONS__'
          } >> "${GITHUB_OUTPUT}"
          TOTAL_FAILURES=$((TOTAL_FAILURES + ${#UNIQUE[@]}))
        else
          echo 'violations=' >> "${GITHUB_OUTPUT}"
        fi

        if [ "${#MISSING_REQUIRED[@]}" -gt 0 ]; then
          # shellcheck disable=SC2207
          UNIQ_MISSING=($(printf '%s\n' "${MISSING_REQUIRED[@]}" | sort -u))
          {
            echo 'missing_required<<__END_MISSING__'
            printf '%s\n' "${UNIQ_MISSING[@]}"
            echo '__END_MISSING__'
          } >> "${GITHUB_OUTPUT}"
          TOTAL_FAILURES=$((TOTAL_FAILURES + ${#UNIQ_MISSING[@]}))
        else
          echo 'missing_required=' >> "${GITHUB_OUTPUT}"
        fi

        if [ "${#REMOVED_REQUIRED[@]}" -gt 0 ]; then
          # shellcheck disable=SC2207
          UNIQ_REMOVED=($(printf '%s\n' "${REMOVED_REQUIRED[@]}" | sort -u))
          {
            echo 'removed_required<<__END_REMOVED__'
            printf '%s\n' "${UNIQ_REMOVED[@]}"
            echo '__END_REMOVED__'
          } >> "${GITHUB_OUTPUT}"
          TOTAL_FAILURES=$((TOTAL_FAILURES + ${#UNIQ_REMOVED[@]}))
        else
          echo 'removed_required=' >> "${GITHUB_OUTPUT}"
        fi

        {
          echo "pr_diff_checked=${PR_CHECKED}"
          echo "tree_checked=${TREE_CHECKED}"
        } >> "${GITHUB_OUTPUT}"

        if [ "${TOTAL_FAILURES}" -gt 0 ]; then
          echo ""
          echo "Marketplace guard: FAIL — ${TOTAL_FAILURES} issue(s)."
          echo "How to fix:"
          echo "  * Blocked paths: move CI workflow files to your source branch (e.g. 'dev')."
          echo "    Use 'release-promote.yml' to publish without including them on the default branch."
          echo "  * Missing required paths: add them on the source branch and enable the"
          echo "    relevant include_* toggle on release-promote.yml (e.g."
          echo "    'include_dependabot_config: true') so the next promote auto-syncs them."
          echo "  * Removed required paths in PR: restore the file, or remove the path from"
          echo "    'required_paths' if the deletion is intentional."
          echo "  * See README 'Marketplace Action repo enrollment' for the full workflow."
          exit 1
        fi

        echo "Marketplace guard: OK."
