name: Purge Cloudflare zone cache
description: >-
  Purge the entire edge cache for a Cloudflare zone via
  `POST /zones/{zone_id}/purge_cache` with `{"purge_everything":true}`.
  The zone ID is resolved via
  [`cloudflare-zone-resolve-id`](../cloudflare-zone-resolve-id/action.yml)
  — it can be supplied explicitly, or auto-resolved from a `site_url`
  via `GET /zones?name=<apex>` so callers don't have to store the
  zone ID as a secret. Surfaces the API response body (never the
  token) for forensics.

inputs:
  zone_id:
    description: >-
      Cloudflare zone ID (32-char lowercase hex). Optional — when
      empty, the action falls back to `fallback_zone_id`, then
      auto-resolves from `site_url` via the Cloudflare API.
      Forwarded to `cloudflare-zone-resolve-id`.
    required: false
    default: ''
  fallback_zone_id:
    description: >-
      Optional secondary source (e.g. for callers that historically
      stored the value under a different secret name). Used only when
      `zone_id` is empty. Forwarded to `cloudflare-zone-resolve-id`.
    required: false
    default: ''
  site_url:
    description: >-
      Public site URL (e.g. `https://example.com`). When both
      `zone_id` and `fallback_zone_id` are empty, the apex hostname
      is derived from this URL and looked up via
      `GET /zones?name=<apex>` using `api_token`. The token must
      additionally carry `Zone → Zone → Read` for the auto-resolve
      path to work (the explicit-ID path needs only `Cache Purge`).
      Forwarded to `cloudflare-zone-resolve-id`.
    required: false
    default: ''
  api_token:
    description: >-
      Cloudflare API token with `Zone → Cache Purge → Purge` permission
      on the target zone. When auto-resolving via `site_url`, the token
      must also carry `Zone → Zone → Read`. The token from
      `secrets.CLOUDFLARE_API_TOKEN` can be reused if the same token
      also carries the Pages:Edit scope.
    required: true
  mask_zone_id:
    description: >-
      When `true` (default) the resolved zone ID is registered with
      `::add-mask::` so it never appears verbatim in subsequent logs.
      Defaulted on as cheap defense-in-depth; the resolved value
      itself is not stored as a secret anywhere when auto-resolved.
      Forwarded to `cloudflare-zone-resolve-id` as `mask`.
    required: false
    default: 'true'

outputs:
  purged:
    description: '`true` when the API returned `success`.'
    value: ${{ steps.purge.outputs.purged }}
  zone_id:
    description: 'Resolved, validated 32-char lowercase hex zone ID.'
    value: ${{ steps.resolve.outputs.value }}
  http_code:
    description: 'HTTP status code returned by the Cloudflare API.'
    value: ${{ steps.purge.outputs.http_code }}

runs:
  using: composite
  steps:
    - name: Resolve zone ID
      id: resolve
      uses: blackoutsecure/bos-automation-hub/.github/actions/cloudflare-zone-resolve-id@main
      with:
        zone_id:          ${{ inputs.zone_id }}
        fallback_zone_id: ${{ inputs.fallback_zone_id }}
        site_url:         ${{ inputs.site_url }}
        api_token:        ${{ inputs.api_token }}
        mask:             ${{ inputs.mask_zone_id }}

    - name: Purge zone cache
      id: purge
      shell: bash
      env:
        ZONE_ID: ${{ steps.resolve.outputs.value }}
        API_TOKEN: ${{ inputs.api_token }}
      run: |
        set -euo pipefail

        # A stray newline in a secret silently truncates GITHUB_OUTPUT
        # for any downstream step, so reject it explicitly.
        if [ -z "${API_TOKEN}" ]; then
          echo "ERROR: api_token is empty" >&2
          exit 1
        fi
        case "${API_TOKEN}" in
          *[$'\n\r\t ']*)
            echo "ERROR: api_token contains whitespace/newlines" >&2
            exit 1
            ;;
        esac

        BODY_FILE="$(mktemp)"
        trap 'rm -f "${BODY_FILE}"' EXIT

        # `--data` body is a fixed literal — no user input is interpolated
        # into it, so no shell-injection surface. The token is sent via
        # an Authorization header and is never echoed to the log.
        HTTP_CODE="$(curl --silent --show-error --location \
          --request POST \
          --url "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/purge_cache" \
          --header "Authorization: Bearer ${API_TOKEN}" \
          --header 'Content-Type: application/json' \
          --data '{"purge_everything":true}' \
          --output "${BODY_FILE}" \
          --write-out '%{http_code}')"

        echo "HTTP ${HTTP_CODE}"
        # The API response body contains the purge ID and any error
        # details — useful for debugging and safe to surface (no token).
        cat "${BODY_FILE}"
        echo

        echo "http_code=${HTTP_CODE}" >> "${GITHUB_OUTPUT}"

        if [ "${HTTP_CODE}" != "200" ]; then
          echo "ERROR: Cloudflare API returned HTTP ${HTTP_CODE}" >&2
          echo "purged=false" >> "${GITHUB_OUTPUT}"
          exit 1
        fi

        # Body shape on success:
        #   {"result":{"id":"..."}, "success":true, "errors":[], "messages":[]}
        # Use grep instead of jq to keep this action runnable on
        # minimalist self-hosted runners.
        if ! grep -Eq '"success"[[:space:]]*:[[:space:]]*true' "${BODY_FILE}"; then
          echo "ERROR: Cloudflare API returned success=false" >&2
          echo "purged=false" >> "${GITHUB_OUTPUT}"
          exit 1
        fi

        echo "purged=true" >> "${GITHUB_OUTPUT}"
        echo "Cache purge OK."
