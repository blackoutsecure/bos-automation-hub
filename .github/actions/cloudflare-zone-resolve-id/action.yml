name: Resolve Cloudflare zone ID
description: >-
  Resolve a Cloudflare zone ID from one of three sources, in order:
  (1) the explicit `zone_id` input, (2) the `fallback_zone_id`
  input, or (3) a `GET /zones?name=<apex>` lookup against the
  Cloudflare API using `api_token`, with the apex derived from a
  supplied `site_url`. The auto-resolve path lets callers avoid
  storing `CLOUDFLARE_ZONE_ID` as a GitHub secret entirely — as
  long as the API token carries `Zone → Zone → Read`. Resolved
  values flow through
  [`shared/cloudflare-resolve-id`](../shared/cloudflare-resolve-id/action.yml)
  for shape validation (`^[0-9a-f]{32}$`) and optional masking.

  This action is general-purpose: any workflow that needs a zone ID
  (cache purge, DNS updates, Workers routes, page rules, etc.) can
  call it instead of duplicating the URL-extraction + curl + JSON
  parsing logic.

inputs:
  zone_id:
    description: >-
      Cloudflare zone ID (32-char lowercase hex). Optional — when
      empty, the action falls back to `fallback_zone_id`, then
      auto-resolves via the Cloudflare API when `site_url` and
      `api_token` are supplied.
    required: false
    default: ''
  fallback_zone_id:
    description: >-
      Optional secondary source (e.g. for callers that historically
      stored the value under a different secret name). Used only when
      `zone_id` is empty.
    required: false
    default: ''
  site_url:
    description: >-
      Public site URL (e.g. `https://example.com`). When both
      `zone_id` and `fallback_zone_id` are empty, the apex hostname
      is derived from this URL and looked up via
      `GET /zones?name=<apex>` using `api_token`. A single leading
      `www.` is stripped; deeper subdomains are queried as-is and
      must match a zone in the account.
    required: false
    default: ''
  api_token:
    description: >-
      Cloudflare API token. Used only on the auto-resolve path (when
      both `zone_id` and `fallback_zone_id` are empty). The token
      must carry `Zone → Zone → Read` on the target zone. The token
      from `secrets.CLOUDFLARE_API_TOKEN` can be reused if the same
      token also carries the scopes your downstream step needs
      (Cache Purge, DNS Edit, etc.).
    required: false
    default: ''
  mask:
    description: >-
      When `true` (default) the resolved zone ID is registered with
      `::add-mask::` so it never appears verbatim in subsequent logs.
      Defaulted on as cheap defense-in-depth; the resolved value
      itself is not stored as a secret anywhere when auto-resolved.
    required: false
    default: 'true'

outputs:
  value:
    description: 'Resolved, validated 32-char lowercase hex zone ID.'
    value: ${{ steps.resolve.outputs.value }}

runs:
  using: composite
  steps:
    - name: Auto-resolve zone ID from site URL
      id: autoresolve
      if: inputs.zone_id == '' && inputs.fallback_zone_id == '' && inputs.site_url != ''
      shell: bash
      env:
        SITE_URL: ${{ inputs.site_url }}
        API_TOKEN: ${{ inputs.api_token }}
        MASK_EARLY: ${{ inputs.mask }}
      run: |
        set -euo pipefail

        if [ -z "${API_TOKEN}" ]; then
          echo "ERROR: api_token is required for auto-resolve" >&2
          exit 1
        fi
        case "${API_TOKEN}" in
          *[$'\n\r\t ']*)
            echo "ERROR: api_token contains whitespace/newlines" >&2
            exit 1
            ;;
        esac

        # Derive the hostname:
        #   1. strip the scheme (http://, https://, etc.)
        #   2. strip the path (everything from the first '/')
        #   3. strip the port (everything from the first ':')
        #   4. strip a single leading 'www.' (zones are registered at
        #      the apex; deeper subdomains pass through unchanged and
        #      must match a zone in the account themselves)
        #   5. lowercase
        URL="${SITE_URL}"
        HOST="${URL#*://}"
        HOST="${HOST%%/*}"
        HOST="${HOST%%:*}"
        case "${HOST}" in
          www.*) HOST="${HOST#www.}" ;;
        esac
        HOST="$(printf '%s' "${HOST}" | tr '[:upper:]' '[:lower:]')"

        # Cheap RFC-1035-ish domain check. Rejects anything that
        # would make an unsafe URL query parameter, including
        # whitespace and shell metacharacters.
        if ! printf '%s' "${HOST}" | grep -Eq '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$'; then
          echo "ERROR: derived hostname '${HOST}' is not a valid domain" >&2
          exit 1
        fi

        BODY_FILE="$(mktemp)"
        trap 'rm -f "${BODY_FILE}"' EXIT

        # `name` is a Cloudflare-defined query filter. No user-controlled
        # string from `${HOST}` reaches the shell as a command argument
        # — it's URL-encoded by curl as part of the --url value. The
        # token rides in the Authorization header, never in logs.
        HTTP_CODE="$(curl --silent --show-error --location \
          --request GET \
          --get \
          --data-urlencode "name=${HOST}" \
          --data-urlencode 'status=active' \
          --url 'https://api.cloudflare.com/client/v4/zones' \
          --header "Authorization: Bearer ${API_TOKEN}" \
          --header 'Content-Type: application/json' \
          --output "${BODY_FILE}" \
          --write-out '%{http_code}')"

        # Helper: scrub any 32-char hex sequence (zone/account IDs) from
        # a body before surfacing it to stderr. We can't `::add-mask::`
        # *other* IDs in the response because we don't know which ones
        # belong to the caller; redacting them all is the safe default.
        # Multi-line JSON is fine — sed processes line by line.
        scrub_body() {
          sed -E 's/[0-9a-f]{32}/***REDACTED-32HEX***/g' "${BODY_FILE}" >&2 || true
        }

        if [ "${HTTP_CODE}" != "200" ]; then
          echo "ERROR: Cloudflare zones lookup for '${HOST}' returned HTTP ${HTTP_CODE}" >&2
          echo "Hint: the API token needs Zone:Read in addition to whatever scope your downstream step needs." >&2
          scrub_body
          exit 1
        fi

        # Response shape:
        #   {"result":[{"id":"<zone_id>","name":"<host>","status":"active",
        #               "account":{"id":"<account_id>",...},...}],
        #    "success":true,...}
        # The FIRST 32-hex `"id"` in the body is `result[0].id` (the
        # zone ID). Account ID appears later, nested inside the zone
        # object. Using grep instead of jq to keep the action runnable
        # on minimalist self-hosted runners.
        ZONE_ID="$(grep -Eo '"id"[[:space:]]*:[[:space:]]*"[0-9a-f]{32}"' "${BODY_FILE}" | head -n 1 | sed -E 's/.*"([0-9a-f]{32})".*/\1/')"

        if [ -z "${ZONE_ID}" ]; then
          echo "ERROR: no active Cloudflare zone matched name='${HOST}'." >&2
          echo "Hint: ensure the apex domain is attached to the Cloudflare account this token authenticates, or pass zone_id explicitly." >&2
          scrub_body
          exit 1
        fi

        # Register the mask BEFORE writing to GITHUB_OUTPUT so the
        # value never appears verbatim in any later log line of this
        # step (the shared validator in the next step would also mask
        # it, but we want defence in depth in case the downstream
        # step is bypassed or modified). The mask call itself is a
        # workflow command on stdout; the value after `::add-mask::`
        # is scrubbed in subsequent logs but echoed once here — that
        # one occurrence is part of the registration handshake and
        # cannot be avoided.
        if [ "${MASK_EARLY:-true}" = "true" ]; then
          echo "::add-mask::${ZONE_ID}"
        fi
        echo "Auto-resolved zone ID for ${HOST}"
        echo "value=${ZONE_ID}" >> "${GITHUB_OUTPUT}"

    - name: Resolve via shared cloudflare-resolve-id
      id: resolve
      uses: blackoutsecure/bos-automation-hub/.github/actions/shared/cloudflare-resolve-id@main
      with:
        value: ${{ inputs.zone_id || inputs.fallback_zone_id || steps.autoresolve.outputs.value }}
        kind: zone
        mask: ${{ inputs.mask }}
