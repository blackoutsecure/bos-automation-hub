name: Resolve Cloudflare account ID
description: >-
  Resolve a Cloudflare account ID from an input (preferred) or a back-compat
  secret, validate the 32-char hex shape, and mask the value in later step
  logs via `::add-mask::`.

inputs:
  account_id:
    description: >-
      Cloudflare account ID (32-char lowercase hex). Preferred source.
      In a workflow, pass `vars.CLOUDFLARE_ACCOUNT_ID` so the caller
      stays free of literals.
    required: false
    default: ''
  fallback_account_id:
    description: >-
      Optional back-compat fallback (e.g. `secrets.CLOUDFLARE_ACCOUNT_ID`).
      Used only when `account_id` is empty.
    required: false
    default: ''
  mask:
    description: >-
      When `true` (default) the resolved account ID is registered with
      `::add-mask::` so it never appears verbatim in subsequent logs.
    required: false
    default: 'true'

outputs:
  value:
    description: 'Resolved, validated 32-char lowercase hex account ID.'
    value: ${{ steps.resolve.outputs.value }}

runs:
  using: composite
  steps:
    - name: Resolve & validate
      id: resolve
      shell: bash
      env:
        INPUT_ID: ${{ inputs.account_id }}
        FALLBACK_ID: ${{ inputs.fallback_account_id }}
        MASK: ${{ inputs.mask }}
      run: |
        set -euo pipefail
        # Strip any whitespace (newlines from a pasted secret are a common cause
        # of silent 401s and of GITHUB_OUTPUT corruption).
        ID="$(printf '%s' "${INPUT_ID:-${FALLBACK_ID}}" | tr -d '[:space:]')"
        if [ -z "${ID}" ]; then
          echo "ERROR: no Cloudflare account ID supplied. Set the 'account_id' input (preferably from 'vars.CLOUDFLARE_ACCOUNT_ID') or 'fallback_account_id'." >&2
          exit 1
        fi
        if ! printf '%s' "${ID}" | grep -Eq '^[0-9a-f]{32}$'; then
          echo "ERROR: Cloudflare account ID must be a 32-char lowercase hex string" >&2
          exit 1
        fi
        case "${MASK}" in
          true|false) ;;
          *) echo "ERROR: input 'mask' must be 'true' or 'false' (got '${MASK}')" >&2; exit 1 ;;
        esac
        if [ "${MASK}" = "true" ]; then
          echo "::add-mask::${ID}"
        fi
        echo "value=${ID}" >> "${GITHUB_OUTPUT}"
