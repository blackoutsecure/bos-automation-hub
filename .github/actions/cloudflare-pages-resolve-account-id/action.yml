name: Resolve Cloudflare account ID
description: >-
  Thin back-compat wrapper around
  [`shared/cloudflare-resolve-id`](../shared/cloudflare-resolve-id/action.yml)
  that preserves the historical `account_id` / `fallback_account_id`
  inputs documented in the repo README. New actions should call the
  shared resolver directly with `kind: account`.

inputs:
  account_id:
    description: >-
      Cloudflare account ID (32-char lowercase hex). Preferred source.
      In a workflow, pass `vars.CLOUDFLARE_ACCOUNT_ID` so the caller
      stays free of literals.
    required: false
    default: ''
  fallback_account_id:
    description: >-
      Optional back-compat fallback (e.g. `secrets.CLOUDFLARE_ACCOUNT_ID`).
      Used only when `account_id` is empty.
    required: false
    default: ''
  mask:
    description: >-
      When `true` (default) the resolved account ID is registered with
      `::add-mask::` so it never appears verbatim in subsequent logs.
    required: false
    default: 'true'

outputs:
  value:
    description: 'Resolved, validated 32-char lowercase hex account ID.'
    value: ${{ steps.resolve.outputs.value }}

runs:
  using: composite
  steps:
    - name: Resolve via shared cloudflare-resolve-id
      id: resolve
      uses: blackoutsecure/bos-automation-hub/.github/actions/shared/cloudflare-resolve-id@main
      with:
        value: ${{ inputs.account_id }}
        fallback: ${{ inputs.fallback_account_id }}
        kind: account
        mask: ${{ inputs.mask }}
