name: Resolve Cloudflare account ID
description: >-
  Resolve the Cloudflare account ID from one of three sources, in order:
  (1) the explicit `account_id` input, (2) the `fallback_account_id`
  input, or (3) a `GET /accounts` lookup against the Cloudflare API
  using `api_token`. The auto-resolve path lets callers avoid storing
  `CLOUDFLARE_ACCOUNT_ID` as a GitHub secret entirely — most
  Pages:Edit-scoped tokens are tied to a single account, so the
  lookup is unambiguous. Resolved values flow through
  [`shared/cloudflare-resolve-id`](../shared/cloudflare-resolve-id/action.yml)
  for shape validation (`^[0-9a-f]{32}$`) and optional masking.

inputs:
  account_id:
    description: >-
      Cloudflare account ID (32-char lowercase hex). Optional — when
      empty, the action falls back to `fallback_account_id`, then
      auto-resolves via the Cloudflare API when `api_token` is supplied.
    required: false
    default: ''
  fallback_account_id:
    description: >-
      Optional secondary source (e.g. for callers that historically
      stored the value under a different secret name). Used only when
      `account_id` is empty.
    required: false
    default: ''
  api_token:
    description: >-
      Cloudflare API token. Used only on the auto-resolve path (when
      both `account_id` and `fallback_account_id` are empty). The
      token's `GET /accounts` response lists the accounts it can
      access; an account-scoped Pages:Edit token returns exactly one
      account, which is what we use. No additional scope is required
      beyond whatever the token already carries for your downstream
      step (Pages:Edit, R2, etc.).
    required: false
    default: ''
  account_name:
    description: >-
      Optional exact account name filter for the auto-resolve path.
      Forwarded to `GET /accounts?name=<account_name>`. Required only
      when the token can access multiple accounts and you need to pick
      a specific one; account-scoped tokens (the common case) can
      leave this empty.
    required: false
    default: ''
  mask:
    description: >-
      When `true` (default) the resolved account ID is registered with
      `::add-mask::` so it never appears verbatim in subsequent logs.
      Defaulted on as cheap defense-in-depth; the resolved value
      itself is not stored as a secret anywhere when auto-resolved.
    required: false
    default: 'true'

outputs:
  value:
    description: 'Resolved, validated 32-char lowercase hex account ID.'
    value: ${{ steps.resolve.outputs.value }}

runs:
  using: composite
  steps:
    - name: Auto-resolve account ID via Cloudflare API
      id: autoresolve
      if: inputs.account_id == '' && inputs.fallback_account_id == '' && inputs.api_token != ''
      shell: bash
      env:
        API_TOKEN: ${{ inputs.api_token }}
        ACCOUNT_NAME: ${{ inputs.account_name }}
        MASK_EARLY: ${{ inputs.mask }}
      run: |
        set -euo pipefail

        if [ -z "${API_TOKEN}" ]; then
          echo "ERROR: api_token is required for auto-resolve" >&2
          exit 1
        fi
        case "${API_TOKEN}" in
          *[$'\n\r\t ']*)
            echo "ERROR: api_token contains whitespace/newlines" >&2
            exit 1
            ;;
        esac

        # Validate account_name when supplied so it can't escape into
        # an unsafe URL query. Cloudflare account names allow letters,
        # digits, spaces, `-`, `_`, `.`, `&`, and `'` (per the dashboard
        # validator). Reject anything else.
        if [ -n "${ACCOUNT_NAME}" ]; then
          if ! printf '%s' "${ACCOUNT_NAME}" | grep -Eq "^[A-Za-z0-9 ._&'-]{1,100}$"; then
            echo "ERROR: account_name contains characters that would not be a valid Cloudflare account name" >&2
            exit 1
          fi
        fi

        BODY_FILE="$(mktemp)"
        trap 'rm -f "${BODY_FILE}"' EXIT

        # Helper: redact any 32-char hex sequence (account/zone IDs)
        # before surfacing the raw response body to stderr. We can't
        # `::add-mask::` IDs that don't belong to the caller, so the
        # safe default is to scrub them all out of diagnostic dumps.
        scrub_body() {
          sed -E 's/[0-9a-f]{32}/***REDACTED-32HEX***/g' "${BODY_FILE}" >&2 || true
        }

        # `--get` + `--data-urlencode` make curl URL-encode the value
        # safely; no user-controlled string reaches the shell as a
        # command argument. The token rides in the Authorization header,
        # never in logs.
        if [ -n "${ACCOUNT_NAME}" ]; then
          HTTP_CODE="$(curl --silent --show-error --location \
            --request GET \
            --get \
            --data-urlencode "name=${ACCOUNT_NAME}" \
            --url 'https://api.cloudflare.com/client/v4/accounts' \
            --header "Authorization: Bearer ${API_TOKEN}" \
            --header 'Content-Type: application/json' \
            --output "${BODY_FILE}" \
            --write-out '%{http_code}')"
        else
          HTTP_CODE="$(curl --silent --show-error --location \
            --request GET \
            --url 'https://api.cloudflare.com/client/v4/accounts' \
            --header "Authorization: Bearer ${API_TOKEN}" \
            --header 'Content-Type: application/json' \
            --output "${BODY_FILE}" \
            --write-out '%{http_code}')"
        fi

        if [ "${HTTP_CODE}" != "200" ]; then
          echo "ERROR: Cloudflare accounts lookup returned HTTP ${HTTP_CODE}" >&2
          echo "Hint: ensure the API token is valid and has at least one account-scoped permission." >&2
          scrub_body
          exit 1
        fi

        # Response shape:
        #   {"result":[{"id":"<account_id>","name":"<name>","type":"...",...}],
        #    "result_info":{"page":1,"per_page":20,"total_pages":1,
        #                   "count":N,"total_count":N},
        #    "success":true,...}
        # When multiple accounts are returned (user-scoped token with
        # access to several orgs), demand `account_name` so the caller
        # picks deterministically — taking `result[0]` silently would
        # be a footgun.
        COUNT="$(grep -Eo '"total_count"[[:space:]]*:[[:space:]]*[0-9]+' "${BODY_FILE}" | head -n 1 | grep -Eo '[0-9]+$' || echo 0)"
        if [ "${COUNT}" = "0" ] || [ -z "${COUNT}" ]; then
          if [ -n "${ACCOUNT_NAME}" ]; then
            echo "ERROR: no Cloudflare account matched name='${ACCOUNT_NAME}'." >&2
          else
            echo "ERROR: the API token returned zero accounts. The token has no account-scoped permissions." >&2
          fi
          scrub_body
          exit 1
        fi
        if [ "${COUNT}" -gt 1 ] && [ -z "${ACCOUNT_NAME}" ]; then
          echo "ERROR: the API token can access ${COUNT} accounts; pass 'account_name' to pick one, or set 'account_id' explicitly." >&2
          # Surface only names (never IDs) so the caller can identify
          # which account_name to use without leaking IDs into logs.
          grep -Eo '"name"[[:space:]]*:[[:space:]]*"[^"]+"' "${BODY_FILE}" | sed -E 's/^"name"[[:space:]]*:[[:space:]]*"([^"]+)"$/  - \1/' >&2 || true
          exit 1
        fi

        # First 32-hex `"id"` in the body is `result[0].id`. Account
        # objects only contain one 32-hex id field at the top level;
        # `subscription` / `settings` sub-objects don't carry 32-hex
        # ids. Using grep instead of jq to keep the action runnable
        # on minimalist self-hosted runners.
        ACCOUNT_ID="$(grep -Eo '"id"[[:space:]]*:[[:space:]]*"[0-9a-f]{32}"' "${BODY_FILE}" | head -n 1 | sed -E 's/.*"([0-9a-f]{32})".*/\1/')"

        if [ -z "${ACCOUNT_ID}" ]; then
          echo "ERROR: failed to parse account ID from Cloudflare /accounts response." >&2
          scrub_body
          exit 1
        fi

        # Register the mask BEFORE writing to GITHUB_OUTPUT so the
        # value never appears verbatim in any later log line of this
        # step. The shared validator in the next step also masks; this
        # is defence in depth in case the downstream step is bypassed.
        if [ "${MASK_EARLY:-true}" = "true" ]; then
          echo "::add-mask::${ACCOUNT_ID}"
        fi
        echo "Auto-resolved Cloudflare account ID"
        echo "value=${ACCOUNT_ID}" >> "${GITHUB_OUTPUT}"

    - name: Resolve via shared cloudflare-resolve-id
      id: resolve
      uses: blackoutsecure/bos-automation-hub/.github/actions/shared/cloudflare-resolve-id@main
      with:
        value: ${{ inputs.account_id || inputs.fallback_account_id || steps.autoresolve.outputs.value }}
        kind: account
        mask: ${{ inputs.mask }}
