name: Commit and push
description: >-
  Stage one or more files, commit them with a configurable author and
  message, and push to the current branch with rebase-retry on conflict.
  Exits cleanly with `committed=false` when there is no staged diff (so
  callers can use the action unconditionally without an outer `if:`
  gate). All inputs flow through `env:`; nothing is interpolated into
  the `run:` body.

inputs:
  files:
    description: >-
      Newline- or whitespace-separated list of repo-relative paths to
      `git add`. Glob patterns are NOT expanded — pass exact paths. Paths
      must not contain `..` or be absolute. At least one path is required.
    required: true
  message:
    description: 'Commit message. Must be non-empty and single-line.'
    required: true
  git_user_name:
    description: 'Git author name.'
    required: false
    default: 'github-actions[bot]'
  git_user_email:
    description: 'Git author email.'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  push_retries:
    description: >-
      Retry attempts for `git push` (1-10). Each retry runs
      `git pull --rebase --autostash` before reattempting.
    required: false
    default: '3'
  branch:
    description: >-
      Target branch ref name (no `refs/heads/` prefix). Defaults to the
      current `GITHUB_REF_NAME`, which is what callers want unless they
      checked out a different branch.
    required: false
    default: ''
  dry_run:
    description: >-
      When `true`, performs all validation and staging but does not
      commit or push. Useful for CI drift-check jobs.
    required: false
    default: 'false'

outputs:
  committed:
    description: '`true` when a commit was created and pushed; `false` when there was nothing to commit (or `dry_run: true`).'
    value: ${{ steps.run.outputs.committed }}
  commit_sha:
    description: 'SHA of the new commit (empty when `committed=false`).'
    value: ${{ steps.run.outputs.commit_sha }}

runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        FILES: ${{ inputs.files }}
        MESSAGE: ${{ inputs.message }}
        GIT_USER_NAME: ${{ inputs.git_user_name }}
        GIT_USER_EMAIL: ${{ inputs.git_user_email }}
        PUSH_RETRIES: ${{ inputs.push_retries }}
        BRANCH_INPUT: ${{ inputs.branch }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail

        die() { echo "ERROR: $*" >&2; exit 1; }

        # --- Validate inputs --------------------------------------------------
        case "${MESSAGE}" in
          '') die "input 'message' is required" ;;
          *$'\n'*) die "input 'message' must be single-line" ;;
        esac

        case "${GIT_USER_NAME}" in
          ''|*$'\n'*) die "input 'git_user_name' is required and must be single-line" ;;
        esac
        case "${GIT_USER_EMAIL}" in
          ''|*$'\n'*) die "input 'git_user_email' is required and must be single-line" ;;
        esac

        case "${PUSH_RETRIES}" in
          ''|*[!0-9]*) die "input 'push_retries' must be an integer 1-10 (got: '${PUSH_RETRIES}')" ;;
        esac
        if [ "${PUSH_RETRIES}" -lt 1 ] || [ "${PUSH_RETRIES}" -gt 10 ]; then
          die "input 'push_retries' must be in 1-10 (got: ${PUSH_RETRIES})"
        fi

        case "${DRY_RUN}" in
          true|false) ;;
          *) die "input 'dry_run' must be 'true' or 'false' (got: '${DRY_RUN}')" ;;
        esac

        BRANCH="${BRANCH_INPUT:-${GITHUB_REF_NAME:-}}"
        case "${BRANCH}" in
          ''|*$'\n'*|refs/*) die "could not determine target branch (input='${BRANCH_INPUT}', GITHUB_REF_NAME='${GITHUB_REF_NAME:-}')" ;;
        esac

        # Parse FILES (newline OR whitespace separated). Validate each.
        FILE_LIST=()
        while IFS= read -r raw || [ -n "${raw}" ]; do
          for token in ${raw}; do
            [ -z "${token}" ] && continue
            case "${token}" in
              \#*) continue ;;
              /*) die "file path must be repo-relative, got absolute: '${token}'" ;;
              *..*) die "file path must not contain '..': '${token}'" ;;
              *$'\n'*|*$'\r'*) die "file path contains newline" ;;
            esac
            FILE_LIST+=("${token}")
          done
        done <<< "${FILES}"

        if [ "${#FILE_LIST[@]}" -eq 0 ]; then
          die "input 'files' resolved to zero paths"
        fi

        # --- Configure git ----------------------------------------------------
        git config user.name  "${GIT_USER_NAME}"
        git config user.email "${GIT_USER_EMAIL}"

        # --- Stage ------------------------------------------------------------
        # Use `--` to defend against paths that look like options.
        git add -- "${FILE_LIST[@]}"

        if git diff --cached --quiet; then
          echo "Nothing to commit."
          {
            echo "committed=false"
            echo "commit_sha="
          } >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        if [ "${DRY_RUN}" = "true" ]; then
          echo "dry_run=true; not committing. Staged diff:"
          git diff --cached --stat
          # Reset the index so the caller's working tree is unchanged.
          git reset --quiet HEAD -- "${FILE_LIST[@]}"
          {
            echo "committed=false"
            echo "commit_sha="
          } >> "${GITHUB_OUTPUT}"
          exit 0
        fi

        # --- Commit -----------------------------------------------------------
        git commit -m "${MESSAGE}"
        NEW_SHA="$(git rev-parse HEAD)"

        # --- Push with rebase-retry ------------------------------------------
        for attempt in $(seq 1 "${PUSH_RETRIES}"); do
          if git push origin "HEAD:${BRANCH}"; then
            echo "Pushed ${NEW_SHA} to ${BRANCH} (attempt ${attempt})."
            {
              echo "committed=true"
              echo "commit_sha=${NEW_SHA}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          if [ "${attempt}" -eq "${PUSH_RETRIES}" ]; then
            die "git push failed after ${PUSH_RETRIES} attempts"
          fi
          echo "git push attempt ${attempt}/${PUSH_RETRIES} failed; rebasing and retrying..."
          git pull --rebase --autostash origin "${BRANCH}"
          # `rev-parse HEAD` may change after rebase; refresh.
          NEW_SHA="$(git rev-parse HEAD)"
        done
