# .bos-launchpad.yaml — Cloudflare Pages flavor example
#
# Copy to `.bos-launchpad.yaml` at your repo root and customize.
# Required when the `bos_launchpad_cf_pages` service is enabled in
# your sync-managed-files caller.
#
# Schema reference (full): see the "`.bos-launchpad.yaml` schema"
# section in the hub README.
# https://github.com/blackoutsecure/bos-automation-hub

# ----- Stage toggles -----
# cf-pages flavor only needs `cloudflare_pages` enabled. Default
# `true` if this file is present at all; explicit here for clarity.
stages:
  cloudflare_pages: true

# ----- Cloudflare Pages deploy -----
cloudflare:
  project_name: 'blackoutsecure-site'
  site_url: 'https://blackoutsecure.app'
  deployment_environment: 'production'

  # `public_dir` is the directory that gets STAGED (copied into
  # deploy_dir). `.` = repo root.
  public_dir: '.'
  deploy_dir: './dist'
  clean_deploy_dir: true

  # Files & directories to stage into `deploy_dir` from `public_dir`.
  # One path per line; `|-` chomps the trailing newline so multi-line
  # values stay byte-stable through the forwarding chain.
  #
  # NOTE: omit `_headers` from `copy_files` when `headers.generate: true`
  # below — the generator writes `_headers` directly into `deploy_dir`
  # and (by default) refuses to overwrite an existing file.
  copy_files: |-
    index.html
    _redirects
    humans.txt
  copy_dirs: |-
    assets

  prebuild_command: ''            # e.g. 'npm ci && npm run build'
  working_directory: ''           # blank = repo root
  branch: ''                      # blank = use default branch
  commit_message: ''              # blank = use trigger commit message
  wrangler_version: ''            # blank = action default
  extra_wrangler_args: ''
  runs_on: ''                     # blank = ubuntu-latest
  checkout_fetch_depth: 0         # 0 = full history
  purge_cache: true               # purge edge cache after deploy

  # ----- Generators (all default false — opt in per generator) -----
  generate_sitemap: true
  generate_robots: true
  generate_security_txt: true
  security_contact: 'info@blackoutsecure.app'
  generate_manifest: true
  manifest_name: 'Blackout Secure'
  manifest_short_name: 'BOS'
  manifest_description: 'Edge-secure, audit-ready ADS-B and runner infrastructure.'
  manifest_orientation: 'portrait'
  manifest_theme_color: '#0a0a0a'
  manifest_background_color: '#0a0a0a'
  manifest_lang: 'en-US'
  manifest_dir: 'ltr'
  manifest_categories: 'utilities,productivity'
  manifest_icons_dir: 'assets/icons'

  # ----- _headers generator (hub-local composite action) -----
  # Dynamically writes `<deploy_dir>/_headers` from composable presets
  # following Cloudflare's _headers spec. Omit `_headers` from
  # `copy_files` above when this is enabled.
  #
  # Docs: https://developers.cloudflare.com/pages/configuration/headers/
  # Action: .github/actions/cf-pages-headers-generate/ (in bos-automation-hub)
  headers:
    generate: true

    # Comma-separated preset list. Order matters (later blocks win
    # for the same path under CF Pages first-match rules).
    #   security   — HSTS, X-Frame-Options, X-Content-Type-Options,
    #                Referrer-Policy, Permissions-Policy, optional CSP.
    #   cache      — HTML no-cache, /assets/* immutable 1y, images 1mo,
    #                /favicon.ico 1w, /site.webmanifest 1d, /sw.js no-cache.
    #   cors-fonts — /*.woff and /*.woff2 immutable + Access-Control-Allow-Origin: *
    #   opkg-feed  — *.ipk octet-stream + Packages*/no-cache (OpenWrt feeds).
    #   none       — emit no presets (use with `custom_rules` only).
    presets: 'security,cache,cors-fonts'

    # Optional Content-Security-Policy value (single line, ≤2000 chars).
    # Appended to the security preset's `/*` block. Tailor the allowlist
    # to your site's actual third-party origins.
    csp: "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # HSTS max-age in seconds. Default 63072000 (2 years, preload-list
    # requirement). Set to '0' to suppress HSTS entirely (useful for
    # preview deployments on untrusted subdomains).
    hsts_max_age: '63072000'

    # Permissions-Policy denylist. Default disables high-risk features
    # a static site never needs. Set empty to omit the header.
    permissions_policy: 'accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()'

    # Cache-Control values for the `cache` preset.
    cache_html_control: 'public, max-age=0, must-revalidate'
    cache_assets_pattern: '/assets/*'
    cache_assets_control: 'public, max-age=31536000, immutable'

    # Raw `_headers` content appended verbatim AFTER all preset blocks.
    # Use this for per-site rules the presets don't cover.
    custom_rules: |-
      /.well-known/security.txt
        Content-Type: text/plain; charset=utf-8
      /robots.txt
        Content-Type: text/plain; charset=utf-8

    # Set true once migrated away from a hand-maintained `_headers`.
    # Default false (safety interlock against silently clobbering a
    # file the caller forgot to delete from `public_dir`).
    replace_existing: true
