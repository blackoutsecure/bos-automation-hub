# Marketplace Action — PR-time compliance guard example.
#
# WHERE THIS LIVES: on the **dev** branch of a GitHub Marketplace
# Action repo, at `.github/workflows/marketplace-guard.yml`. (Same
# reasoning as the release caller: workflow files can only live on
# `dev`, not on `main`.)
#
# WHAT IT DOES:
#   Runs on every PR that targets `main` (the default branch) and
#   fails fast if the PR would add or modify any file under
#   `.github/workflows/**` on `main`. Surfaces the violation as a
#   per-file annotation in the PR check tab.
#
# WHY `pull_request_target` (not `pull_request`):
#   PRs from feature branches into `main` would (correctly) not see
#   this workflow if we used `pull_request` — `pull_request` resolves
#   the workflow file from the PR's BASE branch (`main`), which has
#   no workflows by design. `pull_request_target` resolves from the
#   DEFAULT branch's workflow set, BUT we want this file to live on
#   `dev`. Solution: set the default branch to `main` for Marketplace
#   visibility, but register this workflow file on `dev` ONLY IF you
#   also opt into the dev-default trick OR you accept that this guard
#   only fires for `dev -> main` PRs (the common case the guard is
#   for anyway).
#
#   The simpler, equivalent setup is to keep this guard file on
#   **both** dev (for dev->main PRs from outside contributors) and on
#   the source branch the PR originates from. The release-promote
#   workflow's allowlist hard-block plus the org ruleset still catch
#   anything this misses.
#
# SECURITY NOTE: `pull_request_target` runs in the BASE-branch context
# with the BASE-branch token. We do NOT execute PR code — only `git
# diff` the two SHAs. Safe to keep `permissions: contents: read`.
name: Marketplace guard

"on":
  pull_request_target:
    branches: ['main']
    # Only the paths-of-interest events to keep CI noise down. The
    # guard composite is a few seconds either way; you can drop this
    # filter to run on every PR.
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: marketplace-guard-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    uses: blackoutsecure/bos-automation-hub/.github/workflows/marketplace-repo-guard.yml@main
    with:
      pr_base_sha:        ${{ github.event.pull_request.base.sha }}
      pr_head_sha:        ${{ github.event.pull_request.head.sha }}
      check_pr_diff:      true
      check_tree_state:   true
      require_action_yml: true   # this repo IS a Marketplace Action
      blocked_paths: |
        .github/workflows/

      # ----- Required paths (opt-in symmetric check) ---------------------
      # Paths that MUST exist on the protected branch AND must not be
      # deleted by a PR. Fails fast on the inverse regression — e.g.
      # someone removes `.github/dependabot.yml` from dev, which
      # would silently cascade to main on the next promote and break
      # Dependabot (which reads its config only from the default
      # branch).
      #
      # Recommended baseline for Marketplace Action repos:
      #   * .github/dependabot.yml   — Dependabot needs this on main
      #   * action.yml               — the Marketplace manifest
      #   * LICENSE                  — required by Marketplace policy
      #   * README.md                — appears on the Marketplace listing
      #
      # Each entry must exist on the BASE branch's tree (else the
      # guard fails on the first PR after enabling it). If your repo
      # doesn't use Dependabot, omit the first line.
      required_paths: |
        .github/dependabot.yml
        action.yml
        LICENSE
        README.md
