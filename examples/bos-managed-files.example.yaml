# yaml-language-server: $schema=https://json.schemastore.org/none
#
# .bos-managed-files.yaml — per-repo placeholder values for the
# bos-automation-hub `license_apache2`, `notice_apache2`, and
# `codeowners` sync services.
#
# Consumed by: blackoutsecure/bos-automation-hub/.github/actions/
#              sync-managed-files/sync.py
# Docs:        bos-automation-hub README → "`.bos-managed-files.yaml` schema"
#
# Place this file at the repo ROOT (sibling to `LICENSE` / `NOTICE`).
# All keys are OPTIONAL — when this file is absent OR a key is
# missing, the hub uses org-canonical defaults shown in parentheses.
#
# Flat YAML only: one `key: value` per line. No nesting, no lists,
# no multi-line scalars. Comment lines (#) and inline comments are
# stripped. Unknown keys, malformed lines, and out-of-range years
# fail the sync.

# Copyright holder rendered into NOTICE.
# Default: "Blackout Secure"
copyright_holder: "Blackout Secure"

# First-publication year for this repo. The hub computes
# `COPYRIGHT_YEAR_RANGE` automatically:
#   * unset OR equal to current year → "YYYY"        (e.g. "2026")
#   * earlier year                   → "YYYY-current" (e.g. "2024-2026")
# Must be between 1970 and the current year if set.
# Default: "" (renders as just the current year)
copyright_year_start: 2024

# CODEOWNERS catch-all team — used in the default `* @<team>` rule.
# Must be a valid GitHub team slug (prefix `@`) or username. Consumers
# add per-path overrides BELOW the catch-all in the generated
# `.github/CODEOWNERS` (CODEOWNERS uses last-match-wins semantics).
# Default: "@blackoutsecure/maintainers"
maintainers_team: "@blackoutsecure/maintainers"
