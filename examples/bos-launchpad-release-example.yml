# Reference template for upstream-tracked container release callers
# (Docker + Balena + GitHub Release). Copy to `.github/workflows/bos-launchpad.yml`
# in the consumer repo and fill in the `# TODO` placeholders.
#
# Required vars:    DOCKERHUB_NAMESPACE, BALENA_NAMESPACE
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, BALENA_API_TOKEN
# Optional secrets: UPSTREAM_TOKEN — PAT with `contents: read` on the
#                   upstream repo. Only needed for private upstreams
#                   outside the caller; GITHUB_TOKEN can't read other
#                   private repos.
#
# Full input reference and gotchas: https://github.com/blackoutsecure/bos-automation-hub

name: Blackout Secure Launchpad

on:
  schedule:
    - cron: '17 */6 * * *'   # stagger off :00 to dodge org cron pile-ups
  workflow_dispatch:
    inputs:
      stage_docker:
        description: 'Stage: docker build & push'
        type: boolean
        default: true
      stage_balena:
        description: 'Stage: balena block publish'
        type: boolean
        default: true
      stage_github_release:
        description: 'Stage: GitHub Release publish'
        type: boolean
        default: true
      force_run:
        description: 'Force: run pipeline even if upstream unchanged'
        type: boolean
        default: false
      # `auto` lets the hub decide prerelease from the SemVer suffix.
      # `'true'`/`'false'` force the flag. Ignored unless
      # `stage_github_release` is on.
      release_prerelease:
        description: 'Release: prerelease flag (only for stage_github_release)'
        type: choice
        options: [auto, 'true', 'false']
        default: auto

# No top-level `concurrency:` — the hub workflow owns serialization;
# declaring it on both sides triggers a GHA self-deadlock.

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents:        write   # monitor tracking-file commit + GitHub Release publish
      actions:         write   # nested monitor (`gh workflow run`)
      pull-requests:   write   # nested Docker Scout PR annotations
      security-events: write   # nested Docker Scout SARIF upload
    uses: blackoutsecure/bos-automation-hub/.github/workflows/bos-launchpad.yml@main
    with:
      # Schedule runs use the defaults; manual runs honour the dispatch
      # checkboxes. Every launchpad stage defaults to `false` in the
      # hub — opt in explicitly.
      docker:         ${{ github.event_name != 'workflow_dispatch' || inputs.stage_docker }}
      balena:         ${{ github.event_name != 'workflow_dispatch' || inputs.stage_balena }}
      github_release: ${{ github.event_name != 'workflow_dispatch' || inputs.stage_github_release }}

      # TODO: upstream repo whose releases drive yours. Default source
      # is `github_release` (poll latest release). For rolling builds
      # off a dev branch, switch to `source: github_branch_file` and
      # add `upstream_branch:` + `track_file:` for that branch.
      upstream_repo: <UPSTREAM_OWNER>/<UPSTREAM_REPO>

      # TODO: per-app tracking file path (lets one repo track multiple upstreams).
      track_file: .github/upstream/<APP_NAME>.json

      force_run: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run }}

      # TODO: image name (no namespace). The Balena block slug defaults
      # to `image_name` when `block_name` is omitted — set `block_name`
      # only if the image and block slugs should diverge.
      image_name:          <APP_NAME>
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE }}
      balena_namespace:    ${{ vars.BALENA_NAMESPACE }}

      # Render balena.yml at publish time — no checked-in copy needed.
      balena_generate_yml: true

      # TODO: one-line block description shown on Balena Hub.
      balena_description: >-
        One-line description of what this block does. Mention the upstream
        application and any key features that differentiate the container.

      # TODO: usage snippet (Markdown) rendered on the Balena Hub block page.
      balena_post_provisioning: |
        ## Usage instructions

        Include this snippet in your docker-compose.yml file under 'services':

          ```
          <APP_NAME>:
            image: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/<APP_NAME>:latest
            restart: unless-stopped
            environment:
              - TZ=Etc/UTC
            security_opt:
              - 'no-new-privileges:true'
          ```

        Repository: https://github.com/${{ github.repository }}
        Upstream application: https://github.com/<UPSTREAM_OWNER>/<UPSTREAM_REPO>

      # `release_prerelease`: `auto` collapses to empty (hub decides from
      # the SemVer suffix); `'true'`/`'false'` force the flag. Collapses
      # to `''` outside `workflow_dispatch`.
      release_prerelease: ${{ (github.event_name == 'workflow_dispatch' && inputs.release_prerelease != 'auto') && inputs.release_prerelease || '' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}
      # Uncomment for private upstreams — forwarded to the monitor stage's
      # GitHub API calls. Falls back to GITHUB_TOKEN.
      # UPSTREAM_TOKEN:   ${{ secrets.UPSTREAM_TOKEN }}
