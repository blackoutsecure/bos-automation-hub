# Marketplace Action â€” dev -> main release example.
#
# WHERE THIS LIVES: on the **dev** branch of a GitHub Marketplace
# Action repo (e.g. `bos-sitemap-generator`, `bos-upstream-watcher`),
# at `.github/workflows/release.yml`. It MUST NOT exist on `main` â€”
# that would defeat the entire point of the Marketplace-publishing
# workflow-file restriction.
#
# WHAT IT DOES:
#   1. Operator triggers `workflow_dispatch` and types the SemVer tag.
#   2. release-promote.yml promotes the allowlisted files from `dev`
#      to `main` and tags `main` at the promoted SHA.
#   3. release-promote.yml chains into github-release.yml to publish
#      a GitHub Release (which is what triggers Marketplace pickup).
#
# AUTOMATIC ENFORCEMENT:
#   * The underlying bos-marketplace-kit `promote` Action rejects
#     any path under `.github/workflows/**` in the allowlist (hard
#     error).
#   * `main` branch must have the org ruleset applied (see
#     `scripts/marketplace-repo/` in the hub) â€” that platform-level
#     enforcement is what catches any path that slips past this caller.
#
# SETUP (one-time per Marketplace Action repo):
#   * Set repo default branch to `main` (Settings -> Branches).
#   * Push `dev` from `main`: `git push origin main:dev`.
#   * Add this file at `.github/workflows/release.yml` on `dev`.
#   * Add the guard caller (see `marketplace-action-guard.example.yml`).
#   * Apply the org ruleset (`scripts/marketplace-repo/bootstrap-ruleset.sh`)
#     OR per-repo branch protection
#     (`scripts/marketplace-repo/bootstrap-branch-protection.sh`).
#   * On first Marketplace publish, the operator must tick "Publish to
#     Marketplace" in the Release UI â€” subsequent releases auto-publish.
name: Release (Marketplace promote)

"on":
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (SemVer, e.g. v1.4.0 or v1.4.0-rc.1).'
        required: true
        type: string
      dry_run:
        description: 'Dry run (validate + diff, do not push/tag).'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Publish the GitHub Release as a draft.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release:
    uses: blackoutsecure/bos-automation-hub/.github/workflows/release-promote.yml@main
    # `contents: write` is required by both the promote stage (push
    # branch + tag) and the release stage (create the Release).
    permissions:
      contents: write
    with:
      source_branch: 'dev'
      target_branch: 'main'

      # ----- Allowlist ---------------------------------------------------
      # Every file the **published Action consumer** needs at runtime
      # MUST appear here. Anything not listed is missing from `main`.
      # `.github/workflows/**` is hard-blocked by the composite â€” do
      # not attempt to add it.
      #
      # Typical Marketplace Action repo allowlist:
      #   * `action.yml` â€” the Marketplace manifest (REQUIRED).
      #   * `src/**` â€” implementation (JS / shell / etc.).
      #   * `dist/**` â€” bundled output (JS Actions only).
      #   * `README.md` â€” appears on the Marketplace listing.
      #   * `LICENSE` / `NOTICE` â€” required by Marketplace policy.
      #   * `SECURITY.md` â€” public security policy.
      #   * Top-level config consumed at action runtime (e.g.
      #     `package.json` for JS Actions, `requirements.txt` for
      #     composite-runs-shell Python).
      allowlist_paths: |
        action.yml
        src
        README.md
        LICENSE
        NOTICE
        SECURITY.md

      # ----- Auto-sync toggles (Marketplace-safe `.github/*` files) ------
      # Dependabot reads its config **only from the default branch**.
      # A `dev`-only `.github/dependabot.yml` is ignored by Dependabot
      # entirely. With this toggle ON (default), the release process
      # copies `.github/dependabot.yml` from `dev` to `main` on every
      # promote. The file is auto-skipped (with a notice) if absent
      # â€” safe to leave on even if you don't use Dependabot.
      #
      # Recommended `.github/dependabot.yml` shape on `dev`:
      #   version: 2
      #   updates:
      #     - package-ecosystem: "github-actions"
      #       directory: "/"
      #       schedule: { interval: "weekly" }
      #       target-branch: "dev"      # PR opens against dev (where CI runs)
      include_dependabot_config: true

      # When `true`, auto-syncs additional Marketplace-safe metadata
      # files: `.github/CODEOWNERS`, `.github/FUNDING.yml`,
      # `.github/SECURITY.md`, `.github/CONTRIBUTING.md`,
      # `.github/ISSUE_TEMPLATE/`, `.github/PULL_REQUEST_TEMPLATE.md`,
      # `.github/PULL_REQUEST_TEMPLATE/`. Each is silently skipped if
      # absent on `dev`. Default `false` because most repos curate
      # these explicitly. Flip to `true` if you want all of them
      # synced to main without listing each in `allowlist_paths`.
      include_github_metadata: false

      # Operator-supplied extra paths. Same syntax as
      # `allowlist_paths`, but missing-on-dev entries are silently
      # skipped instead of failing.
      extra_sync_paths: ''

      # NOTE on removals: ANYTHING on `main` that is NOT in the
      # merged allowlist (allowlist_paths + the above toggles + any
      # extra_sync_paths) is REMOVED by this promote. The workflow
      # outputs `removed_paths` and `removed_violations` surface what
      # was cleaned up; the job summary highlights
      # Marketplace-violating files (e.g. workflow files that drifted
      # past the platform ruleset) as a warning.

      tag_name: ${{ inputs.tag_name }}
      dry_run:  ${{ inputs.dry_run }}

      # ----- Release notes ------------------------------------------------
      # Path is resolved on the PROMOTED tag (i.e. the snapshot we just
      # built on `main`) â€” keep the template in the allowlist if you
      # use one.
      release_template_path: ''   # empty => bundled default
      release_extra_context:  |
        REPO=${{ github.repository }}
        TAG=${{ inputs.tag_name }}

      release_draft:           ${{ inputs.draft }}
      release_prerelease:      ''       # empty => auto-detect from -suffix
      release_make_latest:     'true'
      release_generate_notes:  true
