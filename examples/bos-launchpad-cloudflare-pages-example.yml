# Reference template for static-site / Cloudflare Pages callers. Copy to
# `.github/workflows/bos-launchpad.yml` in the consumer repo, then fill in
# the `# TODO` placeholders. Companion: `bos-launchpad-release-example.yml`
# for upstream-tracked container release callers.
#
# Required vars:    CLOUDFLARE_PROJECT_NAME
# Required secrets: CLOUDFLARE_API_TOKEN — needs Account → Cloudflare Pages
#                   → Edit, plus Zone → Cache Purge → Purge and Zone → Zone
#                   → Read when `cloudflare_purge_cache: true`. Zone:Read
#                   lets the purge step auto-resolve the zone ID from
#                   `cloudflare_site_url`; the account ID is auto-resolved
#                   via `GET /accounts`.
# Optional vars:    CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_ZONE_ID — set as `vars`
#                   (org or repo) to pin a specific account/zone and skip
#                   auto-resolution. Storing them as `secrets` causes the
#                   runner to auto-mask, which blocks resolved values from
#                   flowing through `needs.<job>.outputs.*`. Legacy secret
#                   names are still honoured for back-compat.
#
# Full input reference: https://github.com/blackoutsecure/bos-automation-hub

name: Blackout Secure Launchpad

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      # Uncheck for a no-op dispatch (sanity-test wiring without
      # touching Cloudflare).
      stage_cloudflare_pages:
        description: 'Stage: Cloudflare Pages deploy'
        type: boolean
        default: true
      # Uncheck a generator to skip it on this run (e.g. iterating
      # on security.txt without regenerating the rest).
      cloudflare_generate_sitemap:
        description: 'Generate: sitemap.xml'
        type: boolean
        default: true
      cloudflare_generate_robots:
        description: 'Generate: robots.txt'
        type: boolean
        default: true
      cloudflare_generate_security_txt:
        description: 'Generate: .well-known/security.txt'
        type: boolean
        default: true
      cloudflare_generate_manifest:
        description: 'Generate: manifest.webmanifest (PWA)'
        type: boolean
        default: true
      # Force a deploy on a manual run, bypassing the hub's default
      # "deploy only on default-branch pushes" gate.
      force_run:
        description: 'Force: deploy even when the auto gate would skip'
        type: boolean
        default: false

# Do NOT declare a top-level `concurrency:` — the hub workflow owns
# per-project Cloudflare Pages serialization; both sides would deadlock.

permissions:
  contents: read

jobs:
  launchpad:
    permissions:
      contents:        read    # static-site mode: no monitor / release commits
      # Nested Docker Scout paths in the hub's release job demand
      # these; GHA validates nested permissions statically even when
      # those stages are `if:`-skipped at runtime.
      pull-requests:   write
      security-events: write
    uses: blackoutsecure/bos-automation-hub/.github/workflows/bos-launchpad.yml@main
    with:
      # Push runs use the defaults; manual runs honour the dispatch
      # checkboxes. Every launchpad stage defaults to `false` in the
      # hub — opt in explicitly.
      cloudflare_pages: ${{ github.event_name != 'workflow_dispatch' || inputs.stage_cloudflare_pages }}

      # TODO: project name as registered in the Cloudflare dashboard.
      cloudflare_project_name: ${{ vars.CLOUDFLARE_PROJECT_NAME }}

      # TODO: canonical site URL — flows into every generator below.
      cloudflare_site_url: https://example.com

      # TODO: files copied verbatim from the repo root. Globs are
      # expanded by the shell; missing entries fail the run.
      cloudflare_copy_files: |
        index.html
        favicon.ico
        apple-touch-icon.png
        humans.txt
        _headers
        _redirects

      # TODO: directories copied recursively. Entries are `SRC` or `SRC:DEST`.
      cloudflare_copy_dirs: |
        assets
        .well-known

      # Generators run against the staged deploy directory and
      # overwrite any checked-in copy.
      cloudflare_generate_sitemap:      ${{ github.event_name != 'workflow_dispatch' || inputs.cloudflare_generate_sitemap }}
      cloudflare_generate_robots:       ${{ github.event_name != 'workflow_dispatch' || inputs.cloudflare_generate_robots }}
      cloudflare_generate_security_txt: ${{ github.event_name != 'workflow_dispatch' || inputs.cloudflare_generate_security_txt }}
      # TODO: responsible-disclosure contact (email or `https://` URL).
      cloudflare_security_contact:      security@example.com

      cloudflare_generate_manifest:        ${{ github.event_name != 'workflow_dispatch' || inputs.cloudflare_generate_manifest }}
      # TODO: PWA manifest fields.
      cloudflare_manifest_name:            'Example Site'
      cloudflare_manifest_short_name:      'Example'
      cloudflare_manifest_description:     'One-line description of the site.'
      cloudflare_manifest_orientation:     portrait-primary
      cloudflare_manifest_theme_color:     '#000000'
      cloudflare_manifest_background_color: '#000000'
      cloudflare_manifest_lang:            'en-US'
      cloudflare_manifest_dir:             ltr
      cloudflare_manifest_categories:      'business,productivity'
      cloudflare_manifest_icons_dir:       '/assets/'

      # Force the deploy on manual runs when `force_run` is checked;
      # otherwise hub defaults apply (deploy only on default-branch
      # pushes, clean pre-stage, branch inherit, purge cache).
      cloudflare_deploy: ${{ github.event_name == 'workflow_dispatch' && inputs.force_run && 'true' || '' }}
    secrets:
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Back-compat only — prefer `vars.CLOUDFLARE_ACCOUNT_ID` /
      # `vars.CLOUDFLARE_ZONE_ID`. Storing IDs as secrets makes the
      # runner auto-mask them, which blocks resolved values from
      # flowing through `needs.<job>.outputs.*`.
      # CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # CLOUDFLARE_ZONE_ID:    ${{ secrets.CLOUDFLARE_ZONE_ID }}
